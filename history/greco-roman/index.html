.lead{font-size:13.5px;color:var(--ink-soft);margin-bottom:22px;max-width:60ch}

.modes{display:grid;gap:12px}
.mode-card{

}
.mode-card:hover{border-color:var(--ink);transform:translateY(-1px)}
.mode-card:focus-visible{outline:2px solid var(--seal);outline-offset:2px}
.mode-card .code{font-family:"Noto Serif JP",serif;font-weight:700;font-size:18px;color:var(--seal);min-width:30px;padding-top:1px}
.mode-card .body .t{font-weight:700;font-size:15px;margin-bottom:3px}
.mode-card .body .d{font-size:12.5px;color:var(--ink-soft);line-height:1.6}

.era-chip{

}

.opt:hover:not(:disabled){border-color:var(--ink)}
.opt:focus-visible{outline:2px solid var(--seal);outline-offset:1px}
.opt:disabled{cursor:default}
.opt.correct{background:#eef3ea;border-color:var(--e-nanboku);color:#33421f}
.opt.wrong{background:#f6e9e6;border-color:var(--seal);color:#6e2a1e}
.opt.dim{opacity:.5}
.opt.dk{color:var(--ink-soft)}
.opt.dk .mk{color:var(--seal);font-weight:700}

.opt .badge.ans{background:#3f7d52;color:#fff}

@media (max-width:480px){

  .wrap{padding:18px 14px 70px}

function start(){
  if(!state.mode){alert('出題形式を選んでください。');return;}
  buildPool();
  if(state.pool.length===0){alert('出題できる語がありません。');return;}
  show('quiz');renderQuestion();
}

function inEras(){return true;}

function buildPool(){
  let items=DATA.slice();
  if(state.mode==='Bp')items=items.filter(d=>d.type==='人物');
  if(state.mode==='C'){
    // 全時代を最低1回入れ、残りはランダムに補って指定問数ぶん出題（同じ時代が複数回出る）
    let seq=ERA_ORDER.slice();
    while(seq.length<QCOUNT.C)seq.push(ERA_ORDER[Math.floor(Math.random()*ERA_ORDER.length)]);
    state.pool=shuffle(seq).slice(0,QCOUNT.C);
  }else{
    const cap=QCOUNT[state.mode]||12;
    state.pool=shuffle(items).slice(0,Math.min(items.length,cap));
  }
  state.idx=0;state.total=state.pool.length;state.correct=0;state.wrong=[];
}

function show(which){
  ['start','quiz','done'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==which));
  window.scrollTo({top:0,behavior:'instant'});
}
function goHome(){show('start');}
function addBadge(el,text,cls){el.insertAdjacentHTML('beforeend',`<span class="badge ${cls}">${text}</span>`);}

function updateTop(){
  document.getElementById('progress').textContent=`第 ${state.idx+1} 問 / 全 ${state.total} 問`;
  document.getElementById('scoreTag').textContent=state.idx>0?`　正答 ${state.correct}`:'';
}

function explainHTML(d){
  let parts=[];
  parts.push(`区分：<b>${d.era.join('・')}</b>`);
  parts.push(`ジャンル：<b>${d.genre}</b>`);
  if(d.work){const w=byId(d.work);if(w)parts.push(`作品：<b>${w.term}</b>`);}
  if(d.person){const p=byId(d.person);if(p)parts.push(`関連人物：<b>${p.term}</b>`);}
  let s=`<div class="explain"><span class="ttl">解説</span><b>${d.term}</b>：${d.desc}`;
  if(d.note)s+=`<br><span style="color:var(--ink-soft)">※ ${d.note}</span>`;
  s+=`<br><br>${parts.join('　／　')}</div>`;
  return s;
}

function renderQuestion(){
  updateTop();state.answeredCurrent=false;
  const m=state.mode;
  if(m==='A')renderModeA();
  else if(m==='C')renderModeC();
  else renderModeB(); // B / Bp 共通
}

/* ---- モードA：説明 ↔ 語（双方向） ---- */
function renderModeA(){
  const d=state.pool[state.idx];
  const dir=Math.random()<0.5?'toTerm':'toDesc';
  const sameGenre=DATA.filter(x=>x.id!==d.id && x.genre===d.genre);
  let distract;
  if(dir==='toTerm'){
    // 説明 → 語。誤答は同ジャンル（リスト内＋一般用語）。
    const general=(DISTRACTORS[d.genre]||[]).map(t=>({term:t[0],read:t[1],id:'g_'+t[0]}));
    let cand=shuffle([...sameGenre,...general]);
    if(cand.length<3)cand=cand.concat(shuffle(DATA.filter(x=>x.id!==d.id&&!cand.includes(x))));
    distract=cand.slice(0,3);
  }else{
    // 語 → 説明。選択肢は各語の説明文なので、リスト内（説明を持つ語）のみから誤答を作る。
    let cand=shuffle(sameGenre);
    if(cand.length<3)cand=cand.concat(shuffle(DATA.filter(x=>x.id!==d.id&&x.genre!==d.genre)));
    distract=cand.slice(0,3);
  }
  let opts=shuffle([d,...distract]);
  opts=[...opts,{id:'__dk__',dk:true,term:'わからない',desc:'わからない'}];
  const promptLabel=dir==='toTerm'?'この説明にあてはまる語は？':'この語の説明として正しいものは？';
  const promptMain=dir==='toTerm'
    ? `<div class="prompt-desc">${d.desc}</div>`
    : `<div class="prompt-term"><span class="rb">${d.read}</span>${d.term}</div>`;
  const body=document.getElementById('quizBody');
  body.innerHTML=`<div class="card">
    <div class="prompt-label">${promptLabel}</div>
    ${promptMain}
    <div class="opts" id="opts" style="margin-top:16px"></div>
    <div class="actions"><button class="btn btn-primary" id="answerA" disabled>解答する</button></div>
    <div id="afterA"></div>
  </div>`;
  const oc=document.getElementById('opts');
  const marks=['一','二','三','四','五'];
  let selIdx=-1;
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(o.dk?' dk':'');
    let label;
    if(o.dk)label='わからない';
    else if(dir==='toTerm'){const rd=o.read?`<span style="color:var(--ink-soft);font-size:12px">（${o.read}）</span>`:'';label=`${o.term}${rd}`;}
    else label=o.desc;
    b.innerHTML=`<span class="mk">${o.dk?'？':marks[i]}</span><span>${label}</span>`;
    b.addEventListener('click',()=>{
      if(state.answeredCurrent)return;
      selIdx=i;
      [...oc.children].forEach(c=>c.classList.remove('selected'));
      b.classList.add('selected');
      document.getElementById('answerA').disabled=false;
    });
    oc.appendChild(b);
  });
  document.getElementById('answerA').addEventListener('click',()=>{
    if(state.answeredCurrent||selIdx<0)return;
    state.answeredCurrent=true;
    const o=opts[selIdx];
    const ok=o.id===d.id;
    if(ok)state.correct++; else state.wrong.push({type:'item',id:d.id});
    [...oc.children].forEach((c,ci)=>{
      c.disabled=true;c.classList.remove('selected');
      const oo=opts[ci];
      const isCorrect=oo.id===d.id;
      const isPicked=(ci===selIdx);
      if(isCorrect)c.classList.add('correct');
      else if(isPicked && !oo.dk)c.classList.add('wrong');
      else c.classList.add('dim');
      if(isPicked && !oo.dk)addBadge(c,'あなたの解答','your');
      if(isCorrect)addBadge(c,'正しい選択肢','ans');
    });
    document.getElementById('answerA').disabled=true;
    document.getElementById('afterA').innerHTML=verdict(ok)+explainHTML(d)+nextBtnHTML();
    bindNext();
  });
}

/* ---- モードB：区分・ジャンル・人物/実績をまとめて答える ---- */
function renderModeB(){

      headerLabel='次の語に関係する人物について答えてください';
      headerMain=`<div class="prompt-term">${d.key}</div>`;
      questions.push(buildPersonNameQuestion(d,d));
    }
  }else if(d.type==='人物'){
    // 代表語を持たない人物は区分・ジャンルのみ
    headerLabel='次の人物について答えてください';
    headerMain=`<div class="prompt-term"><span class="rb">${d.read}</span>${d.term}</div>`;
  }else{
    // 概念・作品。関連人物があれば人物も問う
    headerLabel='次の語について答えてください';
    headerMain=`<div class="prompt-term"><span class="rb">${d.read}</span>${d.term}</div>`;
    if(d.person){const p=byId(d.person);if(p)questions.push(buildPersonNameQuestion(d,p));}

}

      b.className='opt'+(o.dk?' dk':'');b.dataset.val=o.val;
      b.innerHTML=`<span class="mk">${o.dk?'？':marks[i]}</span><span>${o.label}</span>`;
      b.addEventListener('click',()=>{
        if(q.locked)return;
        [...oc.children].forEach(c=>c.classList.remove('selected'));
        b.classList.add('selected');q.picked=o.val;
      });
      oc.appendChild(b);
    });
    q.el=oc;
  });
  document.getElementById('gradeBtn').addEventListener('click',()=>{
    if(state.answeredCurrent)return;
    if(questions.some(q=>q.picked==null)){
      if(!confirm('未回答の設問があります。このまま採点しますか？'))return;
    }
    state.answeredCurrent=true;
    let allOK=true;
    questions.forEach(q=>{
      q.locked=true;
      const okThis=q.isEra?(q.validEras.includes(q.picked)):(q.picked===q.answer);
      [...q.el.children].forEach(c=>{
        c.disabled=true;c.classList.remove('selected');
        const v=c.dataset.val;
        const isAns=q.isEra?q.validEras.includes(v):(v===q.answer);
        const isPicked=(v===q.picked);
        if(isAns)c.classList.add('correct');
        else if(isPicked && v!=='__dk__')c.classList.add('wrong');
        else c.classList.add('dim');
        if(isPicked && v!=='__dk__')addBadge(c,'あなたの解答','your');
        if(isAns)addBadge(c,'正しい選択肢','ans');
      });
      if(!okThis)allOK=false;
    });
    if(allOK)state.correct++; else state.wrong.push({type:'item',id:d.id});
    document.getElementById('gradeBtn').disabled=true;
    document.getElementById('afterB').innerHTML=
      verdict(allOK)
      +`<p style="font-size:12px;color:var(--ink-soft);margin:8px 0 0">${allOK?'すべての設問に正解しました。':'設問に誤りがあります（全問正解で1点）。'}</p>`
      +explainHTML(d)+nextBtnHTML();
    bindNext();
  });
}

function buildKubunQuestion(d){
  const correct=d.era[0];
  const others=ERA_ORDER.filter(e=>!d.era.includes(e));
  const opts=shuffle([correct,...others]).map(e=>({val:e,label:e}));
  opts.push({val:'__dk__',label:'わからない',dk:true});
  return {ask:'区分は？（ギリシア／ヘレニズム／ローマ）',options:opts,answer:correct,picked:null,locked:false,isEra:true,validEras:d.era};
}
function buildGenreQuestion(d){
  const allG=[...new Set(DATA.map(x=>x.genre))];
  const others=shuffle(allG.filter(g=>g!==d.genre)).slice(0,3);
  const opts=shuffle([d.genre,...others]).map(g=>({val:g,label:g}));
  opts.push({val:'__dk__',label:'わからない',dk:true});
  return {ask:'ジャンルは？',options:opts,answer:d.genre,picked:null,locked:false};
}
function buildKeyQuestion(d){
  const others=shuffle(DATA.filter(x=>x.id!==d.id&&x.key)).slice(0,3);
  const opts=shuffle([d,...others]).map(x=>({val:x.id,label:x.key}));
  opts.push({val:'__dk__',label:'わからない',dk:true});
  return {ask:'代表的な作品・特徴は？',options:opts,answer:d.id,picked:null,locked:false};
}
function buildPersonNameQuestion(d,target){
  const t=target;
  const others=shuffle(DATA.filter(x=>x.id!==t.id&&x.type==='人物')).slice(0,3);
  const opts=shuffle([t,...others]).map(x=>({val:x.id,label:`${x.term}（${x.read}）`}));
  opts.push({val:'__dk__',label:'わからない',dk:true});
  const ask=(t.id===d.id)?'この語に関係する人物は？':'関わった人物は？';
  return {ask,options:opts,answer:t.id,picked:null,locked:false};
}

/* ---- モードC：時代で分類（複数選択） ---- */
function renderModeC(){
  const era=state.pool[state.idx];
  const correctAll=DATA.filter(d=>d.era.includes(era));
  const wrongAll=DATA.filter(d=>!d.era.includes(era));
  // 5択。正解は1〜3個（その時代の語数の範囲で）
  const nCorrect=Math.max(1,Math.min(3,correctAll.length,1+Math.floor(Math.random()*3)));
  const chosenCorrect=sample(correctAll,nCorrect);
  const chosenWrong=sample(wrongAll,5-nCorrect);
  const items=shuffle([...chosenCorrect,...chosenWrong]);
  const picked=new Set();

  const body=document.getElementById('quizBody');
  body.innerHTML=`<div class="card">
    <div class="prompt-label">次のうち、<b style="color:var(--ink)">${era}</b>の文化にあてはまるものを<b style="color:var(--ink)">すべて</b>選んでください</div>
    <div class="prompt-sub">あてはまる語は1つとは限りません。</div>
    <div class="opts" id="optsC"></div>
    <div class="actions"><button class="btn btn-primary" id="gradeC">採点する</button><button class="btn btn-ghost" id="dkC">わからない</button></div>
    <div id="afterC"></div>
  </div>`;
  const oc=document.getElementById('optsC');
  items.forEach(it=>{
    const b=document.createElement('button');
    b.className='opt';b.dataset.id=it.id;
    b.innerHTML=`<span class="mk">□</span><span>${it.term}<span style="color:var(--ink-soft);font-size:12px">（${it.read}）</span></span>`;
    b.addEventListener('click',()=>{
      if(state.answeredCurrent)return;
      const on=picked.has(it.id);
      if(on){picked.delete(it.id);b.querySelector('.mk').textContent='□';b.classList.remove('selected');}
      else{picked.add(it.id);b.querySelector('.mk').textContent='■';b.classList.add('selected');}
    });
    oc.appendChild(b);
  });
  function settleC(forceWrong){
    if(state.answeredCurrent)return;state.answeredCurrent=true;
    let ok=!forceWrong;
    [...oc.children].forEach(c=>{
      c.disabled=true;c.classList.remove('selected');
      const isCorrect=items.find(x=>x.id===c.dataset.id).era.includes(era);
      const chosen=!forceWrong && picked.has(c.dataset.id);
      if(isCorrect&&chosen){c.classList.add('correct');addBadge(c,'あなたの解答','your');addBadge(c,'正しい選択肢','ans');}
      else if(isCorrect&&!chosen){c.classList.add('correct');c.style.opacity='.7';if(!forceWrong)ok=false;addBadge(c,'正しい選択肢','ans');}
      else if(!isCorrect&&chosen){c.classList.add('wrong');ok=false;addBadge(c,'あなたの解答','your');}
      else c.classList.add('dim');
    });
    if(ok)state.correct++; else state.wrong.push({type:'era',era});
    document.getElementById('gradeC').disabled=true;
    document.getElementById('dkC').disabled=true;
    const list=chosenCorrect.map(x=>x.term).join('、');
    const tail=ok?'すべて正しく選べています。':(forceWrong?'「わからない」を選びました。':'取りこぼし・誤選択があります。');
    document.getElementById('afterC').innerHTML=
      verdict(ok)
      +`<div class="explain"><span class="ttl">解説</span>${era}にあてはまるのは <b>${list}</b> です。${tail}<br><br>
      <span style="color:var(--ink-soft);font-size:12px">※ 緑＝${era}の語、薄い緑＝選び落とした正解、赤＝誤って選んだ語。</span></div>`
      +nextBtnHTML();
    bindNext();
  }
  document.getElementById('gradeC').addEventListener('click',()=>settleC(false));
  document.getElementById('dkC').addEventListener('click',()=>settleC(true));
}

// ---- 共通：正誤の明示 ----
function verdict(ok){
  return `<div class="verdict ${ok?'ok':'ng'}"><span class="ic">${ok?'○':'×'}</span><span>${ok?'正解':'不正解'}</span></div>`;
}

// ---- 共通：次へ ----
function nextBtnHTML(){
  const last=state.idx>=state.total-1;
  return `<div class="actions"><button class="btn btn-primary" id="nextBtn">${last?'結果を見る':'次の問題へ →'}</button></div>`;
}
function bindNext(){
  const nb=document.getElementById('nextBtn');
  if(nb)nb.addEventListener('click',()=>{
    state.idx++;
    if(state.idx>=state.total)finish();
    else renderQuestion();
  });
}

function dedupWrong(arr){
  const seen=new Set(),out=[];
  arr.forEach(w=>{const k=w.type+':'+(w.id||w.era);if(!seen.has(k)){seen.add(k);out.push(w);}});
  return out;
}
function finish(){
  show('done');
  document.getElementById('doneScore').textContent=`${state.correct} / ${state.total}`;
  const r=state.total?state.correct/state.total:0;
  let msg;
  if(r===1)msg='全問正解です。';
  else if(r>=0.7)msg='よく取れています。間違えた語を確認しておきましょう。';
  else if(r>=0.4)msg='半ばまで来ています。間違えた箇所を中心に復習しましょう。';
  else msg='まずは語を区分ごとに整理し直すとよいでしょう。';
  document.getElementById('doneMsg').textContent=msg;

  const uniq=dedupWrong(state.wrong);
  const area=document.getElementById('wrongArea');
  if(uniq.length===0){
    area.innerHTML=`<div class="actions" style="justify-content:center">
      <button class="btn btn-primary" id="againBtn">同じ形式でもう一度</button>
      <button class="btn btn-ghost" id="homeBtn">形式を選び直す</button></div>`;
  }else{
    const rows=uniq.map(w=>{
      if(w.type==='era')return `<li><span>${w.era}の文化（時代の分類）</span><span class="rd">モードC</span></li>`;
      const d=byId(w.id);
      return `<li><span>${d.term}</span><span class="rd">${d.read}</span></li>`;
    }).join('');
    area.innerHTML=`<div class="wrong-list">
      <div class="wl-ttl">間違えた問題（${uniq.length}件）</div>
      <ul>${rows}</ul></div>
      <div class="actions" style="justify-content:center">
        <button class="btn btn-primary" id="retryBtn">間違えた問題をもう一度（${uniq.length}問）</button>
        <button class="btn btn-ghost" id="homeBtn">セッションを終了する</button></div>`;
    document.getElementById('retryBtn').addEventListener('click',retryWrong);
  }
  const ag=document.getElementById('againBtn');if(ag)ag.addEventListener('click',()=>{buildPool();show('quiz');renderQuestion();});
  const hm=document.getElementById('homeBtn');if(hm)hm.addEventListener('click',goHome);
}
function retryWrong(){
  const uniq=dedupWrong(state.wrong);
  state.pool = state.mode==='C' ? uniq.map(w=>w.era) : uniq.map(w=>byId(w.id));
  state.idx=0;state.total=state.pool.length;state.correct=0;state.wrong=[];
  show('quiz');renderQuestion();
}
</script>
