<style>
:root{
  --ink:#25302c;
  --ink-soft:#586460;
  --paper:#ecefe4;
  --paper-card:#faf9f2;
  --line:#d2d3c1;
  --seal:#157a6e;
  --seal-soft:#26907f;
  --gold:#c19a3e;
  /* 分野色（正解表示の緑と混同しないよう配慮） */
  --e-shunju:#5f8290;
  --e-kan:#a8553f;
  --e-nanboku:#6c7e58;
  --e-tou:#b9923f;
  --e-sou:#7d96a0;
  --e-min:#3f5a7a;
  --e-shin:#6e4c6b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Noto Sans JP",sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.75;
  min-height:100vh;
  background-image:radial-gradient(circle at 20% 10%,rgba(255,255,255,.4),transparent 40%);
}
.wrap{max-width:760px;margin:0 auto;padding:24px 18px 80px}
.serif{font-family:"Noto Serif JP",serif}

/* ヘッダ */
header.top{display:flex;align-items:baseline;gap:14px;padding:8px 2px 20px;border-bottom:2px solid var(--ink);margin-bottom:26px}
header.top .mark{
  font-family:"Noto Serif JP",serif;font-weight:700;font-size:13px;color:#fff;
  background:var(--seal);padding:7px 9px;border-radius:3px;letter-spacing:.12em;line-height:1.3;
  writing-mode:vertical-rl;text-orientation:upright;
}
header.top h1{font-family:"Noto Serif JP",serif;font-weight:700;font-size:21px;letter-spacing:.04em}
header.top .sub{font-size:12px;color:var(--ink-soft);margin-top:3px;letter-spacing:.08em}
header.top .home-link{margin-left:auto;align-self:center;font-size:12px;color:var(--seal);text-decoration:none;border:1px solid var(--line);padding:6px 12px;border-radius:6px;white-space:nowrap;font-weight:600;letter-spacing:.04em;transition:.12s}
header.top .home-link:hover{background:#e7f2ef;border-color:var(--seal)}

/* 開始画面 */
.lead{font-size:13.5px;color:var(--ink-soft);margin-bottom:22px;max-width:60ch}
.section-label{font-family:"Noto Serif JP",serif;font-size:12px;letter-spacing:.22em;color:var(--gold);margin:26px 0 12px;font-weight:600}

.modes{display:grid;gap:12px}
.mode-card{
  text-align:left;background:var(--paper-card);border:1px solid var(--line);border-radius:7px;
  padding:16px 18px;cursor:pointer;transition:.15s;display:flex;gap:15px;align-items:flex-start;width:100%;
  font-family:inherit;color:inherit;
}
.mode-card:hover{border-color:var(--ink);transform:translateY(-1px)}
.mode-card:focus-visible{outline:2px solid var(--seal);outline-offset:2px}
.mode-card .code{font-family:"Noto Serif JP",serif;font-weight:700;font-size:18px;color:var(--seal);min-width:30px;padding-top:1px}
.mode-card .body .t{font-weight:700;font-size:15px;margin-bottom:3px}
.mode-card .body .d{font-size:12.5px;color:var(--ink-soft);line-height:1.6}

/* 時代フィルタ */
.eras{display:flex;flex-wrap:wrap;gap:8px}
.era-chip{
  font-family:inherit;font-size:13px;border:1px solid var(--line);background:var(--paper-card);
  padding:7px 14px;border-radius:20px;cursor:pointer;color:var(--ink-soft);transition:.12s;font-weight:500;
}
.era-chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
.era-chip:focus-visible{outline:2px solid var(--seal);outline-offset:2px}
.hint{font-size:11.5px;color:var(--ink-soft);margin-top:9px}

/* クイズ画面 */
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.btn-back{font-family:inherit;font-size:12.5px;background:none;border:none;color:var(--ink-soft);cursor:pointer;padding:4px 0;text-decoration:underline;text-underline-offset:3px}
.btn-back:hover{color:var(--ink)}
.progress{font-size:12px;color:var(--ink-soft);font-family:"Noto Serif JP",serif;letter-spacing:.05em}
.score-tag{font-size:12px;color:var(--seal);font-weight:700}

.card{background:var(--paper-card);border:1px solid var(--line);border-radius:9px;padding:22px 20px;box-shadow:0 1px 0 rgba(0,0,0,.02)}

.era-badge{display:inline-block;font-size:11px;font-weight:700;color:#fff;padding:3px 10px;border-radius:3px;letter-spacing:.08em;margin-bottom:14px}

.prompt-label{font-size:11px;letter-spacing:.18em;color:var(--gold);font-weight:600;font-family:"Noto Serif JP",serif;margin-bottom:8px}
.prompt-desc{font-size:15.5px;line-height:1.85;margin-bottom:4px}
.prompt-term{font-family:"Noto Serif JP",serif;font-size:30px;font-weight:700;letter-spacing:.04em;line-height:1.3}
.prompt-term .rb{font-size:13px;color:var(--ink-soft);font-weight:400;display:block;letter-spacing:.1em;margin-bottom:2px}
.prompt-sub{font-size:12.5px;color:var(--ink-soft);margin-top:6px}

/* 選択肢 */
.opts{display:grid;gap:9px;margin-top:18px}
.opt{
  font-family:inherit;text-align:left;background:#fff;border:1px solid var(--line);border-radius:6px;
  padding:12px 15px;cursor:pointer;font-size:14.5px;color:var(--ink);transition:.12s;width:100%;display:flex;gap:10px;align-items:center;
}
.opt .mk{font-family:"Noto Serif JP",serif;color:var(--ink-soft);font-size:13px;min-width:18px}
.opt:hover:not(:disabled){border-color:var(--ink)}
.opt:focus-visible{outline:2px solid var(--seal);outline-offset:1px}
.opt:disabled{cursor:default}
.opt.correct{background:#eef3ea;border-color:var(--e-nanboku);color:#33421f}
.opt.wrong{background:#f6e9e6;border-color:var(--seal);color:#6e2a1e}
.opt.dim{opacity:.5}
.opt.dk{color:var(--ink-soft)}
.opt.dk .mk{color:var(--seal);font-weight:700}
.opt.selected{border-color:var(--seal);background:#e7f2ef;box-shadow:inset 0 0 0 2px rgba(21,122,110,.22)}
.opt .badge{margin-left:auto;font-size:11px;font-weight:700;padding:2px 9px;border-radius:11px;white-space:nowrap;letter-spacing:.03em}
.opt .badge.your{background:#e7ddca;color:#6b573a}
.opt .badge.ans{background:#3f7d52;color:#fff}
.opt .badge+.badge{margin-left:6px}

/* モードB：複数設問ブロック */
.qblock{border-top:1px dashed var(--line);padding-top:16px;margin-top:16px}
.qblock:first-of-type{border-top:none;padding-top:4px;margin-top:8px}
.q-ask{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:10px}
.q-ask .q-no{color:var(--seal);font-family:"Noto Serif JP",serif;margin-right:6px}

/* 解説 */
.explain{margin-top:18px;background:#fbf6ea;border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:13px 15px;font-size:13px;line-height:1.8;color:var(--ink-soft)}
.explain b{color:var(--ink)}
.explain .ttl{font-family:"Noto Serif JP",serif;font-weight:700;color:var(--gold);font-size:11px;letter-spacing:.14em;display:block;margin-bottom:5px}

/* 正誤の明示 */
.verdict{display:flex;align-items:center;gap:9px;font-family:"Noto Serif JP",serif;font-weight:700;font-size:18px;padding:11px 18px;border-radius:7px;margin-top:18px;letter-spacing:.1em}
.verdict .ic{font-size:20px;line-height:1}
.verdict.ok{background:#e7efe0;color:#3a5a22;border:1.5px solid var(--e-nanboku)}
.verdict.ng{background:#f4e3df;color:#8a3322;border:1.5px solid var(--seal)}

/* アクションボタン */
.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn{font-family:inherit;font-size:14px;font-weight:700;border-radius:6px;padding:11px 22px;cursor:pointer;border:1px solid var(--ink);transition:.12s}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:#000}
.btn-ghost{background:transparent;color:var(--ink)}
.btn-ghost:hover{background:rgba(0,0,0,.04)}
.btn:focus-visible{outline:2px solid var(--seal);outline-offset:2px}
.btn:disabled{opacity:.4;cursor:default}

/* 完了画面 */
.done{text-align:center;padding:30px 10px}
.done .big{font-family:"Noto Serif JP",serif;font-size:34px;font-weight:700;margin:10px 0}
.done .lbl{font-size:12px;letter-spacing:.18em;color:var(--gold);font-family:"Noto Serif JP",serif}
.done p{font-size:13.5px;color:var(--ink-soft);margin:14px 0 24px}
.wrong-list{text-align:left;background:#fbf6ea;border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin:18px auto;max-width:520px}
.wrong-list .wl-ttl{font-family:"Noto Serif JP",serif;font-weight:700;font-size:13px;color:var(--seal);margin-bottom:10px}
.wrong-list ul{list-style:none}
.wrong-list li{font-size:14px;padding:7px 2px;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;gap:12px;align-items:baseline}
.wrong-list li:last-child{border-bottom:none}
.wrong-list li .rd{font-size:12px;color:var(--ink-soft);white-space:nowrap}

footer{margin-top:40px;font-size:11px;color:var(--ink-soft);text-align:center;line-height:1.7;border-top:1px solid var(--line);padding-top:16px}

.hidden{display:none!important}

@media (max-width:480px){
  .prompt-term{font-size:25px}
  .wrap{padding:18px 14px 70px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<body>
<div class="wrap">
  <header class="top">
    <div class="mark">演習</div>
    <div>
      <h1>イスラーム文化史</h1>
      <div class="sub">つばめ学習舎 ── 教材準拠の出題</div>
    </div>
    <a class="home-link" href="../">⌂ 世界史トップ</a>
  </header>

  <!-- 開始画面 -->
  <div id="start">
    <p class="lead">出題はすべて、配布した教材資料に記載のある事項に限定しています。誤りの選択肢も同じ範囲の語から作られています。出題形式を選んで演習を始めてください。</p>

    <div class="section-label">出題形式</div>
    <div class="modes" id="modeList"></div>

    <div class="actions" style="margin-top:24px">
      <button class="btn btn-primary" id="startBtn">演習を始める</button>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz" class="hidden">
    <div class="quiz-top">
      <button class="btn-back" id="backBtn">← 形式の選択に戻る</button>
      <div>
        <span class="progress" id="progress"></span>
        <span class="score-tag" id="scoreTag"></span>
      </div>
    </div>
    <div id="quizBody"></div>
  </div>

  <!-- 完了画面 -->
  <div id="done" class="hidden">
    <div class="done">
      <div class="lbl">演習終了</div>
      <div class="big" id="doneScore"></div>
      <p id="doneMsg"></p>
      <div id="wrongArea"></div>
    </div>
  </div>

  <footer>
    出題内容は教材資料の範囲に準拠／別名・補足は解説欄に記載<br>
    つばめ学習舎・授業用演習ツール
  </footer>
</div>

<script>
/* ===================================================================
   データ：各語は資料1〜4と照合済み。
   era … 時代（景徳鎮のみ複数）。person/work … リスト内で相互に問える相手のid。
   note … 解説に出す補足（別名・リスト外の作者・複数時代の注記など）。
   =================================================================== */
const DATA = [
/* ===== 宗教・法 ===== */
{id:"quran",term:"コーラン(クルアーン)",read:"こーらん",era:["宗教・法"],type:"概念",
 desc:"イスラーム教の聖典。神がムハンマドに下した啓示をまとめたもの。"},
{id:"hadith",term:"ハディース",read:"はでぃーす",era:["宗教・法"],type:"概念",
 desc:"ムハンマドの言行についての伝承。イスラーム法の基礎の一つ。"},
{id:"sharia",term:"イスラーム法(シャリーア)",read:"いすらーむほう",era:["宗教・法"],type:"概念",
 desc:"コーランやハディースを基礎に整えられた法体系。信仰・生活の全体を規定する。"},
{id:"ulama",term:"ウラマー",read:"うらまー",era:["宗教・法"],type:"概念",
 desc:"イスラーム法学者。司法や政治の場で活躍した。"},
{id:"rokushingogyo",term:"六信五行",read:"ろくしんごぎょう",era:["宗教・法"],type:"概念",
 desc:"ムスリムの信仰(六信)と行為(五行)。信仰告白・礼拝・喜捨・断食・メッカ巡礼などからなる。"},
{id:"shingaku",term:"イスラーム神学",read:"いすらーむしんがく",era:["宗教・法"],type:"概念",
 desc:"ギリシア哲学の影響を受けて形成された、イスラームの神学。"},

/* ===== 言語・文字 ===== */
{id:"arabic_script",term:"アラビア文字",read:"あらびあもじ",era:["言語・文字"],type:"概念",
 desc:"イスラーム世界で広く用いられた文字。"},
{id:"arabic_lang",term:"アラビア語",read:"あらびあご",era:["言語・文字"],type:"概念",
 desc:"コーランの言語であり、学問や行政の共通語となった。"},

/* ===== 学問 ===== */
{id:"chie",term:"知恵の館(バイト=アルヒクマ)",read:"ちえのやかた",era:["学問"],type:"概念",
 desc:"バグダードに設けられた翻訳・研究機関。ギリシア語文献などがアラビア語に翻訳された。"},
{id:"aristoteles",term:"アリストテレス",read:"ありすとてれす",era:["学問"],type:"人物",
 desc:"ギリシアの哲学者。著作がアラビア語に翻訳され、「第一の師」と呼ばれて尊敬された。"},
{id:"khwarizmi",term:"フワーリズミー",read:"ふわーりずみー",era:["学問"],type:"人物",
 desc:"数学者。『代数学』を著した。"},
{id:"ibn_sina",term:"イブン=シーナー",read:"いぶんしーなー",era:["学問"],type:"人物",work:"igaku_tenpan",
 desc:"中央アジア出身の医学者。『医学典範』を著した。"},
{id:"igaku_tenpan",term:"『医学典範』",read:"いがくてんぱん",era:["学問"],type:"作品",person:"ibn_sina",
 desc:"イブン=シーナーが著した医学書。長く権威をもった。"},
{id:"tabari",term:"タバリー",read:"たばりー",era:["学問"],type:"人物",work:"yogensha",
 desc:"歴史家。年代記『預言者たちと諸王の歴史』を編纂した。"},
{id:"yogensha",term:"『預言者たちと諸王の歴史』",read:"よげんしゃたちとしょおうのれきし",era:["学問"],type:"作品",person:"tabari",
 desc:"タバリーが編纂した年代記。"},

/* ===== 文芸・美術 ===== */
{id:"senya",term:"千夜一夜物語(アラビアン=ナイト)",read:"せんやいちやものがたり",era:["文芸・美術"],type:"作品",
 desc:"インド・イラン・アラビア・ギリシアなどの説話を集成した物語。"},
{id:"arabesque",term:"アラベスク",read:"あらべすく",era:["文芸・美術"],type:"概念",
 desc:"植物や文字を文様化した精緻な装飾文様。偶像を禁じたことから発達した。"},

/* ===== その他 ===== */
{id:"seishi",term:"製紙法",read:"せいしほう",era:["その他"],type:"概念",
 desc:"中国から伝わった紙の製法。アッバース朝期の文化を支えた。"},
{id:"islam_culture",term:"イスラーム文化",read:"いすらーむぶんか",era:["その他"],type:"概念",
 desc:"西アジアと周辺地域の文化、イスラーム教、アラビア語が融合して生まれた文化。"}
];
const KEY_MAP={
  aristoteles:"第一の師",
  khwarizmi:"『代数学』",
  ibn_sina:"『医学典範』",
  tabari:"『預言者たちと諸王の歴史』"
};
DATA.forEach(d=>{if(KEY_MAP[d.id])d.key=KEY_MAP[d.id];});
// 誤答を「同じ種類」で揃えるための系統（人名には人名、著作には著作を並べる）
const GROUP_MAP={
  aristoteles:'人物',khwarizmi:'人物',ibn_sina:'人物',tabari:'人物',
  igaku_tenpan:'著作',yogensha:'著作',senya:'著作',
  quran:'宗教',hadith:'宗教',rokushingogyo:'宗教',shingaku:'宗教',sharia:'宗教',ulama:'宗教',
  arabic_script:'言語',arabic_lang:'言語',
  chie:'施設',arabesque:'美術',seishi:'技術',islam_culture:'総称'
};
const ERA_ORDER=["宗教・法","言語・文字","学問","文芸・美術","その他"];
const ERA_COLOR={"宗教・法":"#1a6e54","言語・文字":"#2c7a7a","学問":"#b0843e","文芸・美術":"#8a4a6a","その他":"#5f7a5f"};
const byId=id=>DATA.find(d=>d.id===id);
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const sample=(arr,n)=>shuffle(arr).slice(0,n);

const MODES=[
  {id:"A",code:"A",t:"説明と語を結びつける",d:"説明から語を選ぶ問題と、語からその説明・作品を選ぶ問題が、両方向で出ます。"},
  {id:"B",code:"B",t:"関係でつなぐ",d:"人物と代表的な作品・特徴、作品と作者など、関係のある要素どうしを答えます。"},
  {id:"C",code:"C",t:"誤りを見つける",d:"複数の記述のうち、誤りを含むものを1つ選びます。"}
];

// 1モードあたりの出題数（ここを変えれば全体に反映されます）
const QCOUNT={A:20, B:20, C:8};

// 状態
let state={mode:null,pool:[],idx:0,total:0,correct:0,answeredCurrent:false,wrong:[]};

// ---- 開始画面の構築 ----
const modeList=document.getElementById('modeList');
MODES.forEach(m=>{
  const b=document.createElement('button');
  b.className='mode-card';b.dataset.mode=m.id;
  b.innerHTML=`<span class="code">${m.code}</span><span class="body"><span class="t">${m.t}</span><span class="d">${m.d}</span></span>`;
  b.addEventListener('click',()=>{selectMode(m.id);});
  modeList.appendChild(b);
});
function selectMode(id){
  state.mode=id;
  [...modeList.children].forEach(c=>c.style.borderColor=(c.dataset.mode===id)?'var(--ink)':'var(--line)');
  [...modeList.children].forEach(c=>c.style.background=(c.dataset.mode===id)?'#fff':'var(--paper-card)');
}

document.getElementById('startBtn').addEventListener('click',start);
document.getElementById('backBtn').addEventListener('click',goHome);

function start(){
  if(!state.mode){alert('出題形式を選んでください。');return;}
  buildPool();
  if(state.pool.length===0){alert('出題できる語がありません。');return;}
  show('quiz');renderQuestion();
}

function inEras(){return true;}

function buildPool(){
  let items=DATA.slice();
  if(state.mode==='B'){
    // 関係を持つ語のみ（代表語・作者・作品）
    items=items.filter(d=>d.key||d.person||d.work);
    state.pool=shuffle(items).slice(0,Math.min(items.length,QCOUNT.B));
  }else if(state.mode==='C'){
    state.pool=shuffle(SETS.slice()).slice(0,Math.min(SETS.length,QCOUNT.C));
  }else{
    const cap=QCOUNT[state.mode]||12;
    state.pool=shuffle(items).slice(0,Math.min(items.length,cap));
  }
  state.idx=0;state.total=state.pool.length;state.correct=0;state.wrong=[];
}

function show(which){
  ['start','quiz','done'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==which));
  window.scrollTo({top:0,behavior:'instant'});
}
function goHome(){show('start');}
function addBadge(el,text,cls){el.insertAdjacentHTML('beforeend',`<span class="badge ${cls}">${text}</span>`);}

function updateTop(){
  document.getElementById('progress').textContent=`第 ${state.idx+1} 問 / 全 ${state.total} 問`;
  document.getElementById('scoreTag').textContent=state.idx>0?`　正答 ${state.correct}`:'';
}

function explainHTML(d){
  let parts=[];
  parts.push(`分野：<b>${d.era.join('・')}</b>`);
  if(d.work){const w=byId(d.work);if(w)parts.push(`作品：<b>${w.term}</b>`);}
  if(d.person){const p=byId(d.person);if(p)parts.push(`関連人物：<b>${p.term}</b>`);}
  let s=`<div class="explain"><span class="ttl">解説</span><b>${d.term}</b>：${d.desc}`;
  if(d.note)s+=`<br><span style="color:var(--ink-soft)">※ ${d.note}</span>`;
  s+=`<br><br>${parts.join('　／　')}</div>`;
  return s;
}

// ====== 出題ルーティング ======
function renderQuestion(){
  updateTop();state.answeredCurrent=false;
  const m=state.mode;
  if(m==='A')renderModeA();
  else if(m==='C')renderModeD(); // 正誤判定
  else renderModeB();
}

/* ---- モードA：説明 ↔ 語（双方向） ---- */
function renderModeA(){
  const d=state.pool[state.idx];
  const dir=Math.random()<0.5?'toTerm':'toDesc';
  const g=GROUP_MAP[d.id];
  const sameGrp=DATA.filter(x=>x.id!==d.id && GROUP_MAP[x.id]===g);
  let distract;
  if(dir==='toTerm'){
    // 説明 → 語。誤答は同じ系統（リスト内＋一般用語）。
    const general=(DISTRACTORS[g]||[]).map(t=>({term:t[0],read:t[1],id:'g_'+t[0]}));
    let cand=shuffle([...sameGrp,...general]);
    if(cand.length<3)cand=cand.concat(shuffle(DATA.filter(x=>x.id!==d.id&&!cand.includes(x))));
    distract=cand.slice(0,3);
  }else{
    // 語 → 説明。誤答も同系統の説明にする（説明を持つ一般用語も使う）。
    const genDesc=(DISTRACTORS[g]||[]).filter(t=>t[2]).map(t=>({term:t[0],read:t[1],desc:t[2],id:'g_'+t[0]}));
    let cand=shuffle([...sameGrp,...genDesc]);
    if(cand.length<3)cand=cand.concat(shuffle(DATA.filter(x=>x.id!==d.id&&GROUP_MAP[x.id]!==g)));
    distract=cand.slice(0,3);
  }
  let opts=shuffle([d,...distract]);
  opts=[...opts,{id:'__dk__',dk:true,term:'わからない',desc:'わからない'}];
  const promptLabel=dir==='toTerm'?'この説明にあてはまる語は？':'この語の説明として正しいものは？';
  const promptMain=dir==='toTerm'
    ? `<div class="prompt-desc">${d.desc}</div>`
    : `<div class="prompt-term"><span class="rb">${d.read}</span>${d.term}</div>`;
  const body=document.getElementById('quizBody');
  body.innerHTML=`<div class="card">
    <div class="prompt-label">${promptLabel}</div>
    ${promptMain}
    <div class="opts" id="opts" style="margin-top:16px"></div>
    <div class="actions"><button class="btn btn-primary" id="answerA" disabled>解答する</button></div>
    <div id="afterA"></div>
  </div>`;
  const oc=document.getElementById('opts');
  const marks=['一','二','三','四','五'];
  let selIdx=-1;
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(o.dk?' dk':'');
    let label;
    if(o.dk)label='わからない';
    else if(dir==='toTerm'){const rd=o.read?`<span style="color:var(--ink-soft);font-size:12px">（${o.read}）</span>`:'';label=`${o.term}${rd}`;}
    else label=o.desc;
    b.innerHTML=`<span class="mk">${o.dk?'？':marks[i]}</span><span>${label}</span>`;
    b.addEventListener('click',()=>{
      if(state.answeredCurrent)return;
      selIdx=i;
      [...oc.children].forEach(c=>c.classList.remove('selected'));
      b.classList.add('selected');
      document.getElementById('answerA').disabled=false;
    });
    oc.appendChild(b);
  });
  document.getElementById('answerA').addEventListener('click',()=>{
    if(state.answeredCurrent||selIdx<0)return;
    state.answeredCurrent=true;
    const o=opts[selIdx];
    const ok=o.id===d.id;
    if(ok)state.correct++; else state.wrong.push({type:'item',id:d.id});
    [...oc.children].forEach((c,ci)=>{
      c.disabled=true;c.classList.remove('selected');
      const oo=opts[ci];
      const isCorrect=oo.id===d.id;
      const isPicked=(ci===selIdx);
      if(isCorrect)c.classList.add('correct');
      else if(isPicked && !oo.dk)c.classList.add('wrong');
      else c.classList.add('dim');
      if(isPicked && !oo.dk)addBadge(c,'あなたの解答','your');
      if(isCorrect)addBadge(c,'正しい選択肢','ans');
    });
    document.getElementById('answerA').disabled=true;
    document.getElementById('afterA').innerHTML=verdict(ok)+explainHTML(d)+nextBtnHTML();
    bindNext();
  });
}

/* ---- モードB：分野と、人物には代表語/関連人物をまとめて答える ---- */
function renderModeB(){
  const d=state.pool[state.idx];
  let q, headerLabel, headerMain;
  if(d.type==='人物' && d.key){
    const dir=Math.random()<0.5?'name':'key';
    if(dir==='name'){
      // 人物 → 代表的な作品・特徴
      headerLabel='次の人物の、代表的な作品・特徴は？';
      headerMain=`<div class="prompt-term"><span class="rb">${d.read}</span>${d.term}</div>`;
      q=buildKeyQuestion(d);
    }else{
      // 代表語 → 人物
      headerLabel='次の語に関係する人物は？';
      headerMain=`<div class="prompt-term">${d.key}</div>`;
      q=buildPersonNameQuestion(d,d);
    }
  }else if(d.person){
    // 作品 → 作者
    const p=byId(d.person);
    headerLabel='次の作品の作者は？';
    headerMain=`<div class="prompt-term"><span class="rb">${d.read}</span>${d.term}</div>`;
    q=buildPersonNameQuestion(d,p);
  }else if(d.work){
    // 人物 → 作品（フォールバック）
    headerLabel='次の人物の作品は？';
    headerMain=`<div class="prompt-term"><span class="rb">${d.read}</span>${d.term}</div>`;
    q=buildKeyQuestion(d);
  }
  renderModeB_single(d,q,headerLabel,headerMain);
}

function renderModeB_single(d,q,headerLabel,headerMain){
  const body=document.getElementById('quizBody');
  body.innerHTML=`<div class="card">
    <div class="prompt-label">${headerLabel}</div>
    ${headerMain}
    <div class="opts" id="opts" style="margin-top:16px"></div>
    <div class="actions"><button class="btn btn-primary" id="answerB" disabled>解答する</button></div>
    <div id="afterB"></div>
  </div>`;
  const oc=document.getElementById('opts');
  const marks=['一','二','三','四','五'];
  let selVal=null;
  q.options.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(o.dk?' dk':'');b.dataset.val=o.val;
    b.innerHTML=`<span class="mk">${o.dk?'？':marks[i]}</span><span>${o.label}</span>`;
    b.addEventListener('click',()=>{
      if(state.answeredCurrent)return;
      selVal=o.val;
      [...oc.children].forEach(c=>c.classList.remove('selected'));
      b.classList.add('selected');
      document.getElementById('answerB').disabled=false;
    });
    oc.appendChild(b);
  });
  document.getElementById('answerB').addEventListener('click',()=>{
    if(state.answeredCurrent||selVal==null)return;
    state.answeredCurrent=true;
    const ok=(selVal===q.answer);
    if(ok)state.correct++; else state.wrong.push({type:'item',id:d.id});
    [...oc.children].forEach(c=>{
      c.disabled=true;c.classList.remove('selected');
      const v=c.dataset.val;
      const isAns=(v===q.answer);
      const isPicked=(v===selVal);
      if(isAns)c.classList.add('correct');
      else if(isPicked && v!=='__dk__')c.classList.add('wrong');
      else c.classList.add('dim');
      if(isPicked && v!=='__dk__')addBadge(c,'あなたの解答','your');
      if(isAns)addBadge(c,'正しい選択肢','ans');
    });
    document.getElementById('answerB').disabled=true;
    document.getElementById('afterB').innerHTML=verdict(ok)+explainHTML(d)+nextBtnHTML();
    bindNext();
  });
}

function renderModeB_multi(d,questions,headerLabel,headerMain){
  const body=document.getElementById('quizBody');
  body.innerHTML=`<div class="card">
    <div class="prompt-label">${headerLabel}</div>
    ${headerMain}
    <div id="qblocks"></div>
    <div class="actions"><button class="btn btn-primary" id="gradeBtn">まとめて採点する</button></div>
    <div id="afterB"></div>
  </div>`;
  const qb=document.getElementById('qblocks');
  questions.forEach((q,qi)=>{
    const blk=document.createElement('div');blk.className='qblock';
    blk.innerHTML=`<div class="q-ask"><span class="q-no">問${qi+1}</span>${q.ask}</div><div class="opts" id="q${qi}"></div>`;
    qb.appendChild(blk);
    const oc=blk.querySelector('.opts');
    const marks=['一','二','三','四','五'];
    q.options.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='opt'+(o.dk?' dk':'');b.dataset.val=o.val;
      b.innerHTML=`<span class="mk">${o.dk?'？':marks[i]}</span><span>${o.label}</span>`;
      b.addEventListener('click',()=>{
        if(q.locked)return;
        [...oc.children].forEach(c=>c.classList.remove('selected'));
        b.classList.add('selected');q.picked=o.val;
      });
      oc.appendChild(b);
    });
    q.el=oc;
  });
  document.getElementById('gradeBtn').addEventListener('click',()=>{
    if(state.answeredCurrent)return;
    if(questions.some(q=>q.picked==null)){
      if(!confirm('未回答の設問があります。このまま採点しますか？'))return;
    }
    state.answeredCurrent=true;
    let allOK=true;
    questions.forEach(q=>{
      q.locked=true;
      const okThis=q.isEra?(q.validEras.includes(q.picked)):(q.picked===q.answer);
      [...q.el.children].forEach(c=>{
        c.disabled=true;c.classList.remove('selected');
        const v=c.dataset.val;
        const isAns=q.isEra?q.validEras.includes(v):(v===q.answer);
        const isPicked=(v===q.picked);
        if(isAns)c.classList.add('correct');
        else if(isPicked && v!=='__dk__')c.classList.add('wrong');
        else c.classList.add('dim');
        if(isPicked && v!=='__dk__')addBadge(c,'あなたの解答','your');
        if(isAns)addBadge(c,'正しい選択肢','ans');
      });
      if(!okThis)allOK=false;
    });
    if(allOK)state.correct++; else state.wrong.push({type:'item',id:d.id});
    document.getElementById('gradeBtn').disabled=true;
    document.getElementById('afterB').innerHTML=
      verdict(allOK)
      +`<p style="font-size:12px;color:var(--ink-soft);margin:8px 0 0">${allOK?'すべての設問に正解しました。':'設問に誤りがあります（全問正解で1点）。'}</p>`
      +explainHTML(d)+nextBtnHTML();
    bindNext();
  });
}

function buildKubunQuestion(d){
  const correct=d.era[0];
  const others=sample(ERA_ORDER.filter(e=>!d.era.includes(e)),3);
  const opts=shuffle([correct,...others]).map(e=>({val:e,label:e}));
  opts.push({val:'__dk__',label:'わからない',dk:true});
  return {ask:'分野は？',options:opts,answer:correct,picked:null,locked:false,isEra:true,validEras:d.era};
}
function buildKeyQuestion(d){
  const others=shuffle(DATA.filter(x=>x.id!==d.id&&x.key)).slice(0,3);
  const opts=shuffle([d,...others]).map(x=>({val:x.id,label:x.key}));
  opts.push({val:'__dk__',label:'わからない',dk:true});
  return {ask:'代表的な作品・特徴は？',options:opts,answer:d.id,picked:null,locked:false};
}
function buildPersonNameQuestion(d,target){
  const t=target;
  const others=shuffle(DATA.filter(x=>x.id!==t.id&&x.type==='人物')).slice(0,3);
  const opts=shuffle([t,...others]).map(x=>({val:x.id,label:`${x.term}（${x.read}）`}));
  opts.push({val:'__dk__',label:'わからない',dk:true});
  const ask=(t.id===d.id)?'この語に関係する人物は？':'関わった人物は？';
  return {ask,options:opts,answer:t.id,picked:null,locked:false};
}

/* ---- モードC：時代で分類（複数選択） ---- */
function renderModeC(){
  const era=state.pool[state.idx];
  const correctAll=DATA.filter(d=>d.era.includes(era));
  const wrongAll=DATA.filter(d=>!d.era.includes(era));
  // 5択。正解は1〜3個（その時代の語数の範囲で）
  const nCorrect=Math.max(1,Math.min(3,correctAll.length,1+Math.floor(Math.random()*3)));
  const chosenCorrect=sample(correctAll,nCorrect);
  const chosenWrong=sample(wrongAll,5-nCorrect);
  const items=shuffle([...chosenCorrect,...chosenWrong]);
  const picked=new Set();

  const body=document.getElementById('quizBody');
  body.innerHTML=`<div class="card">
    <div class="prompt-label">次のうち、<b style="color:var(--ink)">${era}</b>の分野にあてはまるものを<b style="color:var(--ink)">すべて</b>選んでください</div>
    <div class="prompt-sub">あてはまる語は1つとは限りません。</div>
    <div class="opts" id="optsC"></div>
    <div class="actions"><button class="btn btn-primary" id="gradeC">採点する</button><button class="btn btn-ghost" id="dkC">わからない</button></div>
    <div id="afterC"></div>
  </div>`;
  const oc=document.getElementById('optsC');
  items.forEach(it=>{
    const b=document.createElement('button');
    b.className='opt';b.dataset.id=it.id;
    b.innerHTML=`<span class="mk">□</span><span>${it.term}<span style="color:var(--ink-soft);font-size:12px">（${it.read}）</span></span>`;
    b.addEventListener('click',()=>{
      if(state.answeredCurrent)return;
      const on=picked.has(it.id);
      if(on){picked.delete(it.id);b.querySelector('.mk').textContent='□';b.classList.remove('selected');}
      else{picked.add(it.id);b.querySelector('.mk').textContent='■';b.classList.add('selected');}
    });
    oc.appendChild(b);
  });
  function settleC(forceWrong){
    if(state.answeredCurrent)return;state.answeredCurrent=true;
    let ok=!forceWrong;
    [...oc.children].forEach(c=>{
      c.disabled=true;c.classList.remove('selected');
      const isCorrect=items.find(x=>x.id===c.dataset.id).era.includes(era);
      const chosen=!forceWrong && picked.has(c.dataset.id);
      if(isCorrect&&chosen){c.classList.add('correct');addBadge(c,'あなたの解答','your');addBadge(c,'正しい選択肢','ans');}
      else if(isCorrect&&!chosen){c.classList.add('correct');c.style.opacity='.7';if(!forceWrong)ok=false;addBadge(c,'正しい選択肢','ans');}
      else if(!isCorrect&&chosen){c.classList.add('wrong');ok=false;addBadge(c,'あなたの解答','your');}
      else c.classList.add('dim');
    });
    if(ok)state.correct++; else state.wrong.push({type:'era',era});
    document.getElementById('gradeC').disabled=true;
    document.getElementById('dkC').disabled=true;
    const list=chosenCorrect.map(x=>x.term).join('、');
    const tail=ok?'すべて正しく選べています。':(forceWrong?'「わからない」を選びました。':'取りこぼし・誤選択があります。');
    document.getElementById('afterC').innerHTML=
      verdict(ok)
      +`<div class="explain"><span class="ttl">解説</span>${era}にあてはまるのは <b>${list}</b> です。${tail}<br><br>
      <span style="color:var(--ink-soft);font-size:12px">※ 緑＝${era}の語、薄い緑＝選び落とした正解、赤＝誤って選んだ語。</span></div>`
      +nextBtnHTML();
    bindNext();
  }
  document.getElementById('gradeC').addEventListener('click',()=>settleC(false));
  document.getElementById('dkC').addEventListener('click',()=>settleC(true));
}

// ---- 共通：正誤の明示 ----
function verdict(ok){
  return `<div class="verdict ${ok?'ok':'ng'}"><span class="ic">${ok?'○':'×'}</span><span>${ok?'正解':'不正解'}</span></div>`;
}

// ---- 共通：次へ ----
function nextBtnHTML(){
  const last=state.idx>=state.total-1;
  return `<div class="actions"><button class="btn btn-primary" id="nextBtn">${last?'結果を見る':'次の問題へ →'}</button></div>`;
}
function bindNext(){
  const nb=document.getElementById('nextBtn');
  if(nb)nb.addEventListener('click',()=>{
    state.idx++;
    if(state.idx>=state.total)finish();
    else renderQuestion();
  });
}

function renderModeD(){
  const set=state.pool[state.idx];
  const opts=shuffle(set.statements.map(s=>({...s})));
  const body=document.getElementById('quizBody');
  body.innerHTML=`<div class="card">
    <div class="prompt-label">次のうち、<b style="color:var(--ink)">誤りを含む</b>文はどれですか？</div>
    <div class="opts" id="opts" style="margin-top:10px"></div>
    <div class="actions"><button class="btn btn-primary" id="answerC" disabled>解答する</button></div>
    <div id="afterC"></div>
  </div>`;
  const oc=document.getElementById('opts');
  const marks=['一','二','三','四','五'];
  let sel=null;
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="mk">${marks[i]}</span><span>${o.text}</span>`;
    b.addEventListener('click',()=>{
      if(state.answeredCurrent)return;
      sel=o;
      [...oc.children].forEach(c=>c.classList.remove('selected'));
      b.classList.add('selected');
      document.getElementById('answerC').disabled=false;
    });
    oc.appendChild(b);
  });
  const dkb=document.createElement('button');
  dkb.className='opt dk';
  dkb.innerHTML=`<span class="mk">？</span><span>わからない</span>`;
  dkb.addEventListener('click',()=>{
    if(state.answeredCurrent)return;
    sel={dk:true};
    [...oc.children].forEach(c=>c.classList.remove('selected'));
    dkb.classList.add('selected');
    document.getElementById('answerC').disabled=false;
  });
  oc.appendChild(dkb);
  document.getElementById('answerC').addEventListener('click',()=>{
    if(state.answeredCurrent||!sel)return;
    state.answeredCurrent=true;
    const ok=(sel.ok===false); // 誤りを含む記述を選べば正解
    if(ok)state.correct++; else state.wrong.push({type:'set',id:set.id});
    [...oc.children].forEach((c,ci)=>{
      c.disabled=true;c.classList.remove('selected');
      if(ci>=opts.length)return; // 「わからない」ボタン
      const o=opts[ci];
      const isWrongOne=(o.ok===false);
      const isPicked=(o===sel);
      if(isWrongOne)c.classList.add('correct');
      else if(isPicked)c.classList.add('wrong');
      else c.classList.add('dim');
      if(isPicked)addBadge(c,'あなたの解答','your');
      if(isWrongOne)addBadge(c,'誤りを含む文','ans');
    });
    document.getElementById('answerC').disabled=true;
    document.getElementById('afterC').innerHTML=
      verdict(ok)
      +`<div class="explain"><span class="ttl">解説</span>${set.explain}</div>`
      +nextBtnHTML();
    bindNext();
  });
}

function dedupWrong(arr){
  const seen=new Set(),out=[];
  arr.forEach(w=>{const k=w.type+':'+(w.id||w.era);if(!seen.has(k)){seen.add(k);out.push(w);}});
  return out;
}
function finish(){
  show('done');
  document.getElementById('doneScore').textContent=`${state.correct} / ${state.total}`;
  const r=state.total?state.correct/state.total:0;
  let msg;
  if(r===1)msg='全問正解です。';
  else if(r>=0.7)msg='よく取れています。間違えた語を確認しておきましょう。';
  else if(r>=0.4)msg='半ばまで来ています。間違えた箇所を中心に復習しましょう。';
  else msg='まずは語を区分ごとに整理し直すとよいでしょう。';
  document.getElementById('doneMsg').textContent=msg;

  const uniq=dedupWrong(state.wrong);
  const area=document.getElementById('wrongArea');
  if(uniq.length===0){
    area.innerHTML=`<div class="actions" style="justify-content:center">
      <button class="btn btn-primary" id="againBtn">同じ形式でもう一度</button>
      <button class="btn btn-ghost" id="homeBtn">形式を選び直す</button></div>`;
  }else{
    const rows=uniq.map(w=>{
      if(w.type==='era')return `<li><span>${w.era}の分野（分類）</span><span class="rd">モードC</span></li>`;
      if(w.type==='set'){const st=SETS.find(x=>x.id===w.id);const wr=st?st.statements.find(s=>!s.ok):null;return `<li><span>${wr?wr.text:'誤りを含む記述'}</span><span class="rd">誤り探し</span></li>`;}
      const d=byId(w.id);
      return `<li><span>${d.term}</span><span class="rd">${d.read}</span></li>`;
    }).join('');
    area.innerHTML=`<div class="wrong-list">
      <div class="wl-ttl">間違えた問題（${uniq.length}件）</div>
      <ul>${rows}</ul></div>
      <div class="actions" style="justify-content:center">
        <button class="btn btn-primary" id="retryBtn">間違えた問題をもう一度（${uniq.length}問）</button>
        <button class="btn btn-ghost" id="homeBtn">セッションを終了する</button></div>`;
    document.getElementById('retryBtn').addEventListener('click',retryWrong);
  }
  const ag=document.getElementById('againBtn');if(ag)ag.addEventListener('click',()=>{buildPool();show('quiz');renderQuestion();});
  const hm=document.getElementById('homeBtn');if(hm)hm.addEventListener('click',goHome);
}
function retryWrong(){
  const uniq=dedupWrong(state.wrong);
  if(state.mode==='C')state.pool=uniq.map(w=>SETS.find(x=>x.id===w.id));
  else state.pool=uniq.map(w=>byId(w.id));
  state.idx=0;state.total=state.pool.length;state.correct=0;state.wrong=[];
  show('quiz');renderQuestion();
}
</script>
