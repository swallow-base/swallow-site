<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つばめ古文</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1e8;
    --bg-paper: #faf6ed;
    --bg-paper-dark: #ede4d0;
    --ink: #2a2520;
    --ink-soft: #4a4238;
    --accent: #8b2e2e;
    --accent-soft: #b85c5c;
    --gold: #a67c3f;
    --moss: #5a6b3e;
    --moss-bg: #e4e9d8;
    --line: #c9b99a;
    --line-soft: #d9ccb3;
    --shadow: 0 4px 20px rgba(74,58,40,.08);
    --shadow-lg: 0 8px 40px rgba(74,58,40,.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    min-height: 100vh;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184,92,92,.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(166,124,63,.04) 0%, transparent 40%);
    padding: 20px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .app { max-width: 860px; width: 100%; }

  /* ── ヘッダー ── */
  header.masthead {
    text-align: center;
    padding: 32px 0 36px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 48px;
    position: relative;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
  }
  header.masthead::before {
    content: "";
    position: absolute;
    left: 50%; bottom: -1px;
    width: 80px; height: 3px;
    background: var(--accent);
    transform: translateX(-50%);
  }
  .site-label {
    font-size: .78rem;
    letter-spacing: .25em;
    color: var(--gold);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .site-title {
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: .08em;
    margin-bottom: 10px;
  }
  .site-subtitle {
    font-size: .88rem;
    color: var(--ink-soft);
    letter-spacing: .12em;
  }

  /* ── リード文 ── */
  .lead {
    text-align: center;
    font-size: .92rem;
    color: var(--ink-soft);
    margin-bottom: 40px;
    line-height: 1.9;
  }

  /* ── メニューカード ── */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 48px;
  }
  @media (max-width: 680px) {
    .menu-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 520px) {
    .menu-grid { grid-template-columns: 1fr; }
  }

  .menu-card {
    background: var(--bg-paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 32px 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: transform .15s, box-shadow .15s;
    cursor: pointer;
  }
  .menu-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
  }
  .menu-card:active {
    transform: translateY(0);
  }

  .card-icon {
    font-size: 2.4rem;
    line-height: 1;
  }
  .card-badge {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .12em;
    padding: 3px 10px;
    border-radius: 20px;
    color: #fff;
  }
  .badge-shikibetsu { background: #5a6b3e; }
  .badge-keigo      { background: #8b2e2e; }
  .badge-tango      { background: #a67c3f; }

  .card-title {
    font-size: 1.22rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: .06em;
    text-align: center;
  }
  .card-desc {
    font-size: .8rem;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.8;
  }
  .card-meta {
    font-size: .75rem;
    color: var(--gold);
    letter-spacing: .06em;
  }

  .card-btn {
    margin-top: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: .88rem;
    padding: 9px 28px;
    cursor: pointer;
    letter-spacing: .08em;
    transition: background .15s;
    width: 100%;
  }
  .card-btn:hover { background: var(--accent-soft); }
  .card-btn.btn-moss { background: var(--moss); }
  .card-btn.btn-moss:hover { background: #4a5a30; }
  .card-btn.btn-gold { background: var(--gold); }
  .card-btn.btn-gold:hover { background: #8c6630; }

  /* ── フッター ── */
  footer {
    text-align: center;
    font-size: .72rem;
    color: var(--line);
    letter-spacing: .15em;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="app">

  <header class="masthead">
    <div class="site-label">SWALLOW-BASE</div>
    <div class="site-title">つばめ古文</div>
    <div class="site-subtitle">大学受験古文 演習アプリ</div>
  </header>

  <p class="lead">
    学習したい演習を選んでください。
  </p>

  <div class="menu-grid">

    <!-- 識別演習 -->
    <a class="menu-card" href="./shikibetsu/">
      <div class="card-icon">⚔️</div>
      <span class="card-badge badge-shikibetsu">識別</span>
      <div class="card-title">識別演習</div>
      <div class="card-desc">
        「ぬ」「なむ」「に」など<br>
        紛らわしい語の識別を<br>
        例文で演習
      </div>
      <div class="card-meta">v1.2</div>
      <button class="card-btn btn-moss">識別演習へ →</button>
    </a>

    <!-- 敬語演習 -->
    <a class="menu-card" href="./keigo/">
      <div class="card-icon">🏯</div>
      <span class="card-badge badge-keigo">敬語</span>
      <div class="card-title">敬語演習</div>
      <div class="card-desc">
        尊敬語・謙譲語・丁寧語の<br>
        識別と敬意の方向を<br>
        例文で演習
      </div>
      <div class="card-meta">v1.2</div>
      <button class="card-btn">敬語演習へ →</button>
    </a>

    <!-- 古文単語演習 -->
    <a class="menu-card" href="./tango/">
      <div class="card-icon">📖</div>
      <span class="card-badge badge-tango">単語</span>
      <div class="card-title">古文単語</div>
      <div class="card-desc">
        重要古文単語の意味を<br>
        単語と例文の二つの形式で<br>
        選んで演習
      </div>
      <div class="card-meta">v1.0</div>
      <button class="card-btn btn-gold">古文単語へ →</button>
    </a>

  </div>

  <footer>SWALLOW-BASE — つばめ古文</footer>
</div>
</body>
</html>
