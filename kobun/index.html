<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つばめ古文 — 識別演習 v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Klee+One:wght@400;600&family=Noto+Serif+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1e8;
    --bg-paper: #faf6ed;
    --bg-paper-dark: #ede4d0;
    --ink: #2a2520;
    --ink-soft: #4a4238;
    --accent: #8b2e2e;
    --accent-soft: #b85c5c;
    --sakura: #e8c4c4;
    --sakura-bg: #f7e8e8;
    --gold: #a67c3f;
    --moss: #5a6b3e;
    --moss-bg: #e4e9d8;
    --line: #c9b99a;
    --line-soft: #d9ccb3;
    --shadow: 0 4px 20px rgba(74, 58, 40, 0.08);
    --shadow-lg: 0 8px 40px rgba(74, 58, 40, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    min-height: 100vh;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184, 92, 92, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(166, 124, 63, 0.04) 0%, transparent 40%);
    padding: 20px 16px 60px;
  }
  .app { max-width: 780px; margin: 0 auto; }

  header.masthead {
    text-align: center;
    padding: 20px 0 30px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 30px;
    position: relative;
  }
  header.masthead::before {
    content: "";
    position: absolute;
    left: 50%; bottom: -1px;
    width: 80px; height: 3px;
    background: var(--accent);
    transform: translateX(-50%);
  }
  .logo {
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 0.1em;
  }
  .tagline {
    margin-top: 6px;
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.2em;
  }

  /* 進捗バー */
  .progress-card {
    background: var(--bg-paper);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .progress-stats { display: flex; gap: 20px; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-value {
    font-weight: 700;
    font-size: 22px;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    margin-top: 4px;
  }
  .stat.remaining .stat-value { color: var(--accent); }
  .stat.correct .stat-value { color: var(--moss); }
  .stat.mistake .stat-value { color: var(--gold); }

  /* 例文セッションのヘッダー */
  .session-header {
    background: linear-gradient(135deg, #f7ede0 0%, #efe2cc 100%);
    border: 1px solid var(--line-soft);
    border-radius: 6px 6px 0 0;
    padding: 20px 28px;
    border-bottom: none;
  }
  .session-title {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }
  .session-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .session-word {
    font-size: 15px;
    color: var(--ink);
  }
  .session-word .word {
    background: var(--sakura-bg);
    color: var(--accent);
    padding: 3px 12px;
    border-radius: 2px;
    font-weight: 700;
    font-size: 18px;
    margin-left: 8px;
  }
  .session-step {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
  }

  /* 原文表示(セッション共通) */
  .session-example {
    background: var(--bg-paper);
    border: 1px solid var(--line-soft);
    border-top: none;
    padding: 22px 28px;
  }
  .example-text {
    font-size: 22px;
    line-height: 2.3;
    color: var(--ink);
    padding: 18px 16px;
    background: linear-gradient(180deg, #fdfbf5 0%, #f8f2e4 100%);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .example-text .highlight {
    background: linear-gradient(transparent 55%, var(--sakura) 55%, var(--sakura) 85%, transparent 85%);
    padding: 0 3px;
    font-weight: 600;
    color: var(--accent);
    transition: background 0.3s;
  }
  .example-source {
    text-align: right;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 10px;
    letter-spacing: 0.1em;
  }
  .example-source::before { content: "― "; }

  /* ステップ進捗インジケータ */
  .step-indicator {
    display: flex;
    gap: 4px;
    margin-top: 14px;
    justify-content: center;
  }
  .step-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--line-soft);
    border: 1.5px solid transparent;
    transition: all 0.2s;
  }
  .step-dot.done { background: var(--moss); }
  .step-dot.done.mistake { background: var(--gold); }
  .step-dot.current {
    background: var(--accent);
    transform: scale(1.3);
  }
  .step-dot.final {
    border-radius: 2px;
    transform: rotate(45deg);
    width: 11px; height: 11px;
  }
  .step-dot.final.current { transform: rotate(45deg) scale(1.3); }

  /* 問題エリア */
  .question-area {
    background: var(--bg-paper);
    border: 1px solid var(--line-soft);
    border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 24px 28px 28px;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  .question-area::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: var(--accent);
    border-radius: 0 0 0 6px;
  }

  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--line-soft);
    flex-wrap: wrap;
    gap: 10px;
  }
  .q-index {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
  }
  .q-type-badges { display: flex; gap: 6px; }
  .q-type-badge {
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    background: var(--bg-paper-dark);
  }
  .q-type-badge.follow-up {
    background: var(--gold);
    color: white;
    border-color: var(--gold);
  }

  /* 問題文 */
  .q-prompt {
    font-size: 17px;
    color: var(--ink);
    margin-bottom: 20px;
    padding: 14px 18px;
    background: var(--bg);
    border-left: 3px solid var(--gold);
    border-radius: 0 3px 3px 0;
    line-height: 1.7;
  }
  .q-prompt.follow-up-prompt {
    border-left-color: var(--accent);
    background: var(--sakura-bg);
  }
  .q-prompt-label {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
    font-weight: 700;
  }

  /* 選択肢 */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .choice {
    font-family: inherit;
    font-size: 16px;
    padding: 14px 18px;
    background: #fff;
    border: 1.5px solid var(--line-soft);
    border-radius: 3px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .choice:hover:not(:disabled) {
    border-color: var(--accent);
    background: #fffcf6;
    transform: translateX(2px);
  }
  .choice-marker {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--ink-soft);
    flex-shrink: 0;
    font-family: 'Klee One', serif;
    font-weight: 600;
  }
  .choice.selected { border-color: var(--accent); background: var(--sakura-bg); }
  .choice.correct { border-color: var(--moss); background: var(--moss-bg); }
  .choice.correct .choice-marker { background: var(--moss); color: white; border-color: var(--moss); }
  .choice.incorrect { border-color: var(--accent); background: var(--sakura-bg); }
  .choice.incorrect .choice-marker { background: var(--accent); color: white; border-color: var(--accent); }
  .choice:disabled { cursor: default; }

  /* 記述式 */
  .text-input {
    font-family: 'Klee One', 'Shippori Mincho', serif;
    font-size: 16px;
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--line-soft);
    border-radius: 3px;
    background: #fff;
    color: var(--ink);
    resize: vertical;
    min-height: 90px;
    line-height: 1.8;
    margin-bottom: 16px;
  }
  .text-input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fffcf6;
  }
  .self-judge-note {
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    padding: 14px;
    background: var(--bg);
    border-radius: 3px;
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .model-answer {
    background: var(--moss-bg);
    border: 1px solid var(--moss);
    border-radius: 3px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .model-answer.user {
    background: #fff;
    border-color: var(--line);
  }
  .model-answer-label {
    font-size: 12px;
    color: var(--moss);
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }
  .model-answer.user .model-answer-label { color: var(--ink-soft); }
  .model-answer-text {
    font-size: 16px;
    color: var(--ink);
    line-height: 1.8;
  }

  /* 解説 */
  .explanation {
    background: linear-gradient(180deg, #fefbf3 0%, #fbf5e5 100%);
    border: 1px solid var(--line-soft);
    border-radius: 3px;
    padding: 18px 20px;
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease;
  }

  /* 結果バナー */
  .result-banner {
    text-align: center;
    padding: 14px 18px;
    border-radius: 3px;
    margin-bottom: 16px;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.2em;
    animation: fadeIn 0.3s ease;
  }
  .result-banner.all-correct {
    background: var(--moss-bg);
    color: var(--moss);
    border: 1px solid var(--moss);
  }
  .result-banner.partial {
    background: #fdf2e0;
    color: var(--gold);
    border: 1px solid var(--gold);
  }
  .result-banner.all-wrong {
    background: var(--sakura-bg);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .explanation-label {
    font-size: 12px;
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .explanation-label::before {
    content: "解";
    display: inline-block;
    width: 20px; height: 20px;
    background: var(--gold);
    color: white;
    border-radius: 50%;
    text-align: center;
    line-height: 20px;
    font-size: 12px;
    letter-spacing: 0;
  }
  .explanation-text { font-size: 15px; line-height: 1.8; }
  .explanation-ref {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 8px;
  }

  /* ボタン */
  .btn {
    font-family: inherit;
    font-size: 15px;
    padding: 12px 28px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #6f1f1f; }
  .btn-primary:disabled { background: var(--line); cursor: not-allowed; }
  .btn-secondary {
    background: white;
    color: var(--ink);
    border: 1.5px solid var(--line);
  }
  .btn-secondary:hover { background: var(--bg-paper-dark); }
  .btn-moss { background: var(--moss); color: white; }
  .btn-moss:hover { background: #435229; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: #8a6630; }
  .btn-block { width: 100%; }

  .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* セッション完了サマリー */
  .session-summary {
    background: linear-gradient(180deg, #faf6ed 0%, #efe2cc 100%);
    border: 1px solid var(--line-soft);
    border-radius: 0 0 6px 6px;
    border-top: none;
    padding: 30px 28px;
    text-align: center;
  }
  .summary-title {
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 700;
    letter-spacing: 0.15em;
  }
  .summary-line {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }
  .summary-translation {
    background: white;
    border: 1px solid var(--line-soft);
    border-radius: 3px;
    padding: 18px;
    margin-bottom: 20px;
    text-align: left;
  }
  .summary-translation-label {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }
  .summary-translation-text {
    font-size: 16px;
    line-height: 1.9;
  }

  /* 完了画面(全セッション) */
  .all-complete-card {
    background: var(--bg-paper);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    padding: 60px 30px;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .all-complete-title {
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .all-complete-summary {
    font-size: 16px;
    color: var(--ink-soft);
    margin-bottom: 30px;
    line-height: 2;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.2em;
  }

  @media (max-width: 500px) {
    .example-text { font-size: 18px; padding: 16px 12px; }
    .q-prompt { font-size: 15px; }
    .choice { font-size: 15px; padding: 12px 14px; }
    .question-area, .session-header, .session-example { padding-left: 18px; padding-right: 18px; }
  }
</style>
</head>

// ========================================
// 例文セッションをフラット化して構築
// 各セッション = { target_word, example, questions[], total }
// ========================================
function buildSessions() {
  const sessions = [];
  QUESTION_DATA.forEach(word => {
    word.examples.forEach(example => {
      sessions.push({
        session_id: example.example_id,
        target_word: word.target_word,
        example: {
          text: example.text,
          source: example.source,
          modern_translation: example.modern_translation,
          highlights: example.highlights,
        },
        questions: example.questions,
      });
    });
  });
  return sessions;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ========================================
// 原文ハイライト表示
// ========================================
function HighlightedText({ text, highlights, activeId }) {
  if (!highlights || !activeId) return React.createElement('span', null, text);
  const target = highlights.find(h => h.id === activeId);
  if (!target) return React.createElement('span', null, text);

  const before = text.slice(0, target.start);
  const mid = text.slice(target.start, target.end);
  const after = text.slice(target.end);

  return React.createElement(React.Fragment, null,
    before,
    React.createElement('span', { className: 'highlight' }, mid),
    after
  );
}

// ========================================
// 単一問題の表示
// v0.3 変更点:
// - follow_up がある場合、メイン問題と根拠問題を同時に表示
// - 両方選んでから採点
// - 記述式(和訳)は自己採点方式のまま
// ========================================
function QuestionBlock({ question, questionIndex, totalQuestions, onComplete }) {
  const [mainSelected, setMainSelected] = useState(null);
  const [followSelected, setFollowSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [mainCorrect, setMainCorrect] = useState(null);
  const [followCorrect, setFollowCorrect] = useState(null);

  // 記述式用
  const [textAnswer, setTextAnswer] = useState('');
  const [textRevealed, setTextRevealed] = useState(false);

  useEffect(() => {
    setMainSelected(null);
    setFollowSelected(null);
    setRevealed(false);
    setMainCorrect(null);
    setFollowCorrect(null);
    setTextAnswer('');
    setTextRevealed(false);
  }, [question.q_id]);

  const isSelect = question.answer_format === 'select';
  const isText = question.answer_format === 'text';
  const hasFollowUp = !!question.follow_up;

  // 選択式の採点(メイン + 根拠まとめて)
  const handleReveal = () => {
    const mOk = mainSelected === question.correct_answer;
    setMainCorrect(mOk);

    if (hasFollowUp) {
      const fOk = followSelected === question.follow_up.correct_answer;
      setFollowCorrect(fOk);
    }
    setRevealed(true);
  };

  const handleNext = () => {
    const overall = hasFollowUp
      ? (mainCorrect && followCorrect)
      : mainCorrect;
    onComplete({
      mainCorrect,
      followCorrect: hasFollowUp ? followCorrect : null,
      overallCorrect: overall,
    });
  };

  // 記述式
  const handleTextReveal = () => setTextRevealed(true);
  const handleTextJudge = (isCorrect) => {
    onComplete({
      mainCorrect: isCorrect,
      followCorrect: null,
      overallCorrect: isCorrect,
    });
  };

  // 回答ボタンの有効/無効
  const canReveal = isSelect && mainSelected && (!hasFollowUp || followSelected);

  // 選択肢のクラス名を決定
  const getChoiceClass = (choice, selected, correctAnswer) => {
    let cls = 'choice';
    if (revealed) {
      if (choice === correctAnswer) cls += ' correct';
      else if (choice === selected) cls += ' incorrect';
    } else if (choice === selected) {
      cls += ' selected';
    }
    return cls;
  };

  return React.createElement('div', { className: 'question-area' },
    React.createElement('div', { className: 'q-header' },
      React.createElement('div', { className: 'q-index' },
        `問 ${questionIndex + 1} / ${totalQuestions}`
      ),
      React.createElement('div', { className: 'q-type-badges' },
        React.createElement('span', { className: 'q-type-badge' }, question.question_type),
        hasFollowUp && React.createElement('span', { className: 'q-type-badge follow-up' }, '+根拠')
      )
    ),

    // === メイン問題 ===
    React.createElement('div', { className: 'q-prompt' }, question.prompt),

    // 選択式メイン
    isSelect && React.createElement('div', { className: 'choices' },
      question.choices.map((choice, idx) =>
        React.createElement('button', {
          key: idx,
          className: getChoiceClass(choice, mainSelected, question.correct_answer),
          onClick: () => !revealed && setMainSelected(choice),
          disabled: revealed,
        },
          React.createElement('span', { className: 'choice-marker' }, String.fromCharCode(0x2460 + idx)),
          React.createElement('span', null, choice)
        )
      )
    ),

    // 記述式入力
    isText && !textRevealed && React.createElement(React.Fragment, null,
      React.createElement('textarea', {
        className: 'text-input',
        placeholder: 'ここに現代語訳を入力…',
        value: textAnswer,
        onChange: (e) => setTextAnswer(e.target.value),
      }),
      React.createElement('button', {
        className: 'btn btn-primary btn-block',
        onClick: handleTextReveal,
        disabled: !textAnswer.trim(),
      }, '模範解答を見る')
    ),

    // 記述式:模範解答と自己採点
    isText && textRevealed && React.createElement(React.Fragment, null,
      React.createElement('div', { className: 'self-judge-note' },
        'あなたの解答と模範解答を見比べて、自己採点してください。'
      ),
      React.createElement('div', { className: 'model-answer user' },
        React.createElement('div', { className: 'model-answer-label' }, 'あなたの解答'),
        React.createElement('div', { className: 'model-answer-text' }, textAnswer)
      ),
      React.createElement('div', { className: 'model-answer' },
        React.createElement('div', { className: 'model-answer-label' }, '模範解答'),
        React.createElement('div', { className: 'model-answer-text' }, question.correct_answer)
      ),
      React.createElement('div', { className: 'explanation' },
        React.createElement('div', { className: 'explanation-label' }, '解説'),
        React.createElement('div', { className: 'explanation-text' }, question.explanation)
      ),
      React.createElement('div', { className: 'actions' },
        React.createElement('button', {
          className: 'btn btn-gold',
          onClick: () => handleTextJudge(false),
        }, '△ もう一度'),
        React.createElement('button', {
          className: 'btn btn-moss',
          onClick: () => handleTextJudge(true),
        }, '◯ 正解だった'),
      )
    ),

    // === 根拠問題(follow-up) ===
    hasFollowUp && isSelect && React.createElement(React.Fragment, null,
      React.createElement('div', {
        className: 'q-prompt follow-up-prompt',
        style: { marginTop: '8px' }
      },
        React.createElement('div', { className: 'q-prompt-label' }, '根拠を答えよ'),
        question.follow_up.prompt
      ),
      React.createElement('div', { className: 'choices' },
        question.follow_up.choices.map((choice, idx) =>
          React.createElement('button', {
            key: idx,
            className: getChoiceClass(choice, followSelected, question.follow_up.correct_answer),
            onClick: () => !revealed && setFollowSelected(choice),
            disabled: revealed,
          },
            React.createElement('span', { className: 'choice-marker' }, String.fromCharCode(0x2460 + idx)),
            React.createElement('span', null, choice)
          )
        )
      )
    ),

    // === 採点後の表示 ===
    isSelect && revealed && React.createElement(React.Fragment, null,
      // 総合結果バッジ
      React.createElement('div', { className: 'result-banner ' + (
        (hasFollowUp ? (mainCorrect && followCorrect) : mainCorrect) ? 'all-correct' :
        (hasFollowUp && (mainCorrect || followCorrect)) ? 'partial' : 'all-wrong'
      ) },
        (hasFollowUp
          ? (mainCorrect && followCorrect ? '完全正解' : (mainCorrect ? '判別 ◯ / 根拠 ✕' : (followCorrect ? '判別 ✕ / 根拠 ◯' : '要復習')))
          : (mainCorrect ? '正解' : '要復習')
        )
      ),
      // 解説(メイン)
      React.createElement('div', { className: 'explanation' },
        React.createElement('div', { className: 'explanation-label' }, '判別の解説'),
        React.createElement('div', { className: 'explanation-text' }, question.explanation),
        question.reference_page && React.createElement('div', { className: 'explanation-ref' },
          `(教材 p.${question.reference_page} 参照)`
        )
      ),
      // 解説(根拠)
      hasFollowUp && React.createElement('div', { className: 'explanation' },
        React.createElement('div', { className: 'explanation-label' }, '根拠の解説'),
        React.createElement('div', { className: 'explanation-text' }, question.follow_up.explanation)
      ),
      // 次へ
      React.createElement('div', { className: 'actions' },
        React.createElement('button', {
          className: 'btn btn-primary',
          onClick: handleNext,
        }, '次の問題へ →')
      )
    ),

    // === 回答前:採点ボタン ===
    isSelect && !revealed && React.createElement('div', { className: 'actions' },
      React.createElement('button', {
        className: 'btn btn-primary',
        onClick: handleReveal,
        disabled: !canReveal,
      }, hasFollowUp ? '判別・根拠をまとめて採点' : '回答する')
    )
  );
}
// ========================================
// 例文セッション(1つの例文の問題をすべて解く)
// ========================================
function ExampleSession({ session, onSessionComplete }) {
  const [currentIdx, setCurrentIdx] = useState(0);
  const [results, setResults] = useState([]); // [{q_id, overallCorrect}]
  const [showSummary, setShowSummary] = useState(false);

  const currentQuestion = session.questions[currentIdx];
  const totalQuestions = session.questions.length;

  const handleQuestionComplete = (result) => {
    const newResults = [...results, { q_id: currentQuestion.q_id, ...result }];
    setResults(newResults);

    if (currentIdx + 1 >= totalQuestions) {
      // セッション完了
      setShowSummary(true);
    } else {
      setCurrentIdx(currentIdx + 1);
    }
  };

  const handleFinishSession = () => {
    // このセッション内に間違いが1つでもあったか?
    const anyMistake = results.some(r => !r.overallCorrect);
    onSessionComplete({
      sessionId: session.session_id,
      anyMistake,
      results,
    });
  };

  // 現在の問題で使うハイライト(原文表示用)
  const activeHighlight = currentQuestion?.highlight_id || null;

  // ステップインジケータの状態
  const stepStatuses = session.questions.map((q, i) => {
    if (i < results.length) {
      const r = results[i];
      return r.overallCorrect ? 'done' : 'done mistake';
    } else if (i === currentIdx && !showSummary) {
      return 'current';
    } else {
      return '';
    }
  });

  return React.createElement(React.Fragment, null,
    // セッションヘッダー
    React.createElement('div', { className: 'session-header' },
      React.createElement('div', { className: 'session-title' }, '例文セッション'),
      React.createElement('div', { className: 'session-meta' },
        React.createElement('div', { className: 'session-word' },
          '識別対象',
          React.createElement('span', { className: 'word' }, session.target_word)
        ),
        !showSummary && React.createElement('div', { className: 'session-step' },
          `${currentIdx + 1} / ${totalQuestions} 問目`
        )
      ),
      // ステップドット
      React.createElement('div', { className: 'step-indicator' },
        session.questions.map((q, i) => {
          const isFinalQuestion = q.answer_format === 'text';
          const cls = `step-dot ${stepStatuses[i]} ${isFinalQuestion ? 'final' : ''}`;
          return React.createElement('div', { key: i, className: cls, title: q.question_type });
        })
      )
    ),

    // 例文表示
    React.createElement('div', { className: 'session-example' },
      React.createElement('div', { className: 'example-text' },
        React.createElement(HighlightedText, {
          text: session.example.text,
          highlights: session.example.highlights,
          activeId: showSummary ? null : activeHighlight
        })
      ),
      React.createElement('div', { className: 'example-source' }, session.example.source)
    ),

    // 問題 or サマリー
    !showSummary ? React.createElement(QuestionBlock, {
      key: currentQuestion.q_id,
      question: currentQuestion,
      questionIndex: currentIdx,
      totalQuestions: totalQuestions,
      onComplete: handleQuestionComplete,
    }) : React.createElement('div', { className: 'session-summary' },
      React.createElement('div', { className: 'summary-title' },
        results.every(r => r.overallCorrect) ? '◇ 完答 ◇' : '◇ 修了(要復習あり) ◇'
      ),
      React.createElement('div', { className: 'summary-line' },
        `${totalQuestions}問中、${results.filter(r => r.overallCorrect).length}問完全正解`
      ),
      React.createElement('div', { className: 'summary-translation' },
        React.createElement('div', { className: 'summary-translation-label' }, '現代語訳(確認用)'),
        React.createElement('div', { className: 'summary-translation-text' }, session.example.modern_translation)
      ),
      React.createElement('button', {
        className: 'btn btn-primary',
        onClick: handleFinishSession,
      }, '次の例文へ →')
    )
  );
}

// ========================================
// メインアプリ
// ========================================
function App() {
  const allSessions = useMemo(() => buildSessions(), []);
  const totalSessions = allSessions.length;

  const [sessionQueue, setSessionQueue] = useState(() => shuffle(allSessions));
  const [reviewQueue, setReviewQueue] = useState([]);
  const [completedCount, setCompletedCount] = useState(0);
  const [mistakeSessionCount, setMistakeSessionCount] = useState(0);
  const [resetKey, setResetKey] = useState(0);

  const currentSession = sessionQueue[0] || null;
  const isAllComplete = !currentSession && reviewQueue.length === 0;

  const handleSessionComplete = (result) => {
    const newQueue = sessionQueue.slice(1);

    if (result.anyMistake) {
      // このセッションは復習キューへ
      const newReview = [...reviewQueue, currentSession];
      setMistakeSessionCount(m => m + 1);
      if (newQueue.length === 0) {
        setSessionQueue(shuffle(newReview));
        setReviewQueue([]);
      } else {
        setSessionQueue(newQueue);
        setReviewQueue(newReview);
      }
    } else {
      setCompletedCount(c => c + 1);
      if (newQueue.length === 0 && reviewQueue.length > 0) {
        setSessionQueue(shuffle(reviewQueue));
        setReviewQueue([]);
      } else {
        setSessionQueue(newQueue);
      }
    }
  };

  const handleRestart = () => {
    setSessionQueue(shuffle(buildSessions()));
    setReviewQueue([]);
    setCompletedCount(0);
    setMistakeSessionCount(0);
    setResetKey(k => k + 1);
  };

  const remaining = sessionQueue.length + reviewQueue.length;

  return React.createElement('div', { className: 'app' },
    React.createElement('header', { className: 'masthead' },
      React.createElement('div', { className: 'logo' },
        'つばめ古文'
      ),
      React.createElement('div', { className: 'tagline' }, '識別演習 v1.0 — 10語収録')
    ),

    React.createElement('div', { className: 'progress-card' },
      React.createElement('div', { className: 'progress-stats' },
        React.createElement('div', { className: 'stat remaining' },
          React.createElement('div', { className: 'stat-value' }, remaining),
          React.createElement('div', { className: 'stat-label' }, '残り例文')
        ),
        React.createElement('div', { className: 'stat correct' },
          React.createElement('div', { className: 'stat-value' }, completedCount),
          React.createElement('div', { className: 'stat-label' }, '完答')
        ),
        React.createElement('div', { className: 'stat mistake' },
          React.createElement('div', { className: 'stat-value' }, mistakeSessionCount),
          React.createElement('div', { className: 'stat-label' }, '要復習')
        ),
      ),
      React.createElement('button', {
        className: 'btn btn-secondary',
        onClick: handleRestart,
      }, '最初から')
    ),

    currentSession && React.createElement(ExampleSession, {
      key: `${resetKey}_${currentSession.session_id}_${sessionQueue.length}`,
      session: currentSession,
      onSessionComplete: handleSessionComplete,
    }),

    isAllComplete && React.createElement('div', { className: 'all-complete-card' },
      React.createElement('div', { className: 'all-complete-title' }, '◇ 演習 修了 ◇'),
      React.createElement('div', { className: 'all-complete-summary' },
        `全${totalSessions}例文を完答しました。`,
        React.createElement('br'),
        `うち${mistakeSessionCount}回の復習を経て完答です。`
      ),
      React.createElement('button', {
        className: 'btn btn-primary',
        onClick: handleRestart,
      }, 'もう一度挑戦する')
    ),

    React.createElement('footer', null, 'SWALLOW-BASE — 古文識別演習 v1.0')
  );
}

createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
