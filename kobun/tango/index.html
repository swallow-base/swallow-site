word_form":"なに"},{"gloss":"なぜ・どうして（〜か）","text":"かからでよき日もあらむものを、なにしに詣でつらむ。","source":"枕・うらやましげなる物","translation":"こんな日でなくて（ほかに）よい日もあるだろうに、（どうして）お参りに来てしまったのだろうか。","headword_form":"なにしに"}]},{"no":"131","pos":"副詞","headword":"いつしか","kanji":"","senses":[{"sense_no":1,"gloss":"いつの間にか・早くも"},{"sense_no":2,"gloss":"（できるだけ）早く（〜たい・〜てほしい）"}],"examples":[{"gloss":"いつの間にか・早くも","text":"鶯ばかりぞいつしか音したるを、あはれと聞く。","source":"蜻蛉・下巻","translation":"鶯だけが（いつの間にか）来て鳴いたのを、しみじみと聞く。","headword_form":"いつしか"},{"gloss":"（できるだけ）早く（〜たい・〜てほしい）","text":"いつしか梅咲かなむ。","source":"更級","translation":"（できるだけ）早く梅が咲いてほしい。","headword_form":"いつしか"}]},{"no":"132","pos":"副詞","headword":"おのづから","kanji":"自ら","senses":[{"sense_no":1,"gloss":"自然と・ひとりでに"},{"sense_no":2,"gloss":"偶然・たまたま"},{"sense_no":3,"gloss":"〈仮定・推定表現を伴い〉万一・もしかして"}],"examples":[{"gloss":"偶然・たまたま","text":"おのづから人の上などうち言ひそしりたるに、幼き子どもの聞き取りて、その人のあるに言ひ出でたる。","source":"枕・はしたなきもの","translation":"（たまたま）ある人の悪口を言っていたときに、幼い子たちが耳にとめて、その人がいる所で言い出したこと（はきまりが悪い）。","headword_form":"おのづから"},{"gloss":"〈仮定・推定表現を伴い〉万一・もしかして","text":"おのづから歌など（集に）入ると思ひて、","source":"宇治・巻二・十話","translation":"（もしかして）（自分の）歌などが（勅撰集に）選ばれるかと思っ…","headword_form":"おのづから"}]},{"no":"133","pos":"副詞","headword":"なほ","kanji":"猶","senses":[{"sense_no":1,"gloss":"依然として・やはり（変らず）"},{"sense_no":2,"gloss":"なんといってもやはり・それでもやはり"},{"sense_no":3,"gloss":"さらに・いっそう"}],"examples":[{"gloss":"依然として・やはり（変らず）","text":"風波やまねば、なほ同じところにあり。","source":"土佐・一月五日","translation":"風や波がおさまらないので、（舟は）（依然として）同じ所にいる。","headword_form":"なほ"},{"gloss":"なんといってもやはり・それでもやはり","text":"世の中になほいと心憂きものは、人に憎まれむことこそあるべけれ。","source":"枕・世の中になほいと心うき物は","translation":"世の中で（なんといってもやはり）とてもいやなものは、人に憎まれることであるにちがいない。","headword_form":"なほ"},{"gloss":"なんといってもやはり・それでもやはり","text":"《須磨でのわび住まいの中にあって、光源氏は八月十五夜の月（＝中秋の名月）を眺めながら都の恋しい人々を思い、涙する。》をりをりの事思ひ出で給ふに、よよと泣かれ給ふ。「夜更けはべりぬ」と…なほ入り給はず。","source":"源氏・須磨","translation":"「夜も更けました」と（側に仕える者が）申し上げるけれども、（光源氏は月を眺め続け）（それでもやはり）部屋の中にお入りにならない。","headword_form":"なほ"},{"gloss":"さらに・いっそう","text":"東路の道の果てよりも、なほ奥つ方に生ひ出でたる人、","source":"更級","translation":"東国の道の果てよりも、（さらに）奥の方で育った人、","headword_form":"なほ"}]},{"no":"134","pos":"副詞","headword":"いとど","kanji":"","senses":[{"sense_no":1,"gloss":"いっそう・ますます"}],"examples":[{"gloss":"いっそう・ますます","text":"散ればこそいとど桜はめでたけれ","source":"伊勢・八二段","translation":"（花が美しい上に）散るからこそ（ますます）桜はすばらしい。","headword_form":"いとど"}]},{"no":"135","pos":"副詞","headword":"げに","kanji":"実に","senses":[{"sense_no":1,"gloss":"〈実際〉本当に・なるほど（そのとおり）"}],"examples":[{"gloss":"〈実際〉本当に・なるほど（そのとおり）","text":"この歌よしとにはあらねど、げにと思ひて人々忘れず。","source":"土佐・一月十一日","translation":"この歌はよいというほどではないが、（本当に）（そのとおりだ）と思って人々は忘れない。","headword_form":"げに"}]},{"no":"136","pos":"副詞","headword":"かく","kanji":"","senses":[{"sense_no":1,"gloss":"こう・このように"}],"examples":[{"gloss":"こう・このように","text":"かくうつくしうおはする御髪を、え見ぬこそ心憂く口惜しけれ。","source":"大鏡・三条院","translation":"（このように）美しくていらっしゃる御髪を、見ることができないのは情けなく残念である。","headword_form":"かく"}]},{"no":"137","pos":"副詞","headword":"さ","kanji":"","senses":[{"sense_no":1,"gloss":"そう・そのように"}],"examples":[{"gloss":"そう・そのように","text":"さおぼす故はべらむかし。","source":"更級","translation":"（そのように）お思いになるわけがあるのでしょうよ。","headword_form":"さ"},{"gloss":"そう・そのように","text":"若人は、さる好ける物思ひをなむしける。","source":"伊勢・四〇段","translation":"若者は、（そのような）いちずな恋の苦悩をしたものである。","headword_form":"さる"}]},{"no":"138","pos":"副詞","headword":"しか","kanji":"","senses":[{"sense_no":1,"gloss":"そう・そのように"}],"examples":[{"gloss":"そう・そのように","text":"大将も、しか見奉り給ひて、ことわりに思す。","source":"源氏・賢木","translation":"源氏の大将も、（そのように）（中宮のお心を）ご推察申し上げなさって、（それも）ごもっともなことだとお思いになる。","headword_form":"しか"},{"gloss":"そう・そのように","text":"…日に力を尽くしたること、少なからず。しかるに、禄いまだ賜はらず。","source":"竹取・蓬莱の玉の枝","translation":"十余日の間に努力したことは、少なくはない（＝並たいていのことではない）。しかるに、禄をいまだいただいていない。","headword_form":"しかるに"}]},{"no":"139","pos":"副詞","headword":"と","kanji":"","senses":[{"sense_no":1,"gloss":"そのように・あのように"}],"examples":[{"gloss":"そのように・あのように","text":"と言ひかく言ひ、恨み給ふ。","source":"源氏・東屋","translation":"（ああ）言ったり（こう）言ったりなさって、恨みなさる。","headword_form":"と"}]},{"no":"140","pos":"副詞","headword":"やがて","kanji":"","senses":[{"sense_no":1,"gloss":"（ある状態が）そのまま"},{"sense_no":2,"gloss":"（時間的に）すぐに"}],"examples":[{"gloss":"（ある状態が）そのまま","text":"薬も食はず。やがて起きもあがらで、病みふせり。","source":"竹取・富士の煙","translation":"薬も飲まない。（そのまま）起きあがらないで、病気になって伏していた。","headword_form":"やがて"},{"gloss":"（時間的に）すぐに","text":"名を聞くよりやがて面影は推しはからるる心地するを、","source":"徒然・七一段","translation":"名前を聞くやいなや（すぐに）（その人の）面影が想像される気持ちがするのに、","headword_form":"やがて"}]},{"no":"141","pos":"副詞","headword":"すなはち","kanji":"即ち・則ち・乃ち","senses":[{"sense_no":1,"gloss":"すぐに・ただちに"},{"sense_no":2,"gloss":"つまり・言い換えれば（現代語と同じ）"}],"examples":[{"gloss":"すぐに・ただちに","text":"「歌仕うまつれ」と（帝が遊女に）仰せられければ、すなはち詠みたてまつりける。","source":"大和・一四五段","translation":"「歌を詠め」と（帝が遊女に）おっしゃったところ、（すぐに）お詠み申し上げた。","headword_form":"すなはち"}]},{"no":"142","pos":"副詞","headword":"やうやう・やうやく","kanji":"漸う・漸く","senses":[{"sense_no":1,"gloss":"しだいに・だんだんと"},{"sense_no":2,"gloss":"やっと・かろうじて"}],"examples":[{"gloss":"しだいに・だんだんと","text":"春は、曙。やうやう白くなりゆく山際、少し明かりて、紫だちたる雲の、細くたなびきたる。","source":"枕・春は曙","translation":"春は夜明け前（がいい）。（しだいに）白くなりつつある山際の空が、少し明るくなって、紫がかった雲が、細くたなびいているの","headword_form":"やうやう"}]},{"no":"143","pos":"副詞","headword":"やをら・やはら","kanji":"柔ら・和ら","senses":[{"sense_no":1,"gloss":"そっと・静かに"}],"examples":[{"gloss":"そっと・静かに","text":"几帳の片つかたにうちかけて、人の臥したるを、奥の方よりやをら覗いたるも、いとをかし。","source":"枕・心にくきもの","translation":"（脱いだ着物を）几帳の片方にひっかけて、女房が寝ているのを、部屋の奥のほうから（そっと）覗いているのも、とてもおもしろい。","headword_form":"やをら"}]},{"no":"144","pos":"副詞","headword":"なかなか","kanji":"","senses":[{"sense_no":1,"gloss":"中途半端に・なまじ"},{"sense_no":2,"gloss":"かえって・むしろ"}],"examples":[{"gloss":"中途半端に・なまじ","text":"なかなか返事して、門立てられ、錠さされては悪しかりなんと思ひて、","source":"平家・巻六","translation":"（中途半端に）返事をして、門を閉められ、錠をかけられてはまずいだろうと思って、","headword_form":"なかなか"},{"gloss":"かえって・むしろ","text":"なかなかに寝も寝られず。これは夢かとのみ覚ゆ。","source":"成尋阿闍梨母集","translation":"（息子になまじ会ったために）（かえって）眠ることもできない。これ（＝息子に会ったこと）は夢ではないかとばかり思われる。","headword_form":"なかなかに"},{"gloss":"かえって・むしろ","text":"忘れてもあるべきものをなかなかに問ふにつらさを思ひ出でつる","source":"続古今・一三四","translation":"（ほうっておかれたら）忘れてもいられるのに、（どうかと）尋ねるので、（かえって）つらさを思い出してしまった。","headword_form":"なかなかに"}]},{"no":"145","pos":"副詞","headword":"さすがに","kanji":"","senses":[{"sense_no":1,"gloss":"そうはいってもやはり"},{"sense_no":2,"gloss":"なんといってもやはり"}],"examples":[{"gloss":"そうはいってもやはり","text":"祇王もとより思ひまうけたる道なれども、さすがに昨日今日とは思ひよらず。","source":"平家・巻一","translation":"祇王は以前から予想していたことではあるけれども、（そうはいってもやはり）昨日今日（というさし迫ったもの）とは思いもよらない。","headword_form":"さすがに"},{"gloss":"なんといってもやはり","text":"男君も、さすがに貴人の子なれば、けはひも貴やかに、","source":"古本・上巻・二六話","translation":"男君も、（なんといってもやはり）高貴な方の子であるので、様子（態度）も高貴な感じで、","headword_form":"さすがに"}]},{"no":"146","pos":"副詞","headword":"かたみに","kanji":"互に","senses":[{"sense_no":1,"gloss":"互いに"}],"examples":[{"gloss":"互いに","text":"同じ心に、かやうに言ひかはし、世の中の憂きもつらきをかしきも、かたみに言ひかたらふ人、筑前に下りて後、","source":"更級","translation":"気が合って、このように手紙のやり取りをし、世間のいやなこともつらいこともおもしろいことも、（互いに）語り合っている人が、筑前に下って後、","headword_form":"かたみに"}]},{"no":"147","pos":"副詞","headword":"うたて","kanji":"","senses":[{"sense_no":1,"gloss":"不快に・いやな感じに"},{"sense_no":2,"gloss":"気味悪く・異様に怪しく"}],"examples":[{"gloss":"不快に・いやな感じに","text":"花も散りたるのちは、うたてぞ見ゆる。","source":"枕・比は正月","translation":"桜の花も散ってしまったあとは、（いやな感じに）見える。","headword_form":"うたて"},{"gloss":"不快に・いやな感じに","text":"俊寛僧都一人、憂かりし島の島守になりにけるこそうたてけれ。","source":"平家・巻三","translation":"俊寛僧都一人だけ、つらかった島の番人になってしまった（＝都に帰されることもなく、鬼界が島に留め置かれた）のは（嘆かわしい）（いやな）ことである。","headword_form":"うたてけれ"},{"gloss":"気味悪く・異様に怪しく","text":"物に襲はるる心地して、驚き給へれば、灯も消えにけり。うたて思さるれば、太刀を引き抜きて、","source":"源氏・夕顔","translation":"（光源氏は夢の中で）物の怪が何かに襲われるような気持ちがして、はっとお目覚めになったところ、灯火も消えてしまった。（異様に怪しく）（気味悪く）お思いになったので、太刀を引き抜いて、","headword_form":"うたて"}]},{"no":"148","pos":"副詞","headword":"なべて","kanji":"","senses":[{"sense_no":1,"gloss":"一般に・すべて・みな同様に"},{"sense_no":2,"gloss":"並ひととおり・普通・平凡"}],"examples":[{"gloss":"一般に・すべて・みな同様に","text":"（都の人は）なべて心やはらかに、情けあるゆゑに、人のいふほどのこと、けやけくいなびがたくて、","source":"徒然・一四一段","translation":"（都の人は）（一般に）（＝誰もみな同様に）心が穏やかで、人情があるので、人が頼むようなことを、きっぱりと断りにくくて、","headword_form":"なべて"},{"gloss":"並ひととおり・普通・平凡","text":"二の宮におはすらんと目とどむれば、御髪のかかりなべてならで、","source":"狭衣・巻二","translation":"二の宮でいらっしゃるかと目を留めてみると、御髪のかかり具合が（並ひととおりでなく）（＝格別に美しく）、","headword_form":"なべてならで"}]},{"no":"149","pos":"副詞","headword":"わざと","kanji":"","senses":[{"sense_no":1,"gloss":"わざわざ"},{"sense_no":2,"gloss":"特に・とりわけ・格別に"},{"sense_no":3,"gloss":"（下に「の」を伴い）正式な・本格的な"}],"examples":[{"gloss":"特に・とりわけ・格別に","text":"わざとめでたき冊子ども、硯の箱の蓋に入れて遣せたり。","source":"更級","translation":"（親戚の人がわたしに）（特に）立派な物語の本などを、硯の箱の蓋に入れて送ってくれた。","headword_form":"わざと"},{"gloss":"（下に「の」を伴い）正式な・本格的な","text":"わざとの御学問はさるものにて、琴笛の音にも、","source":"源氏・桐壺","translation":"（正式な）御学問はいうまでもなく、琴や笛（の演奏）の音色でも、","headword_form":"わざと"}]},{"no":"150","pos":"副詞","headword":"あまた","kanji":"数多","senses":[{"sense_no":1,"gloss":"たくさん・数多く"}],"examples":[{"gloss":"たくさん・数多く","text":"女御・更衣あまたさぶらひ給ひけるなかに、","source":"源氏・桐壺","translation":"女御・更衣（などの后妃）が（たくさん）お仕えなさっていた中で、","headword_form":"あまた"}]},{"no":"151","pos":"副詞","headword":"ここら・そこら","kanji":"","senses":[{"sense_no":1,"gloss":"たくさん・数多く"},{"sense_no":2,"gloss":"たいそう・はなはだしく"}],"examples":[{"gloss":"たくさん・数多く","text":"物語は、ここらあるが中にも、この源氏のは一きはふかく心を入れて作れる物にして、","source":"玉の小櫛・巻一","translation":"物語は、（たくさん）あるその中でも、この『源氏物語』は特に一生懸命に作ったもので、","headword_form":"ここら"},{"gloss":"たくさん・数多く","text":"そこらの人のほめ感じて、","source":"枕・頭中将のすずろなるそらごと（を聞きて）","translation":"（たくさん）の人がほめ感心して、","headword_form":"そこら"},{"gloss":"たいそう・はなはだしく","text":"ここら悲しきさまざまの愁はしさはさし置かれて、","source":"源氏・明石","translation":"（たいそう）悲しいあれこれのつらいことは自然と捨て置かれて、","headword_form":"ここら"}]},{"no":"152","pos":"副詞","headword":"え","kanji":"","senses":[{"sense_no":1,"gloss":"〈下に打消を伴い〉（〜する）ことができない"}],"examples":[{"gloss":"〈下に打消を伴い〉（〜する）ことができない","text":"この玉はたはやすくえ取らじを、","source":"竹取・竜の頸の玉","translation":"この玉は簡単に取る（ことはできないだろう）に、","forms":["え","じ"]}]},{"no":"153","pos":"副詞","headword":"な〜そ","kanji":"","senses":[{"sense_no":1,"gloss":"（〜する）な・（〜し）ないでくれ・（〜し）てはならない"}],"examples":[{"gloss":"（〜する）な・（〜し）ないでくれ・（〜し）てはならない","text":"や、な起こしたてまつりそ。幼き人は寝入りたまひにけり。","source":"宇治・巻一二十話","translation":"おい、起こし申し上げる（な）。幼い人は寝入りなさってしまったよ。","forms":["な","そ"]},{"gloss":"（〜する）な・（〜し）ないでくれ・（〜し）てはならない","text":"さなせそ。","source":"枕・人ばへする物","translation":"そのように（＝そんなことは）し（てはならない）。","forms":["な","そ"]}]},{"no":"154","pos":"副詞","headword":"おほかた","kanji":"大方","senses":[{"sense_no":1,"gloss":"まったく・少しも・決して（〜ない）"},{"sense_no":2,"gloss":"（打消を伴わないで）だいたい・概して"}],"examples":[{"gloss":"まったく・少しも・決して（〜ない）","text":"《「一条室町に鬼あり」と大騒ぎしているので、》人をやりて見るに、大方あへるものなし。","source":"徒然・五〇段","translation":"人をやって見せる（＝確かめさせる）が、（まったく）会った者はいない。","headword_form":"大方"},{"gloss":"（打消を伴わないで）だいたい・概して","text":"おほかた、振る舞ひて興あるよりも、興無くて安らかなるが、まさりたることなり。","source":"徒然・三二段","translation":"（だいたい）、（わざとらしく）振る舞っておもしろいことよりも、おもしろくなくても素直なほうが、まさっているものである。","headword_form":"おほかた"}]},{"no":"155","pos":"副詞","headword":"さらに","kanji":"更に","senses":[{"sense_no":1,"gloss":"まったく・少しも・決して（〜ない）"},{"sense_no":2,"gloss":"（打消を伴わないで）さらに・その上〔現代語と同じ〕"}],"examples":[{"gloss":"まったく・少しも・決して（〜ない）","text":"《中納言隆家が姉の中宮定子のもとにやってきて、すばらしい扇の骨を手に入れたという。》さらにまだ見ぬ骨のさまなり。","source":"枕・中納言まゐり給ひて","translation":"（まったく）まだ見たこともない（すばらしい扇の）骨の様子である。","headword_form":"さらに"}]},{"no":"156","pos":"副詞","headword":"よに","kanji":"世に","senses":[{"sense_no":1,"gloss":"まったく・少しも・決して（〜ない）"},{"sense_no":2,"gloss":"（打消を伴わないで）実に・非常に"}],"examples":[{"gloss":"まったく・少しも・決して（〜ない）","text":"《男は》空をあふぎて、よに心得ぬけしきにて帰りてけり。","source":"宇治・巻九一話","translation":"（男は）空を仰いで、（まったく）（わけが）分からない様子で帰ってしまった。","headword_form":"よに"}]},{"no":"157","pos":"副詞","headword":"たえて","kanji":"絶えて","senses":[{"sense_no":1,"gloss":"まったく・少しも・決して（〜ない）"}],"examples":[{"gloss":"まったく・少しも・決して（〜ない）","text":"世の中にたえて桜のなかりせば春の心はのどけからまし","source":"古今・五三","translation":"世の中に（まったく）桜がなかったならば、春の（人の）心はのどかだろうに。","headword_form":"たえて"}]},{"no":"158","pos":"副詞","headword":"つゆ","kanji":"露","senses":[{"sense_no":1,"gloss":"まったく・少しも・決して（〜ない）"}],"examples":[{"gloss":"まったく・少しも・決して（〜ない）","text":"《女御は古今和歌集の歌を暗唱して》やがて末まではあらねども、すべてつゆたがふことなかりけり。","source":"枕・清涼殿のうしとらのすみの","translation":"（女御は）そのまますぐに下の句まで（答えるということ）はないが、すべて（の歌を）（少しも）間違うことがなかった。","headword_form":"つゆ"}]},{"no":"159","pos":"副詞","headword":"ゆめ・ゆめゆめ","kanji":"","senses":[{"sense_no":1,"gloss":"まったく・少しも・決して（〜ない）"},{"sense_no":2,"gloss":"決して（〜するな）"}],"examples":[{"gloss":"まったく・少しも・決して（〜ない）","text":"《藤原俊成は平忠度に言った。》かかる忘れ形見を給はり置き候ひぬる上は、ゆめゆめ粗略を存ずまじう候ふ。","source":"平家・巻一","translation":"このような忘れ形見（＝巻物）をいただきました以上は、（決して）粗略を思う（＝いい加減に考える）つもりはありません。","headword_form":"ゆめゆめ"},{"gloss":"決して（〜するな）","text":"ゆめこの雪落とすな。","source":"大和・一二九段","translation":"（決して）この雪を落とすな。","headword_form":"ゆめ"}]},{"no":"160","pos":"副詞","headword":"つやつや","kanji":"","senses":[{"sense_no":1,"gloss":"まったく・少しも・決して（〜ない）"}],"examples":[{"gloss":"まったく・少しも・決して（〜ない）","text":"《法師たちは埋めておいた箱を掘り出そうと、》木の葉をかきのけたれど、つやつや物も見えず。","source":"徒然・五四段","translation":"木の葉をかきのけたが、（まったく）何も見えない。","headword_form":"つやつや"}]},{"no":"161","pos":"副詞","headword":"をさをさ","kanji":"","senses":[{"sense_no":1,"gloss":"ほとんど（〜ない）"}],"examples":[{"gloss":"ほとんど（〜ない）","text":"冬枯れの気色こそ秋にはをさをさとるまじけれ。","source":"徒然・一九段","translation":"冬枯れの様子は秋には（ほとんど）劣らないだろう。","headword_form":"をさをさ"}]},{"no":"162","pos":"副詞","headword":"よも","kanji":"","senses":[{"sense_no":1,"gloss":"まさか（〜ないだろう）"}],"examples":[{"gloss":"まさか（〜ないだろう）","text":"《傷ついた雀も空を飛べるようになったので、》今はよも烏に取られじ。","source":"宇治・巻三十六話","translation":"もう今は（まさか）烏に取られ（ることも）ないだろう。","forms":["よも","じ"]}]},{"no":"163","pos":"副詞","headword":"あなかしこ","kanji":"","senses":[{"sense_no":1,"gloss":"決して（〜するな）"}],"examples":[{"gloss":"決して（〜するな）","text":"《夢占いの女は言う。》あなかしこあなかしこ、人に語りたまふな。","source":"宇治・巻十三・五話","translation":"（決して決して）、他人に語りなさるな。","headword_form":"あなかしこあなかしこ"}]},{"no":"164","pos":"動詞","headword":"ためらふ","kanji":"","senses":[{"sense_no":1,"gloss":"気持ちを静める・体を休める・病勢を落ち着かせる"},{"sense_no":2,"gloss":"迷ってぐずぐずする・躊躇する・ためらう〔現代語と同じ〕"}],"examples":[{"gloss":"気持ちを静める・体を休める・病勢を落ち着かせる","text":"大将も、とみにえためらひたまはず。","source":"源氏・柏木","translation":"大将も、すぐには（気持ちを静め）なさることができない。","headword_form":"ためらひ"},{"gloss":"迷ってぐずぐずする・躊躇する・ためらう〔現代語と同じ〕","text":"たやすくうち出でんもいかがとためらひけるを、","source":"徒然・一三二段","translation":"《料理の名人の技をみんな見たいと思っていたが、》簡単に口に出すようなのもどうかと（ためらっ）ていたのを、","headword_form":"ためらひ"}]},{"no":"165","pos":"動詞","headword":"やすらふ","kanji":"休らふ","senses":[{"sense_no":1,"gloss":"ためらう"},{"sense_no":2,"gloss":"立ち止まる・ひと息入れる・休息する"}],"examples":[{"gloss":"ためらう","text":"ひたぶるに待つとも言はばやすらはでゆくべきものを君が家路に","source":"和泉式部","translation":"《わたしの訪れを》ひたすら待っていると《あなたが》言ってくれるならば、《わたしは》（ためらわ）ないでゆくだろうに、あなたの家に向かう道に（＝あなたの家の方へ）。","headword_form":"やすらは"},{"gloss":"立ち止まる・ひと息入れる・休息する","text":"いといみじき花の蔭に、しばしもやすらはず、","source":"源氏・若紫","translation":"とても美しい桜の花の陰に、少しの間も（立ち止まら）ず、","headword_form":"やすらは"}]},{"no":"166","pos":"動詞","headword":"かたらふ","kanji":"語らふ","senses":[{"sense_no":1,"gloss":"親しく語る・語り合う"},{"sense_no":2,"gloss":"親しく交際する・うちとける"},{"sense_no":3,"gloss":"（男女が）契る・夫婦の関係を結ぶ"},{"sense_no":4,"gloss":"相談する・仲間に引き入れる・説得する"}],"examples":[{"gloss":"親しく語る・語り合う","text":"かたらはばなぐさむこともありやせむ","source":"和泉式部","translation":"（親しく語り合う）ならば慰められることもあるだろうか。","headword_form":"かたら"},{"gloss":"親しく交際する・うちとける","text":"かたらふどちは見せかはしなどするも、いとをかし。","source":"枕・一節は","translation":"《手紙の返事は》（親しく交際している）同士は見せ交わしなどするのも、実におもしろい。","headword_form":"かたらふ"},{"gloss":"（男女が）契る・夫婦の関係を結ぶ","text":"さるべき所に宮仕へける女房をかたらひて、","source":"宇治・巻十一話","translation":"《明俊は》しかるべき所に宮仕えしていた女房と（契っ）て、","headword_form":"かたらひ"},{"gloss":"相談する・仲間に引き入れる・説得する","text":"小君をかたらひ給へど、","source":"源氏・夕顔","translation":"《光源氏は》小君を（説得し）なさるが、","headword_form":"かたらひ"}]},{"no":"167","pos":"動詞","headword":"すむ","kanji":"住む","senses":[{"sense_no":1,"gloss":"住む〔現代語と同じ〕"},{"sense_no":2,"gloss":"（女のもとに）通う・通ってともに暮らす"}],"examples":[{"gloss":"（女のもとに）通う・通ってともに暮らす","text":"男、《二人目の妻の》もとへは、すまずなりにけり。","source":"伊勢・二三段","translation":"《男は一人目の妻の詠んだ歌に感激して、》男は、《二人目の妻のもとへは》（通わ）なくなってしまった。","headword_form":"すま"}]},{"no":"168","pos":"動詞","headword":"やむ","kanji":"止む","senses":[{"sense_no":1,"gloss":"そのままになる・（そのまま）終わる"}],"examples":[{"gloss":"そのままになる・（そのまま）終わる","text":"翁、心地あしく、苦しき時も、この子を見れば、苦しきこともやみぬ。","source":"竹取・かぐや姫の生ひ立ち","translation":"《竹取の》翁は、気分が悪く、苦しいときも、この子（＝かぐや姫）を見ると、苦しいことも（終わって）（＝おさまって）しまう。","headword_form":"やみ"},{"gloss":"そのままになる・（そのまま）終わる","text":"なほこの事、かちまけなくてやませ給はん、いとわろかるべし。","source":"枕・清涼殿のうしとらのすみの","translation":"やはりこのこと（＝『古今和歌集』の暗唱）を、勝ち負けなくて（そのまま終わら）せなさるようなことは（＝勝負をつけないままになさるのは）、実によくないだろう。","headword_form":"やま"}]},{"no":"169","pos":"動詞","headword":"うつろふ","kanji":"移ろふ","senses":[{"sense_no":1,"gloss":"移りゆく"},{"sense_no":2,"gloss":"変わってゆく・色あせる"},{"sense_no":3,"gloss":"心変わりする"}],"examples":[{"gloss":"変わってゆく・色あせる","text":"例よりはひきつくろひて書きて、移ろひたる菊にさしたり。","source":"蜻蛉・上巻","translation":"いつもよりは改まって《歌を》書いて、（色あせ）た菊に挿して送った。","headword_form":"移ろひ"}]},{"no":"170","pos":"動詞","headword":"みいだす","kanji":"見出だす","senses":[{"sense_no":1,"gloss":"外を見る"},{"sense_no":2,"gloss":"見つけ出す"}],"examples":[{"gloss":"外を見る","text":"渡殿の戸口の局に見いだせば、","source":"紫式部","translation":"《土御門殿の》渡殿の戸口の部屋で（外を見る）と、","headword_form":"見いだせ"},{"gloss":"見つけ出す","text":"この地蔵納めて置き奉りたりけるを思ひ出だして、みいだしたりけり。","source":"宇治・巻五十一話","translation":"《身分の低い男は》この地蔵を《奥の部屋に》納めて置き申し上げていたのを思い出して、（見つけ出し）たのであった。","headword_form":"みいだし"}]},{"no":"171","pos":"動詞","headword":"もてなす","kanji":"","senses":[{"sense_no":1,"gloss":"（わが身を）処する・振る舞う"},{"sense_no":2,"gloss":"（人を）待遇する・取り扱う・大切にする"}],"examples":[{"gloss":"（わが身を）処する・振る舞う","text":"涙もつつみあへず出づれど、つれなくもてなして、","source":"蜻蛉・巻一","translation":"涙もおさえきれず出るけれど、なんでもないように（振る舞っ）て、","headword_form":"もてなし"},{"gloss":"（人を）待遇する・取り扱う・大切にする","text":"「人のため恥ぢがましきことなく、いづれをもなだらかにもてなして、女の恨みな負ひそ」とのたまはする。","source":"源氏・葵","translation":"「女にとって恥となるようなことをせず、どなたをも角だたないように（＝傷つけないように）（取り扱っ）て、女の恨みを受けてはならない」と《桐壺院は光源氏に》おっしゃる。","headword_form":"もてなし"}]},{"no":"172","pos":"動詞","headword":"あつかふ","kanji":"扱ふ","senses":[{"sense_no":1,"gloss":"面倒を見る・世話をする・看病する"},{"sense_no":2,"gloss":"もてあます"}],"examples":[{"gloss":"面倒を見る・世話をする・看病する","text":"ただこの尼君ひとりもてあつかひはべりしほどに、","source":"源氏・若紫","translation":"ただこの尼君一人で《娘の》（面倒を見）ておりましたときに、","headword_form":"あつかひ"},{"gloss":"もてあます","text":"多く取らむと騒ぐ者は、なかなかうちこぼしあつかふほどに、","source":"枕・猶めでたきこと","translation":"《食べ物を》たくさん取ろうと騒いでいるものは、かえってこぼして（もてあます）うちに。","headword_form":"あつかふ"}]},{"no":"173","pos":"動詞","headword":"あくがる","kanji":"","senses":[{"sense_no":1,"gloss":"（魂が体から）さまよい出る・浮かれ歩く・（心が）うわの空になる"}],"examples":[{"gloss":"（魂が体から）さまよい出る・浮かれ歩く・（心が）うわの空になる","text":"物思ふ人の魂は、げにあくがるるものになむありける。","source":"源氏・葵","translation":"もの思いをする人の魂は、ほんとうに（体から）（さまよい出る）ものであるわ。","headword_form":"あくがるる"},{"gloss":"（魂が体から）さまよい出る・浮かれ歩く・（心が）うわの空になる","text":"いさよふ月に、ゆくりなくあくがれむことを、女は思ひやすらひ、","source":"源氏・夕顔","translation":"《光源氏は女（＝夕顔）をある廃院へと誘った。》沈むのをためらいがちな（＝なかなか沈まない）月に（誘われて）、突然（浮かれ歩く）ようなことを、女はためらい、","headword_form":"あくがれ"}]},{"no":"174","pos":"動詞","headword":"あふ","kanji":"合ふ・会ふ・逢ふ／敢ふ","senses":[{"sense_no":1,"gloss":"〔Ａ〕結婚する・男女が契る"},{"sense_no":2,"gloss":"〔Ｂ〕〔打消を伴い〕耐えられない・我慢できない"},{"sense_no":3,"gloss":"〔動詞につき、打消を伴い〕〜きれない・〜できない"},{"sense_no":4,"gloss":"〔「あへなむ」の形で〕かまわない・差し支えないだろう"}],"examples":[{"gloss":"〔Ａ〕結婚する・男女が契る","text":"この世の人は、男は女にあふことをす。","source":"竹取・貴公子たちの求婚","translation":"この世の人は、男は女と（結婚する）ことをする。","headword_form":"あふ"},{"gloss":"〔Ｂ〕〔打消を伴い〕耐えられない・我慢できない","text":"霜にあへず枯れにし園の菊なれど、","source":"源氏・宿木","translation":"霜に（耐えられなく）て枯れてしまった庭園の菊ではあるが、","headword_form":"あへ"},{"gloss":"〔動詞につき、打消を伴い〕〜きれない・〜できない","text":"念じあへず泣くけはひあはれなり。","source":"源氏・薄雲","translation":"我慢し（きれない）（＝最後まで我慢することができない）で泣く様子は痛ましい。","headword_form":"あへ"},{"gloss":"〔「あへなむ」の形で〕かまわない・差し支えないだろう","text":"小さきはあへなむ。","source":"大鏡・時平","translation":"幼い子どもは（同行しても）（差し支えないだろう）。","headword_form":"あへ"}]},{"no":"175","pos":"動詞","headword":"しほたる","kanji":"潮垂る","senses":[{"sense_no":1,"gloss":"涙を流す・涙で袖が濡れる"}],"examples":[{"gloss":"涙を流す・涙で袖が濡れる","text":"いと悲しうて、人知れずしほたれけり。","source":"源氏・澪標","translation":"ほんとうに悲しくて、人知れず（涙を流し）たのであった。","headword_form":"しほたれ"}]},{"no":"176","pos":"動詞","headword":"かきくらす","kanji":"掻き暗す","senses":[{"sense_no":1,"gloss":"空を暗くする・あたり一面を暗くする"},{"sense_no":2,"gloss":"心を暗くする・悲しみにくれる"}],"examples":[{"gloss":"空を暗くする・あたり一面を暗くする","text":"雪のかきくらし降るに、","source":"枕・今朝はさしも見えざりつる空の","translation":"雪が（空を暗くし）て降るので、","headword_form":"かきくらし"},{"gloss":"心を暗くする・悲しみにくれる","text":"またかきくらさるるさまぞ、いふかたなき。","source":"建礼門院","translation":"《わたしは亡くなった恋人との思い出の地を訪ねてみたが、》また自然と（悲しみにくれる）様子は、言いようがない。","headword_form":"かきくらさ"}]},{"no":"177","pos":"動詞","headword":"まどふ","kanji":"惑ふ","senses":[{"sense_no":1,"gloss":"迷う・悩む・途方にくれる・うろたえる・心が乱れる"},{"sense_no":2,"gloss":"〈動詞の連用形について〉ひどく（〜する）"}],"examples":[{"gloss":"迷う・悩む・途方にくれる・うろたえる・心が乱れる","text":"道知れる人もなくて、惑ひ行きけり。","source":"伊勢・九段","translation":"道を知っている人もいなくて、（迷い）（ながら）行った。","headword_form":"惑ひ"},{"gloss":"〈動詞の連用形について〉ひどく（〜する）","text":"目眉額なども腫れまどひて、","source":"徒然・四二段","translation":"目や眉や額なども（ひどく）はれて、","headword_form":"まどひ"}]},{"no":"178","pos":"動詞","headword":"たばかる","kanji":"謀る","senses":[{"sense_no":1,"gloss":"考えをめぐらす・工夫する"},{"sense_no":2,"gloss":"だます・たくらむ"}],"examples":[{"gloss":"考えをめぐらす・工夫する","text":"子安貝取らむと思しめさば、たばかり申さむ。","source":"竹取・燕の子安貝","translation":"子安貝を取ろうとお思いになるならば、（工夫し）申し上げよう。","headword_form":"たばかり"},{"gloss":"だます・たくらむ","text":"かの琳賢は基俊と仲のあしかりければ、「たばからん」と思ひて、","source":"無名抄","translation":"あの琳賢は基俊と仲が悪かったので、「（だまそ）う」と思って、","headword_form":"たばから"}]},{"no":"179","pos":"動詞","headword":"すさぶ","kanji":"荒ぶ・進ぶ・遊ぶ","senses":[{"sense_no":1,"gloss":"何かに興じる・楽しむ・慰みに（何かを）する・気の向くままに（何かを）する"}],"examples":[{"gloss":"何かに興じる・楽しむ・慰みに（何かを）する・気の向くままに（何かを）する","text":"笛をえならず吹きすさびたる、","source":"徒然・四二段","translation":"笛を言いようもなくうまく吹き（興じ）ているのを、","headword_form":"すさび"},{"gloss":"何かに興じる・楽しむ・慰みに（何かを）する・気の向くままに（何かを）する","text":"絵など描きて、色どりたまふ。よろづにをかしうすさび散らしたまひけり。","source":"源氏・末摘花","translation":"（若紫は）絵などを描いて、色をおつけになる。いろいろと上手に（気の向くままに描き）散らしなさった。","headword_form":"すさび"}]},{"no":"180","pos":"動詞","headword":"すまふ","kanji":"争ふ・辞ふ","senses":[{"sense_no":1,"gloss":"抵抗する・争う"},{"sense_no":2,"gloss":"辞退する・断る"}],"examples":[{"gloss":"抵抗する・争う","text":"〈男は親がかりの身なので結婚に反対する親に逆らえず、〉女もいやしければ、すまふ力なし。","source":"伊勢・四〇段","translation":"女も身分が低いので、（男の親に）（抵抗する）力がない。","headword_form":"すまふ"},{"gloss":"辞退する・断る","text":"もとより歌の事は知らざりければ、すまひけれど、","source":"伊勢・一〇一段","translation":"（男は）もとより歌のことは知らなかったので、（断っ）たが、","headword_form":"すまひ"}]},{"no":"181","pos":"動詞","headword":"まねぶ","kanji":"学ぶ","senses":[{"sense_no":1,"gloss":"まねる"},{"sense_no":2,"gloss":"〈見聞した物事をそのまま〉伝える・書き記す"}],"examples":[{"gloss":"まねる","text":"人の言ふらむことをまねぶらむよ。","source":"枕・鳥は","translation":"（オウムは）人の言うことを（まねる）というよ。","headword_form":"まねぶ"},{"gloss":"〈見聞した物事をそのまま〉伝える・書き記す","text":"かの御車の所争ひをまねびきこゆる人ありければ、","source":"源氏・葵","translation":"あのお車の場所争いを（光源氏に）（伝え）申し上げる人がいたので、","headword_form":"まねび"}]},{"no":"182","pos":"動詞","headword":"ねぶ","kanji":"","senses":[{"sense_no":1,"gloss":"年をとる・成長する"},{"sense_no":2,"gloss":"大人びる・ませる"}],"examples":[{"gloss":"年をとる・成長する","text":"ねび給ふままに、ゆゆしきまでなりまさり給ふ御ありさまかな。","source":"源氏・紅葉賀","translation":"（皇子は）（年をとり）なさるにつれて、恐ろしいほど美しく成長なさるご様子よ。","headword_form":"ねび"},{"gloss":"大人びる・ませる","text":"御年の程よりはるかにねびさせ給ひて、","source":"平家・巻十一","translation":"お年の程度より（＝実際のお年より）はるかに（大人び）ていらっしゃって、","headword_form":"ねび"}]},{"no":"183","pos":"動詞","headword":"おきつ","kanji":"掟つ","senses":[{"sense_no":1,"gloss":"〈こうしようと心に〉決めておく・計画する"},{"sense_no":2,"gloss":"〈こうしろと〉指図する・命令する"}],"examples":[{"gloss":"〈こうしようと心に〉決めておく・計画する","text":"よろづに見ざらん世までを思ひおきてんこそ、はかなかるべけれ。","source":"徒然・二五段","translation":"何ごとにおいても見ないような世（＝死後のこと）までを考えて（決めておく）ようなことは、むなしいにちがいない。","headword_form":"おきて"},{"gloss":"〈こうしろと〉指図する・命令する","text":"高名の木のぼりといひしをのこ、人をおきてて、高き木にのぼせて、","source":"徒然・一〇九段","translation":"有名な木登りといった（＝木登りで有名な）男が、人に（指図し）、高き木にのぼらせて、","headword_form":"おきて"}]},{"no":"184","pos":"動詞","headword":"うれふ","kanji":"愁ふ・憂ふ","senses":[{"sense_no":1,"gloss":"〈嘆き〉訴える・不平を言う"}],"examples":[{"gloss":"〈嘆き〉訴える・不平を言う","text":"〈ある長者の偽者が現れ、長者の財宝を人々に配ったので、〉（長者が）御門にうれへ申せば、","source":"宇治・巻六・三話","translation":"（長者が）帝に（訴え）申し上げると、","headword_form":"うれへ"}]},{"no":"185","pos":"動詞","headword":"むすぶ","kanji":"結ぶ・掬ぶ","senses":[{"sense_no":1,"gloss":"作る・できる"},{"sense_no":2,"gloss":"契る・約束する"},{"sense_no":3,"gloss":"〈両手で水などを〉すくう"}],"examples":[{"gloss":"作る・できる","text":"淀みに浮かぶうたかたは、かつ消え、かつむすびて、","source":"方丈","translation":"（川の）淀みに浮かぶ水の泡は、一方では消え、一方では（でき）て、","headword_form":"むすび"},{"gloss":"〈両手で水などを〉すくう","text":"また手にむすびてぞ水も飲みける。","source":"徒然・十八段","translation":"また手で（すくっ）て水も飲んだ。","headword_form":"むすび"}]},{"no":"186","pos":"動詞","headword":"とぶらふ","kanji":"訪ふ・弔ふ","senses":[{"sense_no":1,"gloss":"訪ねる・尋ね求める"},{"sense_no":2,"gloss":"見舞う"},{"sense_no":3,"gloss":"弔う〈＝弔問する・供養する〉"}],"examples":[{"gloss":"訪ねる・尋ね求める","text":"能因島に舟を寄せて、三年幽居のあとをとぶらひ、","source":"奥の細道・象潟","translation":"能因島に舟を寄せて、（能因法師が）三年間俗世を避けて暮らしていた跡を（訪ね）、","headword_form":"とぶらひ"},{"gloss":"見舞う","text":"国の司まうでとぶらふにも、え起き上がり給はで、舟底に伏し給へり。","source":"竹取・竜の頸の玉","translation":"国司が参上して（見舞う）ときにも、（大納言は）起き上がりなさることができなくて、舟底に横になっていらっしゃる。","headword_form":"とぶらふ"},{"gloss":"弔う〈＝弔問する・供養する〉","text":"〈桐壺帝は更衣の亡くなったあと、〉後のわざなどにも、こまかにとぶらひはせたまふ。","source":"源氏・桐壺","translation":"（桐壺帝は）法事などに（おいて）も、心を込めて（弔い）なさる。","headword_form":"とぶらひ"}]},{"no":"187","pos":"動詞","headword":"やつす","kanji":"","senses":[{"sense_no":1,"gloss":"目立たない服装〈様子〉にする・質素にする・みすぼらしくする"},{"sense_no":2,"gloss":"出家する"}],"examples":[{"gloss":"目立たない服装〈様子〉にする・質素にする・みすぼらしくする","text":"かくまでやつしたれど、みにくくなどはあらで、","source":"堤中納言・虫めづる姫君","translation":"（姫君は）ここまで（質素な服装をし）ているが、見苦しくなどもなくて、","headword_form":"やつし"},{"gloss":"出家する","text":"〈光源氏と秋好中宮はこの世はすべてはかないものだから捨ててしまいたいと互いにおっしゃっているが、〉なほやつしにくき御身のありさまどもなり。","source":"源氏・鈴虫","translation":"やはり（出家し）がたいご身分の様子（＝お二人の身の上）である。","headword_form":"やつし"}]},{"no":"188","pos":"動詞","headword":"さはる","kanji":"障る","senses":[{"sense_no":1,"gloss":"差し障る・差し支える・妨げられる"}],"examples":[{"gloss":"差し障る・差し支える・妨げられる","text":"八日、さはることありて、なほ同じ所なり。","source":"土佐・一月八日","translation":"八日、（差し支える）ことがあって、やはり同じ所（＝大湊）にいる。","headword_form":"さはる"},{"gloss":"差し障る・差し支える・妨げられる","text":"月影ばかりぞ、八重葎にもさはらずさし入りたる。","source":"源氏・桐壺","translation":"月光だけが、幾重にも生い茂っている雑草にも（妨げられ）ず差し込んでいる。","headword_form":"さはら"}]},{"no":"189","pos":"動詞","headword":"かしこまる","kanji":"畏まる","senses":[{"sense_no":1,"gloss":"恐縮する・恐縮して正座する・お礼を申し上げる・謹慎する"}],"examples":[{"gloss":"恐縮する・恐縮して正座する・お礼を申し上げる・謹慎する","text":"にはかに、（朱雀院が）かく渡りおはしまいたれば、主の院驚きかしこまりきこえたまふ。","source":"源氏・柏木","translation":"突然、（朱雀院が）このようにおいでになったので、主人の院（＝光源氏）は驚き（恐縮し）申し上げなさる。","headword_form":"かしこまり"},{"gloss":"恐縮する・恐縮して正座する・お礼を申し上げる・謹慎する","text":"五位六位ひざまづきかしこまる。","source":"宇津保・忠こそ","translation":"五位六位（の人々）はひざまずき（恐縮して正座する）。","headword_form":"かしこまる"}]},{"no":"190","pos":"動詞","headword":"かこつ","kanji":"託つ","senses":[{"sense_no":1,"gloss":"嘆く・不平を言う"}],"examples":[{"gloss":"嘆く・不平を言う","text":"〈あの世に向かおうとするとき、〉何のわざをかかこたむとする。","source":"方丈","translation":"何のこと（＝何ごと）を（嘆こ）うとするのか。","headword_form":"かこた"}]},{"no":"191","pos":"動詞","headword":"わく","kanji":"分く","senses":[{"sense_no":1,"gloss":"分ける・区別する〈現代語と同じ〉"},{"sense_no":2,"gloss":"理解する"}],"examples":[{"gloss":"理解する","text":"そのおそくとき花の心をよくわきて、いろいろを尽くし植ゑおきたまひしかば、","source":"源氏・幻","translation":"（紫の上は）その（咲くのが）遅い早いという花の性質をよく（理解し）て、あらゆる種類（の花の木）を植えてお置きになったので、","headword_form":"わき"}]},{"no":"192","pos":"動詞","headword":"つつむ","kanji":"慎む","senses":[{"sense_no":1,"gloss":"遠慮する・はばかる"}],"examples":[{"gloss":"遠慮する・はばかる","text":"このふるさとの女の前にてだに、つつみ侍るものを、","source":"紫式部","translation":"自分の実家の侍女の前でさえ、（遠慮し）ておりますのに、","headword_form":"つつみ"}]},{"no":"193","pos":"形容詞","headword":"あらまほし","kanji":"","senses":[{"sense_no":1,"gloss":"理想的だ・望ましい"}],"examples":[{"gloss":"理想的だ・望ましい","text":"人はかたち、ありさまの、優れたらんこそ、あらまほしかるべけれ。","source":"徒然・一段","translation":"人は容貌や、容姿が、すぐれているようなのが、（望ましい）にちがいない。","headword_form":"あらまほしかる"}]},{"no":"194","pos":"形容詞","headword":"らうらうじ","kanji":"労労じ","senses":[{"sense_no":1,"gloss":"巧みだ・もの慣れている・気がきいている・配慮が行き届いている"},{"sense_no":2,"gloss":"上品だ・（気高く）美しい"}],"examples":[{"gloss":"巧みだ・もの慣れている・気がきいている・配慮が行き届いている","text":"《歌を》いとをかしげにらうらうじく書きたまへり。","source":"源氏・椎本","translation":"《中の君は歌を》実に美しい様子に（巧みに）お書きになっている。","headword_form":"らうらうじく"},{"gloss":"上品だ・（気高く）美しい","text":"夜深くうちいでたる時鳥の声の、らうらうじう愛敬づきたる、いみじう心あくがれ、せむかたなし。","source":"枕・鳥は","translation":"深夜に鳴き出した（ほととぎすの）声が、（上品で）かわいらしいのは、ひどく心がひかれ、どうしようもない。","headword_form":"らうらうじう"}]},{"no":"195","pos":"形容詞","headword":"うるせし","kanji":"","senses":[{"sense_no":1,"gloss":"賢い・優れている"},{"sense_no":2,"gloss":"巧みだ・優れている"}],"examples":[{"gloss":"賢い・優れている","text":"この童も心得てけり。うるせきやつぞかし。","source":"宇治・巻一・九話","translation":"この子も分かっているのだなあ。（賢い）やつだよ。","headword_form":"うるせき"},{"gloss":"巧みだ・優れている","text":"宮の御琴の音は、いとうるせくなりにけりな。","source":"源氏・若菜下","translation":"宮のお琴の音色は、たいへん（巧みに）なったなあ。","headword_form":"うるせく"}]},{"no":"196","pos":"形容詞","headword":"はかばかし","kanji":"","senses":[{"sense_no":1,"gloss":"しっかりしている・きちんとしている"},{"sense_no":2,"gloss":"はっきりしている"}],"examples":[{"gloss":"しっかりしている・きちんとしている","text":"とりたてて、はかばかしき後見しなければ、","source":"源氏・桐壺","translation":"（桐壺の更衣は）取り立てて、（しっかりとした）後ろだてがないので、","headword_form":"はかばかしき"},{"gloss":"はっきりしている","text":"「とく参りたまへ」など、はかばかしうも、のたまはせやらず、","source":"源氏・桐壺","translation":"（桐壺帝は）「早く参内してください」などと、（はっきりと）は、最後までおっしゃることもできず、","headword_form":"はかばかしう"}]},{"no":"197","pos":"形容詞","headword":"をさをさし","kanji":"長長し","senses":[{"sense_no":1,"gloss":"しっかりしている"},{"sense_no":2,"gloss":"大人びている"}],"examples":[{"gloss":"しっかりしている","text":"若ければ、文もをさをさしからず、","source":"伊勢・一〇七段","translation":"（女は）若いので、手紙も（しっかりしておら）ず（＝きちんとは書けず）、","headword_form":"をさをさし"}]},{"no":"198","pos":"形容詞","headword":"さうなし","kanji":"双無し","senses":[{"sense_no":1,"gloss":"比べるものがない・すばらしい"}],"examples":[{"gloss":"比べるものがない・すばらしい","text":"園の別当入道はさうなき庖丁者なり。","source":"徒然・二三一段","translation":"園の別当入道は（比べるものがない（すばらしい））料理人である。","headword_form":"さうなき"},{"gloss":"比べるものがない・すばらしい","text":"蛇がふるくよりこの地を占めたるものならば、さうなく掘り捨てられがたし。","source":"徒然・二〇七段","translation":"（蛇が）昔からこの土地を占有しているものであるならば、（簡単）に掘り捨てなることはできない。","headword_form":"さうなく"}]},{"no":"199","pos":"形容詞","headword":"くまなし","kanji":"隈無し","senses":[{"sense_no":1,"gloss":"暗いところがない・陰がない"},{"sense_no":2,"gloss":"なんでも知っている・行き届いている・抜かりがない"}],"examples":[{"gloss":"暗いところがない・陰がない","text":"花は盛りに、月はくまなきをのみ見るものかは。","source":"徒然・一三七段","translation":"桜の花は盛りで（あるときを）、月は（陰がない）のを（＝満月を）のみ見るものか、いや、そうではない。","headword_form":"くまなき"},{"gloss":"なんでも知っている・行き届いている・抜かりがない","text":"《左馬頭はどんな女性がいいのか考えていたが、》くまなきもの言ひ（＝左馬頭）も、定めかねて、いたくうち嘆く。","source":"源氏・帚木","translation":"（なんでも知っている）ものの言い手（＝左馬頭）も、（結局どう）いう女性がいいのか決めかねて、ひどくため息をつく。","headword_form":"くまなき"}]},{"no":"200","pos":"形容詞","headword":"ずちなし","kanji":"術無し","senses":[{"sense_no":1,"gloss":"どうしようもない"}],"examples":[{"gloss":"どうしようもない","text":"「妹のあり所申せ、申せ」と責めらるるに、ずちなし。","source":"枕・里にまかでたるに","translation":"「妹の居所を申せ、申せ」と責めなさるので、（どうしようもない）。","headword_form":"ずちなし"}]},{"no":"201","pos":"形容詞","headword":"まさなし","kanji":"","senses":[{"sense_no":1,"gloss":"よくない・見苦しい"}],"examples":[{"gloss":"よくない・見苦しい","text":"《かぐや姫が竹取の翁に言った。》声高になのたまひそ。屋の上にをる人どもの聞くに、いとまさなし。","source":"竹取・かぐや姫の昇天","translation":"声高に（＝大きな声で）おっしゃらないでください。屋根の上にいる人たちが聞くと、実に（よくない）。","headword_form":"まさなし"}]},{"no":"202","pos":"形容詞","headword":"あいなし","kanji":"","senses":[{"sense_no":1,"gloss":"気に入らない・つまらない"},{"sense_no":2,"gloss":"《あいなく（う）の形で副詞的に用いて》なんとなく・わけもなく・むやみに"}],"examples":[{"gloss":"気に入らない・つまらない","text":"世に語り伝ふること、まことはあいなきにや、多くはみな虚言なり。","source":"徒然・七三段","translation":"世に語り伝え（られ）ていることは、本当（のこと）は（つまらない）のであろうか、多くはみな嘘である。","headword_form":"あいなき"},{"gloss":"《あいなく（う）の形で副詞的に用いて》なんとなく・わけもなく・むやみに","text":"《老いぼれた女房たちもつらそうな光源氏を見て思った。》あいなう心苦しうもあるかな。","source":"源氏・帚木","translation":"（なんとなく）気の毒でもあるわ。","headword_form":"あいなう"}]},{"no":"203","pos":"形容詞","headword":"はかなし","kanji":"","senses":[{"sense_no":1,"gloss":"頼りない・むなしい・はかない"},{"sense_no":2,"gloss":"ちょっとしたことだ・取るに足りない"}],"examples":[{"gloss":"頼りない・むなしい・はかない","text":"《光源氏は愛する夕顔に死なれて嘆く。》などてかくはかなき宿は取りつるぞ。","source":"源氏・夕顔","translation":"どうしてこのように（頼りない）宿を取ったのか。","headword_form":"はかなき"},{"gloss":"ちょっとしたことだ・取るに足りない","text":"《梨の花には》はかなき文づけなどだにせず。","source":"枕・木の花は","translation":"（梨の花には）（ちょっとした）手紙をつけることさえしない。","headword_form":"はかなき"}]},{"no":"204","pos":"形容詞","headword":"こころづきなし","kanji":"","senses":[{"sense_no":1,"gloss":"気にくわない・好感がもてない・心ひかれない"}],"examples":[{"gloss":"気にくわない・好感がもてない・心ひかれない","text":"心づきなき事あらん折は、なかなかその由を言ひてん。","source":"徒然・一七段","translation":"（気にくわない）ことがあるようなときは、かえってその理由を言ってしまうほうがよい。","headword_form":"心づきなき"}]},{"no":"205","pos":"形容詞","headword":"あへなし","kanji":"敢へ無し","senses":[{"sense_no":1,"gloss":"期待はずれだ・落胆している・張り合いがない"},{"sense_no":2,"gloss":"はかない・どうしようもない"}],"examples":[{"gloss":"期待はずれだ・落胆している・張り合いがない","text":"御使ひも、いとあへなくて、帰り参りぬ。","source":"源氏・桐壺","translation":"（帝の）お使いも、実に（落胆し）て、（宮中に）帰って参った。","headword_form":"あへなく"},{"gloss":"はかない・どうしようもない","text":"帥の皇子も重く悩ませ給ひて、あへなく失せ給ひぬ。","source":"増鏡・十五巻","translation":"帥の皇子も重病にかかりなさって、（はかなく）（も）お亡くなりになった。","headword_form":"あへなく"}]},{"no":"206","pos":"形容詞","headword":"よしなし","kanji":"由無し","senses":[{"sense_no":1,"gloss":"理由がない"},{"sense_no":2,"gloss":"方法がない"},{"sense_no":3,"gloss":"つまらない・意味がない"},{"sense_no":4,"gloss":"関係がない・縁がない"}],"examples":[{"gloss":"つまらない・意味がない","text":"《かぐや姫に言い寄ろうとする貴族たちは多かったが、》（愛情が）おろかなる人は、「ようなきありきはよしなかりけり」とて、来ずなりにけり。","source":"竹取・貴公子たちの求婚","translation":"（愛情が）いい加減な人は、「無用な（忍び）歩きは（つまらない）なあ」と言って、来なくなってしまった。","headword_form":"よしなかり"},{"gloss":"関係がない・縁がない","text":"《恋人の来るのを待っていたとき、》あらぬよしなき者の名乗りして来たるも、返す返すもすさまじといふはおろかなり。","source":"枕・すさまじき物","translation":"《恋人とは》別の（関係がない）者が名乗ってきたのも、ほんとうに興ざめだなどという言葉では言い尽くせない。","headword_form":"よしなき"}]},{"no":"207","pos":"形容詞","headword":"おほけなし","kanji":"","senses":[{"sense_no":1,"gloss":"身のほど知らずだ・身分不相応だ・おそれ多い"}],"examples":[{"gloss":"身のほど知らずだ・身分不相応だ・おそれ多い","text":"なほいとわが心ながらもおほけなく、いかで立ちいでしにかと、汗あえて、","source":"枕・宮にはじめてまゐりたるころ","translation":"やはりほんとうにわが気持ちながら（＝自分で決めたことではあるが）（身のほど知らずに）も、どうして出仕したのだろうかと、汗が流れて、","headword_form":"おほけなく"}]},{"no":"208","pos":"形容詞","headword":"さがなし","kanji":"","senses":[{"sense_no":1,"gloss":"意地が悪い・口やかましい"},{"sense_no":2,"gloss":"いたずらだ・やんちゃだ"}],"examples":[{"gloss":"意地が悪い・口やかましい","text":"男にもこのをばの御心のさがなく悪しきことを言ひ聞かせければ、","source":"大和・一六九段","translation":"（妻は）夫にも（母親代わりの）この叔母のお心が（意地が悪く）ひどいということを言い聞かせたので、（夫は叔母に対して）昔のとおりでもなく、","headword_form":"さがなく"},{"gloss":"いたずらだ・やんちゃだ","text":"さがなき童べどものつかまつりける、奇怪にさうらふことなり。","source":"徒然・一三六段","translation":"（いたずらな）子どもたちがいたしましたことで、けしからんことです。","headword_form":"さがなき"}]},{"no":"209","pos":"形容詞","headword":"はしたなし","kanji":"","senses":[{"sense_no":1,"gloss":"中途半端な"},{"sense_no":2,"gloss":"きまり悪い"},{"sense_no":3,"gloss":"そっけなく"},{"sense_no":4,"gloss":"激しく"}],"examples":[{"gloss":"中途半端な","text":"（父上は）人の心とどめたまふべくもあらず、はしたなうてこそ漂はめ。","source":"源氏・真木柱","translation":"（父上は）人の気持ちをとどめなさりそうもなく（＝かまってくださりそうもなく）（男の子たちは）（中途半端な）状態で（この世を）漂うことになるだろう。","headword_form":"はしたなう"},{"gloss":"きまり悪い","text":"げにいとあはれなりなど聞きながら、涙のつといで来ぬ、いとはしたなし。","source":"枕・はしたなき物","translation":"なるほど実に気の毒だなどと（思って話を）聞きながら、涙がすぐに出て来ないのは、ほんとうに（きまり悪い）。","headword_form":"はしたなし"},{"gloss":"そっけなく","text":"心許さざらむ人のためには、はしたなくもてなし給ひつべくこそものし給ふめるを、","source":"源氏・宿木","translation":"（宮の御方は）心を許さない人に対しては、（そっけなく）振る舞うにちがいないようだが、","headword_form":"はしたなく"},{"gloss":"激しく","text":"野分はしたなう吹いて、","source":"平家・巻六","translation":"台風が（激しく）吹いて、","headword_form":"はしたなう"}]},{"no":"210","pos":"形容詞","headword":"しどけなし","kanji":"","senses":[{"sense_no":1,"gloss":"だらしない・乱れている・怠慢だ"},{"sense_no":2,"gloss":"無造作だ・くつろいでいる・気楽だ"}],"examples":[{"gloss":"だらしない・乱れている・怠慢だ","text":"郡司のしどけなかりければ、","source":"宇治・巻九・六話","translation":"郡司が（怠慢だっ）たので、","headword_form":"しどけなかり"},{"gloss":"無造作だ・くつろいでいる・気楽だ","text":"（光源氏は）直衣ばかりをしどけなく着なしたまひて、","source":"源氏・帚木","translation":"（光源氏は）直衣だけを（気楽に）お召しになって、","headword_form":"しどけなく"}]},{"no":"211","pos":"形容詞","headword":"いぎたなし","kanji":"","senses":[{"sense_no":1,"gloss":"寝坊だ・ぐっすり寝込んでいる"}],"examples":[{"gloss":"寝坊だ・ぐっすり寝込んでいる","text":"《会いたくない人が来たので、たぬき寝入りしていると、召し使いが起こしによって来て、）いぎたなしと思ひ顔にひきゆるがしたる、いとにくし。","source":"枕・にくき物","translation":"（寝坊だ）と思っているような顔つきで（わたしを）ゆすっているのは、実に気に入らない。","headword_form":"いぎたなし"}]},{"no":"212","pos":"形容詞","headword":"ひとわろし","kanji":"人悪し","senses":[{"sense_no":1,"gloss":"みっともない・体裁が悪い"}],"examples":[{"gloss":"みっともない・体裁が悪い","text":"烏帽子のさまなどぞ、すこしひとわろき。","source":"枕・あはれなる物","translation":"烏帽子の様子などは、少し（みっともない）。","headword_form":"ひとわろき"}]},{"no":"213","pos":"形容詞","headword":"いぶせし","kanji":"","senses":[{"sense_no":1,"gloss":"うっとうしい・気が晴れない・不快だ"},{"sense_no":2,"gloss":"気がかりだ"}],"examples":[{"gloss":"うっとうしい・気が晴れない・不快だ","text":"旅の宿はつれづれにて、庭の草もいぶせき心地するに、","source":"源氏・東屋","translation":"旅の宿はさびしくて、庭の草も（うっとうしい）感じがするが、","headword_form":"いぶせき"},{"gloss":"気がかりだ","text":"いかなる事、といぶせく思ひわたりし年ごろよりも、","source":"源氏・椎本","translation":"どういうことか、と（気がかりに）思い続けてきた（この）長年よりも、","headword_form":"いぶせく"}]},{"no":"214","pos":"形容詞","headword":"くちをし","kanji":"口惜し","senses":[{"sense_no":1,"gloss":"残念だ・がっかりだ・つまらない"}],"examples":[{"gloss":"残念だ・がっかりだ・つまらない","text":"雀の子を犬君が逃がしつる。伏籠のうちにこめたりつるものを、と、いとくちをしと思へり。","source":"源氏・若紫","translation":"「雀の子を犬君（＝女の子の名）が逃がしたのよ。伏籠の中に閉じ込めておいたのに」と言って、（若紫は）とても（残念だ）と思っている。","headword_form":"くちをし"}]},{"no":"215","pos":"形容詞","headword":"あたらし","kanji":"惜し","senses":[{"sense_no":1,"gloss":"惜しい・もったいない"}],"examples":[{"gloss":"惜しい・もったいない","text":"（宮内卿が）若くて失せにし、いとほしくあたらしくなむ。","source":"増鏡・一巻","translation":"（宮内卿が）若くして亡くなってしまったことは、とても気の毒で（惜しい）ことで（ございます）。","headword_form":"あたらしく"}]},{"no":"216","pos":"形容詞","headword":"ねたし","kanji":"妬し","senses":[{"sense_no":1,"gloss":"くやしい・しゃくだ・にくらしい"}],"examples":[{"gloss":"くやしい・しゃくだ・にくらしい","text":"わるしといはれては、なかなかねたかるべし。","source":"枕・頭中将の、すずろなるそらごとを聞きて","translation":"よくないと言われては、かえって（くやしい）だろう。","headword_form":"ねたかる"}]},{"no":"217","pos":"形容詞","headword":"こちたし","kanji":"","senses":[{"sense_no":1,"gloss":"うるさい・煩わしい"},{"sense_no":2,"gloss":"大げさだ・仰々しい"},{"sense_no":3,"gloss":"非常に多い・はなはだしい"}],"examples":[{"gloss":"うるさい・煩わしい","text":"人言はまことこちたくなりぬともそこに障らむ我にあらなくに","source":"万葉・二八六六","translation":"人の噂がほんとうに（うるさく）なったとしても、それに妨げられるわたしではないのに。","headword_form":"こちたく"},{"gloss":"大げさだ・仰々しい","text":"桐の木の花、紫に咲きたるはなほをかしきに、葉のひろごりざまぞ、うたてこちたけれど、","source":"枕・木の花は","translation":"桐の木の花が、紫色に咲いているのはやはり美しいのに、葉の広がり方が、いやになるほど（大げさだ）が、","headword_form":"こちたけれ"},{"gloss":"非常に多い・はなはだしい","text":"潮風のいとこちたく吹きくるをきこしめして、","source":"増鏡・三巻","translation":"潮風がとても（はなはだしく）吹いてくるのをお聞きになって、","headword_form":"こちたく"}]},{"no":"218","pos":"形容詞","headword":"けし","kanji":"怪し・異し","senses":[{"sense_no":1,"gloss":"異様だ・変だ・よくない"}],"examples":[{"gloss":"異様だ・変だ・よくない","text":"内にはいつしかけしかるものなど住みつきて、","source":"増鏡・五巻","translation":"宮中にはいつの間にか（異様な）ものなどが住みついて、","headword_form":"けしかる"}]},{"no":"219","pos":"形容詞","headword":"わびし","kanji":"侘びし","senses":[{"sense_no":1,"gloss":"つらい・苦しい・やりきれない・困ったことだ"},{"sense_no":2,"gloss":"わびしい・心細い・貧しい（現代語と同じ）"}],"examples":[{"gloss":"つらい・苦しい・やりきれない・困ったことだ","text":"それよりかみは、井の鼻といふ坂の、えもいはずわびしきをのぼりぬれば、","source":"更級","translation":"そこから先は、井の鼻という坂で、言いようもないほど（苦しい）坂を登ったところ、","headword_form":"わびしき"}]},{"no":"220","pos":"形容詞","headword":"こころぐるし","kanji":"心苦し","senses":[{"sense_no":1,"gloss":"心が苦しい・せつなくつらい"},{"sense_no":2,"gloss":"気の毒だ・気がかりだ・心配だ"}],"examples":[{"gloss":"心が苦しい・せつなくつらい","text":"大殿（＝光源氏）の、御心の中に心ぐるしと思すことありて、","source":"源氏・柏木","translation":"光源氏が、ご心中ひそかに（せつなくつらい）とお思いになることがあって、","headword_form":"心ぐるし"},{"gloss":"気の毒だ・気がかりだ・心配だ","text":"心細げなる有様、いかで過ぐすらんと、いと心ぐるし。","source":"徒然・一〇四段","translation":"頼りなげなありさまで、どのように過ごしているのだろうかと、とても（気がかりだ）。","headword_form":"心ぐるし"}]},{"no":"221","pos":"形容詞","headword":"まだし","kanji":"未し","senses":[{"sense_no":1,"gloss":"まだ早い・まだその時期ではない・未熟だ"}],"examples":[{"gloss":"まだ早い・まだその時期ではない・未熟だ","text":"花盛りはまだしきほどなれど、","source":"源氏・少女","translation":"桜の花盛り（に）は（まだ早い）ころであるが、","headword_form":"まだしき"}]},{"no":"222","pos":"形容詞","headword":"さかし","kanji":"賢し","senses":[{"sense_no":1,"gloss":"賢い・優れている・巧みだ"},{"sense_no":2,"gloss":"しっかりしている・気丈だ"},{"sense_no":3,"gloss":"利口ぶっている・こざかしい"}],"examples":[{"gloss":"賢い・優れている・巧みだ","text":"《新任の国守も前任の国守も和歌を詠んだ。》異人々のもありけれど、さかしきもなかるべし。","source":"土佐・十二月二十六日","translation":"ほかの人々の（和歌）もあったが、（優れている）ものはないようだ。","headword_form":"さかしき"},{"gloss":"しっかりしている・気丈だ","text":"《かぐや姫を迎えに来た天人に対し、兵士たちは》さかしき者、念じて射むとすれども、（矢は）外ざまへ行きければ、","source":"竹取・かぐや姫の昇天","translation":"（兵士の）中で、気の（しっかりしている）者が、我慢して射ようとするが、（矢は）ほかの方へ飛んで行ったので、","headword_form":"さかしき"},{"gloss":"利口ぶっている・こざかしい","text":"《紫の上は出家を考えていたが、》（光源氏が）さかしきやうにや思さむとつつまれて、（紫の上は）はかばかしくもえ聞こえたまはず。","source":"源氏・若菜下","translation":"「（光源氏が）自分のことを（こざかしい）ようにお思いになるだろうか」と遠慮されて、（紫の上は）はっきりと申し上げることがおできにならない。","headword_form":"さかしき"}]},{"no":"223","pos":"形容詞","headword":"まばゆし","kanji":"","senses":[{"sense_no":1,"gloss":"まぶしい"},{"sense_no":2,"gloss":"（まぶしいほど）美しい・立派だ・すばらしい"},{"sense_no":3,"gloss":"きまり悪い・恥ずかしい"},{"sense_no":4,"gloss":"見ていられない・（目をそむけたいほど）いやだ"}],"examples":[{"gloss":"まぶしい","text":"朝涼みのほどに出で給ひければ、あやにくにさし来る日影もまばゆくて","source":"源氏・椎本","translation":"（薫は）朝のまだ涼しいうちに（京を）お出になったので、（宇治では）あいにくさしてくる日の光も（まぶしく）て、","headword_form":"まばゆく"},{"gloss":"（まぶしいほど）美しい・立派だ・すばらしい","text":"いとまばゆきまでねびゆく、人（＝光源氏）のかたちかな。","source":"源氏・葵","translation":"ほんとうに（まぶしいほど）美しく成長していく、光源氏の姿よ。","headword_form":"まばゆき"},{"gloss":"きまり悪い・恥ずかしい","text":"髪の筋なども、なかなか昼よりも顕証に見えて、まばゆけれど、","source":"枕・宮にはじめてまゐりたるころ","translation":"（わたしの）髪の毛の筋なども、かえって昼間よりもはっきりと見えて、（恥ずかしい）が、","headword_form":"まばゆけれ"},{"gloss":"見ていられない・（目をそむけたいほど）いやだ","text":"《帝の桐壺の更衣への寵愛ぶりは、》上達部・上人などもあいなく目をそばめつつ、いとまばゆき人の御おぼえなり。","source":"源氏・桐壺","translation":"上達部や殿上人なども気に入らなく（＝困ったことだと）目をそむけて、とても（見ていられない）ほどのご寵愛である。","headword_form":"まばゆき"}]},{"no":"224","pos":"形容詞","headword":"かたじけなし","kanji":"忝し","senses":[{"sense_no":1,"gloss":"おそれ多い・申しわけない"},{"sense_no":2,"gloss":"おそれ多い・もったいない・ありがたい"},{"sense_no":3,"gloss":"恥ずかしい・面目ない"}],"examples":[{"gloss":"おそれ多い・申しわけない","text":"《翁は、かぐや姫に求婚するために集まってきた貴公子たちに、》かたじけなく、きたなげなる所に、年月をへて物し給ふこと、極まりたるかしこまり、と申す。","source":"竹取・貴公子たちの求婚","translation":"「（おそれ多く）（申しわけなく）も、きたならしい所に、長い間通ってくださることは、極まった恐縮（＝恐縮至極）です」と申し上げる。","headword_form":"かたじけなく"},{"gloss":"おそれ多い・もったいない・ありがたい","text":"（桐壺の更衣は）かたじけなき御心ばへのたぐひなきをたのみにて交じらひ給ふ。","source":"源氏・桐壺","translation":"（桐壺の更衣は）（おそれ多い）（ありがたい）（帝の）ご愛情が比類ない（ほど深い）のを頼みとして宮仕えをしていらっしゃる。","headword_form":"かたじけなき"},{"gloss":"恥ずかしい・面目ない","text":"我ながらかたじけなく屈しにける心の程思ひ知らる。","source":"源氏・明石","translation":"我ながら（面目なく）くじけてしまった心のありさまが思い知られる。","headword_form":"かたじけなく"}]},{"no":"225","pos":"形容詞","headword":"かしこし","kanji":"畏し・賢し","senses":[{"sense_no":1,"gloss":"恐ろしい"},{"sense_no":2,"gloss":"おそれ多い・もったいない・尊い"},{"sense_no":3,"gloss":"賢い・優れている・立派だ・ありがたい"},{"sense_no":4,"gloss":"（主に「かしこく（う）」の形で）うまい具合に・運のいいことに"}],"examples":[{"gloss":"おそれ多い・もったいない・尊い","text":"（桐壺の更衣は）かしこき御蔭をば頼みきこえながら、","source":"源氏・桐壺","translation":"（桐壺の更衣は）（帝の）庇護を頼りにし申し上げながら、","headword_form":"かしこき"},{"gloss":"賢い・優れている・立派だ・ありがたい","text":"北山になむ、なにがし寺といふ所に、かしこき行ひ人侍る。","source":"源氏・若紫","translation":"北山の、何々寺という所に、（優れた）行者がおります。","headword_form":"かしこき"},{"gloss":"（主に「かしこく（う）」の形で）うまい具合に・運のいいことに","text":"かしこくここに臥して、かかることを聞きつる。","source":"今昔・巻二九・十二話","translation":"（うまい具合に）ここに寝ていて、こんな（大変な）事を聞いたことよ。","headword_form":"かしこく"},{"gloss":"（主に「かしこく（う）」の形で）うまい具合に・運のいいことに","text":"《折った腕は》かしこく左にて侍る。","source":"宇治・巻十二・六話","translation":"「（折った腕は）、利き腕の右ではなく（運のいいことに）左でござ（います）」","headword_form":"かしこく"}]},{"no":"226","pos":"形容詞","headword":"しげし","kanji":"繁し・茂し","senses":[{"sense_no":1,"gloss":"（何かが）多い"}],"examples":[{"gloss":"（何かが）多い","text":"されど、人目しげければ、え逢はず。","source":"伊勢・六九段","translation":"しかし、人目が（多い）ので、逢うことができない。","headword_form":"しげけれ"}]},{"no":"227","pos":"形容詞","headword":"すごし","kanji":"凄し","senses":[{"sense_no":1,"gloss":"気味が悪い・恐ろしい"},{"sense_no":2,"gloss":"さびしい・殺風景だ"},{"sense_no":3,"gloss":"（ぞっとするほど）すばらしい・美しい"}],"examples":[{"gloss":"気味が悪い・恐ろしい","text":"霰降り荒れてすごき夜のさまなり。","source":"源氏・若紫","translation":"霰が降り荒れて（＝荒々しく降って）（気味が悪い）夜の様子である。","headword_form":"すごき"},{"gloss":"さびしい・殺風景だ","text":"日の入りぎはの、いとすごく霧りわたりたるに、","source":"更級","translation":"日の入り際は、実に（さびしく）一面に霧がたちこめているときに、","headword_form":"すごく"},{"gloss":"（ぞっとするほど）すばらしい・美しい","text":"《舞楽は》なまめかしく、すごうおもしろく、","source":"源氏・若菜下","translation":"（舞楽は）優雅で、（すばらしく）風流で、","headword_form":"すごう"}]},{"no":"228","pos":"形容詞","headword":"いたし","kanji":"甚し・痛し","senses":[{"sense_no":1,"gloss":"とてもよい・すばらしい"},{"sense_no":2,"gloss":"とても悪い・ひどい"},{"sense_no":3,"gloss":"（「いたく（う）」の形で副詞的に用いて）とても・はなはだしく"},{"sense_no":4,"gloss":"（③の形で打消を伴って）それほど・あまり"}],"examples":[{"gloss":"とてもよい・すばらしい","text":"《光源氏は須磨から明石へ移った。》（屋敷の）造れるさま木深く、いたき所まさりて見どころある住まひなり。","source":"源氏・明石","translation":"（屋敷の）造ってある様子は木立が深く、（すばらしい）所が目立って見どころのある住まいである。","headword_form":"いたき"},{"gloss":"とても悪い・ひどい","text":"古代なる御文書きなれど、いたしや。","source":"源氏・行幸","translation":"古風なお手紙の書きぶりであるが、（ひどい）なあ。","headword_form":"いたし"},{"gloss":"（「いたく（う）」の形で副詞的に用いて）とても・はなはだしく","text":"かぐや姫いといたく泣き給ふ。","source":"竹取・かぐや姫の昇天","translation":"かぐや姫はとても（はなはだしく）お泣きになる。","headword_form":"いたく"},{"gloss":"（③の形で打消を伴って）それほど・あまり","text":"わがため面目あるやうに言はれぬる虚言は、人いたくあらがはず。","source":"徒然・七三段","translation":"自分のために（＝自分にとって）名誉になるように言われた嘘は、人は（それほど）反対しない。","headword_form":"いたく"}]},{"no":"229","pos":"形容動詞","headword":"おぼろけなり","kanji":"","senses":[{"sense_no":1,"gloss":"並ひととおりだ・ありきたりだ"},{"sense_no":2,"gloss":"並ひととおりではない・格別だ"}],"examples":[{"gloss":"並ひととおりだ・ありきたりだ","text":"「光源氏が若紫（後の紫の上）を、ひそかに自邸に迎え入れたので、『誰ならむ。おぼろけにはあらじ』と、ささめく。","source":"源氏・若紫","translation":"「どなたなのだろう。並ひととおり（のお方）ではあるまい」と、（源氏の家来たちは）ひそひそささやいている。","headword_form":"おぼろけに"},{"gloss":"並ひととおりではない・格別だ","text":"おぼろけの願によりてにやあらむ、風も吹かず、よき日出で来て、漕ぎ行く。","source":"土佐・一月二十一日","translation":"並ひととおりではない（格別の）祈願のかいがあってであろうか、風も吹かず、よい日出となって、（船を）漕いで行く。","headword_form":"おぼろけの"},{"gloss":"並ひととおりではない・格別だ","text":"「何事ぞ」と問ふに、泣くさまおぼろけならず。","source":"宇治・巻九・二話","translation":"「どうしたのか」と聞くと、泣く様子は並ひととおりではない（＝尋常ではない）。","headword_form":"おぼろけならず"}]},{"no":"230","pos":"形容動詞","headword":"なのめなり","kanji":"斜めなり","senses":[{"sense_no":1,"gloss":"並ひととおりだ・普通だ"},{"sense_no":2,"gloss":"不十分だ・いい加減だ"},{"sense_no":3,"gloss":"並ひととおりではない・格別だ〔鎌倉時代以降〕"}],"examples":[{"gloss":"並ひととおりだ・普通だ","text":"なのめならむ人に見せむは惜しげなる。","source":"源氏・東屋","translation":"（娘を）並ひととおりの男と結婚させるのは惜しいようである。","headword_form":"なのめならむ"},{"gloss":"不十分だ・いい加減だ","text":"いかでかは、かからむ人をなのめに見聞き過ぐしては止まむ。","source":"源氏・竹河","translation":"どうして、こんな（美しい）人を（いい加減に）見過ごしたり聞き過ごしたりしたままで終わったりするだろうか、いや、するはずがない。","headword_form":"なのめに"},{"gloss":"並ひととおりではない・格別だ〔鎌倉時代以降〕","text":"あるじなのめに喜びて、またなき者と思ひける。","source":"文正","translation":"主人は（並ひととおりではなく（格別に）喜んで、並ぶ者のない（優れた）者だと思った。","headword_form":"なのめに"}]},{"no":"231","pos":"形容動詞","headword":"清らなり・けうらなり","kanji":"","senses":[{"sense_no":1,"gloss":"清らかで美しい"}],"examples":[{"gloss":"清らかで美しい","text":"前の世にも御契りや深かりけむ、世になく清らなる玉の男皇子さへ生まれたまひぬ。","source":"源氏・桐壺","translation":"（桐壺の帝と桐壺の更衣は）前世においてもご宿縁が深かったのだろうか、世にまたとなく（清らかで美しい）玉のような皇子（＝光源氏）までがお生まれになった。","headword_form":"清らなる"},{"gloss":"清らかで美しい","text":"この児のかたちのきよらなること、世になく、屋の内は暗き所なく、光満ちたり。","source":"竹取・かぐや姫の生ひ立ち","translation":"この子（＝かぐや姫）の容貌の（清らかで美しい）ことは、世にまたとなく、家の中は暗い所がなく、光に満ちている。","headword_form":"きよらなる"}]},{"no":"232","pos":"形容動詞","headword":"まほなり","kanji":"","senses":[{"sense_no":1,"gloss":"欠点がなく優れている・完全である"}],"examples":[{"gloss":"欠点がなく優れている・完全である","text":"かたほなるをだに、乳母やうの思ふべき人は、あさましう、まほに見なすものを、","source":"源氏・夕顔","translation":"（不完全である（＝欠点があり劣っている）（その子を）かわいがるのが当然の人は、あきれるほど、（完全である（欠点がなく優れている）と見なすものであるが、","headword_form":"まほに"}]},{"no":"233","pos":"形容動詞","headword":"あらはなり","kanji":"顕なり","senses":[{"sense_no":1,"gloss":"（隠れなく）はっきり見える・まる見えである"}],"examples":[{"gloss":"（隠れなく）はっきり見える・まる見えである","text":"「入らせたまへ。端、あらはなり」と（姫君に）聞こえさすれば、","source":"堤中納言・虫めづる姫君","translation":"（縁側で毛虫を見て興じている姫君が貴公子たちにのぞき見されていることに気づいた女房は）「（中に）お入りなさいませ。縁側は（外から）（まる見えである）」と（姫君に）申し上げると、","headword_form":"あらはなり"}]},{"no":"234","pos":"形容動詞","headword":"あながちなり","kanji":"強ちなり","senses":[{"sense_no":1,"gloss":"強引だ・無理やりだ・いちずだ"},{"sense_no":2,"gloss":"（連用形を副詞的に用いて）むやみに・あまりに"}],"examples":[{"gloss":"強引だ・無理やりだ・いちずだ","text":"大臣のあながちにし侍りしことなれば、（帝も）否びさせ給はずなりにき。","source":"大鏡・道長","translation":"父の大臣（＝藤原道隆）が（強引に）しましたことなので、（帝も）お断りになれなくなってしまったのでございます。","headword_form":"あながちに"},{"gloss":"（連用形を副詞的に用いて）むやみに・あまりに","text":"人のあながちに欲心あるは、つたなきことなり。","source":"今昔・三十一巻・〓話","translation":"人が（むやみに）強欲に振る舞うのは、愚かなことである。","headword_form":"あながちに"}]},{"no":"235","pos":"形容動詞","headword":"せちなり","kanji":"切なり","senses":[{"sense_no":1,"gloss":"切実である・ひたすらだ・さし迫っている"},{"sense_no":2,"gloss":"大切である"}],"examples":[{"gloss":"切実である・ひたすらだ・さし迫っている","text":"（かぐや姫は）七月十五日の月に出でゐて、せちに物思へる気色なり。","source":"竹取・天の羽衣","translation":"（かぐや姫は）七月十五日の満月に（縁に）出て座り、（切実に（ひたすら）もの思いに沈んでいる様子である。","headword_form":"せちに"},{"gloss":"大切である","text":"忍びてものし給へ。せちなること聞こえむ。","source":"宇津保・国譲下","translation":"人目を避けておいでください。（大切な）ことを申し上げよう。","headword_form":"せちなる"}]},{"no":"236","pos":"形容動詞","headword":"とみなり","kanji":"頓なり","senses":[{"sense_no":1,"gloss":"急だ・突然だ"}],"examples":[{"gloss":"急だ・突然だ","text":"十二月ばかりに、とみのこととて御文あり。","source":"伊勢・八四段","translation":"十二月ごろに、（急な）事（＝急用）といって（母から）お手紙がある。","headword_form":"とみの"}]},{"no":"237","pos":"形容動詞","headword":"うちつけなり","kanji":"","senses":[{"sense_no":1,"gloss":"急だ・突然だ・にわかだ"},{"sense_no":2,"gloss":"軽率だ・考えが浅い・場当たりだ"}],"examples":[{"gloss":"急だ・突然だ・にわかだ","text":"うちつけに海は鏡の面のごとくなりぬれば、","source":"土佐・二月五日","translation":"（荒れる海に鏡を投げ入れると）（にわかに）海は鏡の表面のように（穏やかに）なったので、","headword_form":"うちつけに"},{"gloss":"軽率だ・考えが浅い・場当たりだ","text":"（光源氏は）うちつけの好き好きしきなどは好ましからぬ御本性にて、","source":"源氏・帚木","translation":"（光源氏は）（軽率な（場当たりの）恋愛沙汰などは好みでないご気性で、","headword_form":"うちつけの"}]},{"no":"238","pos":"形容動詞","headword":"さらなり","kanji":"更なり","senses":[{"sense_no":1,"gloss":"言うまでもない・もちろんだ"}],"examples":[{"gloss":"言うまでもない・もちろんだ","text":"夏は夜。月のころはさらなり。闇もなほ、蛍の多く飛び違ひたる。","source":"枕・春は曙","translation":"夏は夜（がよい）。月の（出ている）ころは（言うまでもない）。（月の出ていない）闇夜でもやはり、蛍がたくさん乱れ飛んでいるの（はよい）。","headword_form":"さらなり"}]},{"no":"239","pos":"形容動詞","headword":"ねんごろなり・ねむごろなり","kanji":"懇ろなり","senses":[{"sense_no":1,"gloss":"心を込めている・熱心だ・丁寧だ"},{"sense_no":2,"gloss":"親密だ・仲むつまじい"}],"examples":[{"gloss":"心を込めている・熱心だ・丁寧だ","text":"親の言なりければ、（斎宮は男を）いとねんごろにいたはりけり。","source":"伊勢・六九段","translation":"親の言葉であったので、（斎宮は男を）たいそう（心を込めて）もてなした。","headword_form":"ねんごろに"},{"gloss":"親密だ・仲むつまじい","text":"ねんごろに相語らひける友だちのもとに、","source":"伊勢・十六段","translation":"（親密に）交際していた友人のところに、","headword_form":"ねんごろに"}]},{"no":"240","pos":"形容動詞","headword":"おいらかなり","kanji":"","senses":[{"sense_no":1,"gloss":"穏やかだ・おっとりしている"}],"examples":[{"gloss":"穏やかだ・おっとりしている","text":"（女が）物怨じをいたくし侍りしかば、心づきなく、いとかからで、おいらかならましかばと思ひつつ、","source":"源氏・帚木","translation":"（女が）嫉妬をひどくしましたので、（わたしは）気にくわないつつ、こんなふうではなくて、（おっとりしてい）たならばと思いつつ、","headword_form":"おいらかならましかば"}]},{"no":"241","pos":"形容動詞","headword":"あやにくなり","kanji":"","senses":[{"sense_no":1,"gloss":"意地が悪い・にくらしいほどひどい"},{"sense_no":2,"gloss":"都合が悪い・間が悪い・あいにくだ"}],"examples":[{"gloss":"意地が悪い・にくらしいほどひどい","text":"帝の御掟、きはめてあやにくにおはしませば、この御子どもを同じ方に遣はさざりけり。","source":"大鏡・時平","translation":"帝の（菅原道真への）ご処置は、極めて（意地が悪く）ていらっしゃるので、この（菅原道真の）お子さまたちを同じ方面にはおやりにならなかった。","headword_form":"あやにくに"},{"gloss":"都合が悪い・間が悪い・あいにくだ","text":"時雨といふばかりにもあらず、あやにくにあるに、なほ出でむとす。","source":"蜻蛉・上巻","translation":"時雨というほどでもないが、（あいにく（間が悪く）降ってきたけれども、やはり出かけようとする。","headword_form":"あやにくに"}]},{"no":"242","pos":"名詞","headword":"おぼえ","kanji":"覚え","senses":[{"sense_no":1,"gloss":"（世間の）評判・人望"},{"sense_no":2,"gloss":"（多く「御覚え」の形で）寵愛されること・信任されること"}],"examples":[{"gloss":"（世間の）評判・人望","text":"世の覚え、時のきら、めでたかりき。","source":"平家・巻一","translation":"世間の（評判）も、時の華やかさ（＝栄華繁栄ぶり）も、すばらしかった。","headword_form":"覚え"},{"gloss":"（多く「御覚え」の形で）寵愛されること・信任されること","text":"母后いといみじう時めき、皇子の御覚えも優れて、","source":"浜松中納言・巻一","translation":"（帝に）寵愛され、皇子が（帝に）（寵愛され）……","headword_form":"御覚え"},{"gloss":"（多く「御覚え」の形で）寵愛されること・信任されること","text":"右大臣の御覚えことのほかにおはしましたるに、左大臣安からずおぼしたるほどに、","source":"大鏡・時平","translation":"右大臣（菅原道真）への（帝の）（寵愛（信任）は格別でいらっしゃったので、左大臣（藤原時平）は不快にお思いになっていた。","headword_form":"御覚え"}]},{"no":"243","pos":"名詞","headword":"ひま","kanji":"隙・暇","senses":[{"sense_no":1,"gloss":"間・すき間"},{"sense_no":2,"gloss":"絶え間・合間"},{"sense_no":3,"gloss":"時間的ゆとり・暇"}],"examples":[{"gloss":"間・すき間","text":"妻戸のあきたるひまを何心もなく見入れたまへるに、","source":"源氏・野分","translation":"妻戸が開いている〔すき間〕をなにげなくのぞき込みなさったところ、","headword_form":"ひま"},{"gloss":"絶え間・合間","text":"僧ども念仏のひまに物語するを聞けば、","source":"蜻蛉・上巻","translation":"僧たちが念仏の〔合間〕に話をするのを聞くと、","headword_form":"ひま"}]},{"no":"244","pos":"名詞","headword":"いとま","kanji":"暇","senses":[{"sense_no":1,"gloss":"時間的ゆとり・暇"},{"sense_no":2,"gloss":"（仕事を）休むこと・別れること・別れの挨拶"}],"examples":[{"gloss":"時間的ゆとり・暇","text":"名利に使はれて、しづかなるいとまなく、","source":"徒然・三八段","translation":"名誉と利益に追い立てられて、落ち着いた〔暇〕もなく、","headword_form":"いとま"},{"gloss":"（仕事を）休むこと・別れること・別れの挨拶","text":"御息所、はかなき心地にわづらひて、まかでなむとし給ふを、いとまさらに許させ給はず。","source":"源氏・桐壺","translation":"御息所は、ちょっとした病にかかって、（養生のため宮中を）退出しようとなさるが、（帝は）〔休むこと〕をまったくお許しにならない。","headword_form":"いとま"}]},{"no":"245","pos":"名詞","headword":"ざえ","kanji":"才","senses":[{"sense_no":1,"gloss":"（漢学・漢詩文の）教養・学才"},{"sense_no":2,"gloss":"（和歌・音楽などの）技能・才能"}],"examples":[{"gloss":"（漢学・漢詩文の）教養・学才","text":"この御族は、女も皆才のおはしたるなり。","source":"大鏡・道隆","translation":"この一族は、女性もみな〔漢詩文の教養〕がおありになったのである。","headword_form":"才"},{"gloss":"（和歌・音楽などの）技能・才能","text":"琴弾かせ給ふことなむ一の才にて、","source":"源氏・絵合","translation":"琴をお弾きになることが第一の〔才能〕で、","headword_form":"才"}]},{"no":"246","pos":"名詞","headword":"よろこび","kanji":"喜び","senses":[{"sense_no":1,"gloss":"喜び・お祝い（ごと）"},{"sense_no":2,"gloss":"（昇進・任官の）お礼"}],"examples":[{"gloss":"喜び・お祝い（ごと）","text":"よろこび奏することをかしけれ。","source":"枕・よろこび奏すること","translation":"（任官や昇進の）〔お礼〕を帝に申し上げる姿はいいものである。","headword_form":"よろこび"},{"gloss":"（昇進・任官の）お礼","text":"右の大臣、大宮の御もとによろこび申しに参り給へり。","source":"宇津保・国譲上","translation":"右大臣は、大宮の所に（〔昇進の〕お礼を申し上げ）に参上なさった。","headword_form":"よろこび申し"}]},{"no":"247","pos":"名詞","headword":"こころばへ","kanji":"心ばへ","senses":[{"sense_no":1,"gloss":"気だて・性質（心の様子）"},{"sense_no":2,"gloss":"心づかい・気配り"},{"sense_no":3,"gloss":"趣・風情・趣意"}],"examples":[{"gloss":"気だて・性質（心の様子）","text":"御容貌、心ばへ、ありがたくめづらしきまで見え給ふを、","source":"源氏・桐壺","translation":"（三歳になった光源氏は、）お顔立ちも、〔気だて〕も、たぐいなくすばらしいまでに見えなさるので、","headword_form":"心ばへ"},{"gloss":"心づかい・気配り","text":"そのほどの心ばへはしも、ねんごろなるやうなりけり。","source":"蜻蛉・上巻","translation":"（わたしが道綱を生んだ）そのころの（夫の）〔心づかい〕はさすがに、心がこもっているようであった。","headword_form":"心ばへ"},{"gloss":"趣・風情・趣意","text":"春の心ばへある歌奉らせ給ふ。","source":"伊勢・七七段","translation":"（歌を読む人々が集めて）春の〔趣〕のある歌を差し出させなさる。","headword_form":"心ばへ"}]},{"no":"248","pos":"名詞","headword":"こころづくし","kanji":"心尽くし","senses":[{"sense_no":1,"gloss":"もの思いをすること・気をもむこと"}],"examples":[{"gloss":"もの思いをすること・気をもむこと","text":"木の間よりもりくる月の影見れば心づくしの秋は来にけり","source":"古今・一八四","translation":"木の枝の間から漏れてくる月の光を見ると、〔もの思いをすること〕が多い秋が来たことだなあ。","headword_form":"心づくし"}]},{"no":"249","pos":"名詞","headword":"そこ","kanji":"","senses":[{"sense_no":1,"gloss":"あなた〔二人称〕"}],"examples":[{"gloss":"あなた〔二人称〕","text":"皇子たちあまたあれど、そこをのみなむかかるほどより明け暮れ見る。","source":"源氏・紅葉賀","translation":"皇子たちはたくさんいるけれども、ただ〔あなた〕だけをこのような（幼い）ときから朝晩見てきた。","headword_form":"そこ"}]},{"no":"250","pos":"名詞","headword":"ここ","kanji":"","senses":[{"sense_no":1,"gloss":"このわたし〔一人称〕"},{"sense_no":2,"gloss":"あなた〔二人称〕"}],"examples":[{"gloss":"このわたし〔一人称〕","text":"ここをば捨てさせ給ひつるか。","source":"栄花・楚王のゆめ","translation":"〔このわたし〕をお見捨てになったのか。","headword_form":"ここ"}]},{"no":"251","pos":"名詞","headword":"かれ","kanji":"","senses":[{"sense_no":1,"gloss":"あの人（＝あの男・あの女）"},{"sense_no":2,"gloss":"あれ・あのもの"}],"examples":[{"gloss":"あの人（＝あの男・あの女）","text":"かれが申さむこと、院に奏せよ。（中略）」と仰せたまうければ、","source":"大和・一四六段","translation":"《帝は遊女のことを気がかりにお思いになって》「〔あの女〕が申すことを、わたしに申し上げよ。（中略）」とおっしゃったので、","headword_form":"かれ"}]},{"no":"252","pos":"名詞","headword":"それ","kanji":"","senses":[{"sense_no":1,"gloss":"その人"},{"sense_no":2,"gloss":"あなた〔二人称〕"}],"examples":[]},{"no":"253","pos":"名詞","headword":"これ","kanji":"","senses":[{"sense_no":1,"gloss":"この人"},{"sense_no":2,"gloss":"このわたし〔一人称〕"},{"sense_no":3,"gloss":"あなた〔二人称〕"}],"examples":[{"gloss":"このわたし〔一人称〕","text":"これはたびたび参つて候ふ間、案内は存知して候ふ。","source":"平家・巻十","translation":"〔このわたし〕は度々参っておりますので、様子は分かっております。","headword_form":"これ"}]},{"no":"254","pos":"名詞","headword":"あなた","kanji":"","senses":[{"sense_no":1,"gloss":"あちら・向こう〔遠くのほう〕"}],"examples":[{"gloss":"あちら・向こう〔遠くのほう〕","text":"山崎のあなたに、水無瀬といふ所に宮ありけり。","source":"伊勢・八二段","translation":"山崎の〔向こう〕の、水無瀬という所に離宮があった。","headword_form":"あなた"}]},{"no":"255","pos":"名詞","headword":"そなた","kanji":"","senses":[{"sense_no":1,"gloss":"そちら"},{"sense_no":2,"gloss":"あなた〔二人称〕"}],"examples":[]},{"no":"256","pos":"名詞","headword":"こなた","kanji":"","senses":[{"sense_no":1,"gloss":"こちら"},{"sense_no":2,"gloss":"このわたし〔一人称〕"}],"examples":[{"gloss":"このわたし〔一人称〕","text":"こなたをもそなたをも、さまざま人の聞こえ悩まさむ、","source":"源氏・行幸","translation":"〔このわたし〕のことも〔あなた〕のことも、いろいろ人が（噂を）申し上げて悩ますでしょう、","headword_form":"こなた"}]},{"no":"257","pos":"名詞","headword":"そのかみ","kanji":"","senses":[{"sense_no":1,"gloss":"その当時・その昔・往時"}],"examples":[{"gloss":"その当時・その昔・往時","text":"そのかみを思ひやりて、ある人の詠める歌。","source":"土佐・二月二十日","translation":"（阿倍仲麻呂が中国に留学した）〔その当時〕を思いやって、ある人が詠んだ歌。","headword_form":"そのかみ"}]},{"no":"258","pos":"名詞","headword":"せうと","kanji":"兄人","senses":[{"sense_no":1,"gloss":"兄・弟〔ほとんど「兄」を指す〕"}],"examples":[{"gloss":"兄・弟〔ほとんど「兄」を指す〕","text":"かの人のせうとなる和泉前守を召し寄せて、","source":"源氏・若菜上","translation":"あの女の〔兄〕である前の和泉守を呼び寄せなさって、","headword_form":"せうと"},{"gloss":"兄・弟〔ほとんど「兄」を指す〕","text":"この男のこのかみも衛府の督なりけり。","source":"伊勢・八七段","translation":"この男の〔兄〕も衛府の長官であった。","headword_form":"このかみ"}]},{"no":"259","pos":"名詞","headword":"おとうと・おとと","kanji":"弟","senses":[{"sense_no":1,"gloss":"弟・妹"}],"examples":[{"gloss":"弟・妹","text":"妻のおとうとを持て侍りける人に、うへのきぬを贈る。","source":"古今・八六八詞書","translation":"（わたしの）妻の〔妹〕を持っていました人に、束帯の上着を贈る。","headword_form":"おとうと"}]},{"no":"260","pos":"名詞","headword":"いも","kanji":"妹","senses":[{"sense_no":1,"gloss":"いとしいあなた〔妻・恋人〕"}],"examples":[{"gloss":"いとしいあなた〔妻・恋人〕","text":"筒井つの井筒にかけしまろがたけ過ぎにけらしな妹見ざるまに","source":"伊勢・二三段","translation":"筒井を囲むその筒と背比べをしたわたしの背丈は（その筒の高さ）越えてしまったようだなあ。〔いとしいあなた〕を見ないでいるうちに。","headword_form":"妹"}]},{"no":"261","pos":"名詞","headword":"つま","kanji":"夫・妻","senses":[{"sense_no":1,"gloss":"夫・妻"}],"examples":[{"gloss":"夫・妻","text":"信濃路は今の懇り道刈りばねに足踏ましむな沓はけ我が背","source":"万葉・三三九九","translation":"信濃路は新しく切り開いた道です。切り株で足を踏み抜かないようにしてください、沓をおはきください、わたしの〔いとしい人〕よ。","headword_form":"背"},{"gloss":"夫・妻","text":"武蔵野は今日はな焼きそ若草のつまもこもれり我もこもれり","source":"伊勢・一二段","translation":"《男と女が草むらに隠れていると、追って来た人が野に火をつけようとした。女は次のような歌を詠んだ。》武蔵野を今日は焼かないでください。わたしも隠れています。〔夫〕も（草の中に）隠れています。","headword_form":"つま"}]},{"no":"262","pos":"名詞","headword":"はらから","kanji":"同胞","senses":[{"sense_no":1,"gloss":"兄弟・姉妹"}],"examples":[{"gloss":"兄弟・姉妹","text":"鹿児の崎といふ所に、守のはらから、また異人これかれ、酒なにと持て追ひ来て、磯に下りゐて、別れ難きことをいふ。","source":"土佐・十二月二十七日","translation":"鹿児の崎という所で、国守の〔兄弟〕、またそのほかの誰かが、酒など持って追って来て、磯に下りて座り、惜別の言葉を述べる。","headword_form":"はらから"}]},{"no":"263","pos":"名詞","headword":"かたへ","kanji":"片方","senses":[{"sense_no":1,"gloss":"片方・半分・一部分"},{"sense_no":2,"gloss":"側・傍ら"},{"sense_no":3,"gloss":"仲間・同僚〔傍らの人〕"}],"examples":[{"gloss":"片方・半分・一部分","text":"五年六年のうちに、千年や過ぎにけむ、かたへはなくなりにけり。","source":"土佐・二月十六日","translation":"（留守をした）五、六年のうちに、千年も過ぎてしまったのだろうか、（庭の松の）〔半分（一部分）〕はなくなってしまっていたよ。","headword_form":"かたへ"},{"gloss":"仲間・同僚〔傍らの人〕","text":"ある荒夷の恐ろしげなるが、かたへにありて、「御子はおはすや」と問ひしに、","source":"徒然・一四二段","translation":"ある荒々しい東国の武士で恐ろしい様子の者が、〔仲間〕（傍らの人）に向かって、「子どもさんはいらっしゃるか」と尋ねたところ、","headword_form":"かたへ"}]},{"no":"264","pos":"名詞","headword":"ほど","kanji":"程","senses":[{"sense_no":1,"gloss":"間・うち・時・ころ〔時間の程度〕"},{"sense_no":2,"gloss":"距離・広さ・あたり〔空間の程度〕"},{"sense_no":3,"gloss":"身分・地位・年齢〔人間の程度〕"},{"sense_no":4,"gloss":"様子・ありさま〔物の程度〕"}],"examples":[{"gloss":"間・うち・時・ころ〔時間の程度〕","text":"またの日、山の端に日のかかるほど、住吉の浦を過ぐ。","source":"更級","translation":"次の日、山の稜線に太陽がかかる（ころ）、住吉の浦を通り過ぎる。","headword_form":"ほど"},{"gloss":"距離・広さ・あたり〔空間の程度〕","text":"（部屋の）ほどせばしといへども、夜臥す床あり。","source":"方丈","translation":"（部屋の）（広さ）は狭いとはいっても、夜、横になる床はある。","headword_form":"ほど"},{"gloss":"身分・地位・年齢〔人間の程度〕","text":"（桐壺の更衣と）同じほど、それより下臈の更衣たちは、まして安からず。","source":"源氏・桐壺","translation":"（桐壺の更衣と）同じ（身分）か、彼女より身分の低い更衣たちは、まして心穏やかではない。","headword_form":"ほど"},{"gloss":"様子・ありさま〔物の程度〕","text":"髪は風に吹きまよはされて、すこしうちふくだみたるほど、まことにめでたし。","source":"枕・風は","translation":"髪が風に吹き乱されて、少しそそり立っているのが、肩にかかっている（様子）は、ほんとうに魅力的だ。","headword_form":"ほど"}]},{"no":"265","pos":"名詞","headword":"かぎり","kanji":"限り","senses":[{"sense_no":1,"gloss":"限度・限界"},{"sense_no":2,"gloss":"極み・極致〔物事の上限〕"},{"sense_no":3,"gloss":"最期・臨終・葬送〔人生の限界点〕"},{"sense_no":4,"gloss":"全部・すべて〔限界点までの範囲〕"}],"examples":[{"gloss":"限度・限界","text":"絵にかける楊貴妃のかたちは、いみじき絵師といへども、筆限りありければ、いとにほひ少なし。","source":"源氏・桐壺","translation":"絵に描いた楊貴妃の容貌は、優れた絵師であっても、筆の力には（限界）があったので、まことにつやのある美しさはない。","headword_form":"限り"},{"gloss":"極み・極致〔物事の上限〕","text":"いつはとは時はわかねど秋の夜ぞもの思ふことのかぎりなりける","source":"古今・一八九","translation":"（物思うということは）いつはとは季節に区別はないけれども、秋の夜こそ物思いをすることの（極致）である。","headword_form":"かぎり"},{"gloss":"最期・臨終・葬送〔人生の限界点〕","text":"（紫の上は）消えゆく露の心地して限りに見え給へば、","source":"源氏・御法","translation":"（紫の上は）消えゆく露の様子で（臨終）だと見えなさるので、","headword_form":"限り"},{"gloss":"全部・すべて〔限界点までの範囲〕","text":"いかで琵琶の音のおぼゆるかぎり弾きて聞かせむ。","source":"更級","translation":"ぜひとも琵琶の音の（私が）思い出される（=知っている）（すべ）て（の曲）を（あの方に）弾いて聞かせよう。","headword_form":"かぎり"}]},{"no":"266","pos":"名詞","headword":"きは","kanji":"際","senses":[{"sense_no":1,"gloss":"端・限り・終わり"},{"sense_no":2,"gloss":"程度〔ほど〕・身分〔身のほど〕"}],"examples":[{"gloss":"程度〔ほど〕・身分〔身のほど〕","text":"ただ人も、舎人など賜るきははゆゆしと見ゆ。","source":"徒然・一段","translation":"普通の貴族でも、舎人（=警衛にあたる近衛府の官人）などを（朝廷から）いただく（身分）はたいしたものだと思われる。","headword_form":"きは"}]},{"no":"267","pos":"名詞","headword":"ついで","kanji":"序","senses":[{"sense_no":1,"gloss":"順序・序列"},{"sense_no":2,"gloss":"機会・折"}],"examples":[{"gloss":"順序・序列","text":"多くのついでを越してこそ大臣の位にはなしつれ。","source":"宇津保・忠こそ","translation":"多くの（官位の）（序列）を超えて大臣の位に就かせたのだ。","headword_form":"ついで"},{"gloss":"機会・折","text":"京に出でたるついでに（冷泉院に）参りて、","source":"源氏・橋姫","translation":"（僧は）京に出た（機会）に（冷泉院のもとに）参上して、","headword_form":"ついで"}]},{"no":"268","pos":"名詞","headword":"さた","kanji":"沙汰","senses":[{"sense_no":1,"gloss":"評議・裁き・処置"},{"sense_no":2,"gloss":"命令・指図"},{"sense_no":3,"gloss":"噂・評判"}],"examples":[{"gloss":"評議・裁き・処置","text":"いかがせんと沙汰ありけるに、","source":"徒然・二一七段","translation":"どうしたものだろうかと（評議）があったところ、","headword_form":"沙汰"},{"gloss":"評議・裁き・処置","text":"「風発りたり」と云ひて、沙汰の庭に出でざりければ、","source":"今昔・三一巻・二四話","translation":"「風病が起こった」と言って、（裁き）の場に出なかったので、","headword_form":"沙汰"},{"gloss":"命令・指図","text":"世鎮まりさうらひなば、勅撰の御沙汰さうらはんずらむ。","source":"平家・巻七","translation":"世の中が落ち着きましたならば、勅撰（和歌集を選ぶという）（帝）のご（命令）がございましょう。","headword_form":"沙汰"},{"gloss":"噂・評判","text":"この歌の故にやと、時の人沙汰しけるとぞ。","source":"著聞・和歌","translation":"この和歌のためであろうかと、当時の人は（噂）したということだ。","headword_form":"沙汰"}]},{"no":"269","pos":"名詞","headword":"とが","kanji":"咎・科","senses":[{"sense_no":1,"gloss":"欠点・短所"},{"sense_no":2,"gloss":"過失・罪"}],"examples":[{"gloss":"欠点・短所","text":"光源氏、名のみことことしう、いひたてられ給ふ咎多かなるに、","source":"源氏・帚木","translation":"「光源氏」と、名前だけは仰々しく（立派だが）、（人から）けなされなさる（欠点）が多いようだが、","headword_form":"咎"},{"gloss":"過失・罪","text":"世治まらずして、凍餒の苦しみあらば、とがの者絶ゆべからず。","source":"徒然・一四二段","translation":"世が治まらないで、飢え凍える苦しみがあるならば、（罪）を犯す者が絶えるはずがない。","headword_form":"とが"}]},{"no":"270","pos":"名詞","headword":"け","kanji":"故","senses":[{"sense_no":1,"gloss":"ゆえ・ため・せい〔原因・理由を表す〕"}],"examples":[{"gloss":"ゆえ・ため・せい〔原因・理由を表す〕","text":"在中将の東に行きたりけるけにやあらむ、この子どもも、人の国に通ひをなむときどきしける。","source":"大和・一四四段","translation":"在中将（=在原業平）が東国に行った（ため）であろうか、この子どもたちも、よその国に旅をときどきしたのだった。","headword_form":"け"}]},{"no":"271","pos":"名詞","headword":"よし","kanji":"由","senses":[{"sense_no":1,"gloss":"（奥ゆかしい）趣・風情・様子・そぶり"},{"sense_no":2,"gloss":"（家柄のよさなどの）由緒・由来"},{"sense_no":3,"gloss":"（何かをするための）手段・方法・手立て"},{"sense_no":4,"gloss":"こと・旨"}],"examples":[{"gloss":"（奥ゆかしい）趣・風情・様子・そぶり","text":"古う作りなせる前栽の池や、木立、よしあるさまの所なり。","source":"平家・灌頂巻","translation":"古風に造ってある庭前の池や、木立が、（風情）のある様子の所である。","headword_form":"よし"},{"gloss":"（家柄のよさなどの）由緒・由来","text":"母北の方なむ、いにしへの人のよしあるにて、","source":"源氏・桐壺","translation":"母である奥方は、昔の人で（=古い家の出で）（由緒）ある方で、","headword_form":"よし"},{"gloss":"（何かをするための）手段・方法・手立て","text":"〈源義経の愛人静御前は源頼朝の前で歌（次はその一部）を歌った。〉昔を今になすよしもがな","source":"義経・巻六","translation":"（義経様が時めいていた）昔を今実現する（手立て）があったらなあ。","headword_form":"よし"},{"gloss":"こと・旨","text":"（帝は）御文、不死の薬の壺ならべて、火をつけて燃やすべきよし仰せ給ふ。","source":"竹取・富士の煙","translation":"（帝は）かぐや姫が差し上げたお手紙と不死の薬の壺とを並べて、火をつけて燃やせという（こと）をご命令なさる。","headword_form":"よし"}]},{"no":"272","pos":"名詞","headword":"やう","kanji":"様","senses":[{"sense_no":1,"gloss":"様子・ありさま"},{"sense_no":2,"gloss":"理由・わけ"},{"sense_no":3,"gloss":"方法・手段"},{"sense_no":4,"gloss":"〈形式名詞として使われ〉〜ことには"}],"examples":[{"gloss":"様子・ありさま","text":"いとあやしき子なり。生ひ立たむやうを見む。","source":"竹取・巻","translation":"とても不思議な子である。成長していく（様子）を見よう。","headword_form":"やう"},{"gloss":"理由・わけ","text":"参るまじくは、そのやうを申せ。","source":"宇津保・俊蔭","translation":"参上しないつもりならば、その（理由）を申し上げよ。","headword_form":"やう"},{"gloss":"方法・手段","text":"（蓬萊山という）その山見るに、さらに登るべきやうなし。","source":"竹取・蓬萊の玉の枝","translation":"（蓬萊山という）その山を見ると、まったく登ることができる（方法）がない。","headword_form":"やう"},{"gloss":"〈形式名詞として使われ〉〜ことには","text":"母上に申したまひけるやう、「おのれ死にはべりぬとも、（後略）」","source":"大鏡・伊尹","translation":"母上に申し上げなさった（ことには）、「わたしが死んでしまいましても、（後略）」","headword_form":"やう"}]},{"no":"273","pos":"名詞","headword":"ちぎり","kanji":"契り","senses":[{"sense_no":1,"gloss":"約束〔言い交わすこと〕"},{"sense_no":2,"gloss":"前世からの約束・因縁・宿縁"}],"examples":[{"gloss":"約束〔言い交わすこと〕","text":"心の限り行く先の契りをのみし給ふ。","source":"源氏・明石","translation":"（光源氏は明石の上に）心から将来の（約束）をなさるばかりだ。","headword_form":"契り"},{"gloss":"前世からの約束・因縁・宿縁","text":"前の世にも御契りや深かりけむ、世になく清らなる玉の男皇子さへ生まれたまひぬ。","source":"源氏・桐壺","translation":"（桐壺帝と桐壺の更衣は）前世においてもご（宿縁）が深かったのだろうか、世にまたとなく清らかな玉のような男皇子までもがお生まれになった。","headword_form":"契り"}]},{     return TANGO_DATA.filter(w=>{const r=rec[w.no];return r&&!r.mastered;});
  }
  return TANGO_DATA.slice();
}

/* ---------- 苦手な語の記録（localStorage・回数つき） ----------
   構造: { "094": {wrong:3, streak:0, mastered:false}, ... }
   wrong    … 間違えた累計回数
   streak   … 現在の連続正解回数
   mastered … 2回連続正解で克服＝true（ランキングには残す） */
const WEAK_KEY='tsubame_kobun_tango_weak_v2';
const MASTER_STREAK=2; // 連続正解でこの回数に達したら克服
function loadWeak(){
  try{const s=localStorage.getItem(WEAK_KEY);return s?JSON.parse(s):{};}
  catch(e){return {};}
}
function saveWeak(rec){
  try{localStorage.setItem(WEAK_KEY,JSON.stringify(rec));}catch(e){}
}
function markWrong(no){
  if(!no)return;
  const rec=loadWeak();
  const r=rec[no]||{wrong:0,streak:0,mastered:false};
  r.wrong+=1; r.streak=0; r.mastered=false; // 間違えたら克服状態は解除
  rec[no]=r; saveWeak(rec);
}
function markCorrect(no){
  if(!no)return;
  const rec=loadWeak();
  const r=rec[no];
  if(!r)return; // 一度も間違えていない語は記録しない
  if(r.mastered)return; // すでに克服済みは据え置き
  r.streak+=1;
  if(r.streak>=MASTER_STREAK)r.mastered=true;
  rec[no]=r; saveWeak(rec);
}
function clearWeak(){saveWeak({});}
// 未克服（現在の苦手）の語数
function weakCount(){
  const rec=loadWeak();
  return Object.keys(rec).filter(no=>!rec[no].mastered).length;
}
// ランキング用: 記録のある全語を間違い回数の多い順に
function weakRanking(){
  const rec=loadWeak();
  return Object.keys(rec).map(no=>({
    no, wrong:rec[no].wrong, streak:rec[no].streak, mastered:!!rec[no].mastered,
    word:TANGO_DATA.find(w=>w.no===no)
  })).filter(x=>x.word)
     .sort((a,b)=> b.wrong-a.wrong || (a.mastered-b.mastered) || (parseInt(a.no)-parseInt(b.no)));
}

/* ---------- state ---------- */
let S=null; // session

/* ---------- screen switch ---------- */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('#'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}

/* ---------- build questions ---------- */
function buildQuestionsA(pool){
  // pool: array of words. one question per word.
  const picked=sample(pool, Math.min(SESSION_A,pool.length));
  return picked.map(w=>{
    const correct=w.senses.map(s=>s.gloss);
    // distractors from same pos, other words
    const distPool=[];
    const seen=new Set(correct);
    TANGO_DATA.forEach(o=>{
      if(o.no===w.no||o.pos!==w.pos)return;
      o.senses.forEach(s=>{if(!seen.has(s.gloss)){seen.add(s.gloss);distPool.push(s.gloss);}});
    });
    // distractor count: at least as many as correct, and enough to reach >=4 total options
    const dn=Math.max(correct.length, 4-correct.length, 2);
    // 正解語義のいずれかと酷似するダミーは除外
    const cleanDist=distPool.filter(d=>!correct.some(c=>glossSim(c,d)));
    const distractors=sample(cleanDist,Math.min(dn,cleanDist.length));
    const options=shuffle(correct.concat(distractors));
    return {mode:'A',word:w,headword:w.headword,kanji:w.kanji,pos:w.pos,
            correct,options,multi:true};
  });
}
function glossSim(a,b){
  // 「・」区切りの語義片どうしに共通要素があれば類似とみなす
  if(a===b)return true;
  const pa=a.split(/[・／]/).map(s=>s.trim()).filter(Boolean);
  const pb=b.split(/[・／]/).map(s=>s.trim()).filter(Boolean);
  return pa.some(x=>pb.some(y=>x===y||(x.length>=3&&y.includes(x))||(y.length>=3&&x.includes(y))));
}
function buildQuestionsB(pool){
  // one question per example
  const exQ=[];
  pool.forEach(w=>{
    w.examples.forEach(ex=>{
      if(!canUnderline(ex))return; // 傍線が引けない例文は除外
      exQ.push({word:w,ex});
    });
  });
  const picked=sample(exQ, Math.min(SESSION_B,exQ.length));
  return picked.map(({word,ex})=>{
    const correct=ex.gloss;
    // 選択肢: 正解と酷似しない語義を集めて四択にする
    const opts=[correct];
    const used=[correct];
    const tryAdd=g=>{
      if(opts.length>=4)return;
      if(used.some(u=>glossSim(u,g)))return;
      opts.push(g);used.push(g);
    };
    // まず同一単語の他語義
    word.senses.forEach(s=>tryAdd(s.gloss));
    // 次に同品詞の他語の語義
    if(opts.length<4){
      const extra=[];
      TANGO_DATA.forEach(o=>{if(o.pos!==word.pos)return;o.senses.forEach(s=>extra.push(s.gloss));});
      shuffle(extra).forEach(tryAdd);
    }
    // 最後の保険: 全品詞
    if(opts.length<4){
      const all=[];TANGO_DATA.forEach(o=>o.senses.forEach(s=>all.push(s.gloss)));
      shuffle(all).forEach(tryAdd);
    }
    return {mode:'B',word,ex,headword:word.headword,pos:word.pos,
            correct:[correct],options:shuffle(opts),multi:false};
  });
}

/* ---------- session ---------- */
function startSession(mode,range,reuse){
  let questions;
  if(reuse){questions=reuse;}
  else{
    const pool=poolByRange(range);
    questions=(mode==='A'?buildQuestionsA(pool):buildQuestionsB(pool));
  }
  S={mode,range,questions,idx:0,score:0,wrong:[],selected:[],answered:false};
  $('#q-total').textContent=questions.length;
  $('#q-mode').textContent='モード'+mode;
  $('#q-range').textContent=rangeLabel(range);
  show('quiz');
  renderQuestion();
}
function rangeLabel(range){
  if(!range||range.type==='all')return '全289語';
  if(range.type==='band')return 'No.'+range.min+'–'+range.max;
  if(range.type==='pos')return range.pos;
  if(range.type==='weak')return '苦手';
  return '';
}

function renderQuestion(){
  S.selected=[];S.answered=false;
  const q=S.questions[S.idx];
  $('#q-now').textContent=S.idx+1;
  $('#q-total').textContent=S.questions.length;
  $('#q-bar').style.width=((S.idx)/S.questions.length*100)+'%';

  const fb=$('#q-feedback');fb.className='feedback';fb.innerHTML='';
  const stem=$('#q-stem');
  const optsCard=$('#q-opts');

  if(q.mode==='A'){
    stem.innerHTML=
      '<span class="pos-tag">'+q.pos+'</span>'+
      '<div class="headword">'+esc(q.headword)+'</div>'+
      (q.kanji?'<div class="kanji">'+esc(q.kanji)+'</div>':'')+
      '<p class="ask multi">該当する意味を<b>すべて</b>選んでください</p>';
  }else{
    const passage=markHeadword(q.ex);
    stem.innerHTML=
      '<span class="pos-tag">'+q.pos+'</span>'+
      '<p class="passage">'+passage+'</p>'+
      (q.ex.source?'<p class="source">〔'+esc(q.ex.source)+'〕</p>':'')+
      '<p class="ask">傍線部の意味として適切なものを選んでください</p>';
  }

  // options
  optsCard.innerHTML='';
  const optsWrap=document.createElement('div');
  optsWrap.className='opts';
  const radio=!q.multi;
  q.options.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt'+(radio?' radio':'');
    b.dataset.val=opt;
    b.innerHTML='<span class="box"></span><span class="lab">'+esc(opt)+'</span>';
    b.onclick=()=>toggleOpt(b,opt,radio);
    optsWrap.appendChild(b);
  });
  // dont-know
  const dk=document.createElement('button');
  dk.className='opt dontknow'+(radio?' radio':'');
  dk.dataset.val='__dk__';
  dk.innerHTML='<span class="box"></span><span class="lab">わからない</span>';
  dk.onclick=()=>toggleOpt(dk,'__dk__',true); // dontknow always exclusive
  optsWrap.appendChild(dk);
  optsCard.appendChild(optsWrap);

  const act=$('#q-action');
  act.textContent='解答する';
  act.disabled=true;
  act.className='btn btn-primary';
  act.onclick=submitAnswer;
  updateActionState();
}

function toggleOpt(btn,val,radio){
  if(S.answered)return;
  const card=$('#q-opts');
  if(val==='__dk__'){
    const on=btn.classList.contains('sel');
    card.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    S.selected=[];
    if(!on){btn.classList.add('sel');S.selected=['__dk__'];}
  }else if(radio){
    card.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    btn.classList.add('sel');S.selected=[val];
  }else{
    // multi: deselect dontknow if active
    const dk=card.querySelector('.opt.dontknow');
    if(dk.classList.contains('sel')){dk.classList.remove('sel');S.selected=S.selected.filter(v=>v!=='__dk__');}
    if(btn.classList.contains('sel')){btn.classList.remove('sel');S.selected=S.selected.filter(v=>v!==val);}
    else{btn.classList.add('sel');S.selected.push(val);}
  }
  updateActionState();
}
function updateActionState(){
  $('#q-action').disabled=S.selected.length===0;
}

function submitAnswer(){
  if(S.answered)return;
  S.answered=true;
  const q=S.questions[S.idx];
  const card=$('#q-opts');
  const dk=S.selected.includes('__dk__');
  const chosen=S.selected.filter(v=>v!=='__dk__');
  const correct = !dk && eq(chosen,q.correct);
  if(correct)S.score++;

  // lock & color
  card.querySelectorAll('.opt').forEach(o=>{
    o.disabled=true;
    const v=o.dataset.val;
    const addTag=(cls,text)=>{
      let box=o.querySelector('.opt-tags');
      if(!box){box=document.createElement('span');box.className='opt-tags';o.appendChild(box);}
      const t=document.createElement('span');
      t.className='opt-tag '+cls;t.textContent=text;
      box.appendChild(t);
    };
    if(v==='__dk__'){
      if(dk){o.classList.add('wrong');addTag('you','あなたの解答');}
      return;
    }
    const isCorrect=q.correct.includes(v);
    const isChosen=chosen.includes(v);
    if(isChosen&&isCorrect){o.classList.add('correct');addTag('you','あなたの解答');addTag('right','正しい選択肢');}
    else if(isChosen&&!isCorrect){o.classList.add('wrong');addTag('you','あなたの解答');}
    else if(!isChosen&&isCorrect){o.classList.add('missed');addTag('right-line','正しい選択肢');}
  });

  // feedback
  const fb=$('#q-feedback');
  fb.classList.add('show',correct?'ok':'ng');
  const noLabel=wordNo(q.word);
  let html='<div class="verdict-row">'+
    '<span class="verdict">'+(correct?'正解':'不正解')+'</span>'+
    '<span class="word-no"><span class="no-badge">No.'+noLabel+'</span>'+
      '<span class="word-name">'+esc(q.headword)+(q.kanji?'（'+esc(q.kanji)+'）':'')+'</span></span>'+
    '</div>';
  html+='<div class="gloss-label">正しい意味</div>';
  html+='<ul class="gloss-list">'+q.correct.map(g=>'<li>'+esc(g)+'</li>').join('')+'</ul>';
  if(q.mode==='B'&&q.ex.translation){
    html+='<div class="trans">'+esc(q.ex.translation)+'</div>';
  }
  fb.innerHTML=html;

  if(!correct){
    S.wrong.push({q,chosen:dk?['わからない']:chosen.slice()});
    markWrong(q.word.no);     // 間違えた語を苦手として記録（回数++）
  }else{
    markCorrect(q.word.no);   // 正解: 連続正解を加算、2回連続で克服
  }

  $('#q-bar').style.width=((S.idx+1)/S.questions.length*100)+'%';
  const act=$('#q-action');
  act.textContent = (S.idx+1<S.questions.length)?'次の問題へ →':'結果を見る →';
  act.onclick=nextQuestion;
}

function nextQuestion(){
  if(S.idx+1<S.questions.length){S.idx++;renderQuestion();}
  else showResult();
}

/* ---------- result ---------- */
function showResult(){
  $('#r-score').textContent=S.score;
  $('#r-total').textContent=S.questions.length;
  const rate=S.score/S.questions.length;
  let msg;
  if(rate===1)msg='全問正解です。よく仕上がっています。';
  else if(rate>=0.8)msg='高い正答率です。取りこぼした語を確認しておきましょう。';
  else if(rate>=0.5)msg='半分以上は正解です。誤った語を重点的に見直しましょう。';
  else msg='まずは間違えた語から復習することをおすすめします。';
  $('#r-msg').textContent=msg;

  const rev=$('#r-review');
  if(S.wrong.length===0){
    rev.innerHTML='<div class="perfect"><span class="big">✓</span>間違えた問題はありません。</div>';
  }else{
    let h='<div class="review-h">間違えた問題 <span class="cnt">'+S.wrong.length+'</span></div>';
    S.wrong.forEach(w=>{
      const q=w.q;
      let qline,meta;
      if(q.mode==='A'){
        qline='<span class="rev-no">No.'+wordNo(q.word)+'</span>'+esc(q.headword)+(q.kanji?'　<span style="font-size:.85rem;color:var(--ink-soft)">'+esc(q.kanji)+'</span>':'');
        meta='モードA ／ '+q.pos;
      }else{
        qline=markHeadword(q.ex);
        meta='<span class="rev-no inline">No.'+wordNo(q.word)+'</span>モードB ／ '+q.pos+' ／ '+esc(q.headword)+(q.ex.source?' ／ 〔'+esc(q.ex.source)+'〕':'');
      }
      const correctHtml = q.correct.length>1
        ? '<ul class="gloss-list" style="margin-top:2px">'+q.correct.map(g=>'<li>'+esc(g)+'</li>').join('')+'</ul>'
        : '<span class="val">'+esc(q.correct[0])+'</span>';
      h+='<div class="rev-item">'+
        '<div class="rev-q">'+qline+'</div>'+
        '<div class="rev-meta">'+meta+'</div>'+
        '<div class="rev-line your"><span class="lab">あなたの解答</span><span class="val">'+w.chosen.map(esc).join('・')+'</span></div>'+
        '<div class="rev-line true"><span class="lab">正しい意味</span>'+correctHtml+'</div>'+
        '</div>';
    });
    rev.innerHTML=h;
  }

  const acts=$('#r-actions');
  acts.innerHTML='';
  if(S.wrong.length>0){
    const b=document.createElement('button');
    b.className='btn btn-enji btn-block';
    b.textContent='間違えた問題だけ解き直す（'+S.wrong.length+'問）';
    b.onclick=retryWrong;
    acts.appendChild(b);
  }
  // 苦手ランキング（記録が一つでもあれば）
  if(weakRanking().length>0){
    const rk=document.createElement('button');
    rk.className='btn btn-ghost btn-block';
    rk.textContent='苦手ランキングを見る';
    rk.onclick=()=>showRanking('result');
    acts.appendChild(rk);
  }
  const h=document.createElement('button');
  h.className='btn btn-ghost btn-block';
  h.textContent='モード選択へ戻る';
  h.onclick=goHome;
  acts.appendChild(h);
  show('result');
}

function retryWrong(){
  const qs=shuffle(S.wrong.map(w=>w.q));
  startSession(S.mode,S.range,qs);
}
function goHome(){refreshHome();show('home');}

/* ---------- helpers ---------- */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function wordNo(w){return w&&w.no?String(parseInt(w.no,10)):'';}
function canUnderline(ex){
  const forms=(ex.forms&&ex.forms.length)?ex.forms:(ex.headword_form?[ex.headword_form]:[]);
  if(!forms.length)return false;
  let cursor=0;
  for(const f of forms){
    const i=ex.text.indexOf(f,cursor);
    if(i<0)return false;
    cursor=i+f.length;
  }
  return true;
}
function markHeadword(ex){
  // ex.forms(配列) があれば複数傍線、なければ ex.headword_form の単一傍線
  const text=ex.text;
  const forms=(ex.forms&&ex.forms.length)?ex.forms:(ex.headword_form?[ex.headword_form]:[]);
  if(!forms.length)return esc(text);
  // 各formの出現区間[start,end)を前から順に確定（探索位置を進めて重複を回避）
  const spans=[];
  let cursor=0;
  for(const f of forms){
    const i=text.indexOf(f,cursor);
    if(i<0)continue;
    spans.push([i,i+f.length]);
    cursor=i+f.length;
  }
  if(!spans.length)return esc(text);
  spans.sort((a,b)=>a[0]-b[0]);
  let out='',pos=0;
  for(const [s,e] of spans){
    if(s<pos)continue; // 万一の重なりは無視
    out+=esc(text.slice(pos,s))+'<span class="uline">'+esc(text.slice(s,e))+'</span>';
    pos=e;
  }
  out+=esc(text.slice(pos));
  return out;
}
