<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つばめ古文 — 古文単語演習 v1.1</title>
<style>
  :root{
    --paper:#f5f0e6;
    --paper-2:#efe8d8;
    --ink:#26303a;
    --ink-soft:#4a5560;
    --indigo:#2b4257;
    --indigo-2:#3a5a73;
    --enji:#9c3848;
    --enji-2:#b14a5a;
    --gold:#a9852f;
    --line:#d8cfba;
    --line-soft:#e7dfcd;
    --ok:#3f7d57;
    --ok-bg:#e7f0e8;
    --ng:#a8434f;
    --ng-bg:#f4e4e4;
    --shadow:0 1px 2px rgba(38,48,58,.06),0 8px 24px rgba(38,48,58,.08);
    --radius:14px;
    --maxw:680px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    line-height:1.7;
    -webkit-text-size-adjust:100%;
    min-height:100vh;
    display:flex;flex-direction:column;
  }
  .wrap{width:100%;max-width:var(--maxw);margin:0 auto;padding:0 18px;flex:1 0 auto}

  /* header */
  header{
    border-bottom:1px solid var(--line);
    background:rgba(245,240,230,.92);
    backdrop-filter:saturate(1.1) blur(4px);
    position:sticky;top:0;z-index:20;
  }
  .head-in{
    max-width:var(--maxw);margin:0 auto;padding:10px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .brand{display:flex;align-items:baseline;gap:9px;font-weight:600;letter-spacing:.02em;flex-shrink:0}
  .brand .mark{
    font-family:"Hiragino Mincho ProN",serif;color:var(--enji);
    font-size:1.12rem;white-space:nowrap;
  }
  .brand .sub{font-size:.82rem;color:var(--ink-soft);letter-spacing:.06em;white-space:nowrap}
  .ver{font-size:.72rem;color:var(--ink-soft);font-family:system-ui,sans-serif;letter-spacing:.04em}
  .nav-group{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .home-btn{
    font-family:system-ui,sans-serif;font-size:.8rem;color:var(--ink-soft);
    background:none;border:1px solid var(--line);border-radius:999px;
    padding:5px 12px;cursor:pointer;transition:.15s;text-decoration:none;white-space:nowrap;
  }
  .home-btn:hover{background:var(--paper-2);color:var(--ink)}
  @media (max-width:560px){
    .brand .sub{display:none}
    .ver{display:none}
    .home-btn{font-size:.76rem;padding:5px 10px}
  }

  /* footer */
  footer{
    flex-shrink:0;border-top:1px solid var(--line);margin-top:40px;
    padding:18px;text-align:center;color:var(--ink-soft);
    font-size:.74rem;letter-spacing:.08em;font-family:system-ui,sans-serif;
  }

  /* generic */
  .screen{display:none;padding-top:26px;animation:fade .35s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h1.title{
    font-size:1.55rem;margin:.2em 0 .15em;letter-spacing:.04em;font-weight:600;
  }
  .lead{color:var(--ink-soft);font-size:.95rem;margin:0 0 22px}
  .eyebrow{
    font-family:system-ui,sans-serif;font-size:.72rem;letter-spacing:.18em;
    color:var(--enji);font-weight:600;text-transform:none;margin-bottom:6px;
  }

  /* range stats */
  .stats{
    display:flex;gap:10px;margin:0 0 24px;flex-wrap:wrap;
  }
  .stat{
    flex:1;min-width:90px;background:var(--paper-2);border:1px solid var(--line-soft);
    border-radius:12px;padding:12px 14px;text-align:center;
  }
  .stat .num{font-size:1.4rem;font-weight:600;color:var(--indigo);font-variant-numeric:tabular-nums}
  .stat .lab{font-size:.72rem;color:var(--ink-soft);font-family:system-ui,sans-serif;letter-spacing:.06em;margin-top:2px}

  /* mode cards */
  .modes{display:flex;flex-direction:column;gap:14px}
  .mode-card{
    text-align:left;width:100%;cursor:pointer;
    background:#fffdf8;border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;box-shadow:var(--shadow);transition:.18s;
    display:flex;gap:16px;align-items:flex-start;
  }
  .mode-card:hover{transform:translateY(-2px);border-color:var(--indigo-2)}
  .mode-card:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .mode-badge{
    flex-shrink:0;width:42px;height:42px;border-radius:11px;
    display:grid;place-items:center;font-size:1.2rem;font-weight:600;
    background:var(--indigo);color:#fff;font-family:"Hiragino Mincho ProN",serif;
  }
  .mode-card.b .mode-badge{background:var(--enji)}
  .mode-h{font-size:1.08rem;font-weight:600;margin:0 0 3px;letter-spacing:.03em}
  .mode-d{font-size:.86rem;color:var(--ink-soft);margin:0}
  .mode-meta{font-size:.74rem;color:var(--gold);font-family:system-ui,sans-serif;margin-top:7px;letter-spacing:.04em}

  /* progress */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
  .qcount{font-family:system-ui,sans-serif;font-size:.8rem;color:var(--ink-soft);letter-spacing:.05em}
  .qcount b{color:var(--indigo);font-size:1.05rem}
  .bar{flex:1;height:6px;background:var(--line-soft);border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--indigo),var(--indigo-2));width:0;transition:width .4s}
  .pill{
    font-family:system-ui,sans-serif;font-size:.72rem;padding:3px 10px;border-radius:99px;
    background:var(--paper-2);color:var(--ink-soft);border:1px solid var(--line-soft);white-space:nowrap;
  }

  /* question */
  .qstem{
    background:#fffdf8;border:1px solid var(--line);
    border-radius:var(--radius) var(--radius) 0 0;
    border-bottom:none;
    padding:18px 22px 14px;box-shadow:var(--shadow);
    position:sticky;top:var(--head-h,56px);z-index:15;
  }
  .qopts{
    background:#fffdf8;border:1px solid var(--line);
    border-top:1px dashed var(--line-soft);
    border-radius:0 0 var(--radius) var(--radius);
    padding:16px 22px 22px;box-shadow:var(--shadow);
  }
  .pos-tag{
    display:inline-block;font-family:system-ui,sans-serif;font-size:.72rem;
    color:var(--ink-soft);border:1px solid var(--line);border-radius:99px;
    padding:2px 10px;margin-bottom:10px;letter-spacing:.05em;
  }
  .headword{
    font-size:2.1rem;font-weight:600;letter-spacing:.05em;margin:.05em 0 .05em;color:var(--ink);
  }
  .kanji{font-size:1rem;color:var(--ink-soft);margin-bottom:2px}
  .ask{font-size:.86rem;color:var(--ink-soft);margin:10px 0 2px;font-family:system-ui,sans-serif}
  .ask.multi{color:var(--enji)}

  .passage{
    font-size:1.18rem;line-height:1.95;letter-spacing:.02em;margin:4px 0 4px;
  }
  .uline{
    border-bottom:2.5px solid var(--enji);padding:0 1px 1px;font-weight:600;color:var(--ink);
  }
  .source{font-size:.8rem;color:var(--gold);font-family:system-ui,sans-serif;text-align:right;margin-top:4px;letter-spacing:.04em}

  /* options */
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:0}
  .opt{
    text-align:left;width:100%;cursor:pointer;font-family:inherit;font-size:1.02rem;
    background:#fff;border:1.5px solid var(--line);border-radius:11px;
    padding:13px 16px;transition:.13s;display:flex;align-items:center;gap:12px;color:var(--ink);
  }
  .opt:hover:not(:disabled){border-color:var(--indigo-2);background:#fffdf6}
  .opt:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .opt .box{
    flex-shrink:0;width:22px;height:22px;border:1.5px solid var(--line);border-radius:6px;
    display:grid;place-items:center;font-size:.85rem;color:#fff;background:#fff;transition:.13s;
  }
  .opt.radio .box{border-radius:99px}
  .opt.sel{border-color:var(--indigo);background:#eef2f5}
  .opt.sel .box{background:var(--indigo);border-color:var(--indigo)}
  .opt.dontknow{font-family:system-ui,sans-serif;font-size:.92rem;color:var(--ink-soft);border-style:dashed}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg)}
  .opt.correct .box{background:var(--ok);border-color:var(--ok)}
  .opt.wrong{border-color:var(--ng);background:var(--ng-bg)}
  .opt.wrong .box{background:var(--ng);border-color:var(--ng)}
  .opt.missed{border-color:var(--ok);border-style:dashed;background:#fff}
  .opt.missed .box{border-color:var(--ok)}
  .opt:disabled{cursor:default}
  .opt .lab{flex:1}
  .opt-tag{
    flex-shrink:0;font-family:system-ui,sans-serif;font-size:.68rem;font-weight:600;
    letter-spacing:.04em;padding:2px 8px;border-radius:99px;white-space:nowrap;
  }
  .opt-tag.you{background:var(--ng);color:#fff}
  .opt-tag.right{background:var(--ok);color:#fff}
  .opt-tag.right-line{background:transparent;color:var(--ok);border:1px solid var(--ok)}

  /* action row */
  .actions{margin-top:20px;display:flex;gap:10px}
  .btn{
    font-family:system-ui,sans-serif;font-size:.95rem;font-weight:600;letter-spacing:.04em;
    border:none;border-radius:11px;padding:13px 22px;cursor:pointer;transition:.15s;
  }
  .btn:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .btn-primary{background:var(--indigo);color:#fff;flex:1}
  .btn-primary:hover{background:var(--indigo-2)}
  .btn-primary:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}
  .btn-ghost{background:var(--paper-2);color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--line-soft)}
  .btn-enji{background:var(--enji);color:#fff}
  .btn-enji:hover{background:var(--enji-2)}
  .btn-block{width:100%}

  /* feedback */
  .feedback{
    margin-top:18px;border-radius:11px;padding:14px 16px;font-size:.92rem;
    border:1px solid var(--line-soft);background:var(--paper-2);display:none;
  }
  .feedback.show{display:block;animation:fade .25s}
  .feedback .verdict{font-weight:600;font-family:system-ui,sans-serif;letter-spacing:.04em;margin-bottom:6px}
  .verdict-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .verdict-row .verdict{margin-bottom:0}
  .word-no{
    display:inline-flex;align-items:center;gap:8px;
    font-family:system-ui,sans-serif;letter-spacing:.02em;
  }
  .no-badge{
    font-family:system-ui,sans-serif;font-size:1rem;font-weight:700;
    color:#fff;background:var(--enji);border-radius:8px;
    padding:3px 12px;letter-spacing:.02em;white-space:nowrap;
    box-shadow:0 1px 3px rgba(156,56,72,.25);
  }
  .word-name{font-size:.95rem;color:var(--ink);font-weight:600}
  .feedback.ok .verdict{color:var(--ok)}
  .feedback.ng .verdict{color:var(--ng)}
  .feedback .ans{color:var(--ink-soft);font-size:.88rem}
  .feedback .ans b{color:var(--ink)}
  .feedback .trans{margin-top:8px;font-size:.85rem;color:var(--ink-soft);line-height:1.65}
  .gloss-list{list-style:none;margin:6px 0 0;padding:0}
  .gloss-list li{
    position:relative;padding-left:1.1em;margin:3px 0;color:var(--ink);
    font-size:.92rem;line-height:1.55;
  }
  .gloss-list li::before{
    content:"・";position:absolute;left:0;color:var(--ok);font-weight:700;
  }
  .gloss-label{font-size:.82rem;color:var(--ink-soft);font-family:system-ui,sans-serif}

  /* result */
  .result-head{text-align:center;margin-bottom:8px}
  .score-big{font-size:3rem;font-weight:600;color:var(--indigo);font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .score-big small{font-size:1.1rem;color:var(--ink-soft);font-weight:400}
  .result-msg{color:var(--ink-soft);font-size:.95rem;margin-bottom:24px;text-align:center}

  .review-h{font-size:1rem;font-weight:600;margin:24px 0 10px;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
  .review-h .cnt{font-family:system-ui,sans-serif;font-size:.78rem;color:#fff;background:var(--enji);border-radius:99px;padding:1px 9px}
  .rev-item{
    background:#fffdf8;border:1px solid var(--line);border-left:3px solid var(--enji);
    border-radius:10px;padding:13px 15px;margin-bottom:10px;
  }
  .rev-q{font-size:1.05rem;font-weight:600;margin-bottom:3px}
  .rev-no{
    display:inline-block;font-family:system-ui,sans-serif;font-size:.7rem;font-weight:600;
    color:#fff;background:var(--enji);border-radius:6px;padding:1px 7px;margin-right:8px;
    letter-spacing:.03em;vertical-align:middle;
  }
  .rev-no.inline{background:var(--gold);margin-right:7px}
  .rev-q .uline{font-size:1rem}
  .rev-meta{font-size:.74rem;color:var(--ink-soft);font-family:system-ui,sans-serif;margin-bottom:6px}
  .rev-line{font-size:.85rem;margin:6px 0 0;display:flex;gap:8px;align-items:baseline}
  .rev-line .lab{
    flex-shrink:0;display:inline-block;width:5.6em;color:var(--ink-soft);
    font-family:system-ui,sans-serif;font-size:.74rem;
  }
  .rev-line.your .val{color:var(--ng)}
  .rev-line.true .val{color:var(--ok);font-weight:600}
  .rev-line.true .gloss-list{margin:0}
  .rev-line.true .gloss-list li{color:var(--ok);font-weight:600;font-size:.85rem}

  .perfect{
    text-align:center;padding:30px 16px;color:var(--ok);font-size:1.05rem;
  }
  .perfect .big{font-size:2.4rem;display:block;margin-bottom:8px}

  .result-actions{display:flex;flex-direction:column;gap:11px;margin-top:26px}

  /* modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(38,48,58,.45);z-index:50;
    display:none;align-items:center;justify-content:center;padding:24px;animation:fade .2s;
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--paper);border-radius:16px;padding:26px 24px;max-width:340px;width:100%;
    box-shadow:0 12px 40px rgba(38,48,58,.25);text-align:center;
  }
  .modal p{margin:0 0 20px;font-size:.98rem;line-height:1.7}
  .modal .row{display:flex;gap:10px}
  .modal .row .btn{flex:1;padding:11px}
  .modal-actions{display:flex;flex-direction:column;gap:9px}
  .modal-actions .btn{width:100%;padding:11px}

  @media (max-width:480px){
    h1.title{font-size:1.35rem}
    .headword{font-size:2rem}
    .passage{font-size:1.12rem}
    .score-big{font-size:2.5rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="brand">
      <span class="mark">つばめ古文</span>
      <span class="sub">古文単語</span>
    </div>
    <div class="nav-group">
      <span class="ver">v1.1</span>
      <a class="home-btn nav-tango" href="https://swallow-base.com/kobun/tango/">単語トップ</a>
      <a class="home-btn nav-kobun" href="https://swallow-base.com/kobun/">⌂ 古文</a>
    </div>
  </div>
</header>

<div class="wrap">

  <!-- ===== HOME ===== -->
  <section id="home" class="screen active">
    <div class="eyebrow">重要古文単語315 ／ No.1–150</div>
    <h1 class="title">古文単語演習</h1>
    <p class="lead">第一章 最重要語を中心とした150語から出題します。モードを選んでください。</p>

    <div class="stats">
      <div class="stat"><div class="num">150</div><div class="lab">収録語数</div></div>
      <div class="stat"><div class="num">279</div><div class="lab">例文数</div></div>
      <div class="stat"><div class="num" id="stat-q">20</div><div class="lab">出題数</div></div>
    </div>

    <div class="modes">
      <button class="mode-card a" onclick="startSession('A')">
        <span class="mode-badge">意</span>
        <span>
          <p class="mode-h">モードA　単語 → 意味</p>
          <p class="mode-d">見出し語を見て、現代語の意味を選びます。該当する意味を漏れなく、余分なく選んで正解です。</p>
          <p class="mode-meta">20問 ／ 複数選択</p>
        </span>
      </button>
      <button class="mode-card b" onclick="startSession('B')">
        <span class="mode-badge">文</span>
        <span>
          <p class="mode-h">モードB　例文 → 傍線部の意味</p>
          <p class="mode-d">例文の傍線部に着目し、その意味として最も適切なものを一つ選びます。</p>
          <p class="mode-meta">10問 ／ 四択</p>
        </span>
      </button>
    </div>
  </section>

  <!-- ===== QUIZ ===== -->
  <section id="quiz" class="screen">
    <div class="topbar">
      <span class="qcount"><b id="q-now">1</b> / <span id="q-total">20</span></span>
      <span class="bar"><i id="q-bar"></i></span>
      <span class="pill" id="q-mode">モードA</span>
    </div>
    <div class="qstem" id="q-stem"><!-- filled: 固定される問い --></div>
    <div class="qopts" id="q-opts"><!-- filled: 選択肢 --></div>
    <div class="feedback" id="q-feedback"></div>
    <div class="actions">
      <button class="btn btn-primary" id="q-action" disabled>解答する</button>
    </div>
  </section>

  <!-- ===== RESULT ===== -->
  <section id="result" class="screen">
    <div class="result-head">
      <div class="eyebrow" style="text-align:center">演習完了</div>
      <div class="score-big"><span id="r-score">0</span><small> / <span id="r-total">20</span> 正解</small></div>
    </div>
    <p class="result-msg" id="r-msg"></p>
    <div id="r-review"><!-- filled --></div>
    <div class="result-actions" id="r-actions"><!-- filled --></div>
  </section>

</div>

<footer>SWALLOW-BASE — つばめ古文 ／ 古文単語演習 v1.1</footer>

<!-- modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <p id="modal-msg">現在の演習を終了して<br>移動しますか？</p>
    <div class="modal-actions" id="modal-actions"><!-- filled --></div>
  </div>
</div>

<script>

":1,"gloss":"答える"}],"examples":[{"gloss":"答える","text":"一度にいらへむも、待ちけるかともぞ思ふとて、","headword_form":"いらへ","source":"宇治・巻十・二話","translation":"ただ一度で（答える）ようなのも、待っていたのかと思うと困ると考えて、"}]},{"no":"027","pos":"動詞","headword":"あきらむ","kanji":"明らむ","senses":[{"sense_no":1,"gloss":"明らかにする・はっきりさせる"}],"examples":[{"gloss":"明らかにする・はっきりさせる","text":"なりともあきらめ申さん。","headword_form":"あきらめ","source":"徒然・二三五段","translation":"事であっても（明らかにし）て差し上げよう。"}]},{"no":"028","pos":"動詞","headword":"にほふ","kanji":"匂ふ","senses":[{"sense_no":1,"gloss":"美しく映える・美しく輝く"},{"sense_no":2,"gloss":"香りがする〔現代語と同じ〕"}],"examples":[{"gloss":"美しく映える・美しく輝く","text":"いにしへの奈良の都の八重桜けふ九重ににほひぬるかな","headword_form":"にほひ","source":"詞花・二九","translation":"昔の（都である）奈良の都で咲いた八重桜が、今日この宮中で（美しく咲い）たなあ。"}]},{"no":"029","pos":"動詞","headword":"ねんず","kanji":"念ず","senses":[{"sense_no":1,"gloss":"我慢する"},{"sense_no":2,"gloss":"（心の中で）祈る〔現代語と同じ〕"}],"examples":[{"gloss":"我慢する","text":"《伏見稲荷に一念発起して参詣したときに、》御社のほどの、わりなうくるしきを、念じのぼるに、","headword_form":"念じ","source":"枕・うらやましげなる物","translation":"《伏見稲荷に一念発起して参詣したときに、》お社のあたりが（急坂で）、どうしようもなく苦しいのを、（我慢して）登っていると、"}]},{"no":"030","pos":"動詞","headword":"まうく","kanji":"設く","senses":[{"sense_no":1,"gloss":"準備する・用意する"}],"examples":[{"gloss":"準備する・用意する","text":"惟光は、懐に設けたる、柄短き筆など、御車とどむる所にて奉れり。","headword_form":"設け","source":"源氏・澪標","translation":"惟光は、懐に（用意し）ていた、柄の短い筆などを、お車をとめた場所で（光源氏に）差し上げた。"}]},{"no":"031","pos":"動詞","headword":"ゐる","kanji":"Ａ 居る／Ｂ 率る","senses":[{"sense_no":1,"gloss":"居る・じっとしている・（人が）留まる・（鳥が）とまる"},{"sense_no":3,"gloss":"（動詞の連用形について）～ている"},{"sense_no":4,"gloss":"連れる・伴う"}],"examples":[{"gloss":"居る・じっとしている・（人が）留まる・（鳥が）とまる","text":"三寸ばかりなる人、いとうつくしうてゐたり。","headword_form":"ゐ","source":"竹取・かぐや姫の生ひ立ち","translation":"三寸（＝約九センチ）くらいの人が、とてもかわいらしく（座っ）ていた。"}]},{"no":"032","pos":"動詞","headword":"ぐす","kanji":"具す","senses":[{"sense_no":1,"gloss":"伴う・連れる・添える"}],"examples":[{"gloss":"伴う・連れる・添える","text":"うつはものども具せざりければ、手にむすびて食はす。","headword_form":"具せ","source":"伊勢・異一段","translation":"（男は）器なども（伴っ）（＝持っ）ていなかったので、（水を）手ですくって（女に）飲ませる。"}]}
