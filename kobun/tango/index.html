/* ---------- ホーム：モード選択アコーディオン & 範囲選択 ---------- */
let openMode=null;      // 現在開いているモード（'A'|'B'|null）
let rangeTab={A:'band',B:'band'}; // 各モードで開いているタブ

function toggleMode(mode){
  if(openMode===mode){ closeMode(mode); openMode=null; return; }
  if(openMode){ closeMode(openMode); }
  openMode=mode;
  const card=$('#mc-'+mode);
  card.classList.add('open');
  card.setAttribute('aria-expanded','true');
  buildRangePanel(mode);
  const panel=$('#range-'+mode);
  panel.classList.add('open');
}
function closeMode(mode){
  const card=$('#mc-'+mode);
  card.classList.remove('open');
  card.setAttribute('aria-expanded','false');
  $('#range-'+mode).classList.remove('open');
}

function buildRangePanel(mode){
  const panel=$('#range-'+mode);
  const tab=rangeTab[mode];
  // タブ切替
  let h='<div class="range-tabs">'+
    '<button class="rtab'+(tab==='band'?' on':'')+'" onclick="setRangeTab(\''+mode+'\',\'band\')">番号帯で選ぶ</button>'+
    '<button class="rtab'+(tab==='pos'?' on':'')+'" onclick="setRangeTab(\''+mode+'\',\'pos\')">品詞で選ぶ</button>'+
    '</div>';

  h+='<div class="range-choices">';
  if(tab==='band'){
    RANGE_BANDS.forEach(b=>{
      const cnt=countPool(mode,{type:'band',min:b.min,max:b.max});
      h+='<button class="rchoice" onclick="chooseRange(\''+mode+'\',{type:\'band\',min:'+b.min+',max:'+b.max+'})">'+
         '<span class="rc-label">'+b.label+'</span>'+
         '<span class="rc-count">'+cnt+(mode==='A'?'語':'例文')+'</span></button>';
    });
  }else{
    POS_LIST.forEach(p=>{
      const cnt=countPool(mode,{type:'pos',pos:p});
      h+='<button class="rchoice" onclick="chooseRange(\''+mode+'\',{type:\'pos\',pos:\''+p+'\'})">'+
         '<span class="rc-label">'+p+'</span>'+
         '<span class="rc-count">'+cnt+(mode==='A'?'語':'例文')+'</span></button>';
    });
  }
  h+='</div>';

  // 全範囲ボタン
  const allCnt=countPool(mode,{type:'all'});
  h+='<button class="rchoice rc-wide" onclick="chooseRange(\''+mode+'\',{type:\'all\'})">'+
     '<span class="rc-label">すべて（No.1–289）</span>'+
     '<span class="rc-count">'+allCnt+(mode==='A'?'語':'例文')+'</span></button>';

  // 苦手復習ボタン（未克服の苦手があるときのみ）
  const weakCnt=countPool(mode,{type:'weak'});
  if(weakCnt>0){
    h+='<button class="rchoice rc-weak" onclick="chooseRange(\''+mode+'\',{type:\'weak\'})">'+
       '<span class="rc-label">★ 苦手な語だけ復習</span>'+
       '<span class="rc-count">'+weakCnt+(mode==='A'?'語':'例文')+'</span></button>';
  }
  // 苦手ランキングを見るボタン（記録が一つでもあれば表示）
  if(weakRanking().length>0){
    h+='<button class="rchoice rc-rank" onclick="showRanking()">'+
       '<span class="rc-label">苦手ランキングを見る</span>'+
       '<span class="rc-count">'+weakRanking().length+'語</span></button>';
  }

  panel.innerHTML=h;
}

function setRangeTab(mode,tab){ rangeTab[mode]=tab; buildRangePanel(mode); }

// そのモード・範囲で実際に出題可能な数（A=語数、B=傍線可能な例文数）
function countPool(mode,range){
  const pool=poolByRange(range);
  if(mode==='A')return pool.length;
  let c=0; pool.forEach(w=>w.examples.forEach(ex=>{if(canUnderline(ex))c++;}));
  return c;
}

function chooseRange(mode,range){
  const cnt=countPool(mode,range);
  if(cnt===0){
    alert('この範囲には出題できる問題がありません。別の範囲を選んでください。');
    return;
  }
  startSession(mode,range);
}

/* ホーム画面を最新状態に更新（苦手語数の表示など） */
function refreshHome(){
  $('#stat-weak').textContent=weakCount();
  // 開いているパネルがあれば作り直し（苦手数の反映）
  if(openMode)buildRangePanel(openMode);
}

/* ---------- 苦手ランキング画面 ---------- */
let rankFrom='home'; // 'home' | 'result' 戻り先
function showRanking(from){
  if(from)rankFrom=from;
  const list=weakRanking();
  const wrap=$('#rank-list');
  if(list.length===0){
    wrap.innerHTML='<div class="perfect"><span class="big">✓</span>まだ間違えた単語はありません。</div>';
  }else{
    const maxWrong=Math.max.apply(null,list.map(x=>x.wrong));
    let h='';
    list.forEach((x,i)=>{
      const w=x.word;
      const barW=Math.round(x.wrong/maxWrong*100);
      const label=(w.pos==='動詞'||w.pos==='形容詞'||w.pos==='形容動詞'||w.pos==='名詞'||w.pos==='副詞')?w.pos:'';
      h+='<div class="rank-item'+(x.mastered?' mastered':'')+'">'+
        '<div class="rank-pos">'+(i+1)+'</div>'+
        '<div class="rank-main">'+
          '<div class="rank-head">'+
            '<span class="rank-no">No.'+parseInt(x.no,10)+'</span>'+
            '<span class="rank-word">'+esc(w.headword)+'</span>'+
            (w.kanji?'<span class="rank-kanji">'+esc(w.kanji)+'</span>':'')+
            (x.mastered?'<span class="rank-badge master">克服</span>':'')+
          '</div>'+
          '<div class="rank-bar-row">'+
            '<span class="rank-bar"><i style="width:'+barW+'%"></i></span>'+
            '<span class="rank-count">'+x.wrong+'回</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    });
    wrap.innerHTML=h;
  }
  // アクション
  const acts=$('#rank-actions');
  acts.innerHTML='';
  const back=document.createElement('button');
  back.className='btn btn-ghost btn-block';
  back.textContent=(rankFrom==='result')?'結果に戻る':'モード選択へ戻る';
  back.onclick=()=>{ if(rankFrom==='result'){show('result');} else {refreshHome();show('home');} };
  acts.appendChild(back);
  // 全消去（誤操作防止に確認）
  if(list.length>0){
    const clr=document.createElement('button');
    clr.className='btn btn-ghost btn-block rank-clear';
    clr.textContent='記録をすべて消す';
    clr.onclick=()=>{
      if(confirm('苦手の記録をすべて消去します。よろしいですか？')){
        clearWeak();showRanking();refreshHome();
      }
    };
    acts.appendChild(clr);
  }
  show('ranking');
}

refreshHome();

</script>
