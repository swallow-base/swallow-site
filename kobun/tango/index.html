<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つばめ古文 — 古文単語演習 v1.2</title>
<style>
  :root{
    --paper:#f5f0e6;
    --paper-2:#efe8d8;
    --ink:#26303a;
    --ink-soft:#4a5560;
    --indigo:#2b4257;
    --indigo-2:#3a5a73;
    --enji:#9c3848;
    --enji-2:#b14a5a;
    --gold:#a9852f;
    --line:#d8cfba;
    --line-soft:#e7dfcd;
    --ok:#3f7d57;
    --ok-bg:#e7f0e8;
    --ng:#a8434f;
    --ng-bg:#f4e4e4;
    --shadow:0 1px 2px rgba(38,48,58,.06),0 8px 24px rgba(38,48,58,.08);
    --radius:14px;
    --maxw:680px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    line-height:1.7;
    -webkit-text-size-adjust:100%;
    min-height:100vh;
    display:flex;flex-direction:column;
  }
  .wrap{width:100%;max-width:var(--maxw);margin:0 auto;padding:0 18px;flex:1 0 auto}

  /* header */
  header{
    border-bottom:1px solid var(--line);
    background:rgba(245,240,230,.92);
    backdrop-filter:saturate(1.1) blur(4px);
    position:sticky;top:0;z-index:20;
  }
  .head-in{
    max-width:var(--maxw);margin:0 auto;padding:10px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .brand{display:flex;align-items:baseline;gap:9px;font-weight:600;letter-spacing:.02em;flex-shrink:0}
  .brand .mark{
    font-family:"Hiragino Mincho ProN",serif;color:var(--enji);
    font-size:1.12rem;white-space:nowrap;
  }
  .brand .sub{font-size:.82rem;color:var(--ink-soft);letter-spacing:.06em;white-space:nowrap}
  .ver{font-size:.72rem;color:var(--ink-soft);font-family:system-ui,sans-serif;letter-spacing:.04em}
  .nav-group{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .home-btn{
    font-family:system-ui,sans-serif;font-size:.8rem;color:var(--ink-soft);
    background:none;border:1px solid var(--line);border-radius:999px;
    padding:5px 12px;cursor:pointer;transition:.15s;text-decoration:none;white-space:nowrap;
  }
  .home-btn:hover{background:var(--paper-2);color:var(--ink)}
  @media (max-width:560px){
    .brand .sub{display:none}
    .ver{display:none}
    .home-btn{font-size:.76rem;padding:5px 10px}
  }

  /* footer */
  footer{
    flex-shrink:0;border-top:1px solid var(--line);margin-top:40px;
    padding:18px;text-align:center;color:var(--ink-soft);
    font-size:.74rem;letter-spacing:.08em;font-family:system-ui,sans-serif;
  }

  /* generic */
  .screen{display:none;padding-top:26px;animation:fade .35s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h1.title{
    font-size:1.55rem;margin:.2em 0 .15em;letter-spacing:.04em;font-weight:600;
  }
  .lead{color:var(--ink-soft);font-size:.95rem;margin:0 0 22px}
  .eyebrow{
    font-family:system-ui,sans-serif;font-size:.72rem;letter-spacing:.18em;
    color:var(--enji);font-weight:600;text-transform:none;margin-bottom:6px;
  }

  /* range stats */
  .stats{
    display:flex;gap:10px;margin:0 0 24px;flex-wrap:wrap;
  }
  .stat{
    flex:1;min-width:90px;background:var(--paper-2);border:1px solid var(--line-soft);
    border-radius:12px;padding:12px 14px;text-align:center;
  }
  .stat .num{font-size:1.4rem;font-weight:600;color:var(--indigo);font-variant-numeric:tabular-nums}
  .stat .lab{font-size:.72rem;color:var(--ink-soft);font-family:system-ui,sans-serif;letter-spacing:.06em;margin-top:2px}

  /* mode cards */
  .modes{display:flex;flex-direction:column;gap:14px}
  .mode-block{display:flex;flex-direction:column}
  .mode-card{
    text-align:left;width:100%;cursor:pointer;
    background:#fffdf8;border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;box-shadow:var(--shadow);transition:border-color .18s, background .18s;
    display:flex;gap:16px;align-items:flex-start;
  }
  .mode-card:hover{border-color:var(--indigo-2)}
  .mode-card:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .mode-card.open{
    border-color:var(--indigo);border-bottom-left-radius:0;border-bottom-right-radius:0;
    background:#fbf7ee;box-shadow:none;border-bottom:1px dashed var(--line-soft);
  }
  .mode-card.b.open{border-color:var(--enji)}
  .mode-body{flex:1}
  .mode-badge{
    flex-shrink:0;width:42px;height:42px;border-radius:11px;
    display:grid;place-items:center;font-size:1.2rem;font-weight:600;
    background:var(--indigo);color:#fff;font-family:"Hiragino Mincho ProN",serif;
  }
  .mode-card.b .mode-badge{background:var(--enji)}
  .mode-h{font-size:1.08rem;font-weight:600;margin:0 0 3px;letter-spacing:.03em;display:flex;align-items:center;justify-content:space-between}
  .chev{font-size:.85rem;color:var(--ink-soft);transition:transform .2s;margin-left:8px}
  .mode-card.open .chev{transform:rotate(180deg)}
  .mode-d{font-size:.86rem;color:var(--ink-soft);margin:0}
  .mode-meta{font-size:.74rem;color:var(--gold);font-family:system-ui,sans-serif;margin-top:7px;letter-spacing:.04em}

  /* range panel */
  .range-panel{
    display:none;background:#fbf7ee;border:1px solid var(--indigo);border-top:none;
    border-radius:0 0 var(--radius) var(--radius);padding:16px 18px 18px;
    box-shadow:var(--shadow);
  }
  .mode-block:has(.mode-card.b.open) .range-panel{border-color:var(--enji)}
  .range-panel.open{display:block;animation:fade .25s ease}
  .range-tabs{display:flex;gap:8px;margin-bottom:14px}
  .rtab{
    flex:1;font-family:system-ui,sans-serif;font-size:.85rem;padding:8px 10px;cursor:pointer;
    background:#fff;border:1px solid var(--line);border-radius:9px;color:var(--ink-soft);transition:.15s;
  }
  .rtab:hover{border-color:var(--indigo-2)}
  .rtab.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}
  .mode-block:has(.mode-card.b.open) .rtab.on{background:var(--enji);border-color:var(--enji)}
  .range-choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
  .rchoice{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    font-family:inherit;font-size:.98rem;text-align:left;cursor:pointer;
    background:#fff;border:1.5px solid var(--line);border-radius:10px;
    padding:11px 14px;transition:.13s;color:var(--ink);
  }
  .rchoice:hover{border-color:var(--indigo);background:#fbfaf5}
  .rchoice:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .rc-label{font-weight:600;letter-spacing:.02em}
  .rc-count{font-family:system-ui,sans-serif;font-size:.74rem;color:var(--ink-soft);white-space:nowrap}
  .rc-wide{grid-column:1 / -1;width:100%}
  .rc-weak{grid-column:1 / -1;width:100%;border-color:var(--enji);background:#fdf3f4}
  .rc-weak:hover{border-color:var(--enji);background:#fbe9ec}
  .rc-weak .rc-label{color:var(--enji)}
  .rc-rank{grid-column:1 / -1;width:100%;border-style:dashed}
  .rc-rank .rc-label{color:var(--indigo)}
  @media (max-width:420px){
    .range-choices{grid-template-columns:1fr}
  }

  /* ranking screen */
  #rank-list{margin-bottom:8px}
  .rank-item{
    display:flex;align-items:center;gap:12px;
    background:#fffdf8;border:1px solid var(--line);border-radius:11px;
    padding:12px 14px;margin-bottom:9px;
  }
  .rank-item.mastered{background:#f4f7f1;border-color:#cfe0c6}
  .rank-pos{
    flex-shrink:0;width:26px;height:26px;border-radius:50%;
    display:grid;place-items:center;font-family:system-ui,sans-serif;
    font-size:.82rem;font-weight:700;color:#fff;background:var(--indigo);
  }
  .rank-item:nth-child(1) .rank-pos{background:#b8902f}
  .rank-item:nth-child(2) .rank-pos{background:#9aa0a6}
  .rank-item:nth-child(3) .rank-pos{background:#b07a49}
  .rank-item.mastered .rank-pos{background:var(--ok)}
  .rank-main{flex:1;min-width:0}
  .rank-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .rank-no{
    font-family:system-ui,sans-serif;font-size:.72rem;font-weight:700;color:#fff;
    background:var(--enji);border-radius:6px;padding:1px 7px;letter-spacing:.02em;
  }
  .rank-item.mastered .rank-no{background:var(--ok)}
  .rank-word{font-size:1.05rem;font-weight:600;color:var(--ink)}
  .rank-kanji{font-size:.82rem;color:var(--ink-soft)}
  .rank-badge.master{
    font-family:system-ui,sans-serif;font-size:.68rem;font-weight:700;color:#fff;
    background:var(--ok);border-radius:99px;padding:1px 9px;letter-spacing:.04em;
  }
  .rank-bar-row{display:flex;align-items:center;gap:9px}
  .rank-bar{flex:1;height:7px;background:var(--line-soft);border-radius:99px;overflow:hidden}
  .rank-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--enji),var(--enji-2));border-radius:99px}
  .rank-item.mastered .rank-bar > i{background:linear-gradient(90deg,var(--ok),#5a9a72)}
  .rank-count{font-family:system-ui,sans-serif;font-size:.78rem;color:var(--ink-soft);white-space:nowrap;min-width:2.6em;text-align:right}
  .rank-clear{color:var(--ink-soft);font-size:.85rem}

  /* progress */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
  .qcount{font-family:system-ui,sans-serif;font-size:.8rem;color:var(--ink-soft);letter-spacing:.05em}
  .qcount b{color:var(--indigo);font-size:1.05rem}
  .bar{flex:1;height:6px;background:var(--line-soft);border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--indigo),var(--indigo-2));width:0;transition:width .4s}
  .pill{
    font-family:system-ui,sans-serif;font-size:.72rem;padding:3px 10px;border-radius:99px;
    background:var(--paper-2);color:var(--ink-soft);border:1px solid var(--line-soft);white-space:nowrap;
  }
  .pill-range{background:#eef2f5;color:var(--indigo);border-color:#cdd9e3}

  /* question */
  .qstem{
    background:#fffdf8;border:1px solid var(--line);
    border-radius:var(--radius) var(--radius) 0 0;
    border-bottom:none;
    padding:18px 22px 14px;box-shadow:var(--shadow);
    position:sticky;top:var(--head-h,56px);z-index:15;
  }
  .qopts{
    background:#fffdf8;border:1px solid var(--line);
    border-top:1px dashed var(--line-soft);
    border-radius:0 0 var(--radius) var(--radius);
    padding:16px 22px 22px;box-shadow:var(--shadow);
  }
  .pos-tag{
    display:inline-block;font-family:system-ui,sans-serif;font-size:.72rem;
    color:var(--ink-soft);border:1px solid var(--line);border-radius:99px;
    padding:2px 10px;margin-bottom:10px;letter-spacing:.05em;
  }
  .headword{
    font-size:2.1rem;font-weight:600;letter-spacing:.05em;margin:.05em 0 .05em;color:var(--ink);
  }
  .kanji{font-size:1rem;color:var(--ink-soft);margin-bottom:2px}
  .ask{font-size:.86rem;color:var(--ink-soft);margin:10px 0 2px;font-family:system-ui,sans-serif}
  .ask.multi{color:var(--enji)}

  .passage{
    font-size:1.18rem;line-height:1.95;letter-spacing:.02em;margin:4px 0 4px;
  }
  .uline{
    border-bottom:2.5px solid var(--enji);padding:0 1px 1px;font-weight:600;color:var(--ink);
  }
  .source{font-size:.8rem;color:var(--gold);font-family:system-ui,sans-serif;text-align:right;margin-top:4px;letter-spacing:.04em}

  /* options */
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:0}
  .opt{
    text-align:left;width:100%;cursor:pointer;font-family:inherit;font-size:1.02rem;
    background:#fff;border:1.5px solid var(--line);border-radius:11px;
    padding:13px 16px;transition:.13s;display:flex;align-items:center;gap:12px;color:var(--ink);
  }
  .opt:hover:not(:disabled){border-color:var(--indigo-2);background:#fffdf6}
  .opt:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .opt .box{
    flex-shrink:0;width:22px;height:22px;border:1.5px solid var(--line);border-radius:6px;
    display:grid;place-items:center;font-size:.85rem;color:#fff;background:#fff;transition:.13s;
  }
  .opt.radio .box{border-radius:99px}
  .opt.sel{border-color:var(--indigo);background:#eef2f5}
  .opt.sel .box{background:var(--indigo);border-color:var(--indigo)}
  .opt.dontknow{font-family:system-ui,sans-serif;font-size:.92rem;color:var(--ink-soft);border-style:dashed}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg)}
  .opt.correct .box{background:var(--ok);border-color:var(--ok)}
  .opt.wrong{border-color:var(--ng);background:var(--ng-bg)}
  .opt.wrong .box{background:var(--ng);border-color:var(--ng)}
  .opt.missed{border-color:var(--ok);border-style:dashed;background:#fff}
  .opt.missed .box{border-color:var(--ok)}
  .opt:disabled{cursor:default}
  .opt .lab{flex:1;min-width:0}
  .opt-tags{flex-shrink:0;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .opt-tag{
    flex-shrink:0;font-family:system-ui,sans-serif;font-size:.68rem;font-weight:600;
    letter-spacing:.04em;padding:2px 8px;border-radius:99px;white-space:nowrap;
  }
  .opt-tag.you{background:var(--ng);color:#fff}
  .opt-tag.right{background:var(--ok);color:#fff}
  .opt-tag.right-line{background:transparent;color:var(--ok);border:1px solid var(--ok)}

  /* action row */
  .actions{margin-top:20px;display:flex;gap:10px}
  .btn{
    font-family:system-ui,sans-serif;font-size:.95rem;font-weight:600;letter-spacing:.04em;
    border:none;border-radius:11px;padding:13px 22px;cursor:pointer;transition:.15s;
  }
  .btn:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .btn-primary{background:var(--indigo);color:#fff;flex:1}
  .btn-primary:hover{background:var(--indigo-2)}
  .btn-primary:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}
  .btn-ghost{background:var(--paper-2);color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--line-soft)}
  .btn-enji{background:var(--enji);color:#fff}
  .btn-enji:hover{background:var(--enji-2)}
  .btn-block{width:100%}

  /* feedback */
  .feedback{
    margin-top:18px;border-radius:11px;padding:14px 16px;font-size:.92rem;
    border:1px solid var(--line-soft);background:var(--paper-2);display:none;
  }
  .feedback.show{display:block;animation:fade .25s}
  .feedback .verdict{font-weight:600;font-family:system-ui,sans-serif;letter-spacing:.04em;margin-bottom:6px}
  .verdict-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .verdict-row .verdict{margin-bottom:0}
  .word-no{
    display:inline-flex;align-items:center;gap:8px;
    font-family:system-ui,sans-serif;letter-spacing:.02em;
  }
  .no-badge{
    font-family:system-ui,sans-serif;font-size:1rem;font-weight:700;
    color:#fff;background:var(--enji);border-radius:8px;
    padding:3px 12px;letter-spacing:.02em;white-space:nowrap;
    box-shadow:0 1px 3px rgba(156,56,72,.25);
  }
  .word-name{font-size:.95rem;color:var(--ink);font-weight:600}
  .feedback.ok .verdict{color:var(--ok)}
  .feedback.ng .verdict{color:var(--ng)}
  .feedback .ans{color:var(--ink-soft);font-size:.88rem}
  .feedback .ans b{color:var(--ink)}
  .feedback .trans{margin-top:8px;font-size:.85rem;color:var(--ink-soft);line-height:1.65}
  .gloss-list{list-style:none;margin:6px 0 0;padding:0}
  .gloss-list li{
    position:relative;padding-left:1.1em;margin:3px 0;color:var(--ink);
    font-size:.92rem;line-height:1.55;
  }
  .gloss-list li::before{
    content:"・";position:absolute;left:0;color:var(--ok);font-weight:700;
  }
  .gloss-label{font-size:.82rem;color:var(--ink-soft);font-family:system-ui,sans-serif}

  /* result */
  .result-head{text-align:center;margin-bottom:8px}
  .score-big{font-size:3rem;font-weight:600;color:var(--indigo);font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .score-big small{font-size:1.1rem;color:var(--ink-soft);font-weight:400}
  .result-msg{color:var(--ink-soft);font-size:.95rem;margin-bottom:24px;text-align:center}

  .review-h{font-size:1rem;font-weight:600;margin:24px 0 10px;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
  .review-h .cnt{font-family:system-ui,sans-serif;font-size:.78rem;color:#fff;background:var(--enji);border-radius:99px;padding:1px 9px}
  .rev-item{
    background:#fffdf8;border:1px solid var(--line);border-left:3px solid var(--enji);
    border-radius:10px;padding:13px 15px;margin-bottom:10px;
  }
  .rev-q{font-size:1.05rem;font-weight:600;margin-bottom:3px}
  .rev-no{
    display:inline-block;font-family:system-ui,sans-serif;font-size:.7rem;font-weight:600;
    color:#fff;background:var(--enji);border-radius:6px;padding:1px 7px;margin-right:8px;
    letter-spacing:.03em;vertical-align:middle;
  }
  .rev-no.inline{background:var(--gold);margin-right:7px}
  .rev-q .uline{font-size:1rem}
  .rev-meta{font-size:.74rem;color:var(--ink-soft);font-family:system-ui,sans-serif;margin-bottom:6px}
  .rev-line{font-size:.85rem;margin:6px 0 0;display:flex;gap:8px;align-items:baseline}
  .rev-line .lab{
    flex-shrink:0;display:inline-block;width:5.6em;color:var(--ink-soft);
    font-family:system-ui,sans-serif;font-size:.74rem;
  }
  .rev-line.your .val{color:var(--ng)}
  .rev-line.true .val{color:var(--ok);font-weight:600}
  .rev-line.true .gloss-list{margin:0}
  .rev-line.true .gloss-list li{color:var(--ok);font-weight:600;font-size:.85rem}

  .perfect{
    text-align:center;padding:30px 16px;color:var(--ok);font-size:1.05rem;
  }
  .perfect .big{font-size:2.4rem;display:block;margin-bottom:8px}

  .result-actions{display:flex;flex-direction:column;gap:11px;margin-top:26px}

  /* modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(38,48,58,.45);z-index:50;
    display:none;align-items:center;justify-content:center;padding:24px;animation:fade .2s;
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--paper);border-radius:16px;padding:26px 24px;max-width:340px;width:100%;
    box-shadow:0 12px 40px rgba(38,48,58,.25);text-align:center;
  }
  .modal p{margin:0 0 20px;font-size:.98rem;line-height:1.7}
  .modal .row{display:flex;gap:10px}
  .modal .row .btn{flex:1;padding:11px}
  .modal-actions{display:flex;flex-direction:column;gap:9px}
  .modal-actions .btn{width:100%;padding:11px}

  @media (max-width:480px){
    h1.title{font-size:1.35rem}
    .headword{font-size:2rem}
    .passage{font-size:1.12rem}
    .score-big{font-size:2.5rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="brand">
      <span class="mark">つばめ古文</span>
      <span class="sub">古文単語</span>
    </div>
    <div class="nav-group">
      <span class="ver">v1.2</span>
      <a class="home-btn nav-tango" href="https://swallow-base.com/kobun/tango/">単語トップ</a>
      <a class="home-btn nav-kobun" href="https://swallow-base.com/kobun/">⌂ 古文</a>
    </div>
  </div>
</header>

<div class="wrap">

  <!-- ===== HOME ===== -->
  <section id="home" class="screen active">
    <div class="eyebrow">重要古文単語315 ／ No.1–289</div>
    <h1 class="title">古文単語演習</h1>
    <p class="lead">第一章・第二章の289語から出題します。モードを選ぶと、出題範囲を指定できます。</p>

    <div class="stats">
      <div class="stat"><div class="num">289</div><div class="lab">収録語数</div></div>

const TANGO_DATA = [{"no":"001","pos":"動詞","headword":"みる","kanji":"見る","senses":[{"sense_no":1,"gloss":"見る・会う"},{"sense_no":2,"gloss":"思う・分かる"},{"sense_no":3,"gloss":"（男女の）関係を結ぶ・結婚する・妻とする"},{"sense_no":4,"gloss":"面倒を見る・世話をする"}],"examples":[{"gloss":"思う・分かる","text":"めでたしとみる人の、心劣りせらるる本性見えむこそ、口惜しかるべけれ。","source":"徒然・一段","translation":"すばらしいと（思う）人が、思っていたより劣っている人だと感じられるような本性が見えるのは、残念であるにちがいない。","headword_form":"みる"},{"gloss":"（男女の）関係を結ぶ・結婚する・妻とする","text":"はやくみし女のこと、ほめ言ひ出でなどするも、程経たることなれど、なほにくし。","source":"枕・にくきもの","translation":"（今の彼が）以前（関係を結ん）だ女性のことを、ほめて口に出したりするのも、時がたったことであっても、やはり気にくわない。","headword_form":"みし"},{"gloss":"面倒を見る・世話をする","text":"《帝に差し上げようと大切に育ててきた娘であったが、》娘に恋しい人ができたので、親も見ずなりにけり。","source":"大和・一〇五段","translation":"《娘に恋しい人ができたので、》親も（娘の）（面倒を見）なくなってしまった。","headword_form":"見ず"}]},{"no":"002","pos":"動詞","headword":"みす","kanji":"見す","senses":[{"sense_no":1,"gloss":"見せる・（様子を）見せる"},{"sense_no":2,"gloss":"結婚させる"}],"examples":[{"gloss":"結婚させる","text":"宮仕へに次ぎては、親王たちにこそは見せ奉らめ。","source":"源氏・若菜下","translation":"（大切に育てている娘の将来は）宮仕え（をさせるか、それ）に次いでは、親王たちと（結婚させ）申し上げるのがよかろう。","headword_form":"見せ"}]},{"no":"003","pos":"動詞","headword":"みゆ","kanji":"見ゆ","senses":[{"sense_no":1,"gloss":"見える・思われる"},{"sense_no":2,"gloss":"見られる・見せる"},{"sense_no":3,"gloss":"（女性が）結婚する"}],"examples":[{"gloss":"見える・思われる","text":"都の中とも見えぬ所のさまなり。","source":"更級","translation":"都の中とも（見え（思われ））ない場所の様子である。","headword_form":"見え"},{"gloss":"見られる・見せる","text":"さて、出でて行くと見えて、前栽の中に隠れて、","source":"大和・一四九段","translation":"（男は）出て行くと（見せ）て、庭の植ゑ込みの中に隠れて、","headword_form":"見え"},{"gloss":"（女性が）結婚する","text":"いかならむ人にもみえて、身をも助け、幼き者どもをはぐくみ給ふべし。","source":"平家・巻七","translation":"（相手が）どのような男でも（結婚し）て、（あなた自身の）身を守り、幼い子どもたちを（大切に）育ててください。","headword_form":"みえ"}]},{"no":"004","pos":"動詞","headword":"かいまみる","kanji":"垣間見る","senses":[{"sense_no":1,"gloss":"のぞき見る"}],"examples":[{"gloss":"のぞき見る","text":"女、をとこの家にいきてかいまみけるを、","source":"伊勢・六三段","translation":"女は、男の家に行って（のぞき見）たところ、","headword_form":"かいまみ"}]},{"no":"005","pos":"動詞","headword":"よばふ","kanji":"呼ばふ","senses":[{"sense_no":1,"gloss":"呼び続ける"},{"sense_no":2,"gloss":"求婚する・言い寄る"}],"examples":[{"gloss":"呼び続ける","text":"あとに呼ばふ声あり。かへりみれば人なし。","source":"宇治・巻十五・十一話","translation":"後ろで（呼び続ける）声がする。振り返ってみると誰もいない。","headword_form":"呼ばふ"},{"gloss":"求婚する・言い寄る","text":"《実に奥ゆかしくて、》よばふ人もいと多かりけれど、かへりごともせざりけり。","source":"大和・一四段","translation":"《実にかわいらしい人だったので、》（求婚する）人も実に多かったが、返事もしなかった。","headword_form":"よばふ"}]},{"no":"006","pos":"動詞","headword":"すく","kanji":"好く","senses":[{"sense_no":1,"gloss":"風流を好む・芸道に熱中する"},{"sense_no":2,"gloss":"色ごとを好む・恋愛に熱中する"}],"examples":[{"gloss":"風流を好む・芸道に熱中する","text":"よき人は、ひとへにすける様にも見えず、","source":"徒然・三五段","translation":"身分が高く教養がある人は、ひたすら（風流を好ん）でいるようにも見えず、","headword_form":"すける"},{"gloss":"色ごとを好む・恋愛に熱中する","text":"《光源氏の息子の夕霧は自分のことを棚に上げ説教する父を、》「かかるすきにいでや」と見奉り給ふ。","source":"源氏・横笛","translation":"《光源氏の息子の夕霧は自分のことを棚に上げ説教する父を、》「父上もご自身のこのような（色好み（恋愛））はさあどうだろうか」と思い申し上げなさる。","headword_form":"すき"}]},{"no":"007","pos":"動詞","headword":"わたる","kanji":"渡る","senses":[{"sense_no":1,"gloss":"行く・来る・通る〔移動を表す〕"},{"sense_no":2,"gloss":"（主に「わたらせ給ふ」の形で）いらっしゃる〔存在・状態を表す〕"},{"sense_no":3,"gloss":"（動詞の連用形について）〜続ける"},{"sense_no":4,"gloss":"（動詞の連用形について）一面に〔〜する〕"}],"examples":[{"gloss":"行く・来る・通る〔移動を表す〕","text":"むかし、男、後涼殿のはさまを渡りければ、","source":"伊勢・一〇〇段","translation":"昔、男が、後涼殿（と清涼殿）のすき間を（通っ）たところ、","headword_form":"渡り"},{"gloss":"（主に「わたらせ給ふ」の形で）いらっしゃる〔存在・状態を表す〕","text":"高倉の宮の御子の宮たちのあまたわたらせ給ふ候ふなる。","source":"平家・巻四","translation":"高倉の宮のお子様の宮たちが大勢（いらっしゃる）そうです。","headword_form":"わたらせ給ふ"},{"gloss":"（動詞の連用形について）〜続ける","text":"女のえ得まじかりけるを、年を経てよばひわたりけるを、","source":"伊勢・六段","translation":"女で手に入れられそうもなかった女（＝妻にしたくてもできなかった女）を、何年間も求婚し（続け）ていたが、","headword_form":"わたり"},{"gloss":"（動詞の連用形について）一面に〔〜する〕","text":"夕霧立ちわたりて、","source":"更級","translation":"夕霧が（一面に）立って、","headword_form":"わたり"}]},{"no":"008","pos":"動詞","headword":"ありく","kanji":"歩く","senses":[{"sense_no":1,"gloss":"歩き回る・動き回る・出歩く"},{"sense_no":2,"gloss":"（動詞の連用形について）〜しまわる"},{"sense_no":3,"gloss":"（動詞の連用形について）〜続ける"}],"examples":[{"gloss":"歩き回る・動き回る・出歩く","text":"もし歩くべきことあれば、自ら歩む。","source":"方丈","translation":"もし（出歩か）なければならないことがあると、自分（の足）で歩く。","headword_form":"歩く"},{"gloss":"（動詞の連用形について）〜しまわる","text":"蛍のとびありきけるを、","source":"大和・四〇段","translation":"蛍が飛び（まわっ）ていたのを、","headword_form":"ありき"},{"gloss":"（動詞の連用形について）〜続ける","text":"後ろ見ありき給ふめる。","source":"源氏・東屋","translation":"世話をし（続け）なさっているようだ。","headword_form":"ありき"}]},{"no":"009","pos":"動詞","headword":"おこなふ","kanji":"行ふ","senses":[{"sense_no":1,"gloss":"仏道修行をする・勤行する"}],"examples":[{"gloss":"仏道修行をする・勤行する","text":"山にこもりておこなはむ。","source":"宇津保・忠こそ","translation":"山に籠もって（仏道修行をし）よう。","headword_form":"おこなは"}]},{"no":"010","pos":"動詞","headword":"なやむ","kanji":"悩む","senses":[{"sense_no":1,"gloss":"病気になる・病気で苦しむ"}],"examples":[{"gloss":"病気になる・病気で苦しむ","text":"身にやむごとなく思ふ人のなやむを聞きて、","source":"枕・うれしき物","translation":"自分にとって大事に思っている人が（病気で苦しむ）のを聞いて、","headword_form":"なやむ"}]},{"no":"011","pos":"動詞","headword":"おこたる","kanji":"怠る","senses":[{"sense_no":1,"gloss":"病気が治る"}],"examples":[{"gloss":"病気が治る","text":"おこたりたる由、消息ある、いとうれし。","source":"枕・うれしき物","translation":"（病気が治っ）たという知らせを聞くのも、とてもうれしい。","headword_form":"おこたり"}]},{"no":"012","pos":"動詞","headword":"おくる","kanji":"後る・遅る","senses":[{"sense_no":1,"gloss":"先立たれる・死に後れる"},{"sense_no":2,"gloss":"後になる・残される・劣る"}],"examples":[{"gloss":"先立たれる・死に後れる","text":"故姫君は、十ばかりにて殿におくれ給ひしほどは、","source":"源氏・若紫","translation":"亡くなった姫君は、十歳ぐらいで父君に（先立たれ）なさったとき、","headword_form":"おくれ"}]},{"no":"013","pos":"動詞","headword":"ながむ","kanji":"眺む／詠む","senses":[{"sense_no":1,"gloss":"Ⓐ もの思いに沈む・もの思いにふける・もの思いしながらぼんやり見る"},{"sense_no":2,"gloss":"Ⓑ （漢詩や和歌を）口ずさむ・（声に出して）歌う"}],"examples":[{"gloss":"Ⓐ もの思いに沈む・もの思いにふける・もの思いしながらぼんやり見る","text":"暮れがたき夏の日ぐらしながむれば","source":"伊勢・四五段","translation":"なかなか暮れない夏の（日に）一日中（もの思いに沈んでいる）と、","headword_form":"ながむれ"},{"gloss":"Ⓑ （漢詩や和歌を）口ずさむ・（声に出して）歌う","text":"「こぼれてにほふ花桜かな」とながめければ、その声を院聞こしめさせたまひて、","source":"今昔・二七巻・二九話","translation":"（誰かが）「咲きこぼれて美しい桜の花よ」と（口ずさん）だので、その声を院がお聞きになって、","headword_form":"ながめ"}]},{"no":"014","pos":"動詞","headword":"ときめく","kanji":"時めく","senses":[{"sense_no":1,"gloss":"寵愛を受ける・特別に愛される"},{"sense_no":2,"gloss":"（時流に乗って・時宜を得て）栄える・もてはやされる"}],"examples":[{"gloss":"寵愛を受ける・特別に愛される","text":"いとやむごとなき際にはあらぬが、すぐれてときめき給ふありけり。","source":"源氏・桐壺","translation":"それほど高貴な身分ではない方で、際だって（帝の）（寵愛を受け）ていらっしゃる方があった。","headword_form":"ときめき"},{"gloss":"（時流に乗って・時宜を得て）栄える・もてはやされる","text":"世の中にときめき給ふ雲客、桂より遊びて帰り給ふが、","source":"著聞・和歌","translation":"世の中で（時流に乗って）栄え）なさっている殿上人が、桂から遊んでお帰りになっていたが、","headword_form":"ときめき"}]},{"no":"015","pos":"動詞","headword":"かしづく","kanji":"","senses":[{"sense_no":1,"gloss":"大切に育てる"},{"sense_no":2,"gloss":"大切に世話をする"}],"examples":[{"gloss":"大切に育てる","text":"親たちかしづき給ふことかぎりなし。","source":"堤中納言・虫めづる姫君","translation":"親たちが（姫君を）（大切に育て）なさることこの上ない。","headword_form":"かしづき"},{"gloss":"大切に世話をする","text":"この少将をばよき聟（むこ）とてかしづき、","source":"宇治・巻三八話","translation":"この少将をよい婿として（大切に世話をし）、","headword_form":"かしづき"}]},{"no":"016","pos":"動詞","headword":"めづ","kanji":"愛づ","senses":[{"sense_no":1,"gloss":"愛する・好む・かわいがる"},{"sense_no":2,"gloss":"ほめる・たたえる・感嘆する"}],"examples":[{"gloss":"愛する・好む・かわいがる","text":"いかなる人、蝶めづる姫君につかまつるらむ。","source":"堤中納言・虫めづる姫君","translation":"どのような人が、蝶を（愛する）姫君にお仕えしているのだろう。","headword_form":"めづる"},{"gloss":"ほめる・たたえる・感嘆する","text":"この歌にめでてあひにけり。","source":"伊勢・九段","translation":"（女は）この歌に（感嘆し）て（男に）逢ってしまった。","headword_form":"めで"}]},{"no":"017","pos":"動詞","headword":"おどろく","kanji":"驚く","senses":[{"sense_no":1,"gloss":"目を覚ます・起きる"},{"sense_no":2,"gloss":"（はっと）気づく"},{"sense_no":3,"gloss":"驚く〔現代語と同じ〕"}],"examples":[{"gloss":"目を覚ます・起きる","text":"抱きて寝たるに、おどろきて児を見るになし。","source":"今昔・十二巻・四話","translation":"抱いて寝たのに、（目を覚まし）て子どもを見るといない。","headword_form":"おどろき"},{"gloss":"（はっと）気づく","text":"秋来ぬと目にはさやかに見えねども風の音にぞおどろかれぬる","source":"古今・一六九","translation":"秋が来たと目にははっきりと見えないが、風の音に自然と（気づい）てしまった。","headword_form":"おどろか"}]},{"no":"018","pos":"動詞","headword":"こうず","kanji":"困ず","senses":[{"sense_no":1,"gloss":"疲れる"},{"sense_no":2,"gloss":"悩む・困る"}],"examples":[{"gloss":"疲れる","text":"このごろ物の怪にあづかりてこうじにけるにや、ゐるままにすなはちねぶり声なる、いとにくし。","source":"枕・にくきもの","translation":"（験者は）このごろ物の怪（の退治）にかかわって（疲れ）てしまったのであろうか、座るとすぐにそのまま眠り声である（＝眠たそうな声になる）のは、実に気にくわない。","headword_form":"こうじ"}]},{"no":"019","pos":"動詞","headword":"おぼゆ","kanji":"覚ゆ","senses":[{"sense_no":1,"gloss":"思われる"},{"sense_no":2,"gloss":"思い出す・思い出される"},{"sense_no":3,"gloss":"似る・似ている"}],"examples":[{"gloss":"思われる","text":"世の中にまた類ある事ともおぼえず。","source":"更級","translation":"世の中にまた類例があることとも（思われ）ない。","headword_form":"おぼえ"},{"gloss":"思い出す・思い出される","text":"うちある調度も昔おぼえて、","source":"徒然・十段","translation":"ちょっと（置いて）ある調度も昔が（思い出され）て、","headword_form":"おぼえ"},{"gloss":"似る・似ている","text":"少しおぼえたるところあれば、子なめりと見給ふ。","source":"源氏・若紫","translation":"少し（似）ているところがあるので、（尼君の）子であろうと（光源氏は）ご覧になる。","headword_form":"おぼえ"}]},{"no":"020","pos":"動詞","headword":"きこゆ","kanji":"聞こゆ","senses":[{"sense_no":1,"gloss":"聞こえる"},{"sense_no":2,"gloss":"噂される・評判になる"},{"sense_no":3,"gloss":"分かる"}],"examples":[{"gloss":"聞こえる","text":"鶴は、いとこちたきさまなれど、鳴く声雲居まできこゆる、いとめでたし。","source":"枕・鳥は","translation":"鶴は、とても大げさな様子（＝姿）であるが、鳴く声が天まで（聞こえる）のは、実にすばらしい。","headword_form":"きこゆる"},{"gloss":"噂される・評判になる","text":"都にきこえたる白拍子の上手一人出で来たり。","source":"平家・巻一","translation":"都で（評判になっ）ている（＝評判の）白拍子の名人が一人出て来た。","headword_form":"きこえ"},{"gloss":"分かる","text":"きこえぬことども言ひつつよろめきたる、いとかはゆし。","source":"徒然・一七五段","translation":"（年をとった法師が）（分から）ないことを言ってはよろめいているのは、とても見るにたえない。","headword_form":"きこえ"}]},{"no":"021","pos":"動詞","headword":"まもる・まぼる","kanji":"守る","senses":[{"sense_no":1,"gloss":"見つめる"},{"sense_no":2,"gloss":"監視する"}],"examples":[{"gloss":"見つめる","text":"《匂の宮は、養母の紫の上に死後の供養を頼まれて、》うちうなづきて、御顔をまもりて、涙の落つべかめれば立ちておはしぬ。","source":"源氏・御法","translation":"（匂の宮は）うなずいて、（紫の上の）お顔を（見つめ）て、涙が落ちてきそうなので立って（部屋の外へ）いらっしゃった。","headword_form":"まもり"}]},{"no":"022","pos":"動詞","headword":"たのむ","kanji":"頼む","senses":[{"sense_no":1,"gloss":"あてにする・頼りにする・期待する"},{"sense_no":2,"gloss":"頼りにさせる・あてにさせる・期待させる"}],"examples":[{"gloss":"あてにする・頼りにする・期待する","text":"あとの矢をたのみて、初めの矢になほざりの心あり。","source":"徒然・九二段","translation":"あとの矢を（あてにし）て、最初の矢（を射るの）にいい加減な気持ちが起こる。","headword_form":"たのみ"},{"gloss":"頼りにさせる・あてにさせる・期待させる","text":"たのめしをなほや待つべき","source":"更級","translation":"（あなたがわたしに）（あてにさせ）たことをやはり待つべきでしょうか。","headword_form":"たのめ"}]},{"no":"023","pos":"動詞","headword":"かづく","kanji":"被く","senses":[{"sense_no":1,"gloss":"かぶる"},{"sense_no":2,"gloss":"（貴人から）ほうびとしていただく"},{"sense_no":3,"gloss":"かぶせる"},{"sense_no":4,"gloss":"（貴人がほうびとして）与える"}],"examples":[{"gloss":"かぶる","text":"《仁和寺の法師が酔って興に入ったあまり、》足鼎を取りて、頭にかづきたれば、","source":"徒然・五三段","translation":"（三本）足の鼎（＝食物を煮るのに用いる鉄や土製の容器）を取って、頭に（かぶっ）たところ、","headword_form":"かづき"},{"gloss":"（貴人から）ほうびとしていただく","text":"大袿かづきて、","source":"大和・三三段","translation":"ほうびとして大袿を（いただい）て、","headword_form":"かづき"},{"gloss":"（貴人がほうびとして）与える","text":"中納言は御衣脱ぎてかづけ給うつ。","source":"竹取・燕の子安貝","translation":"（中納言は）お召し物を脱いで（ほうびとして）（与え）なさった。","headword_form":"かづけ"}]},{"no":"024","pos":"動詞","headword":"ののしる","kanji":"","senses":[{"sense_no":1,"gloss":"大声を出す・大声で騒ぐ"},{"sense_no":2,"gloss":"評判になる・噂になる"},{"sense_no":3,"gloss":"勢いが盛んである・羽振りをきかす"}],"examples":[{"gloss":"大声を出す・大声で騒ぐ","text":"田舎びたる声したる犬どもの出で来てののしるも、いと恐ろしく、","source":"源氏・浮舟","translation":"田舎びた声をした何匹かの犬が出て来て（大声で騒ぐ）のも、とても恐ろしく、","headword_form":"ののしる"},{"gloss":"評判になる・噂になる","text":"この世にののしりたまふ光源氏、かかるついでに見たてまつりたまはんや。","source":"源氏・若紫","translation":"この世で（評判になっ）ていらっしゃる光源氏を、この機会に拝見なさいませんか。","headword_form":"ののしり"},{"gloss":"勢いが盛んである・羽振りをきかす","text":"左大臣の北の方にてののしり給ひける時、","source":"大和・三四段","translation":"左大臣の夫人として（羽振りをきかせ）ていらっしゃったときに、","headword_form":"ののしり"}]},{"no":"025","pos":"動詞","headword":"やる","kanji":"遣る","senses":[{"sense_no":1,"gloss":"人を行かせる・物を送る"},{"sense_no":2,"gloss":"（動詞＋「やらず」の形で）～しきれない・最後まで（～し）ない"}],"examples":[{"gloss":"人を行かせる・物を送る","text":"（ある）人の許に言ふべき事ありて、文をやるとて、","source":"徒然・三段","translation":"（ある）人のもとへ言わなければならないことがあって、手紙を（送る）といって（＝ときに）、","headword_form":"やる"},{"gloss":"（動詞＋「やらず」の形で）～しきれない・最後まで（～し）ない","text":"言ひもやらず泣くさま、ことわりなり。","source":"源氏・総角","translation":"（老人が）言い（きれず）泣く様子は、もっともである。","headword_form":"やら"}]},{"no":"026","pos":"動詞","headword":"いらふ","kanji":"答ふ","senses":[{"sense_no":1,"gloss":"答える"}],"examples":[{"gloss":"答える","text":"一度にいらへむも、待ちけるかともぞ思ふとて、","source":"宇治・巻十・二話","translation":"ただ一度で（答える）ようなのも、待っていたのかと思うと困ると考えて、","headword_form":"いらへ"}]},{"no":"027","pos":"動詞","headword":"あきらむ","kanji":"明らむ","senses":[{"sense_no":1,"gloss":"明らかにする・はっきりさせる"}],"examples":[{"gloss":"明らかにする・はっきりさせる","text":"なりともあきらめ申さん。","source":"徒然・二三五段","translation":"事であっても（明らかにし）て差し上げよう。","headword_form":"あきらめ"}]},{"no":"028","pos":"動詞","headword":"にほふ","kanji":"匂ふ","senses":[{"sense_no":1,"gloss":"美しく映える・美しく輝く"},{"sense_no":2,"gloss":"香りがする〔現代語と同じ〕"}],"examples":[{"gloss":"美しく映える・美しく輝く","text":"いにしへの奈良の都の八重桜けふ九重ににほひぬるかな","source":"詞花・二九","translation":"昔の（都である）奈良の都で咲いた八重桜が、今日この宮中で（美しく咲い）たなあ。","headword_form":"にほひ"}]},{"no":"029","pos":"動詞","headword":"ねんず","kanji":"念ず","senses":[{"sense_no":1,"gloss":"我慢する"},{"sense_no":2,"gloss":"（心の中で）祈る〔現代語と同じ〕"}],"examples":[{"gloss":"我慢する","text":"《伏見稲荷に一念発起して参詣したときに、》御社のほどの、わりなうくるしきを、念じのぼるに、","source":"枕・うらやましげなる物","translation":"《伏見稲荷に一念発起して参詣したときに、》お社のあたりが（急坂で）、どうしようもなく苦しいのを、（我慢して）登っていると、","headword_form":"念じ"}]},{"no":"030","pos":"動詞","headword":"まうく","kanji":"設く","senses":[{"sense_no":1,"gloss":"準備する・用意する"}],"examples":[{"gloss":"準備する・用意する","text":"惟光は、懐に設けたる、柄短き筆など、御車とどむる所にて奉れり。","source":"源氏・澪標","translation":"惟光は、懐に（用意し）ていた、柄の短い筆などを、お車をとめた場所で（光源氏に）差し上げた。","headword_form":"設け"}]},{"no":"031","pos":"動詞","headword":"ゐる","kanji":"Ａ 居る／Ｂ 率る","senses":[{"sense_no":1,"gloss":"居る・じっとしている・（人が）留まる・（鳥が）とまる"},{"sense_no":3,"gloss":"（動詞の連用形について）～ている"},{"sense_no":4,"gloss":"連れる・伴う"}],"examples":[{"gloss":"居る・じっとしている・（人が）留まる・（鳥が）とまる","text":"三寸ばかりなる人、いとうつくしうてゐたり。","source":"竹取・かぐや姫の生ひ立ち","translation":"三寸（＝約九センチ）くらいの人が、とてもかわいらしく（座っ）ていた。","headword_form":"ゐ"}]},{"no":"032","pos":"動詞","headword":"ぐす","kanji":"具す","senses":[{"sense_no":1,"gloss":"伴う・連れる・添える"}],"examples":[{"gloss":"伴う・連れる・添える","text":"うつはものども具せざりければ、手にむすびて食はす。","source":"伊勢・異一段","translation":"（男は）器なども（伴っ）（＝持っ）ていなかったので、（水を）手ですくって（女に）飲ませる。","headword_form":"具せ"}]},{"no":"033","pos":"動詞","headword":"ふ","kanji":"経","senses":[{"sense_no":1,"gloss":"（時間が）たつ・経過する"},{"sense_no":2,"gloss":"（場所を）通る・経由する"}],"examples":[{"gloss":"（時間が）たつ・経過する","text":"日ごろ経て、宮に帰りたまうけり。","source":"伊勢・八三段","translation":"日が（たっ）て、御所にお帰りになった。","headword_form":"経"},{"gloss":"（場所を）通る・経由する","text":"の松原をへて行く。","source":"土佐・二月一日","translation":"崎の松原を（通っ）て行く。","headword_form":"へ"}]},{"no":"034","pos":"動詞","headword":"さる","kanji":"Ａ 避る／Ｂ 去る","senses":[{"sense_no":1,"gloss":"避ける"},{"sense_no":2,"gloss":"（時節が）来る・（その時に）なる〔現代語と同じ〕"},{"sense_no":3,"gloss":"立ち去る・過ぎ去る〔現代語と同じ〕"}],"examples":[{"gloss":"避ける","text":"さらぬことのみいとど重なりて、","source":"徒然・五九段","translation":"（避ける）ことのできないことばかりがますます重なって、","headword_form":"さら"},{"gloss":"（時節が）来る・（その時に）なる〔現代語と同じ〕","text":"夕されば野辺の秋風身にしみて鶉鳴くなり深草の里","source":"千載・二五九","translation":"夕方に（なる）と野辺の秋風が身にしみて、鶉が鳴いているような深草の里で。","headword_form":"され"}]},{"no":"035","pos":"動詞","headword":"ものす","kanji":"物す","senses":[{"sense_no":1,"gloss":"あり・ある・いる"},{"sense_no":2,"gloss":"（ものごとを）する"}],"examples":[{"gloss":"あり・ある・いる","text":"（夕霧は）いづこよりものしつるぞ。","source":"源氏・野分","translation":"《（夕霧は）どこから（来）たのか》と源氏はお尋ねになった。","headword_form":"ものし"},{"gloss":"（ものごとを）する","text":"御文をだにものせさせ給へ。","source":"落窪・巻一","translation":"せめてそのようなお手紙だけでもお（書き）ください。","headword_form":"ものせ"}]},{"no":"036","pos":"動詞","headword":"ならふ","kanji":"慣らふ・馴らふ","senses":[{"sense_no":1,"gloss":"慣れる"},{"sense_no":2,"gloss":"親しくなる・なじむ"}],"examples":[{"gloss":"慣れる","text":"ならはぬ道なれば、","source":"とはずがたり・巻四","translation":"それでもやはり（慣れ）ない道であるので、","headword_form":"ならは"},{"gloss":"親しくなる・なじむ","text":"かかる有様もならひ給はず、ところせき御身にて、珍しく","source":"源氏・若紫","translation":"《光源氏は、》このような（山の）様子にも（なじみ）なさっていなくて、（簡単には外出できない）窮屈なご身分で、（山の景色を）すらしいとお思いになった。","headword_form":"ならひ"}]},{"no":"037","pos":"動詞","headword":"しのぶ","kanji":"Ａ 忍ぶ／Ｂ 偲ぶ","senses":[{"sense_no":1,"gloss":"我慢する・こらえる〔耐え忍ぶ〕"},{"sense_no":2,"gloss":"人目につかないようにする〔人目を忍ぶ〕"},{"sense_no":3,"gloss":"思い出す・恋い慕う〔過去・人を偲ぶ〕"}],"examples":[{"gloss":"我慢する・こらえる〔耐え忍ぶ〕","text":"うちにはかぎりなく妬く心憂く思ふを、しのぶるになむありける。","source":"大和・一四九段","translation":"《ほかの女のもとに夫が通うようになった妻は平気を装っていたが、》（妻は）心ではこの上なく妬ましくつらく思っているのを、（我慢する）のであった。","headword_form":"しのぶる"},{"gloss":"思い出す・恋い慕う〔過去・人を偲ぶ〕","text":"き人をしのぶる宵のむら雨に濡れてや来つる山時鳥","source":"源氏・幻","translation":"（亡き人を）（思い出す）夜の俄雨に濡れてやってきたのか。山の時鳥は。","headword_form":"しのぶる"}]},{"no":"038","pos":"動詞","headword":"わぶ","kanji":"侘ぶ","senses":[{"sense_no":1,"gloss":"困る・嘆く・つらく思う"},{"sense_no":2,"gloss":"（動詞の連用形について）～かねる・～することができない"}],"examples":[{"gloss":"困る・嘆く・つらく思う","text":"いたう強ひられて、わびにて侍り。","source":"源氏・花宴","translation":"にひどく（酒を）強制されて、（困っ）てしまっております。","headword_form":"わび"},{"gloss":"困る・嘆く・つらく思う","text":"遠くも来にけるかな、とわび合へるに、","source":"伊勢・九段","translation":"（男たちは）この上なく遠くまで来てしまったものだなあと、（嘆）き合っていると、","headword_form":"わび"},{"gloss":"（動詞の連用形について）～かねる・～することができない","text":"わびつつ、様々の財物かたはしより捨つるが如くすれども、","source":"方丈","translation":"（人々は飢饉に苦しんで）（困っ）（かね）て、様々な宝物を片っ端から捨てるようにする（＝安売り払う）が、","headword_form":"わび"}]},{"no":"039","pos":"形容詞","headword":"をかし","kanji":"","senses":[{"sense_no":1,"gloss":"すばらしい〔美しい・かわいい・おもしろい・風流だなど肯定的に評価する様子や心情を表す〕"},{"sense_no":2,"gloss":"おかしい・滑稽だ"}],"examples":[{"gloss":"すばらしい〔美しい・かわいい・おもしろい・風流だなど肯定的に評価する様子や心情を表す〕","text":"また、一匹か二匹など、ほのかに光って（飛んで）行くもをかし。","source":"枕・春は曙","translation":"また、一匹か二匹ほど、ほのかに光って（飛んで）行くのも、（すばらしい〔すてきだ・美しい・風情がある〕）。","headword_form":"をかし"},{"gloss":"すばらしい〔美しい・かわいい・おもしろい・風流だなど肯定的に評価する様子や心情を表す〕","text":"笛をいとをかしく吹き澄まして、過ぎぬなり。","source":"更級","translation":"笛をとても（すばらしく〔うまく〕）澄んだ音色で吹いて、通り過ぎて行ってしまったようだ。","headword_form":"をかしく"},{"gloss":"おかしい・滑稽だ","text":"妻、「をかし」と思ひて、笑ひてやみにけり。","source":"今昔・二八巻・四二話","translation":"妻は、「（滑稽だ〔おかしい〕）」と思って、笑って終わった。","headword_form":"をかし"}]},{"no":"040","pos":"形容詞","headword":"よろし","kanji":"","senses":[{"sense_no":1,"gloss":"悪くはない・まあよい"},{"sense_no":2,"gloss":"普通だ"}],"examples":[{"gloss":"悪くはない・まあよい","text":"「よろしく侍り。」","source":"無名抄","translation":"「（悪くはない）」です（＝悪くはありません）。","headword_form":"よろしく"},{"gloss":"普通だ","text":"よろしき事にだに、かかる別れの悲しからぬはなきわざなるを、ましてあはれに言ふかひなし。","source":"源氏・桐壺","translation":"《普通の》状況でさえ、このような（母子の）別れが悲しくないことはないことだが、まして（源氏の幼さを考えると）かわいそうでどうしようもない。","headword_form":"よろしき"}]},{"no":"041","pos":"形容詞","headword":"ありがたし","kanji":"","senses":[{"sense_no":1,"gloss":"めったにない・珍しい"},{"sense_no":2,"gloss":"（めったにないほど）すばらしい"}],"examples":[{"gloss":"めったにない・珍しい","text":"ありがたきもの。舅にほめらるる婿。","source":"枕・ありがたき物","translation":"めったにない（＝珍しい）もの。舅（＝妻の父）にほめられる婿。","headword_form":"ありがたき"},{"gloss":"（めったにないほど）すばらしい","text":"「さ候へばこそ、世に有り難きものには侍りけれ」とていよいよ秘蔵しけり。","source":"徒然・八八段","translation":"「そうでございますから、実に（すばらしい）ものなのでございますよ」と言ってますます大切にしまっていた。","headword_form":"有り難き"}]},{"no":"042","pos":"形容詞","headword":"つきづきし","kanji":"付き付きし","senses":[{"sense_no":1,"gloss":"似つかわしい・ふさわしい"}],"examples":[{"gloss":"似つかわしい・ふさわしい","text":"家居のつきづきしく、あらまほしきこそ、仮の宿りとは思へど、興あるものなれ。","source":"徒然・十段","translation":"住居が（住んでいる人に）（似つかわしく）、理想的であるのは、（現世における）仮の宿だとは思っても、興味をそそられるものである。","headword_form":"つきづきしく"}]},{"no":"043","pos":"形容詞","headword":"なまめかし","kanji":"","senses":[{"sense_no":1,"gloss":"優美だ・上品だ"},{"sense_no":2,"gloss":"若々しい・みずみずしい"}],"examples":[{"gloss":"優美だ・上品だ","text":"《春宮は》あてになまめかしくおはします。","source":"源氏・若菜下","translation":"《皇太子は》高貴で（上品で（優美で））いらっしゃる。","headword_form":"なまめかしく"},{"gloss":"若々しい・みずみずしい","text":"《光源氏は四十歳のお祝いをお迎えになるが》なまめかしく、人の親げなくおはしますを、","source":"源氏・若菜上","translation":"《光源氏は四十歳のお祝いをお迎えになるが》（若々しく）、人の親という様子ではなくていらっしゃるので、","headword_form":"なまめかしく"}]},{"no":"044","pos":"形容詞","headword":"めでたし","kanji":"","senses":[{"sense_no":1,"gloss":"すばらしい"}],"examples":[{"gloss":"すばらしい","text":"藤の花は、しなひ長く、色濃く咲きたる、いとめでたし。","source":"枕・木の花は","translation":"藤の花は、花房のしだれが長く、色が濃く咲いているのが、とても（すばらしい）。","headword_form":"めでたし"}]},{"no":"045","pos":"形容詞","headword":"うるはし","kanji":"","senses":[{"sense_no":1,"gloss":"きちんとしている・整っている・端正だ"},{"sense_no":2,"gloss":"立派だ・美しい・見事だ"}],"examples":[{"gloss":"きちんとしている・整っている・端正だ","text":"日の装束うるはしくしたる人の、太刀帯きて笏取り、","source":"今昔・二八巻・二話","translation":"晴れの装束を（きちんと）着た人が、太刀を身につけて笏を（手に）取り、","headword_form":"うるはしく"},{"gloss":"立派だ・美しい・見事だ","text":"枇杷殿はあまり御心うるはしくすなほにて、へつらひ飾りたる小国には負はぬ御相なり。","source":"大鏡・雄々物語","translation":"枇杷殿はあまりにお気持ちが（美しく）素直で、へつらい飾った小国（＝この国）には似合わないご人相である。","headword_form":"うるはしく"}]},{"no":"046","pos":"形容詞","headword":"やむごとなし","kanji":"","senses":[{"sense_no":1,"gloss":"高貴だ・尊い"},{"sense_no":2,"gloss":"格別だ・並々でない・優れている"}],"examples":[{"gloss":"高貴だ・尊い","text":"やむごとなき人のかくれ給へるもあまた聞こゆ。","source":"方丈","translation":"（高貴な）人がお亡くなりになったということもたくさん聞こえる（＝耳にした）。","headword_form":"やむごとなき"},{"gloss":"格別だ・並々でない・優れている","text":"この大臣の御おぼえいとやむごとなきに、","source":"源氏・桐壺","translation":"","headword_form":"やむごとなき"}]},{"no":"047","pos":"形容詞","headword":"おとなし","kanji":"大人し","senses":[{"sense_no":1,"gloss":"大人らしい・大人びている・ませている"},{"sense_no":2,"gloss":"思慮分別がある・落ち着いている"},{"sense_no":3,"gloss":"主だっている・年配で中心的な立場の者である"}],"examples":[{"gloss":"大人らしい・大人びている・ませている","text":"《春宮は》十一になりたまへど、ほどより大きに大人しうきよらに、","source":"源氏・澪標","translation":"《皇太子は》十一歳におなりになるが、年齢よりも大いに（大人びていて）美しく、","headword_form":"大人しう"},{"gloss":"思慮分別がある・落ち着いている","text":"上人なほゆかしがりて、おとなしく物知りぬべき顔したる神官を呼びて、","source":"徒然・二三六段","translation":"上人はやはり知りたがって、（思慮分別があり）物を（よく）知っていそうな神官を呼んで、","headword_form":"おとなしく"},{"gloss":"主だっている・年配で中心的な立場の者である","text":"おとなしく、もどきぬべくもあらぬ人のいひ聞かするを、","source":"徒然・二三六段","translation":"（主だっている）、逆らって非難することができそうもない人が言い聞かせるのを、","headword_form":"おとなしく"}]},{"no":"048","pos":"形容詞","headword":"ゆかし","kanji":"","senses":[{"sense_no":1,"gloss":"見たい・聞きたい・知りたい"},{"sense_no":2,"gloss":"心ひかれる・慕わしい"}],"examples":[{"gloss":"見たい・聞きたい・知りたい","text":"《天香具山は》年ごろゆかしう思ひわたりし所なりければ、","source":"菅笠・下巻","translation":"《天香具山は》長年（見たいと）（＝登りたく）思い続けていた所であったので、","headword_form":"ゆかしう"},{"gloss":"心ひかれる・慕わしい","text":"山路来て何やらゆかしすみれ草","source":"野ざらし","translation":"（さびしい）山道をやってきて何やら（心ひかれる）。すみれ草よ。","headword_form":"ゆかし"}]},{"no":"049","pos":"形容詞","headword":"なつかし","kanji":"","senses":[{"sense_no":1,"gloss":"親しみ深い・心ひかれる・好ましい"}],"examples":[{"gloss":"親しみ深い・心ひかれる・好ましい","text":"《村上天皇は》なつかしうなまめきたる方は、延喜にはまさり申させたまへり。","source":"大鏡・雑々物語","translation":"《村上天皇は》（親しみ深く）優美な点では、醍醐天皇にまさり申し上げなさっている。","headword_form":"なつかしう"}]},{"no":"050","pos":"形容詞","headword":"はづかし","kanji":"恥づかし","senses":[{"sense_no":1,"gloss":"恥ずかしい・きまりが悪い〔現代語と同じ〕"},{"sense_no":2,"gloss":"（こちらが恥ずかしくなるほど相手が）立派だ"}],"examples":[{"gloss":"（こちらが恥ずかしくなるほど相手が）立派だ","text":"はづかしき人の、歌の本末問ひたるに、ふとおぼえたる、我ながらうれし。","source":"枕・うれしき物","translation":"（こちらが恥ずかしくなるほど立派な）方が、歌の上の句や下の句を尋ねたときに、ふと思い出したのは、我ながらうれしい。","headword_form":"はづかしき"}]},{"no":"051","pos":"形容詞","headword":"こころにくし","kanji":"","senses":[{"sense_no":1,"gloss":"奥ゆかしい・上品だ・心ひかれる"}],"examples":[{"gloss":"奥ゆかしい・上品だ・心ひかれる","text":"《身分が高く教養がある人の住まいというものは、》うちある調度も昔覚えてやすらかなるこそ、心にくしと見ゆれ。","source":"徒然・十段","translation":"《身分が高く教養がある人の住まいというものは、》ちょっと（置いて）ある調度も昔が思い出されて（＝古風で）落ち着いているのが、（奥ゆかしい）と思われる。","headword_form":"心にくし"}]},{"no":"052","pos":"形容詞","headword":"うつくし","kanji":"美し","senses":[{"sense_no":1,"gloss":"かわいい・いとしい"},{"sense_no":2,"gloss":"美しい〔現代語と同じ〕"}],"examples":[{"gloss":"かわいい・いとしい","text":"うつくしきもの。瓜にかきたるちごの顔。","source":"枕・うつくしき物","translation":"（かわいい）もの。瓜に描いた幼児の顔。","headword_form":"うつくしき"}]},{"no":"053","pos":"形容詞","headword":"かなし","kanji":"","senses":[{"sense_no":1,"gloss":"いとしい・かわいい"},{"sense_no":2,"gloss":"悲しい〔現代語と同じ〕"}],"examples":[{"gloss":"いとしい・かわいい","text":"《男は新しい妻を河内に持った。もとからの妻は河内に出かける男をこころよく送り出す。疑念を抱いた男は出かけるふりをして庭の植え込みに身を隠す。妻は男の向かったであろう遠く険しい山の方を見つめ、男の身を案じる歌を詠んだのだった。》（男は）限りなくかなしとおもひて、河内へも行かずなりにけり。","source":"伊勢・三段","translation":"《男はもとからの妻を》この上なく（いとしい）と思って、河内へも行かなくなってしまった。","headword_form":"かなし"}]},{"no":"054","pos":"形容詞","headword":"らうたし","kanji":"","senses":[{"sense_no":1,"gloss":"かわいい・いじらしい"}],"examples":[{"gloss":"かわいい・いじらしい","text":"《赤ちゃんが》かい付きて寝たる、いとらうたし。","source":"枕・うつくしき物","translation":"《赤ちゃんが》抱きついて寝てしまったのは、とても（かわいい）。","headword_form":"らうたし"},{"gloss":"かわいい・いじらしい","text":"《若紫は》頬つきいとらうたげにて、","source":"源氏・若紫","translation":"《若紫は》顔つきがとても（かわいらしく）て、","headword_form":"らうたげ"}]},{"no":"055","pos":"形容詞","headword":"めやすし","kanji":"目安し","senses":[{"sense_no":1,"gloss":"（見た目の）感じがよい・見苦しくない"}],"examples":[{"gloss":"（見た目の）感じがよい・見苦しくない","text":"《女房は》髪ゆるるかに、いと長く、めやすき人なめり。","source":"源氏・若紫","translation":"《女房は》髪がゆったりと（して）、とても長く、（感じがよい）人であるようだ。","headword_form":"めやすき"}]},{"no":"056","pos":"形容詞","headword":"あやし","kanji":"怪し／賤し","senses":[{"sense_no":1,"gloss":"不思議だ・変だ・妙だ"},{"sense_no":2,"gloss":"身分が低い・卑しい"},{"sense_no":3,"gloss":"粗末だ・みすぼらしい"}],"examples":[{"gloss":"不思議だ・変だ・妙だ","text":"ただ文字一つに、あやしう、あてにもいやしうもなるは","source":"枕","translation":"ただ文字一つで、（不思議に）品にも下品にもなるのは、どういうことであろうか。","headword_form":"あやしう"},{"gloss":"身分が低い・卑しい","text":"あやしの身には得がたき物にて、","source":"発心・第六七","translation":"（身分が低い）わが身には手に入れにくい物で、","headword_form":"あやしの"},{"gloss":"粗末だ・みすぼらしい","text":"あやしき舟どもに柴刈り積み、","source":"源氏・橋姫","translation":"（粗末な）舟に木の枝を刈って積み、","headword_form":"あやしき"}]},{"no":"057","pos":"形容詞","headword":"さうざうし","kanji":"","senses":[{"sense_no":1,"gloss":"もの足りない・さびしい"}],"examples":[{"gloss":"もの足りない・さびしい","text":"帝、さうざうしとや思し召しけむ、殿上に出でさせおはしまして、","source":"大鏡・道長","translation":"帝は、（もの足りない）とお思いになったのだろうか、殿上の間に出ていらっしゃって、","headword_form":"さうざうし"}]},{"no":"058","pos":"形容詞","headword":"つれなし","kanji":"連れ無し","senses":[{"sense_no":1,"gloss":"平然としている・平気だ"},{"sense_no":2,"gloss":"冷淡だ・薄情だ"}],"examples":[{"gloss":"平然としている・平気だ","text":"つれなく、なにとも思ひたらぬさまにて、たゆめ過ぐすも、またをかし。","source":"枕・うれしき物","translation":"まったく（平然として）、なんとも思っていない様子で、（相手を）油断させ過ごすのも、またおもしろい。","headword_form":"つれなく"},{"gloss":"冷淡だ・薄情だ","text":"をとこ、つれなかりける女にいひやりける。","source":"伊勢・五四段","translation":"男が、（自分に）（冷淡だっ）た女に言い贈った（歌）。","headword_form":"つれなかり"}]},{"no":"059","pos":"形容詞","headword":"なめし","kanji":"","senses":[{"sense_no":1,"gloss":"無礼だ"}],"examples":[{"gloss":"無礼だ","text":"ことばなめき人こそいとにくけれ。","source":"枕・こと葉なめき人こそ","translation":"〓の言葉が（無礼な）人はほんとうに気にくわない。","headword_form":"なめき"}]},{"no":"060","pos":"形容詞","headword":"おどろおどろし","kanji":"","senses":[{"sense_no":1,"gloss":"大げさだ・仰々しい"},{"sense_no":2,"gloss":"気味が悪い・恐ろしい"}],"examples":[{"gloss":"大げさだ・仰々しい","text":"夜いたくふけて、門をいたうおどろおどろしうたたけば、","source":"大鏡・道長","translation":"夜がひどく更けて、門をとても（大げさに）たたくので、","headword_form":"おどろおどろしう"},{"gloss":"気味が悪い・恐ろしい","text":"おどろおどろしくかきたれ雨の降る夜、","source":"枕・里にまかでたるに","translation":"（気味悪く）激しく雨の降る夜、","headword_form":"おどろおどろしく"}]},{"no":"061","pos":"形容詞","headword":"うし","kanji":"憂し","senses":[{"sense_no":1,"gloss":"つらい・いやだ・情けない"}],"examples":[{"gloss":"つらい・いやだ・情けない","text":"今日よりはうき世の中をいかでわたらむ。","source":"大和・一五七段","translation":"今日からは（つらい）世の中をどうして渡ってゆけばいいのだろう。","headword_form":"うき"}]},{"no":"062","pos":"形容詞","headword":"むつかし","kanji":"","senses":[{"sense_no":1,"gloss":"不快だ・煩わしい・うっとうしい"},{"sense_no":2,"gloss":"気味が悪い・恐ろしい"}],"examples":[{"gloss":"不快だ・煩わしい・うっとうしい","text":"女君は、暑くむつかしとて、御髪すまして、","source":"源氏・若菜下","translation":"女君（＝紫の上）は、「暑く、（うっとうしい）」と言って、御髪を洗って、","headword_form":"むつかし"},{"gloss":"気味が悪い・恐ろしい","text":"奥の方は暗うものむつかしと、女は思ひたれば、","source":"源氏・夕顔","translation":"《光源氏は女（＝夕顔）をある荒れ果てた院に連れていった。》奥の方は暗くなんとなく（気味が悪い）と、女は思っているので、","headword_form":"むつかし"}]},{"no":"063","pos":"形容詞","headword":"すさまじ","kanji":"","senses":[{"sense_no":1,"gloss":"興ざめだ・おもしろくない・しらけている"},{"sense_no":2,"gloss":"殺風景だ・寒々としている・荒涼とした"}],"examples":[{"gloss":"興ざめだ・おもしろくない・しらけている","text":"すさまじきもの。昼ほゆる犬、春の網代。","source":"枕・すさまじき物","translation":"（興ざめな）もの。昼ほえる犬、春の網代。","headword_form":"すさまじき"},{"gloss":"殺風景だ・寒々としている・荒涼とした","text":"冬の夜の月は、昔よりすさまじき物の例にひかれて侍りけるに、","source":"更級","translation":"冬の夜の月は、昔から（殺風景な）（寒々とした）物の例として引かれて","headword_form":"すさまじき"}]},{"no":"064","pos":"形容詞","headword":"びんなし","kanji":"便無し","senses":[{"sense_no":1,"gloss":"不都合だ・具合が悪い・いたわしい"},{"sense_no":2,"gloss":"気の毒だ"}],"examples":[{"gloss":"不都合だ・具合が悪い・いたわしい","text":"左の大臣の、一の人といひながら、美麗ことのほかにて参れる、びんなきことなり。","source":"大鏡・時平","translation":"《帝はぜいたくを禁じていた。》左大臣（＝藤原時平）が、最高の身分の人とはいいながらも、ことのほか華美な衣服で参内したのは、（不都合な）ことである。","headword_form":"びんなき"}]},{"no":"065","pos":"形容詞","headword":"いとほし","kanji":"","senses":[{"sense_no":1,"gloss":"気の毒だ・かわいそうだ"},{"sense_no":2,"gloss":"いとしい・かわいい"}],"examples":[{"gloss":"気の毒だ・かわいそうだ","text":"翁をいとほし、かなしと思しつることも失せぬ。","source":"竹取・かぐや姫の昇天","translation":"（かぐや姫は）翁を（気の毒だ）、いとしいとお思いになっていたこと（＝気持ち）もなくなってしまった。","headword_form":"いとほし"},{"gloss":"気の毒だ・かわいそうだ","text":"「きのふの価かへしくれたびてんや」と侘びぬ。いとほしうて、許しやりぬ。","source":"落柿舎","translation":"（買った人が）「昨日の代金を返してくださいませんか」と嘆いて、とても（気の毒な）ので、（わたしは）許して（＝返して）やった。","headword_form":"いとほしう"}]},{"no":"066","pos":"形容詞","headword":"いはけなし","kanji":"","senses":[{"sense_no":1,"gloss":"幼い・あどけない・子どもっぽい"}],"examples":[{"gloss":"幼い・あどけない・子どもっぽい","text":"若紫が、いはけなくかいやりたる額つき、髪ざし、いみじううつくし。","source":"源氏・若紫","translation":"（若紫が）（子どもっぽく）（髪を）かきあげた額のようす、髪のはえ具合が、とてもかわいらしい。","headword_form":"いはけなく"}]},{"no":"067","pos":"形容詞","headword":"つらし","kanji":"辛し","senses":[{"sense_no":1,"gloss":"薄情だ・冷淡だ"},{"sense_no":2,"gloss":"つらい（現代語と同じ）"}],"examples":[{"gloss":"薄情だ・冷淡だ","text":"つらくもおはしますかな。","source":"源氏・少女","translation":"《部屋に閉じ込められて勉強を強いられて…ことをこう思った。》（父上は）（薄情で）いらっしゃるなあ。","headword_form":"つらく"}]},{"no":"068","pos":"形容詞","headword":"ところせし","kanji":"所狭し","senses":[{"sense_no":1,"gloss":"（物理的に）窮屈だ・（窮屈なほどその場に）あふれている"},{"sense_no":2,"gloss":"（心理的に）窮屈だ・気詰まりだ"},{"sense_no":3,"gloss":"仰々しい・大げさだ"}],"examples":[{"gloss":"（物理的に）窮屈だ・（窮屈なほどその場に）あふれている","text":"小さき屋ども作り集めて奉り給へるを、ところせきまで遊び広げ給ふ。","source":"源氏・紅葉賀","translation":"（光源氏が人形の）小さな家をたくさん作り集めて差し上げなさったのを、（紫の上は）（窮屈な）ほど広げて遊んでいらっしゃる。","headword_form":"ところせき"},{"gloss":"（心理的に）窮屈だ・気詰まりだ","text":"かかる有様もならひ給はず、ところせき御身にて、珍しう思されけり。","source":"源氏・若紫","translation":"《病気になった光源氏は加持祈祷を受けるため北山の寺へ赴いた。》（光源氏は）このような（山の）様子にもなじみなさっていなく、（簡単には外出できない）（窮屈な）ご身分で、（山の景色を）珍しいとお思いになった。","headword_form":"ところせき"}]},{"no":"069","pos":"形容詞","headword":"うしろめた（な）し","kanji":"","senses":[{"sense_no":1,"gloss":"気がかりだ"}],"examples":[{"gloss":"気がかりだ","text":"いとはかなうものし給ふこそ、あはれにうしろめたけれ。","source":"源氏・若紫","translation":"《尼君は若紫の髪をなでながら言った。》（あなたが）とても頼りなくていらっしゃるのが、かわいそうで（気がかりだ）。","headword_form":"うしろめたけれ"}]},{"no":"070","pos":"形容詞","headword":"かたはらいたし","kanji":"傍ら痛し","senses":[{"sense_no":1,"gloss":"きまり悪い・恥ずかしい"},{"sense_no":2,"gloss":"苦々しい・腹立たしい・見苦しい・聞き苦しい"},{"sense_no":3,"gloss":"気の毒だ・心苦しい"}],"examples":[{"gloss":"きまり悪い・恥ずかしい","text":"御前にて申すはかたはらいたき事には候へども、","source":"今昔・二三巻・八話","translation":"《平中（＝平貞文）は大臣に言う。》（大臣の）御前で申し上げるのは（きまり悪い）ことではございますが、","headword_form":"かたはらいたき"},{"gloss":"苦々しい・腹立たしい・見苦しい・聞き苦しい","text":"すべていとも知らぬ道の物がたりしたる、かたはらいたく聞きにくし。","source":"徒然・五七段","translation":"何ごともあまり知らない方面の話をしているのは、（苦々しく）（みっともなく）聞きづらい。","headword_form":"かたはらいたく"},{"gloss":"気の毒だ・心苦しい","text":"すのこはかたはらいたければ、南のひさしに入れ奉る。","source":"源氏・朝顔","translation":"縁側（にお座りいただくの）は（気の毒な）ので、南の廂の間に（源氏を）お入れ申し上げる。","headword_form":"かたはらいたけれ"}]},{"no":"071","pos":"形容詞","headword":"わりなし","kanji":"","senses":[{"sense_no":1,"gloss":"道理に合わない・ひどい・無理やりだ"},{"sense_no":2,"gloss":"しかたがない・どうしようもない"},{"sense_no":3,"gloss":"苦しい・つらい・困っている"}],"examples":[{"gloss":"道理に合わない・ひどい・無理やりだ","text":"わりなくものうたがひする男にいみじう思はれたる女。","source":"枕・くるしげなる物","translation":"（ひどく）もの疑いをする（＝疑い深い）男にとても愛された女。","headword_form":"わりなく"},{"gloss":"しかたがない・どうしようもない","text":"わりなうおぼし乱れぬべし。","source":"枕・清涼殿のうしとらのすみの","translation":"きっと（どうしようもなく）思い乱れなさるにちがいない。","headword_form":"わりなう"},{"gloss":"苦しい・つらい・困っている","text":"一昨日より腹を病みて、いとわりなければ、","source":"源氏・空蝉","translation":"おとといから腹が痛くて、とても（苦しい）ので、","headword_form":"わりなけれ"}]},{"no":"072","pos":"形容詞","headword":"本意なし","kanji":"本意なし","senses":[{"sense_no":1,"gloss":"不本意だ・残念だ"}],"examples":[{"gloss":"不本意だ・残念だ","text":"人の語りいでたる歌物語の、歌のわろきこそほいなけれ。","source":"徒然・五七段","translation":"人が語り始めた歌物語で、歌のよくないのは（残念だ）。","headword_form":"ほいなけれ"}]},{"no":"073","pos":"形容詞","headword":"あさまし","kanji":"","senses":[{"sense_no":1,"gloss":"驚くほどだ"},{"sense_no":2,"gloss":"あきれるほどだ"},{"sense_no":3,"gloss":"情けない・嘆かわしい"}],"examples":[{"gloss":"驚くほどだ","text":"このゐたる犬のふるひわななきて、涙をただおとしにおとすに、いとあさまし。","source":"枕・うへにさぶらふ御ねこは","translation":"このうずくまっていた犬がぶるぶる震えて、涙をただ落としに落とすので、ほんとうに（驚くほどだ）。","headword_form":"あさまし"}]},{"no":"074","pos":"形容詞","headword":"めざまし","kanji":"目覚まし","senses":[{"sense_no":1,"gloss":"気にくわない・目障りだ"},{"sense_no":2,"gloss":"すばらしい・立派だ"}],"examples":[{"gloss":"気にくわない・目障りだ","text":"《新しく桐壺の帝のもとに入内してきた桐壺の更衣に対して》はじめより我はと思ひ上がり給へる御方々、めざましきものにおとしめそねみ給ふ。","source":"源氏・桐壺","translation":"はじめから我こそはと思い上がりなさっていた方々は（桐壺の更衣を）（気にくわない）者としてさげすみ、ねたみなさる。","headword_form":"めざましき"}]},{"no":"075","pos":"形容詞","headword":"いみじ","kanji":"","senses":[{"sense_no":1,"gloss":"とてもよい・すばらしい"},{"sense_no":2,"gloss":"とても悪い・ひどい"},{"sense_no":3,"gloss":"《いみじく（う）》の形で副詞的に用いて）とても・はなはだしく"}],"examples":[{"gloss":"とてもよい・すばらしい","text":"世は定めなきこそ、いみじけれ。","source":"徒然・七段","translation":"この世は無常であるからこそ、（すばらしい）。","headword_form":"いみじけれ"},{"gloss":"とても悪い・ひどい","text":"あないみじ。犬を蔵人二人してうち給ふ。死ぬべし。","source":"","translation":"","headword_form":"いみじ"}]},{"no":"076","pos":"形容詞","headword":"ゆゆし","kanji":"","senses":[{"sense_no":1,"gloss":"不吉だ・縁起が悪い・恐ろしい"},{"sense_no":2,"gloss":"とてもよい・すばらしい・立派だ"},{"sense_no":3,"gloss":"《ゆゆしく（う）》の形で副詞的に用いて）とても・はなはだしく"}],"examples":[{"gloss":"不吉だ・縁起が悪い・恐ろしい","text":"《桐壺の更衣（＝光源氏の母）の母は娘を亡くして》ゆゆしき身にはべれば、","source":"源氏・桐壺","translation":"（わたしは娘に先立たれて）（不吉な）身でございますので、","headword_form":"ゆゆしき"},{"gloss":"とてもよい・すばらしい・立派だ","text":"ゆゆしかりける者どもの心の大きさ広さかな。","source":"宇治・巻三九話","translation":"（すばらしかっ）た者たちの心の大きさ広さだなあ（＝すばらしい、心の大きさ・広さをもった者たちだなあ）。","headword_form":"ゆゆしかり"},{"gloss":"《ゆゆしく（う）》の形で副詞的に用いて）とても・はなはだしく","text":"各々拝みて、ゆゆしく信おこしたり。","source":"徒然・二三六段","translation":"それぞれが拝んで、（はなはだしく）信仰心を起こした。","headword_form":"ゆゆしく"}]},{"no":"077","pos":"形容詞","headword":"やさし","kanji":"恥し・優し","senses":[{"sense_no":1,"gloss":"恥ずかしい・きまり悪い"},{"sense_no":2,"gloss":"優美だ・上品だ・風流だ"},{"sense_no":3,"gloss":"けなげだ・殊勝だ・感心だ"}],"examples":[{"gloss":"恥ずかしい・きまり悪い","text":"昨日今日御門ののたまはむことにつかむ、人聞きやさし。","source":"竹取・御門の求婚","translation":"昨日今日、帝のおっしゃることに付き従うようなこと（＝帝の求婚に応じること）は、人聞きが（恥ずかしい）（＝人聞きが悪い）。","headword_form":"やさし"},{"gloss":"優美だ・上品だ・風流だ","text":"いと若やかに愛敬づき、やさしきところ添ひたり。","source":"源氏・蜻蛉","translation":"（宮の君は）実に若々しくかわいらしく、さらに（上品な）ところもある。","headword_form":"やさしき"},{"gloss":"けなげだ・殊勝だ・感心だ","text":"《味方の軍勢はみな落ち延びたのに、実盛ただ一人敵と交戦するために残った。》あなやさし。","source":"平家・巻七","translation":"ああ、（殊勝だ）（＝なんと、感心なことだ）。","headword_form":"やさし"}]},{"no":"078","pos":"形容詞","headword":"しるし","kanji":"著し","senses":[{"sense_no":1,"gloss":"はっきりと分かる・はっきりしている"},{"sense_no":2,"gloss":"《〜もしるく》の形で）〜（の）とおりに"}],"examples":[{"gloss":"はっきりと分かる・はっきりしている","text":"東よりの使ひ帰り来たる気色しるけれど、","source":"増鏡・十六巻","translation":"関東からの使者が帰ってきた様子は（はっきりと分かる）が、","headword_form":"しるけれ"},{"gloss":"《〜もしるく》の形で）〜（の）とおりに","text":"《亡くなった御息所の姉にあたる方は、一生結婚はしないと言っておられた。》世とともにいひけるもしるく、男もせで、二十九にてなむ、うせたまひにける。","source":"大和・一四三段","translation":"常に言っていた（とおりに）、夫ももたないで、二十九歳で、お亡くなりになってしまいました。","headword_form":"しるく"}]},{"no":"079","pos":"形容詞","headword":"とし","kanji":"疾し","senses":[{"sense_no":1,"gloss":"早い・速い"}],"examples":[{"gloss":"早い・速い","text":"梅は白き、うす紅梅、一重なるがとく咲きたるも、重なりたる紅梅の、匂ひめでたきも、みなをかし。","source":"徒然・一三九段","translation":"梅は白いのも、薄紅梅色のも、一重の梅で（早く）咲いたのも、八重の紅梅で、色美しく咲いたのも、みなすばらしい。","headword_form":"とく"}]},{"no":"080","pos":"形容詞","headword":"ゆくりなし","kanji":"","senses":[{"sense_no":1,"gloss":"突然だ・思いがけない"}],"examples":[{"gloss":"突然だ・思いがけない","text":"眺めつつ来る間に、ゆくりなく風吹きて、","source":"土佐・二月五日","translation":"もの思いにふけりながら（舟を漕いで）来るうちに、（突然に）風が吹いて、","headword_form":"ゆくりなく"}]},{"no":"081","pos":"形容詞","headword":"おぼつかなし","kanji":"覚束無し","senses":[{"sense_no":1,"gloss":"はっきりしない"},{"sense_no":2,"gloss":"気がかりだ・不安だ"},{"sense_no":3,"gloss":"待ち遠しい・じれったい"}],"examples":[{"gloss":"はっきりしない","text":"小町が盛りなる事、その後のことにや、なほおぼつかなし。","source":"徒然・一七三段","translation":"（小野小町が）（若くて女）盛りであったのは、その（弘法大師の亡くなられた）後のことだろうか、やはり（はっきりしない）。","headword_form":"おぼつかなし"},{"gloss":"気がかりだ・不安だ","text":"《昔、ある僧が大納言家の法事に招かれたが、少し顔色が悪く、》やや久しく物もいはでありければ、人どもおぼつかなく思ひける程に、","source":"宇治・巻二十一話","translation":"（僧は）かなりの間ものも言わないでいたので、人々は（気がかりに）思っていたときに、","headword_form":"おぼつかなく"}]},{"no":"082","pos":"形容詞","headword":"こころもとなし","kanji":"心許無し","senses":[{"sense_no":1,"gloss":"はっきりしない・かすかだ"},{"sense_no":2,"gloss":"気がかりだ・不安だ"},{"sense_no":3,"gloss":"待ち遠しい・じれったい"}],"examples":[{"gloss":"はっきりしない・かすかだ","text":"花びらの端に、をかしきにほひこそ、こころもとなうつきためれ。","source":"枕・木の花は","translation":"花びらの端に、美しい色つやが、（かすかに）ついているようだ。","headword_form":"こころもとなう"},{"gloss":"気がかりだ・不安だ","text":"こころもとなき日数重なるままに、白河の関にかかりて、旅心定まりぬ。","source":"奥の細道・白河の関","translation":"（不安な）日々が重なるうちに、白河の関にさしかかって、ようやく旅の覚悟が定まった。","headword_form":"こころもとなき"},{"gloss":"待ち遠しい・じれったい","text":"《作者はやっと念願の『源氏物語』を叔母からもらった。》わづかに見つつ心も得ずこころもとなく思ふ源氏を、一の巻よりして、（中略）","source":"","translation":"少し見て内容も分からず（じれったく）思っていた『源氏物語』を、最初の巻からはじめて、","headword_form":"こころもとなく"}]},{"no":"083","pos":"形容動詞","headword":"あはれなり","kanji":"","senses":[{"sense_no":1,"gloss":"しみじみと心に深く感じられる"},{"sense_no":2,"gloss":"かわいい"}],"examples":[{"gloss":"しみじみと心に深く感じられる","text":"あはれなりつる心のほどなむ忘れむ世あるまじき。","source":"更級","translation":"（心に深く感じられ）た（あなたの）心は忘れるときはないでしょう。","headword_form":"あはれなり"},{"gloss":"かわいい","text":"あはれなる人を見つるかな。","source":"源氏・若紫","translation":"（かわいい）人を見たものだなあ。","headword_form":"あはれなる"}]},{"no":"084","pos":"形容動詞","headword":"つれづれなり","kanji":"徒然なり","senses":[{"sense_no":1,"gloss":"（することもなく）退屈である・所在ない"},{"sense_no":2,"gloss":"（しんみりと）ものさびしい"}],"examples":[{"gloss":"（することもなく）退屈である・所在ない","text":"日もいと長きに、つれづれなれば、（光源氏は）夕暮れのいたう霞みたるに紛れて、かの小柴垣のもとに立ち出で給ふ。","source":"源氏・若紫","translation":"春の日も大変長く、（することもなく）（退屈である）ので、（光源氏は）夕方の立ちこめた霞に紛れて、あの小柴垣の所に出て行きなさる。","headword_form":"つれづれなれ"},{"gloss":"（しんみりと）ものさびしい","text":"そこはかとなく、つれづれに心細うのみ覚ゆるを、","source":"源氏・末摘花","translation":"なんとなく、（しんみりと）（ものさびしく）心細いとだけ思われるので、","headword_form":"つれづれに"}]},{"no":"085","pos":"形容動詞","headword":"すずろなり・そぞろなり","kanji":"漫ろなり","senses":[{"sense_no":1,"gloss":"なんということ（わけ）もない"},{"sense_no":2,"gloss":"思いがけない"},{"sense_no":3,"gloss":"むやみやたらだ"}],"examples":[{"gloss":"なんということ（わけ）もない","text":"昔、男、すずろに陸奥の国までまどひいにけり。","source":"伊勢・二六段","translation":"昔、男が、（なんというわけもなく）陸奥の国までさまよい出かけた。","headword_form":"すずろに"},{"gloss":"思いがけない","text":"心細く、すずろなる目を見ることと思ふに、","source":"伊勢・九段","translation":"なんとなく心細く、（思いがけない）目に遭うことだと思うと、","headword_form":"すずろなる"},{"gloss":"むやみやたらだ","text":"すずろに言ひ散らすは、さばかりの才にはあらぬにや。","source":"徒然・六六段","translation":"（むやみやたらに）言い散らすのは、それほどの学識ではないのでは（ないだろうか）。","headword_form":"すずろに"}]},{"no":"086","pos":"形容動詞","headword":"まめなり・まめやかなり","kanji":"実なり・忠実なり／実やかなり・忠実やかなり","senses":[{"sense_no":1,"gloss":"まじめである・誠実である"},{"sense_no":2,"gloss":"実用的である"}],"examples":[{"gloss":"まじめである・誠実である","text":"大方の人がらまめやかに、あだめきたる所なく、","source":"源氏・少女","translation":"おおよその人柄は（まじめで）、浮いたところがなく、","headword_form":"まめやかに"},{"gloss":"実用的である","text":"小舎人童を走らせて、すなはち、車にてまめなる物、さまざまにももて来たり。","source":"大和・一七三段","translation":"小舎人童（＝召し使いの少年）を走らせて、すぐに、牛車で（実用的な）もの（＝生活に直接必要なもの）を、いろいろと持って来た。","headword_form":"まめなる"}]},{"no":"087","pos":"形容動詞","headword":"あだなり","kanji":"徒なり","senses":[{"sense_no":1,"gloss":"はかない・頼りにならない・もろい"},{"sense_no":2,"gloss":"誠実さがない・浮ついている・浮気だ"}],"examples":[{"gloss":"はかない・頼りにならない・もろい","text":"命をばあだなるものと聞きしかどつらきがためは長くもあるかな","source":"新古今・一三六三","translation":"人の命とは（はかない）ものと聞いていたけれども、つらい（恋をしているわたし）にとっては長く思われることだなあ。","headword_form":"あだなる"},{"gloss":"誠実さがない・浮ついている・浮気だ","text":"あだなる男の形見とて置きたる物どもを見て、","source":"伊勢・二九段","translation":"（女は）（浮気な）男が形見だと言って残した品々を見て、","headword_form":"あだなる"}]},{"no":"088","pos":"形容動詞","headword":"いたづらなり","kanji":"徒らなり","senses":[{"sense_no":1,"gloss":"役に立たない・むだだ・かいがない"},{"sense_no":2,"gloss":"むなしい・はかない"}],"examples":[{"gloss":"役に立たない・むだだ・かいがない","text":"（水車を）とかく直しけれどもつひに回らでいたづらに立てりけり。","source":"徒然・五一段","translation":"（水車を）あれこれ修理したけれどもとうとう回らないで（役にも立たず）（むなしく）立っていた。","headword_form":"いたづらに"},{"gloss":"むなしい・はかない","text":"かく濡れ濡れ参りて、いたづらに帰らむ愁へを、姫君の御方に聞こえて、","source":"源氏・橋姫","translation":"このように（露に）濡れて参上して、（むなしく）姫君のもとに帰るつらさを、姫君のもとに申し上げて、（会えず）","headword_form":"いたづらに"}]},{"no":"089","pos":"形容動詞","headword":"いうなり","kanji":"優なり","senses":[{"sense_no":1,"gloss":"優れている・すばらしく立派だ"},{"sense_no":2,"gloss":"上品で美しい・優雅である"}],"examples":[{"gloss":"優れている・すばらしく立派だ","text":"（花山院が）遊ばしたる和歌はいづれも人の口に乗らぬなく、優にこそ承れな。","source":"大鏡・伊尹","translation":"（花山院が）お詠みになった和歌はどれも人に口ずさまれないものはなく、（優れている）とお聞きしていますよ。","headword_form":"優に"},{"gloss":"上品で美しい・優雅である","text":"内侍所の御鈴の音は、めでたく優なるものなり。","source":"徒然・二三段","translation":"内侍所の（女官が鳴らす）鈴の音は、すばらしく（優雅な）ものである。","headword_form":"優なる"}]},{"no":"090","pos":"形容動詞","headword":"あてなり","kanji":"貴なり","senses":[{"sense_no":1,"gloss":"高貴である・身分が高い"},{"sense_no":2,"gloss":"気品がある・上品である"}],"examples":[{"gloss":"高貴である・身分が高い","text":"世界の男、貴なるも賤しきも、いかでこのかぐや姫を得てしがな見てしがなと、音に聞きめでてまどふ。","source":"竹取・かぐや姫の生ひ立ち","translation":"世の中の男は、（高貴な）人も身分の低い人も、なんとかしてこのかぐや姫を妻にしたい、会いたいと、噂を聞き心ひかれて夢中になる。","headword_form":"貴なる"},{"gloss":"気品がある・上品である","text":"四十余ばかりにて、いと白うあてに、やせたれど、","source":"源氏・若紫","translation":"（尼君は）四十過ぎくらいで、とても色が白く（上品で）、やせているけれど、","headword_form":"あてに"}]},{"no":"091","pos":"形容動詞","headword":"あからさまなり","kanji":"","senses":[{"sense_no":1,"gloss":"（「あからさまに」の形で）ほんのちょっと・一時的に"}],"examples":[{"gloss":"（「あからさまに」の形で）ほんのちょっと・一時的に","text":"入らせ給はぬさきに雪降らなむ。この御前の有様、いかにをかしからむ」と思ふに、あからさまにまかでたるほど、二日ばかりありてしも雪は降るものか。","source":"紫式部","translation":"「中宮様が宮中にお帰りにならない前に雪が降ってほしい。（雪が降ったら中宮様のお部屋の前の庭は、どんなに趣があることだろう」と思ううちに、（わたしが）（ほんのちょっと）（実家に）退出した間に、二日ほどして雪が降るではないか。","headword_form":"あからさまに"}]},{"no":"092","pos":"形容動詞","headword":"みそかなり","kanji":"密かなり","senses":[{"sense_no":1,"gloss":"（「みそかに」の形で）ひそかに・こっそりと"}],"examples":[{"gloss":"（「みそかに」の形で）ひそかに・こっそりと","text":"六月二十二日の夜、あさましくさぶらひしことは、（花山院は）人にも知らせたまはで、みそかに花山寺におはしまして、御出家入道せさせたまへりしこそ、","source":"大鏡・花山院","translation":"六月二十二日の夜に、驚きあきれましたことには、（花山院は）誰にもお知らせになられずに、（ひそかに）花山寺にいらっしゃって、ご出家入道なさったのですよ、","headword_form":"みそかに"}]},{"no":"093","pos":"形容動詞","headword":"おろかなり","kanji":"疎かなり","senses":[{"sense_no":1,"gloss":"いい加減だ・疎略だ"},{"sense_no":2,"gloss":"並ひととおりだ"},{"sense_no":3,"gloss":"（「〜とはおろかなり」などの形で）（〜という言葉では）言い尽くせない"}],"examples":[{"gloss":"いい加減だ・疎略だ","text":"帝の御使ひをばいかでかおろかにせむ。","source":"竹取・御狩のみゆき","translation":"帝からの使者をどうして（いい加減に）するだろうか。","headword_form":"おろかに"},{"gloss":"並ひととおりだ","text":"年頃はおろかならず頼みて過ぐしつるに、","source":"今鏡・昔語第九","translation":"この数年は（並ひととおりで）なく信頼して過ごしてきたのに、","headword_form":"おろかならず"},{"gloss":"（「〜とはおろかなり」などの形で）（〜という言葉では）言い尽くせない","text":"恐ろしなんどもおろかなり。","source":"平家・巻十一","translation":"恐ろしいなどという言葉では（言い尽くせない）。","headword_form":"おろかなり"}]},{"no":"094","pos":"形容動詞","headword":"をこなり","kanji":"痴なり・烏許なり・尾籠なり","senses":[{"sense_no":1,"gloss":"愚かだ・まぬけだ・ばかばかしい"}],"examples":[{"gloss":"愚かだ・まぬけだ・ばかばかしい","text":"義仲、をこの者で候ふ。ただ今朝敵になり候ひなんず。急ぎ追討せさせ給へ」と申しければ、","source":"平家・巻八","translation":"（後白河法皇に向かって）平知康は「木曽義仲は、（愚か）な者でございます。すぐにも朝廷に反逆する者になるでしょう。急いで（義仲を）追討する命をお出しください」と申し上げたので、","forms":["をこ"]},{"gloss":"愚かだ・まぬけだ・ばかばかしい","text":"虚言をねんごろに信じたるもをこがましく、","source":"徒然・七三段","translation":"嘘を心底から信じているのも（ばかばかしく）、","forms":["をこがましく"]}]},{"no":"095","pos":"形容動詞","headword":"むげなり","kanji":"無下なり","senses":[{"sense_no":1,"gloss":"ひどい・最低最悪だ"},{"sense_no":2,"gloss":"（「むげに」の形で副詞的に用いて）むやみに・ひどく"}],"examples":[{"gloss":"ひどい・最低最悪だ","text":"賤しの田舎人なれども、みなさやうのことは知りたるものを。かの郡司は無下なりける奴かな。","source":"今昔・巻二八七語","translation":"卑しい田舎者であっても、誰もみなそれくらいのことは知っているのに。あの郡司は（ひどかっ）た奴だなあ（＝ひどい奴だったなあ）。","headword_form":"無下なりける"},{"gloss":"（「むげに」の形で副詞的に用いて）むやみに・ひどく","text":"むげに思ひしをれて、心細かりければ、","source":"源氏・帚木","translation":"（ひどく）気落ちして、心細かったので、","headword_form":"むげに"}]},{"no":"096","pos":"形容動詞","headword":"なかなかなり","kanji":"中々なり","senses":[{"sense_no":1,"gloss":"中途半端だ・どっちつかずだ"},{"sense_no":2,"gloss":"かえってしないほうがよい・かえってないほうがましだ"}],"examples":[{"gloss":"中途半端だ・どっちつかずだ","text":"七日が程の御有様、書きつづくるもなかなかなれば、えもまねばず。","source":"栄花・さまざまのよろこび","translation":"（出産後）七日ほどの（たくさんのお祝いの儀式の）ご様子を、書き続けるのも（中途半端である）ので、そのまま（すべてをここに）書き記すことはできない。","headword_form":"なかなかなれ"},{"gloss":"かえってしないほうがよい・かえってないほうがましだ","text":"さる言には、何のいらへをかせむ。なかなかならむ。","source":"枕・五月ばかり","translation":"あんな（すばらしい）言葉には、どんな返事をすることができようか。（かえってしないほうがよい）だろう。","headword_form":"なかなかならむ"},{"gloss":"かえってしないほうがよい・かえってないほうがましだ","text":"「御忘れ形見もなかなかなる御もの思ひの催しぐさなりや」と、おぼしめすらむかし。","source":"源家長日記","translation":"若宮が参上なさったときには、（若宮という）忘れ形見も（かえってないほうがましな）物思いを引き起こすもとであるよ」と、（上皇は）お思いになっていることだろうよ。","headword_form":"なかなかなる"}]},{"no":"097","pos":"名詞","headword":"て","kanji":"手","senses":[{"sense_no":1,"gloss":"字・筆跡"},{"sense_no":2,"gloss":"（楽器の）演奏法・曲"},{"sense_no":3,"gloss":"手段・方法・やり方"},{"sense_no":4,"gloss":"傷・負傷"}],"examples":[{"gloss":"字・筆跡","text":"手のわろき人の、はばからず文書きちらすはよし。","source":"徒然・三五段","translation":"〔字〕の下手な人が、（下手なことを）少しも気にかけずに手紙をどんどん書くのはよいものである。","headword_form":"手"},{"gloss":"（楽器の）演奏法・曲","text":"父が弾く手、一つ残さず習ひとり。","source":"宇津保・俊蔭","translation":"（娘は）父が弾く（琴の）（演奏法）は、一つ残らず習得した。","headword_form":"手"}]},{"no":"098","pos":"名詞","headword":"ふみ","kanji":"文・書","senses":[{"sense_no":1,"gloss":"手紙"},{"sense_no":2,"gloss":"漢詩・漢文・漢学・漢籍〔漢文の書物〕"}],"examples":[{"gloss":"手紙","text":"文に思ひける事どもの限り多う書きて取らせたりければ、","source":"平中・一八段","translation":"《平中は女に恋文を送っても色よい返事がないので、》（手紙）に思ったことのすべてをたくさん書いて与えたので、","headword_form":"文"},{"gloss":"漢詩・漢文・漢学・漢籍〔漢文の書物〕","text":"「長恨歌」といふ文を、物語に書きてあるところあんなり。","source":"更級","translation":"（白楽天の）「長恨歌」という（漢詩）を、物語に書いて（持って）いる人がいるそうだ。","headword_form":"文"}]},{"no":"099","pos":"名詞","headword":"せうそこ","kanji":"消息","senses":[{"sense_no":1,"gloss":"手紙"},{"sense_no":2,"gloss":"訪問の申し入れ・訪問のあいさつ"}],"examples":[{"gloss":"手紙","text":"心に忘れずながら、消息などもせで久しくはべりしに、","source":"源氏・帚木","translation":"（女のことを）心の中では忘れていないながら、長く（会わないで）いましたところ、（手紙）などもやら","headword_form":"消息"},{"gloss":"訪問の申し入れ・訪問のあいさつ","text":"消息を言ひ入るれど、なにのかひなし。","source":"大和・一〇二段","translation":"（家の中の者に）（訪問の申し入れ）をしてみるが、なんのかいもない。","headword_form":"消息"}]},{"no":"100","pos":"名詞","headword":"あそび","kanji":"遊び","senses":[{"sense_no":1,"gloss":"遊び〔楽しむこと〕〔現代語と同じ〕"},{"sense_no":2,"gloss":"管弦の遊び〔音楽を楽しむこと〕"}],"examples":[{"gloss":"管弦の遊び〔音楽を楽しむこと〕","text":"あはれがらせ給ひて、ものもきこしめさず。御遊びなどもなかりけり。","source":"竹取・富士の煙","translation":"《かぐや姫は帝にお別れの手紙を残して月の都に去ってしまう。帝はその手紙を見て、》（帝は）しみじみとお悲しみになって、何も召し上がらない。（管弦の）（遊び）なども停止された。","headword_form":"遊び"},{"gloss":"管弦の遊び〔音楽を楽しむこと〕","text":"ひとわたり遊びて、琵琶弾きやみたるに、","source":"枕・御仏名のまたの日","translation":"（道方の少納言は、）琵琶がとてもすばらしい。済政の箏の琴、行義の笛、経房の中将の笙の笛なども、おもしろい。みながひととおり（音楽を奏で楽しん）で、琵琶を弾くのをやめたときに、","headword_form":"遊び"}]},{"no":"101","pos":"名詞","headword":"うへ","kanji":"上","senses":[{"sense_no":1,"gloss":"高貴な人のいる所"},{"sense_no":2,"gloss":"帝・天皇"},{"sense_no":3,"gloss":"（貴人の）奥様〔「北の方」という〕"},{"sense_no":4,"gloss":"身の上・〜に関わること"}],"examples":[{"gloss":"帝・天皇","text":"「無名」といふ琵琶の御琴を、上の持てわたらせ給へるに、","source":"枕・無名といふ琵琶の御琴を","translation":"「無名」という名の琵琶のお琴を、（帝）が持っておいでになったので、","headword_form":"上"},{"gloss":"（貴人の）奥様〔「北の方」という〕","text":"上も大臣も、かく、つと添ひおはすれば、","source":"源氏・柏木","translation":"（母）（北の方）も（父）大臣も、こうして、（病床の息子に）ぴったり寄り添っていらっしゃるので、","headword_form":"上"}]},{"no":"102","pos":"名詞","headword":"おほやけ","kanji":"公","senses":[{"sense_no":1,"gloss":"朝廷・政府"},{"sense_no":2,"gloss":"帝・天皇"},{"sense_no":3,"gloss":"公的なこと〔現代語と同じ〕"}],"examples":[{"gloss":"朝廷・政府","text":"おほやけの宮仕へしければ、（親王のもとに）常にはえまうでず。","source":"伊勢・八四段","translation":"（男は、）（朝廷）に宮仕えをしていたので、（公務で忙しく、親王の所に）絶えず参上することはできない。","headword_form":"おほやけ"},{"gloss":"帝・天皇","text":"大臣のかく世をのがれ給へば、おほやけも心細う思され、","source":"源氏・賢木","translation":"大臣がこのように出家なさったので、（帝）も心細くお思いになり、","headword_form":"おほやけ"}]},{"no":"103","pos":"名詞","headword":"うち","kanji":"内裏・内","senses":[{"sense_no":1,"gloss":"（建物の）内部"},{"sense_no":2,"gloss":"宮中・内裏"},{"sense_no":3,"gloss":"帝・天皇"}],"examples":[{"gloss":"宮中・内裏","text":"君は二日三日うちへも参り給はで、","source":"源氏・若紫","translation":"（光源氏の）君は二、三日（宮中）へも参上なさらないで、","headword_form":"うち"},{"gloss":"宮中・内裏","text":"ひきや深山の奥に住まひして雲居の月をよそに見むとは","source":"平家・灌頂巻","translation":"《高倉天皇の中宮であった建礼門院は、出家して大原（比叡山の西北）の寂光院で余生を送った。そのときの歌。》こんなに深い山の奥に住んで、（かつて眺めた）（宮中）の月をほかの所で見ようとは思いもかけなかったよ。","headword_form":"雲居"},{"gloss":"帝・天皇","text":"うちにも、（春宮を）めでたしと見奉り給ひて、世の中ゆづり聞こえ給ふべきことなど、なつかしう聞こえ知らせ給ふ。","source":"源氏・澪標","translation":"（帝）も（皇太子を）立派だと見申し上げ（＝拝見）なさって、国の政治を譲り（＝譲位）申し上げなさるつもりであることを、やさしく（皇太子に）お話ししてお聞かせになる。","headword_form":"うち"}]},{"no":"104","pos":"名詞","headword":"おまへ","kanji":"御前","senses":[{"sense_no":1,"gloss":"（神仏や貴人の）御前・お側"},{"sense_no":2,"gloss":"〔貴人への敬称、または貴人その人を表す〕"}],"examples":[{"gloss":"（神仏や貴人の）御前・お側","text":"帝は愛する更衣を、あながちに御前去らずもてなさせ給ひしほど、","source":"源氏・桐壺","translation":"帝は愛する更衣を、無理に（お側）から離さずに大切になさっていたと","headword_form":"御前"},{"gloss":"〔貴人への敬称、または貴人その人を表す〕","text":"宮の御前のうち笑ませ給へる、いとをかし。","source":"枕・関白殿、二月廿一日に","translation":"中宮（様）がほほえんでいらっしゃる様子は、とてもすてきだ。","headword_form":"御前"}]},{"no":"105","pos":"名詞","headword":"みゆき","kanji":"行幸・御幸","senses":[{"sense_no":1,"gloss":"（帝や上皇の）お出かけ・お出まし〔帝には「行幸」を、上皇には「御幸」の字をあて、前者は「ぎょうごう」または「ぎょうこう」、後者は「ごこう」とも読む〕"}],"examples":[{"gloss":"（帝や上皇の）お出かけ・お出まし〔帝には「行幸」を、上皇には「御幸」の字をあて、前者は「ぎょうごう」または「ぎょうこう」、後者は「ごこう」とも読む〕","text":"小倉山峰のもみぢ葉心あらば今一度のみゆき待たなむ","source":"拾遺・一一二八（百人一首）","translation":"小倉山の峰の紅葉よ、もしおまえに心があるならば、もう一度の（帝の）（お出まし）を（散らずに）待っていてほしい。","headword_form":"みゆき"},{"gloss":"（帝や上皇の）お出かけ・お出まし〔帝には「行幸」を、上皇には「御幸」の字をあて、前者は「ぎょうごう」または「ぎょうこう」、後者は「ごこう」とも読む〕","text":"法皇夜をこめて大原の奥へぞ御幸なる。","source":"平家・灌頂巻","translation":"法皇はまだ夜も深いうちに大原の奥へ（お出まし）になる。","headword_form":"御幸"}]},{"no":"106","pos":"名詞","headword":"たより","kanji":"頼り・便り","senses":[{"sense_no":1,"gloss":"よりどころ・頼みにできるもの"},{"sense_no":2,"gloss":"つて・縁故・手づる"},{"sense_no":3,"gloss":"よい機会・都合のよい折・ついで"}],"examples":[{"gloss":"よりどころ・頼みにできるもの","text":"さて年ごろ経るほどに、女、親なく、たよりなくなるままに、","source":"伊勢・三段","translation":"そうして何年か過ぎるうちに、女は、親が死に、（暮らしの）（よりどころ）がなくなるにつれ、","headword_form":"たより"},{"gloss":"つて・縁故・手づる","text":"たよりあらばいかで都へ告げやらむ今日白河の関は越えぬと","source":"拾遺・三三九","translation":"（何か）（つて）があるならばなんとかして都へ知らせてやりたいものだ。今日（陸奥の）白河の関を越えたと。","headword_form":"たより"},{"gloss":"よい機会・都合のよい折・ついで","text":"たよりごとに物も絶えず得させたり。","source":"土佐・二月十六日","translation":"（何か）（よい機会）があるごとに（お礼の）品物も絶えず与えていた。","headword_form":"たより"}]},{"no":"107","pos":"名詞","headword":"ものがたり","kanji":"物語","senses":[{"sense_no":1,"gloss":"世間話・雑談"},{"sense_no":2,"gloss":"物語〔『竹取物語』や『源氏物語』などの物語〕〔現代語と同じ〕"}],"examples":[{"gloss":"世間話・雑談","text":"おなじ心なる人二三人ばかり、火桶を中に据ゑて、物語などするに、","source":"枕・雪のいと高うはあらで","translation":"気の合う人二、三人くらいが、火桶を中に置いて、（世間話）などするうちに、","headword_form":"物語"},{"gloss":"物語〔『竹取物語』や『源氏物語』などの物語〕〔現代語と同じ〕","text":"世の中に『源氏物語』などの物語といふもののあんなるを、いかで見ばやと思ひつつ、","source":"更級","translation":"世の中に『源氏物語』などの（物語）というものがあるそうだが、（それを）どうにかして読みたいと（わたしは）思いながら、","headword_form":"物語"}]},{"no":"108","pos":"名詞","headword":"ためし","kanji":"例","senses":[{"sense_no":1,"gloss":"前例・先例〔以前にあった事柄〕"}],"examples":[{"gloss":"前例・先例〔以前にあった事柄〕","text":"集をえらぶ人はためし多かれども、再び勅をうけて、代々に聞こえ侍る家は、たぐひなほありがたくやあらむ。","source":"十六夜","translation":"（和歌の）勅撰集を編集する人は（先例）がたくさんあるけれど、その御代御代の天皇に（勅撰和歌集を）二度勅命を受けて、奏上した家柄は、類例がやはりめったになかったことだろうか。","headword_form":"ためし"}]},{"no":"109","pos":"名詞","headword":"いそぎ","kanji":"急ぎ","senses":[{"sense_no":1,"gloss":"急なこと・急用〔現代語と同じ〕"},{"sense_no":2,"gloss":"支度・準備"}],"examples":[{"gloss":"支度・準備","text":"十二月には公事どもしげく、春の急ぎにとり重ねて催し行はるるさまぞ、いみじきや。","source":"徒然・十九段","translation":"（十二月には）朝廷の政務や儀式などが頻繁にあり、新春の（準備）が（十二月には）（それらが）重複して催し行われる有様は、たいそうなものだ。","headword_form":"急ぎ"},{"gloss":"支度・準備","text":"正月の御装束急ぎ給ふ。","source":"宇津保・嵯峨の院","translation":"正月のご衣装を（準備し）なさる。","headword_form":"急ぎ"}]},{"no":"110","pos":"名詞","headword":"ようい","kanji":"用意","senses":[{"sense_no":1,"gloss":"気配り・心づかい"},{"sense_no":2,"gloss":"支度・準備〔現代語と同じ〕"}],"examples":[{"gloss":"気配り・心づかい","text":"頭の中将、容貌用意、人にはことなるを、なほ花のかたはらの深山木なり。","source":"源氏・紅葉賀","translation":"頭の中将は、顔立ちも（気配り）も、人よりは優れているが、（光源氏と）立ち並ぶと、やはり桜の花のかたわらの山奥の木である。","headword_form":"用意"}]},{"no":"111","pos":"名詞","headword":"かたち","kanji":"形・容貌","senses":[{"sense_no":1,"gloss":"形・外見〔現代語と同じ〕"},{"sense_no":2,"gloss":"容貌・顔立ち"}],"examples":[{"gloss":"容貌・顔立ち","text":"さかりにならば、かたちも限りなくよく、髪もいみじく長くなりなむ。宇治の大将の浮舟の女君のやうにこそあらめ。","source":"更級","translation":"（わたしも）年ごろになったら、きっと（容貌）もこの上なく美しく、光源氏の（恋人の）夕顔、（大将）（薫）の（恋人の）浮舟の女君のようになるだろう。","headword_form":"かたち"}]},{"no":"112","pos":"名詞","headword":"かげ","kanji":"影・陰","senses":[{"sense_no":1,"gloss":"光〔Ａ 影〕"},{"sense_no":2,"gloss":"姿・形〔Ａ 影〕"},{"sense_no":3,"gloss":"陰〔光の当たらない所〕・物陰〔現代語と同じ〕〔Ｂ 陰〕"}],"examples":[{"gloss":"光〔Ａ 影〕","text":"木の間よりもりくる月の影見れば心づくしの秋は来にけり","source":"古今・一八四","translation":"木々の枝の間から漏れてくる月の（光）を見ると、もの思いをすることが多い秋が来たことだなあ。","headword_form":"影"},{"gloss":"姿・形〔Ａ 影〕","text":"月隈なくさし出でて、ふと人の影見えければ、","source":"源氏・空蝉","translation":"月が隈なく差し出て、月の光がこうこうと照りはじめて、すっと人の（姿）が見えたので、","headword_form":"影"}]},{"no":"113","pos":"名詞","headword":"けしき","kanji":"気色","senses":[{"sense_no":1,"gloss":"様子"},{"sense_no":2,"gloss":"顔色・機嫌〔顔の様子〕"},{"sense_no":3,"gloss":"意向・意中〔心の中の様子〕"}],"examples":[{"gloss":"様子","text":"切に物思へる気色なり。","source":"竹取・天の羽衣","translation":"いちずに何か思っている（様子）である。","headword_form":"気色"},{"gloss":"顔色・機嫌〔顔の様子〕","text":"おほやけの御気色悪しかりけり。","source":"伊勢・二四段","translation":"帝のご（機嫌）は悪かった。","headword_form":"気色"},{"gloss":"意向・意中〔心の中の様子〕","text":"わざとの御消息とはあらねど、御気色ありけるを、","source":"源氏・若菜上","translation":"正式な形でのお手紙ということではないが、ご（意向）を示されたのを、","headword_form":"気色"}]},{"no":"114","pos":"名詞","headword":"こころざし","kanji":"心ざし・志","senses":[{"sense_no":1,"gloss":"意志・意向〔何かをしようとする気持ち〕〔現代語と同じ〕"},{"sense_no":2,"gloss":"愛情・好意〔相手に寄せる気持ち〕"},{"sense_no":3,"gloss":"お礼の贈り物"}],"examples":[{"gloss":"愛情・好意〔相手に寄せる気持ち〕","text":"「心ざしのまさらむにこそはあはめ」と思ふに、","source":"大和・一四七段","translation":"「（自分への）（愛情）がまさっているほうの男性と結婚しよう」と思うが、","headword_form":"心ざし"},{"gloss":"お礼の贈り物","text":"《留守中、家の管理を頼んでいた隣の人は、荒れるにまかせていた。》とはつらく見ゆれど、志はせむとす。","source":"土佐・二月十六日","translation":"とても薄情に見えるけれども、（お礼の贈り物）はしようと思う。","headword_form":"志"}]},{"no":"115","pos":"名詞","headword":"ほい","kanji":"本意","senses":[{"sense_no":1,"gloss":"本来の意志・かねてからの願い"}],"examples":[{"gloss":"本来の意志・かねてからの願い","text":"山籠りの本意深く、今年は出でじと思ひけれど、","source":"源氏・手習","translation":"山寺に籠もって仏道修行したいという（かねてからの願い）が深く、今年は（山から）出まいと思っていたけれども、","headword_form":"本意"}]},{"no":"116","pos":"名詞","headword":"こと","kanji":"言","senses":[{"sense_no":1,"gloss":"言葉"},{"sense_no":2,"gloss":"和歌"}],"examples":[{"gloss":"言葉","text":"言に出でて言はぬばかりぞ","source":"古今・六〇七","translation":"（言葉）に出して言わないだけだ（心の中では思っているよ）。","headword_form":"言"},{"gloss":"和歌","text":"ただ今覚えむ古き言、ひとつづつ書け。","source":"枕・清涼殿のうしとらのすみの","translation":"この紙に、今すぐ思い出せる古い（和歌）を、各自一首ずつ書け。","headword_form":"言"}]},{"no":"117","pos":"名詞","headword":"わざ","kanji":"業","senses":[{"sense_no":1,"gloss":"こと（事）・行い"},{"sense_no":2,"gloss":"葬儀・法事〔葬送の儀や追善供養〕"}],"examples":[{"gloss":"こと（事）・行い","text":"夜泣きといふわざする乳児の乳母。","source":"枕・くるしげなる物","translation":"（苦しそうなのは）夜泣きという（こと）をする赤ん坊の養育係。","headword_form":"わざ"},{"gloss":"葬儀・法事〔葬送の儀や追善供養〕","text":"それ失せ給ひて、安祥寺にて御わざしけり。","source":"伊勢・七七段","translation":"その方がお亡くなりになって、安祥寺で御（葬儀）をした。","headword_form":"わざ"}]},{"no":"118","pos":"名詞","headword":"よろづ","kanji":"万","senses":[{"sense_no":1,"gloss":"多くの数・さまざま・万事"},{"sense_no":2,"gloss":"〔副詞として使われ〕何ごとにつけても・すべてにわたって"}],"examples":[{"gloss":"多くの数・さまざま・万事","text":"やまと歌は人の心を種として、よろづの言の葉とぞなれりける。","source":"古今・仮名序","translation":"和歌というものは人の心を種として、（さまざま）の言葉となったものである。","headword_form":"よろづ"},{"gloss":"〔副詞として使われ〕何ごとにつけても・すべてにわたって","text":"世の中変はりてのち、（光源氏は）よろづもの憂く思され、","source":"源氏・葵","translation":"ご治世が変わってから、（光源氏は）（何ごとにつけても）もの憂く","headword_form":"よろづ"}]},{"no":"119","pos":"名詞","headword":"ことわり","kanji":"理","senses":[{"sense_no":1,"gloss":"道理〔もっともであること〕"}],"examples":[{"gloss":"道理〔もっともであること〕","text":"我を知らずして、外を知るといふことわりあるべからず。","source":"徒然・一三四段","translation":"自分（のこと）を知らないで、他人を知るという（道理）があるはずがない。","headword_form":"ことわり"}]},{"no":"120","pos":"名詞","headword":"ひがこと・ひがごと","kanji":"僻事","senses":[{"sense_no":1,"gloss":"間違い・誤り〔道理にはずれたこと〕"}],"examples":[{"gloss":"間違い・誤り〔道理にはずれたこと〕","text":"道理と僻事を並べんに、いかでか道理につかざるべき。","source":"平家・巻一","translation":"道理と（間違い）を並べたときに、どうして道理に従わないことがあろうか（道理に従うものだ）。","headword_form":"僻事"}]},{"no":"121","pos":"名詞","headword":"そらごと","kanji":"空言・虚言","senses":[{"sense_no":1,"gloss":"嘘・偽り・作りごと"}],"examples":[{"gloss":"嘘・偽り・作りごと","text":"まこと蓬莱の木かとこそ思ひつれ。かくあさましきそらごとにてありければ、はや返し給へ。","source":"竹取・蓬莱の玉の枝","translation":"本当に蓬莱山の木かと思ったことであった。（しかしそれは）このようにあきれるほどの（嘘）であったので、早くお返しください。","headword_form":"そらごと"}]},{"no":"122","pos":"名詞","headword":"しるし","kanji":"験・徴","senses":[{"sense_no":1,"gloss":"効き目・効果・効験"},{"sense_no":2,"gloss":"（神仏の）霊験・ご利益"},{"sense_no":3,"gloss":"前兆・きざし"}],"examples":[{"gloss":"効き目・効果・効験","text":"さまざまの御祈りはじまりて、なべてならぬ法ども行はるれど、さらにそのしるしなし。","source":"方丈","translation":"いろいろなご祈祷が始まって、並々でない加持祈祷が行われたが、少しもその（効き目）がない。","headword_form":"しるし"},{"gloss":"（神仏の）霊験・ご利益","text":"必ず仏の御験を見むと思ひ立ちて、その暁に京を出づるに、","source":"更級","translation":"必ず仏の（ご利益）を受けようと思い立って、その日の夜明け前に都を出たが、","headword_form":"験"},{"gloss":"前兆・きざし","text":"年も返りぬ。春のしるしも見えず、凍りわたれる水の音せぬさへ心細","source":"源氏・手習","translation":"年も改まった。（しかし、辺りは）春の（きざし）も見られず、一面に凍りついている（谷川の）水の（流れる）音もしないことまでもが心細く感じられて、","headword_form":"しるし"}]},{"no":"123","pos":"名詞","headword":"りやう","kanji":"料","senses":[{"sense_no":1,"gloss":"ため・（何かの）ためのもの"}],"examples":[{"gloss":"ため・（何かの）ためのもの","text":"見れば、（庭に）長むしろをぞ四五枚敷きたる。何の料にかあらんと見るに、","source":"宇治・巻一・二十八話","translation":"見ると、（庭に）長いむしろを四、五枚敷いてある。なんの（ため（のもの））だろうかと見ていると、","headword_form":"料"}]},{"no":"124","pos":"名詞","headword":"ろく","kanji":"禄","senses":[{"sense_no":1,"gloss":"ほうび（の品物）"}],"examples":[{"gloss":"ほうび（の品物）","text":"禄を出ださるれば、肩に掛けて、拝して退く。","source":"徒然・六四段","translation":"（ほうび）を下さると、肩に掛けて、礼をして退出する。","headword_form":"禄"}]},{"no":"125","pos":"名詞","headword":"としごろ","kanji":"年頃・年比・年来","senses":[{"sense_no":1,"gloss":"数年（の間）・数年来・長年"}],"examples":[{"gloss":"数年（の間）・数年来・長年","text":"夜中ばかりに、皮の聖のもとにおはして「われ法師になし給へ。年頃の本意なり」とのたまひければ、","source":"栄花・ひがけのかづら","translation":"夜中ごろに、行円上人の所にいらっしゃって「わたしを法師にしてください。（長年）の望みである」とおっしゃったので、","headword_form":"年頃"}]},{"no":"126","pos":"名詞","headword":"つとめて","kanji":"","senses":[{"sense_no":1,"gloss":"早朝"},{"sense_no":2,"gloss":"翌朝"}],"examples":[{"gloss":"早朝","text":"九日のつとめて、大湊より（中略）漕ぎ出でけり。","source":"土佐・一月九日","translation":"九日の（早朝）、大湊から（中略）舟を漕ぎ出した。","headword_form":"つとめて"},{"gloss":"翌朝","text":"そのあひけるつとめて、人おこせむと思ひけるに、","source":"大和・一〇三段","translation":"平中という男は、（女と）夫婦の縁を結んだその（翌朝）（早く）、使いの人を（女に）よこそうと思ったが、","headword_form":"つとめて"}]},{"no":"127","pos":"名詞","headword":"よ・よのなか","kanji":"世・世の中","senses":[{"sense_no":1,"gloss":"世の中・世間〔現代語と同じ〕"},{"sense_no":2,"gloss":"（世の中の）人間関係・男女の仲・夫婦の仲"},{"sense_no":3,"gloss":"（人の）一生・（ある）御代　※「世」は単に「時・折」の意でも使う。"}],"examples":[{"gloss":"（世の中の）人間関係・男女の仲・夫婦の仲","text":"心もゆかぬ世とはいひながら、まだいとかかる目は見ざりつれば、","source":"蜻蛉・中巻","translation":"思いどおりにならない（夫婦の仲）とはいいながら、まだこんなひどい目に遭ったことはなかったので、","headword_form":"世"},{"gloss":"（世の中の）人間関係・男女の仲・夫婦の仲","text":"夢よりもはかなき世の中を嘆きわびつつ明かし暮らすほどに、","source":"和泉式部","translation":"夢よりもむなしい（亡き親王との）（男女の仲）を嘆き悲しみなが","headword_form":"世の中"}]},{"no":"128","pos":"副詞","headword":"いかで・いかでか","kanji":"","senses":[{"sense_no":1,"gloss":"どうして・どのように（〜だろうか）〔疑問〕"},{"sense_no":2,"gloss":"どうして（〜だろうか、いや、〜ない）〔反語〕"},{"sense_no":3,"gloss":"なんとかして（〜よう・〜たい・〜てほしい）〔意志・自己の願望・他への願望〕"}],"examples":[{"gloss":"どうして・どのように（〜だろうか）〔疑問〕","text":"心細げなる有様、いかで過ぐすらんと、いと心ぐるし。","source":"徒然・二百段","translation":"頼りなげなありさまで、（どのように）過ごしているのだろうかと、とても気がかりだ。","headword_form":"いかで"},{"gloss":"どうして（〜だろうか、いや、〜ない）〔反語〕","text":"いかで月を見ではあらむ」とて、なほ月出づれば、出でつつ嘆き思へり。","source":"竹取・天の羽衣","translation":"（どうして）月を見ないでいられようか、いや、いられない」と言って、やはり月が出ると、（かぐや姫は）縁側に出て座って嘆き悲しんでいる。","headword_form":"いかで"},{"gloss":"なんとかして（〜よう・〜たい・〜てほしい）〔意志・自己の願望・他への願望〕","text":"今は、いかでこの若き人々おとなびさせむと思ふよりほかのことなきに、","source":"更級","translation":"（夫が信濃守となり都にいない）今はもう、（なんとかして）（妻であるわたしが）この子どもたちを一人前に仕立てようと思うばかりであるが、","headword_form":"いかで"},{"gloss":"なんとかして（〜よう・〜たい・〜てほしい）〔意志・自己の願望・他への願望〕","text":"いかでこのかぐや姫を得てしがな。","source":"竹取・かぐや姫の生ひ立ち","translation":"（なんとかして）このかぐや姫を手に入れ（て妻にし）たいものだ。","headword_form":"いかで"}]},{"no":"129","pos":"副詞","headword":"いかが・いかに","kanji":"","senses":[{"sense_no":1,"gloss":"どのように・どうして（〜だろうか）〔疑問〕"},{"sense_no":2,"gloss":"どうして（〜だろうか、いや、〜ない）〔反語〕"},{"sense_no":3,"gloss":"どんなに・どれほど・なんとまあ（〜だろう）〔程度の強調・感嘆〕"}],"examples":[{"gloss":"どのように・どうして（〜だろうか）〔疑問〕","text":"あはれ、いかにし給はむずらむ。","source":"蜻蛉・上巻","translation":"ああ、（あなたはこの先）（どのように）なさるのだろうか。","headword_form":"いかに"},{"gloss":"どのように・どうして（〜だろうか）〔疑問〕","text":"昔、男ありけり。いかがありけむ、その男住まずなりにけり。","source":"伊勢・九四段","translation":"昔、男がいた。（どう）したのだろうか、その男は（女の所に）通わなくなってしまった。","headword_form":"いかが"},{"gloss":"どうして（〜だろうか、いや、〜ない）〔反語〕","text":"かくばかり逢ふ日のまれになる人をいかがつらしと思はざるべき","source":"古今・四三三","translation":"これほどまでに逢う日がまれになるあの人のことを、（どうして）薄情だと思わないでいられようか、いや、薄情だと思ってしまいます。","headword_form":"いかが"},{"gloss":"どんなに・どれほど・なんとまあ（〜だろう）〔程度の強調・感嘆〕","text":"このごろの山の紅葉はいかにをかしからむ。","source":"和泉式部","translation":"この時期の山の紅葉は（どんなにか）美しいことだろう。","headword_form":"いかに"}]},{"no":"130","pos":"副詞","headword":"など・などか・などて・なじかは","kanji":"","senses":[{"sense_no":1,"gloss":"なぜ・どうして（〜か）"}],"examples":[{"gloss":"なぜ・どうして（〜か）","text":"「など答へもせぬ」と言へば、","source":"伊勢・六二段","translation":"「（どうして）返事もしないのか」と言うと、","headword_form":"など"},{"gloss":"なぜ・どうして（〜か）","text":"なぞかう暑きにこの格子は下ろされたる。","source":"源氏・空蝉","translation":"（どうして）こんなに暑いのにこの格子をお下ろしになっているのか。","headword_form":"なぞ"},{"gloss":"なぜ・どうして（〜か）","text":"春霞なに隠すらむ桜花散る間をだにも見るべきものを","source":"古今・七九","translation":"春霞は（どうして）桜の花を隠しているのだろうか。（咲いている期間が短い桜は）散るときでさえも見ていたいものなのに。","head
