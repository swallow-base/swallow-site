<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つばめ古文 — 敬語演習 v1.0</title>
<style>
:root {
  --bg:#faf7f2; --surface:#fff; --surface2:#f3ede3;
  --border:#d4c5a9; --text:#2c2416; --text-sub:#6b5b3e;
  --accent:#8b1a1a; --accent2:#c0392b; --gold:#b8860b;
  --son:#6b2f6b; --ken:#1a5276; --tei:#1e6b45;
  --nibetsu:#7d5a00; --tokubetsu:#8b1a1a;
  --correct:#1a6b2f; --wrong:#8b1a1a;
  --radius:8px; --shadow:0 2px 12px rgba(44,36,22,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center}

header{width:100%;background:var(--accent);padding:12px 20px;
  display:flex;align-items:center;gap:12px}
.header-title{color:#fff;font-size:1.15rem;letter-spacing:.12em}
.header-tagline{color:rgba(255,255,255,.7);font-size:.78rem;margin-left:auto}

main{width:100%;max-width:760px;padding:28px 16px 60px}

.card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:28px 24px;margin-bottom:20px}

/* ── スタート ── */
#screen-start{text-align:center}
.app-logo{font-size:2rem;color:var(--accent);margin-bottom:6px}
.app-sub{color:var(--text-sub);font-size:.88rem;margin-bottom:28px}
.stats-row{display:flex;justify-content:center;gap:32px;margin-bottom:28px}
.stat-box{text-align:center}
.stat-num{font-size:2rem;color:var(--accent);font-weight:bold}
.stat-lbl{font-size:.75rem;color:var(--text-sub)}
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:28px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--text-sub)}
.legend-dot{width:10px;height:10px;border-radius:50%}
.btn-start{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
  font-family:inherit;font-size:1.05rem;padding:14px 48px;cursor:pointer;
  letter-spacing:.1em;transition:background .15s}
.btn-start:hover{background:var(--accent2)}

/* ── 進捗 ── */
.progress-wrap{margin-bottom:20px}
.progress-bar-bg{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden}
.progress-bar-fill{background:var(--accent);height:100%;border-radius:4px;transition:width .4s}
.progress-text{font-size:.78rem;color:var(--text-sub);margin-top:5px;text-align:right}

/* ── 例文カード ── */
.example-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.word-badge{display:inline-flex;align-items:center;padding:3px 10px;
  border-radius:14px;font-size:.78rem;font-weight:bold;color:#fff}
.cat-son{background:var(--son)}
.cat-ken{background:var(--ken)}
.cat-tei{background:var(--tei)}
.cat-nibetsu{background:var(--nibetsu)}
.cat-tokubetsu{background:var(--tokubetsu)}
.source-tag{font-size:.75rem;color:var(--text-sub);margin-left:auto}
.example-text{font-size:1.12rem;line-height:2;
  background:var(--surface2);border-left:3px solid var(--border);
  padding:12px 16px;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:4px}
.example-text .hl{color:var(--accent);border-bottom:2px solid var(--accent);font-weight:bold}

/* ── 問題 ── */
.q-label{font-size:.78rem;color:var(--text-sub);letter-spacing:.08em;margin-bottom:8px}
.q-text{font-size:.98rem;margin-bottom:12px;line-height:1.7}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:11px 16px;font-family:inherit;
  font-size:.92rem;text-align:left;cursor:pointer;transition:background .1s,border-color .1s}
.choice-btn:hover:not(:disabled){background:#ede4d4;border-color:var(--gold)}
.choice-btn.selected-pending{background:#e8e0f0;border-color:var(--son);color:var(--son);font-weight:bold}
.result-label{font-size:.92rem;font-weight:bold;margin-top:8px;padding:4px 0}
.choice-btn.unknown{
  margin-top:6px;background:transparent;border-style:dashed;
  color:var(--text-sub);font-size:.85rem;
}
.choice-btn.unknown:hover:not(:disabled){background:var(--surface2);border-color:var(--text-sub)}
.result-correct{color:var(--correct)}
.result-wrong{color:var(--wrong)}
.choice-btn.correct{background:#e6f4ea;border-color:var(--correct);color:var(--correct)}
.choice-btn.wrong{background:#fdecea;border-color:var(--wrong);color:var(--wrong)}
.choice-btn:disabled{cursor:default}

/* 自己採点 */
.model-answer-box{background:#f9f3e3;border:1px solid var(--gold);
  border-radius:var(--radius);padding:12px 16px;font-size:.95rem;margin-bottom:12px}
.model-answer-box .label{font-size:.75rem;color:var(--gold);margin-bottom:4px}
.self-check-btns{display:flex;gap:10px;margin-top:8px}
.btn-ok{flex:1;background:#e6f4ea;border:1px solid var(--correct);color:var(--correct)}
.btn-ng{flex:1;background:#fdecea;border:1px solid var(--wrong);color:var(--wrong)}
.btn-ok,.btn-ng{border-radius:var(--radius);padding:10px;font-family:inherit;font-size:.9rem;cursor:pointer}
.btn-ok:hover{background:#c8e6c9}
.btn-ng:hover{background:#ffcdd2}

.explanation-box{background:#f5f0e8;border-left:3px solid var(--gold);
  padding:10px 14px;border-radius:0 var(--radius) var(--radius) 0;
  font-size:.85rem;color:var(--text-sub);margin-top:10px;line-height:1.7}

/* 次へ */
.btn-next{width:100%;margin-top:18px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-family:inherit;
  font-size:.98rem;padding:13px;cursor:pointer;transition:background .15s}
.btn-next:hover{background:var(--accent2)}

/* 再挑戦バナー */
/* ── スティッキー例文 ── */
.sticky-example{
  position:sticky; top:0; z-index:100;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:0 2px 8px rgba(44,36,22,.13);
  padding:16px 20px;
  margin-bottom:12px;
}
.sticky-example .example-text{
  margin-bottom:0;
}

.retry-banner{background:#fff8e1;border:1px solid var(--gold);border-radius:var(--radius);
  padding:8px 14px;font-size:.82rem;color:var(--gold);margin-bottom:14px;text-align:center}

/* ── 結果 ── */
#screen-result{text-align:center}
.result-badge{font-size:3.5rem;margin-bottom:16px}
.result-title{font-size:1.6rem;color:var(--accent);margin-bottom:8px}
.result-sub{color:var(--text-sub);font-size:.9rem;margin-bottom:16px}
.result-score{font-size:1.2rem;margin-bottom:24px}
.result-details{text-align:left;margin-bottom:24px}
.result-row{display:flex;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:.9rem}
.result-row:last-child{border-bottom:none}

/* ── ホームボタン ── */
.btn-home{
  background:transparent;border:1px solid rgba(255,255,255,.5);
  color:rgba(255,255,255,.85);border-radius:6px;
  font-family:inherit;font-size:.75rem;padding:5px 12px;
  cursor:pointer;letter-spacing:.06em;
  transition:background .15s,border-color .15s;
  white-space:nowrap;
}
.btn-home:hover{background:rgba(255,255,255,.15);border-color:#fff;}

/* ── 確認ダイアログ ── */
.dialog-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:1000;display:flex;align-items:center;justify-content:center;
}
.dialog-box{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  padding:28px 24px;max-width:320px;width:90%;text-align:center;
}
.dialog-box p{font-size:.95rem;line-height:1.7;margin-bottom:20px;color:var(--text);}
.dialog-btns{display:flex;gap:10px;}
.dialog-btns button{
  flex:1;border-radius:var(--radius);padding:10px;
  font-family:inherit;font-size:.9rem;cursor:pointer;border:none;
}
.dialog-btn-ok{background:var(--accent);color:#fff;}
.dialog-btn-ok:hover{background:var(--accent2);}
.dialog-btn-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border)!important;}
.dialog-btn-cancel:hover{background:#ede4d4;}

footer{width:100%;background:var(--surface2);border-top:1px solid var(--border);
  text-align:center;padding:14px;font-size:.75rem;color:var(--text-sub);letter-spacing:.08em}

.hidden{display:none!important}
</style>
</head>
<body>

<header>
  <div class="header-title">つばめ古文</div>
  <button class="btn-home" onclick="confirmGoHome()">⌂ ホーム</button>
  <div class="header-tagline">敬語演習 v1.2</div>
</header>

<!-- ホーム確認ダイアログ -->
<div class="dialog-overlay hidden" id="dialog-home">
  <div class="dialog-box">
    <p>現在の演習を終了して<br>ホームに戻りますか？</p>
    <div class="dialog-btns">
      <button class="dialog-btn-cancel" onclick="closeDialog()">キャンセル</button>
      <button class="dialog-btn-ok" onclick="goHome()">ホームへ戻る</button>
    </div>
  </div>
</div>

<main>

  <!-- ═══ スタート ═══ -->
  <div id="screen-start" class="card">
    <div class="app-logo">敬語演習</div>
    <div class="app-sub">尊敬語・謙譲語・丁寧語の識別と敬意の方向を演習</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="stat-words">—</div><div class="stat-lbl">収録語数</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-examples">—</div><div class="stat-lbl">例文数</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-questions">—</div><div class="stat-lbl">問題数</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--son)"></div>尊敬語</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--ken)"></div>謙譲語</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--tei)"></div>丁寧語</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--nibetsu)"></div>見分け方演習</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--tokubetsu)"></div>特別な敬語表現</div>
    </div>
    <button class="btn-start" onclick="startQuiz()">演習を始める</button>
  </div>

  <!-- ═══ 問題 ═══ -->
  <div id="screen-quiz" class="hidden">
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </div>
    <div id="retry-banner" class="retry-banner hidden">🔄 再挑戦：前回間違えた例文です</div>
    <!-- 例文：スティッキー固定 -->
    <div class="sticky-example" id="sticky-example">
      <div class="example-header">
        <span class="word-badge" id="word-badge">—</span>
        <span id="word-name" style="font-size:.92rem;color:var(--text-sub)"></span>
        <span class="source-tag" id="source-tag"></span>
      </div>
      <div class="example-text" id="example-text"></div>
    </div>
    <!-- 問題エリア -->
    <div class="card" id="quiz-card">
      <div id="question-block"></div>
      <button class="btn-next hidden" id="btn-next" onclick="nextExample()">次の例文へ →</button>
    </div>
  </div>

  <!-- ═══ 結果 ═══ -->
  <div id="screen-result" class="hidden card">
    <div class="result-badge" id="result-badge"></div>
    <div class="result-title">演習完了！</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-details" id="result-details"></div>
    <button class="btn-start" onclick="restartQuiz()">もう一度</button>
  </div>

</main>

<footer>SWALLOW-BASE — 古文敬語演習 v1.2</footer>

//  アプリロジック
// ══════════════════════════════════════════════
const CAT_CLASS = {
  "尊敗語":"cat-son","尊敬語":"cat-son",
  "謙譲語":"cat-ken","丁寧語":"cat-tei",
  "見分け方演習":"cat-nibetsu","特別な敬語表現":"cat-tokubetsu"
};
const TYPE_LABEL = {
  category:"種別",direction:"敬意の方向",
  translation:"現代語訳",reason:"判断の根拠"
};

let queue=[],retryQueue=[],currentItem=null,currentQIdx=0;
let stats={correct:0,wrong:0,self_ok:0,self_ng:0};

function init(){
  const all=[];
  KEIGO_DATA.forEach(w=>w.examples.forEach(ex=>all.push({word:w,ex:ex})));
  const totalQ=all.reduce((a,e)=>a+e.ex.questions.length,0);
  document.getElementById('stat-words').textContent=KEIGO_DATA.length;
  document.getElementById('stat-examples').textContent=all.length;
  document.getElementById('stat-questions').textContent=totalQ;
}

const SESSION_SIZE = 20;

function startQuiz(){
  const all=[];
  KEIGO_DATA.forEach(w=>w.examples.forEach(ex=>all.push({word:w,ex:ex})));
  queue=shuffle([...all]).slice(0, SESSION_SIZE);
  retryQueue=[];
  stats={correct:0,wrong:0,self_ok:0,self_ng:0,total:SESSION_SIZE};
  document.getElementById('screen-start').classList.add('hidden');
  document.getElementById('screen-quiz').classList.remove('hidden');
  nextExample();
}

function nextExample(){
  if(queue.length>0){ loadExample(queue.shift(),false); }
  else if(retryQueue.length>0){ loadExample(retryQueue.shift(),true); }
  else { showResult(); }
}

function loadExample(item,isRetry){
  currentItem=item;
  item.ex._wrong=false;
  currentQIdx=0;

  const done=stats.total-queue.length-retryQueue.length-1;
  const pct=stats.total>0?Math.round(done/stats.total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${Math.max(0,done)} / ${stats.total} 例文`;

  const banner=document.getElementById('retry-banner');
  isRetry?banner.classList.remove('hidden'):banner.classList.add('hidden');

  const w=item.word, ex=item.ex;
  const badge=document.getElementById('word-badge');
  // バッジはセクション種別を表示（カテゴリそのままは答えのヒントになるため）
  const badgeLabel = w.category==='見分け方演習' ? '敬語の見分け' : '敬語の用例';
  badge.textContent=badgeLabel;
  badge.className='word-badge '+(CAT_CLASS[w.category]||'cat-son');
  document.getElementById('word-name').textContent='';  // 語名は答えのヒントになるため非表示
  document.getElementById('source-tag').textContent=ex.source||'';

  const hl=ex.highlight;
  const re=new RegExp(hl.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  document.getElementById('example-text').innerHTML=
    ex.text.replace(re,`<span class="hl">${hl}</span>`);

  document.getElementById('question-block').innerHTML='';
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('btn-next').textContent='次の例文へ →';

  // Q1(category)とQ2(direction)を同時表示、Q3(translation)は単独
  renderPair();
}

// ── Q1+Q2を同時表示して「確認する」ボタンで同時採点 ──────
function renderPair(){
  const qs = currentItem.ex.questions;
  const block = document.getElementById('question-block');

  // Q1とQ2が両方selectならペア表示
  const q1 = qs[0]; // category
  const q2 = qs[1]; // direction
  const q3 = qs[2]; // translation

  if(q1 && q2 && q1.answer_format==='select' && q2.answer_format==='select'){
    renderPairBlock(q1, q2, q3);
  } else {
    // フォールバック：順番通り
    currentQIdx=0;
    renderQuestion(qs[0]);
  }
}

function renderPairBlock(q1, q2, q3){
  const block = document.getElementById('question-block');

  // ── Q1ブロック ──
  const div1 = document.createElement('div');
  div1.style.marginTop='22px';
  div1.innerHTML=`<div class="q-label">問1（${TYPE_LABEL[q1.type]||q1.type}）</div><div class="q-text">${q1.question}</div>`;
  const cd1 = document.createElement('div');
  cd1.className='choices';
  let sel1=null;
  shuffle([...q1.choices]).forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c;
    btn.onclick=()=>{
      cd1.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected-pending'));
      btn.classList.add('selected-pending');
      sel1=c;
      if(q2.reason_by_answer) updateQ2Block(sel1);
      checkEnableConfirm();
    };
    cd1.appendChild(btn);
  });
  // 「わからない」ボタン
  {
    const ub=document.createElement('button');
    ub.className='choice-btn unknown';
    ub.textContent='？ わからない';
    ub.onclick=()=>{
      cd1.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected-pending'));
      ub.classList.add('selected-pending');
      sel1='__UNKNOWN__';
      if(q2.reason_by_answer) updateQ2Block('__UNKNOWN__');
      checkEnableConfirm();
    };
    cd1.appendChild(ub);
  }
  div1.appendChild(cd1);
  block.appendChild(div1);

  // ── Q2ブロック ──
  const div2 = document.createElement('div');
  div2.style.marginTop='22px';
  // reason_by_answerのとき初期はプレースホルダー表示
  const q2InitData = q2.reason_by_answer
    ? Object.values(q2.reason_by_answer)[0]  // 最初のパターンで仮表示
    : q2;
  div2.innerHTML=`<div class="q-label">問2（${TYPE_LABEL[q2.type]||q2.type}）</div><div class="q-text q2-text">${q2.reason_by_answer ? '問1に答えると問2が表示されます。' : q2InitData.question}</div>`;
  const cd2 = document.createElement('div');
  cd2.className='choices';
  cd2.id='cd2-choices';
  if(!q2.reason_by_answer){
    // distractor_choicesがあれば4択をランダム構成、なければ従来の3択
    const choices4 = buildChoices4(q2);
    shuffle(choices4).forEach(c=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.textContent=c;
      btn.onclick=()=>{
        cd2.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected-pending'));
        btn.classList.add('selected-pending');
        sel2=c;
        checkEnableConfirm();
      };
      cd2.appendChild(btn);
    });
    // 「わからない」ボタン
    {
      const ub=document.createElement('button');
      ub.className='choice-btn unknown';
      ub.textContent='？ わからない';
      ub.onclick=()=>{
        cd2.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected-pending'));
        ub.classList.add('selected-pending');
        sel2='__UNKNOWN__';
        checkEnableConfirm();
      };
      cd2.appendChild(ub);
    }
  }
  div2.appendChild(cd2);
  block.appendChild(div2);

  let sel2=null;
  let currentQ2Data=q2InitData;

  // reason_by_answer: Q1選択後にQ2を更新
  function updateQ2Block(q1Answer){
    const data = q2.reason_by_answer[q1Answer] || Object.values(q2.reason_by_answer)[0];
    currentQ2Data = data;
    sel2 = null;
    div2.querySelector('.q2-text').textContent = data.question;
    const cd = div2.querySelector('#cd2-choices');
    cd.innerHTML='';
    const choices4r = buildChoices4(data);
    shuffle(choices4r).forEach(c=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.textContent=c;
      btn.onclick=()=>{
        cd.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected-pending'));
        btn.classList.add('selected-pending');
        sel2=c;
        checkEnableConfirm();
      };
      cd.appendChild(btn);
    });
    // 「わからない」ボタン
    {
      const ub=document.createElement('button');
      ub.className='choice-btn unknown';
      ub.textContent='？ わからない';
      ub.onclick=()=>{
        cd.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected-pending'));
        ub.classList.add('selected-pending');
        sel2='__UNKNOWN__';
        checkEnableConfirm();
      };
      cd.appendChild(ub);
    }
    checkEnableConfirm();
  }

  // ── 確認ボタン ──
  const confirmBtn = document.createElement('button');
  confirmBtn.className='btn-next';
  confirmBtn.style.marginTop='16px';
  confirmBtn.textContent='確認する';
  confirmBtn.disabled=true;
  confirmBtn.id='btn-confirm-pair';
  block.appendChild(confirmBtn);

  function checkEnableConfirm(){
    confirmBtn.disabled = !(sel1 && sel2);
  }

  function addResultLabel(parentDiv, isCorrect){
    const lbl = document.createElement('div');
    lbl.className = 'result-label ' + (isCorrect ? 'result-correct' : 'result-wrong');
    lbl.textContent = isCorrect ? '⭕️ 正解' : '❌ 不正解';
    parentDiv.appendChild(lbl);
  }

  confirmBtn.onclick=()=>{
    confirmBtn.disabled=true;

    // Q1採点
    const c1=q1.correct_answer;
    cd1.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.disabled=true;
      btn.classList.remove('selected-pending');
      if(btn.textContent===c1) btn.classList.add('correct');
      if(btn.textContent===sel1&&sel1!==c1) btn.classList.add('wrong');
    });
    const ok1 = sel1===c1;
    if(ok1){ stats.correct++; } else { stats.wrong++; currentItem.ex._wrong=true; }
    // わからない→正解を表示
    if(sel1==='__UNKNOWN__'){
      cd1.querySelectorAll('.choice-btn').forEach(btn=>{
        btn.disabled=true;
        btn.classList.remove('selected-pending');
        if(btn.textContent===c1) btn.classList.add('correct');
      });
    }
    addResultLabel(div1, ok1);
    if(q1.explanation){
      const e=document.createElement('div');
      e.className='explanation-box';
      e.textContent=q1.explanation;
      div1.appendChild(e);
    }

    // Q2採点（reason_by_answerのとき正解はsel1に対応するデータから取得）
    const q2data = q2.reason_by_answer ? currentQ2Data : q2;
    const c2 = q2data.correct_answer;
    const cd2el = div2.querySelector('#cd2-choices');
    cd2el.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.disabled=true;
      btn.classList.remove('selected-pending');
      if(btn.textContent===c2) btn.classList.add('correct');
      if(btn.textContent===sel2&&sel2!==c2) btn.classList.add('wrong');
    });
    const ok2 = sel2===c2;
    if(ok2){ stats.correct++; } else { stats.wrong++; currentItem.ex._wrong=true; }
    // わからない→正解を表示
    if(sel2==='__UNKNOWN__'){
      cd2el.querySelectorAll('.choice-btn').forEach(btn=>{
        btn.disabled=true;
        btn.classList.remove('selected-pending');
        if(btn.textContent===c2) btn.classList.add('correct');
      });
    }
    addResultLabel(div2, ok2);
    if(q2data.explanation){
      const e=document.createElement('div');
      e.className='explanation-box';
      e.textContent=q2data.explanation;
      div2.appendChild(e);
    }

    // Q3（現代語訳）を表示
    currentQIdx=2;
    setTimeout(()=>renderQuestion(q3), 200);
  };
}

function renderQuestion(q){
  const block=document.getElementById('question-block');
  // 確認ボタンを除去
  const cb=document.getElementById('btn-confirm-pair');
  if(cb) cb.remove();

  const div=document.createElement('div');
  div.id='q-'+q.q_id;
  div.style.marginTop='22px';
  div.innerHTML=`
    <div class="q-label">問3（${TYPE_LABEL[q.type]||q.type}）</div>
    <div class="q-text">${q.question}</div>`;

  // 自己採点
  const ma=document.createElement('div');
  ma.className='model-answer-box hidden';
  ma.id='ma-'+q.q_id;
  ma.innerHTML=`<div class="label">模範解答</div>${q.model_answer}`;
  const showBtn=document.createElement('button');
  showBtn.className='choice-btn';
  showBtn.textContent='模範解答を見る';
  showBtn.onclick=()=>{
    showBtn.style.display='none';
    ma.classList.remove('hidden');
    const sb=document.createElement('div');
    sb.className='self-check-btns';
    sb.innerHTML=`<button class="btn-ok">○ 正解</button><button class="btn-ng">✕ 不正解</button>`;
    sb.querySelector('.btn-ok').onclick=()=>selfCheck('ok',q,div,sb);
    sb.querySelector('.btn-ng').onclick=()=>selfCheck('ng',q,div,sb);
    div.appendChild(sb);
  };
  div.appendChild(ma);
  div.appendChild(showBtn);
  block.appendChild(div);
}

function selfCheck(result,q,div,sb){
  sb.querySelectorAll('button').forEach(b=>b.disabled=true);
  const isOk = result==='ok';
  if(isOk){ stats.self_ok++; }
  else { stats.self_ng++; currentItem.ex._wrong=true; }
  const lbl=document.createElement('div');
  lbl.className='result-label '+(isOk?'result-correct':'result-wrong');
  lbl.textContent=isOk?'⭕️ 正解':'❌ 不正解';
  div.appendChild(lbl);
  if(q.explanation){
    const e=document.createElement('div');
    e.className='explanation-box';
    e.textContent=q.explanation;
    div.appendChild(e);
  }
  // Q3完了→次へボタン表示
  if(currentItem.ex._wrong) retryQueue.push(currentItem);
  const btn=document.getElementById('btn-next');
  btn.classList.remove('hidden');
  if(queue.length===0&&retryQueue.length===0)
    btn.textContent='結果を見る →';
}

// 4択を構成：正解1 + distractor_choicesからランダム3
// 「誰から」が正解と同じものが1個または2個になるようランダムに混在
function buildChoices4(q){
  const correct = q.correct_answer;
  if(!q.distractor_choices || q.distractor_choices.length===0){
    return [...q.choices]; // フォールバック
  }
  const correctFrom = correct.split('→')[0];
  // 同じ「誰から」の誤答と異なる「誰から」の誤答を分類
  const sameFrom = q.distractor_choices.filter(d=>d.split('→')[0]===correctFrom);
  const diffFrom = q.distractor_choices.filter(d=>d.split('→')[0]!==correctFrom);
  // ランダムに「同じ誰から」を1個または2個含める
  const includeSame = Math.random()<0.5 ? 1 : Math.min(2, sameFrom.length);
  const samePicked = shuffle([...sameFrom]).slice(0, includeSame);
  const remaining = 3 - samePicked.length;
  const diffPicked = shuffle([...diffFrom]).slice(0, remaining);
  // diffが足りない場合sameで補完
  const extra = 3 - samePicked.length - diffPicked.length;
  const extraPicked = extra>0 ? shuffle([...sameFrom].filter(d=>!samePicked.includes(d))).slice(0,extra) : [];
  return [correct, ...samePicked, ...diffPicked, ...extraPicked].slice(0,4);
}

function showResult(){
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
  const c=stats.correct+stats.self_ok;
  const w=stats.wrong+stats.self_ng;
  const pct=w+c>0?Math.round(c/(c+w)*100):100;
  document.getElementById('result-badge').textContent=pct>=80?'🎉':pct>=60?'👍':'📖';
  document.getElementById('result-sub').textContent=`正答率 ${pct}%`;
  document.getElementById('result-score').textContent=`${c} 問正解 / ${c+w} 問中`;
  document.getElementById('result-details').innerHTML=`
    <div class="result-row"><span>選択問題 正解</span><span>${stats.correct} 問</span></div>
    <div class="result-row"><span>選択問題 不正解</span><span>${stats.wrong} 問</span></div>
    <div class="result-row"><span>和訳 自己○</span><span>${stats.self_ok} 問</span></div>
    <div class="result-row"><span>和訳 自己✕</span><span>${stats.self_ng} 問</span></div>`;
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
