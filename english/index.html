<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つばめ英語 — 演習一覧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c2436;
    --ink-soft: #3a4257;
    --paper: #fefdfb;
    --bg: #f5f3ee;
    --accent: #8a1f2b;
    --accent-deep: #6b1620;
    --subtle: #6e6a5f;
    --border: #c9c3b3;
    --border-soft: #e0dccf;
    --highlight: #f7f1de;
    --rule-gold: #a08940;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 30%, rgba(160,137,64,0.02) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(28,36,54,0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 16px;
    padding: 40px 0 28px;
    position: relative;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.82em;
    letter-spacing: 0.4em;
    color: var(--subtle);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .title-main {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 2em;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--ink);
  }

  .title-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15em;
    color: var(--subtle);
    letter-spacing: 0.2em;
    margin-top: 10px;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--rule-gold);
    margin: 22px auto 0;
  }

  .lead {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.95em;
    margin-bottom: 34px;
    letter-spacing: 0.03em;
  }

  /* アプリ選択カード */
  .app-grid {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .app-card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 30px 30px 26px;
    position: relative;
    overflow: hidden;
    transition: all 0.22s ease;
    box-shadow: 0 1px 0 var(--border-soft), 0 4px 20px rgba(28,36,54,0.04);
  }

  /* 左端のゴールド罫線 */
  .app-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--rule-gold);
    opacity: 0.55;
    transition: opacity 0.22s ease, width 0.22s ease;
  }

  .app-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 26px rgba(28,36,54,0.09);
  }

  .app-card:hover::before {
    opacity: 1;
    width: 5px;
    background: var(--accent);
  }

  /* カード上部: アイコンの行 */
  .app-head {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .app-icon {
    flex-shrink: 0;
    width: 46px;
    height: 46px;
  }

  .app-name-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4em;
    font-weight: 600;
    font-style: italic;
    color: var(--accent);
    line-height: 1.05;
    letter-spacing: 0.01em;
  }

  .app-name-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.15em;
    font-weight: 700;
    color: var(--ink);
    margin: 10px 0 8px;
    letter-spacing: 0.04em;
  }

  .app-desc {
    font-size: 0.9em;
    color: var(--subtle);
    line-height: 1.7;
    max-width: 90%;
  }

  .app-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border-soft);
  }

  .app-modes {
    font-size: 0.78em;
    color: var(--subtle);
    letter-spacing: 0.04em;
  }

  .app-enter {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.88em;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    transition: transform 0.22s ease;
  }

  .app-card:hover .app-enter {
    transform: translateX(4px);
  }

  footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    color: var(--subtle);
    font-size: 0.72em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 0.25em;
  }

  footer::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 16px;
  }

  @media (max-width: 480px) {
    .title-main { font-size: 1.6em; }
    .app-name-en { font-size: 2em; }
    .app-desc { max-width: 100%; }
    .app-card { padding: 26px 22px 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="brand">Swallow-Base</div>
    <div class="title-main">つばめ英語</div>
    <div class="title-sub">English Training</div>
  </header>

  <p class="lead">取り組みたい演習を選んでください。</p>

  <div class="app-grid">

    <a class="app-card" href="suffix/">
      <div class="app-head">
        <svg class="app-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="9" width="36" height="30" rx="2" stroke="var(--ink)" stroke-width="1.5"/>
          <line x1="24" y1="9" x2="24" y2="39" stroke="var(--ink)" stroke-width="1.5"/>
          <text x="15" y="28" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="13" fill="var(--accent)" text-anchor="middle">A</text>
          <text x="33" y="28" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="var(--accent)" text-anchor="middle">字</text>
          <line x1="10" y1="33" x2="20" y2="33" stroke="var(--rule-gold)" stroke-width="1"/>
          <line x1="28" y1="33" x2="38" y2="33" stroke="var(--rule-gold)" stroke-width="1"/>
        </svg>
      </div>
      <div class="app-name-en">Suffix</div>
      <div class="app-name-jp">接尾辞演習</div>
      <div class="app-desc">
        -tion / -ful / -ly などの接尾辞や単語から、名詞・形容詞・副詞のいずれを作るかを答える演習です。
      </div>
      <div class="app-foot">
        <span class="app-modes">2モード ・ 接尾辞 → 品詞 / 単語 → 品詞</span>
        <span class="app-enter">演習へ →</span>
      </div>
    </a>

    <a class="app-card" href="preposition/">
      <div class="app-head">
        <svg class="app-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="17" stroke="var(--ink)" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="2.5" fill="var(--accent)"/>
          <path d="M24 24 L31 14" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M24 24 L17 30" stroke="var(--rule-gold)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="24" y1="5" x2="24" y2="9" stroke="var(--ink)" stroke-width="1.5"/>
          <line x1="24" y1="39" x2="24" y2="43" stroke="var(--ink)" stroke-width="1.5"/>
          <line x1="5" y1="24" x2="9" y2="24" stroke="var(--ink)" stroke-width="1.5"/>
          <line x1="39" y1="24" x2="43" y2="24" stroke="var(--ink)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="app-name-en">Preposition</div>
      <div class="app-name-jp">前置詞演習</div>
      <div class="app-desc">
        in / at / by などの前置詞のコアイメージや、例文の空所に入る前置詞を答える演習です。
      </div>
      <div class="app-foot">
        <span class="app-modes">3モード ・ コアイメージ / 空所補充 / 発展</span>
        <span class="app-enter">演習へ →</span>
      </div>
    </a>

  </div>

  <footer>
    SWALLOW-BASE — English
  </footer>

</div>
</body>
</html>
