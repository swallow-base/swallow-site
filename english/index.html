<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つばめ英語 — 接尾辞演習 v1.4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* 英語参考書・辞書を意識した配色 */
    --ink: #1c2436;           /* 深いインクブルー */
    --ink-soft: #3a4257;
    --paper: #fefdfb;         /* 紙の白 */
    --bg: #f5f3ee;            /* 古い洋書のクリーム色 */
    --accent: #8a1f2b;        /* オックスフォード赤 */
    --accent-deep: #6b1620;
    --subtle: #6e6a5f;
    --border: #c9c3b3;
    --border-soft: #e0dccf;
    --correct: #1f5d3f;
    --wrong: #8a1f2b;
    --highlight: #f7f1de;
    --rule-gold: #a08940;     /* 装飾線のゴールド */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  /* 紙のテクスチャ感を出すための微妙な背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 30%, rgba(160,137,64,0.02) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(28,36,54,0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    padding: 28px 0 24px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--rule-gold);
    margin: 18px auto 0;
  }

  .title-main {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.45em;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--ink);
  }

  .title-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.7em;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--subtle);
    margin-top: 8px;
    text-transform: none;
  }

  .title-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1em;
    color: var(--subtle);
    letter-spacing: 0.18em;
    margin-top: 8px;
  }

  /* モード選択画面 */
  .mode-select {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 28px;
    box-shadow: 0 1px 0 var(--border-soft), 0 4px 20px rgba(28,36,54,0.04);
  }

  .mode-select h2 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1em;
    font-weight: 500;
    margin-bottom: 28px;
    text-align: center;
    color: var(--ink);
    letter-spacing: 0.1em;
  }

  .mode-select h2::after {
    content: '';
    display: block;
    width: 30px;
    height: 1px;
    background: var(--border);
    margin: 12px auto 0;
  }

  .mode-btn {
    display: block;
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 26px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    font-family: 'Noto Sans JP', sans-serif;
    position: relative;
  }

  .mode-btn:hover {
    border-color: var(--accent);
    background: var(--highlight);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(28,36,54,0.06);
  }

  .mode-btn .mode-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2em;
    font-weight: 600;
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 2px;
    line-height: 1;
  }

  .mode-btn .mode-title {
    font-size: 1.02em;
    font-weight: 700;
    color: var(--ink);
    margin: 8px 0 6px;
  }

  .mode-btn .mode-desc {
    font-size: 0.85em;
    color: var(--subtle);
    line-height: 1.6;
  }

  .mode-btn .mode-count {
    font-size: 0.78em;
    color: var(--subtle);
    margin-top: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.05em;
  }

  /* クイズ画面 */
  .quiz-screen { display: none; }
  .quiz-screen.active { display: block; }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 12px 18px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.85em;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--subtle);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9em;
    padding: 4px 8px;
  }

  .back-btn:hover { color: var(--accent); }

  .progress {
    color: var(--subtle);
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.05em;
    font-size: 0.9em;
  }

  .progress strong {
    color: var(--ink);
    font-weight: 600;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25em;
    margin: 0 2px;
  }

  .question-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px 28px;
    margin-bottom: 16px;
    position: relative;
  }

  .question-label {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78em;
    font-weight: 500;
    color: var(--subtle);
    letter-spacing: 0.35em;
    margin-bottom: 4px;
    text-align: center;
    padding-left: 0.35em;
  }

  .question-label::after {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--rule-gold);
    margin: 10px auto 0;
  }

  .question-target {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.2em;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    padding: 18px 0 8px;
    letter-spacing: 0.01em;
  }

  .question-target.small {
    font-size: 2.5em;
  }

  .question-target .target-note {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.32em;
    font-weight: 500;
    color: var(--subtle);
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }

  .question-prompt {
    text-align: center;
    color: var(--subtle);
    font-size: 0.92em;
    margin-top: 4px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .multi-notice {
    display: none;
    margin-top: 10px;
    padding: 8px 14px;
    background: var(--highlight);
    border: 1px solid var(--rule-gold);
    border-radius: 3px;
    color: var(--accent-deep);
    font-size: 0.88em;
    font-weight: 700;
    text-align: center;
  }

  .multi-notice.show { display: block; }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .choice-btn {
    padding: 16px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1em;
    font-weight: 500;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }

  .choice-btn:hover:not(:disabled) {
    background: var(--highlight);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .choice-btn:disabled { cursor: default; }

  .choice-btn.selected {
    background: var(--highlight);
    border-color: var(--accent);
    border-width: 2px;
    color: var(--accent-deep);
    font-weight: 700;
  }

  .choice-btn.correct {
    background: #e3eee7;
    border-color: var(--correct);
    border-width: 2px;
    color: var(--correct);
    font-weight: 700;
  }

  .choice-btn.wrong {
    background: #f3dee0;
    border-color: var(--wrong);
    border-width: 2px;
    color: var(--wrong);
  }

  .choice-btn.dimmed {
    opacity: 0.35;
  }

  /* 「わからない」ボタン */
  .dontknow-btn {
    width: 100%;
    padding: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.92em;
    font-weight: 500;
    background: var(--paper);
    border: 1px dashed var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--subtle);
    margin-bottom: 12px;
  }

  .dontknow-btn:hover:not(:disabled) {
    background: var(--highlight);
    border-color: var(--subtle);
    border-style: solid;
    color: var(--ink);
  }

  .dontknow-btn:disabled { cursor: default; }

  .dontknow-btn.dimmed { opacity: 0.35; }

  /* レビュー画面 */
  .review-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 28px;
  }

  .review-card h2 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.2em;
    font-weight: 700;
    margin-bottom: 8px;
    text-align: center;
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  .review-card h2::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--rule-gold);
    margin: 14px auto 0;
  }

  .review-summary {
    text-align: center;
    color: var(--subtle);
    font-size: 0.92em;
    margin: 14px 0 24px;
  }

  .review-summary .num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    color: var(--accent);
    font-size: 1.4em;
    margin: 0 3px;
  }

  .wrong-list {
    margin-bottom: 28px;
  }

  .wrong-item {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
    background: var(--paper);
  }

  .wrong-item-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
  }

  .wrong-item-header:hover {
    background: var(--highlight);
  }

  .wrong-item-target {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4em;
    font-weight: 500;
    color: var(--ink);
    flex-shrink: 0;
  }

  .wrong-item-meta {
    font-size: 0.82em;
    color: var(--subtle);
    flex-grow: 1;
    text-align: right;
  }

  .wrong-item-meta .user-ans {
    color: var(--wrong);
    font-weight: 700;
  }

  .wrong-item-meta .correct-ans {
    color: var(--correct);
    font-weight: 700;
  }

  .wrong-item-toggle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4em;
    color: var(--subtle);
    transition: transform 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .wrong-item.expanded .wrong-item-toggle {
    transform: rotate(45deg);
  }

  .wrong-item-body {
    display: none;
    padding: 16px 18px 18px;
    border-top: 1px solid var(--border-soft);
    background: var(--bg);
    font-size: 0.9em;
    line-height: 1.8;
  }

  .wrong-item.expanded .wrong-item-body {
    display: block;
  }

  .wrong-item-body .label {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--accent);
    margin-right: 6px;
    font-size: 0.92em;
  }

  .wrong-item-body code {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    background: var(--highlight);
    padding: 1px 8px;
    border-radius: 2px;
    color: var(--ink);
  }

  .wrong-item-body .note {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--paper);
    border-left: 3px solid var(--accent);
    border-radius: 0 3px 3px 0;
    font-size: 0.92em;
    color: var(--ink-soft);
  }

  .review-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .review-actions button {
    width: 100%;
    padding: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.98em;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .review-actions .primary-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
  }

  .review-actions .primary-btn:hover {
    background: var(--accent);
  }

  .review-actions .secondary-btn {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .review-actions .secondary-btn:hover {
    background: var(--highlight);
    border-color: var(--accent);
    color: var(--accent);
  }

  .submit-btn {
    display: none;
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.98em;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .submit-btn:hover { background: var(--accent); }
  .submit-btn:disabled { background: var(--subtle); cursor: default; opacity: 0.6; }
  .submit-btn.show { display: block; }

  /* 解説 */
  .feedback {
    display: none;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 26px;
    margin-bottom: 16px;
    position: relative;
  }

  .feedback.show { display: block; }

  .feedback::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--rule-gold);
    border-radius: 3px 0 0 3px;
  }

  .feedback-result {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    margin-bottom: 14px;
    font-size: 1.1em;
    letter-spacing: 0.1em;
  }

  .feedback-result.correct { color: var(--correct); }
  .feedback-result.wrong { color: var(--wrong); }

  .feedback-body {
    font-size: 0.92em;
    line-height: 1.85;
    color: var(--ink);
  }

  .feedback-row {
    margin-bottom: 4px;
  }

  .feedback-body .label {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--accent);
    margin-right: 8px;
    letter-spacing: 0.05em;
  }

  .feedback-body code {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    background: var(--highlight);
    padding: 1px 8px;
    border-radius: 2px;
    font-size: 1.05em;
    color: var(--ink);
  }

  .feedback-body .note {
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--highlight);
    border-left: 3px solid var(--accent);
    border-radius: 0 3px 3px 0;
    font-size: 0.9em;
    color: var(--ink-soft);
  }

  .next-btn {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.98em;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.1em;
  }

  .next-btn:hover { background: var(--accent); }

  /* 完了画面 */
  .complete-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px 28px;
    text-align: center;
  }

  .complete-card h2 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.3em;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink);
    letter-spacing: 0.08em;
  }

  .complete-card h2::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--rule-gold);
    margin: 14px auto 0;
  }

  .complete-card p {
    color: var(--subtle);
    margin: 16px 0 24px;
    font-size: 0.92em;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 36px;
    margin: 24px 0 32px;
  }

  .stat-item .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6em;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }

  .stat-item .stat-label {
    font-size: 0.8em;
    color: var(--subtle);
    letter-spacing: 0.05em;
    margin-top: 6px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .restart-btn {
    padding: 12px 28px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.92em;
    cursor: pointer;
    margin: 0 6px;
    letter-spacing: 0.05em;
  }

  .restart-btn:hover { background: var(--accent); }

  .restart-btn.secondary {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .restart-btn.secondary:hover {
    background: var(--highlight);
    border-color: var(--accent);
    color: var(--accent);
  }

  footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    color: var(--subtle);
    font-size: 0.72em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 0.25em;
  }

  footer::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 16px;
  }

  @media (max-width: 480px) {
    .title-main { font-size: 1.6em; }
    .question-target { font-size: 2.4em; }
    .question-target.small { font-size: 1.9em; }
    .choices { grid-template-columns: 1fr; }
    .stats { gap: 22px; }
    .stat-item .stat-num { font-size: 2.1em; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-main">つばめ英語 — 接尾辞演習</div>
    <div class="title-sub">Suffix Training</div>
  </header>

  <!-- モード選択 -->
  <div id="modeSelect" class="mode-select">
    <h2>モードを選んでください</h2>
    <button class="mode-btn" onclick="startQuiz('A')">
      <div class="mode-label">A.</div>
      <div class="mode-title">接尾辞から品詞を答える</div>
      <div class="mode-desc">表示される接尾辞(例: -tion, -ful, -ly)から、名詞・形容詞・副詞のどれを作るかを答えます。</div>
      <div class="mode-count" id="countA"></div>
    </button>
    <button class="mode-btn" onclick="startQuiz('B')">
      <div class="mode-label">B.</div>
      <div class="mode-title">単語から品詞を答える</div>
      <div class="mode-desc">表示される英単語(例: information, friendly)が、名詞・形容詞・副詞のどれかを答えます。</div>
      <div class="mode-count" id="countB"></div>
    </button>
  </div>

  <!-- クイズ画面 -->
  <div id="quizScreen" class="quiz-screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="backToMode()">← モード選択へ</button>
      <div class="progress">
        <span id="roundLabel"></span>残り <strong id="remaining">0</strong> / 正解 <strong id="correct">0</strong>
      </div>
    </div>

    <div class="question-card">
      <div class="question-label">問題</div>
      <div class="question-target" id="qTarget"></div>
      <div class="question-prompt" id="qPrompt">この語が作る(またはこの語の)品詞は?</div>
      <div class="multi-notice" id="multiNotice">複数選択可 — 当てはまるものをすべて選択してください</div>
    </div>

    <div class="choices">
      <button class="choice-btn" data-pos="noun" onclick="selectChoice('noun')">名詞</button>
      <button class="choice-btn" data-pos="adjective" onclick="selectChoice('adjective')">形容詞</button>
      <button class="choice-btn" data-pos="adverb" onclick="selectChoice('adverb')">副詞</button>
    </div>

    <button class="dontknow-btn" id="dontknowBtn" onclick="selectDontKnow()">わからない</button>

    <button class="submit-btn" id="submitBtn" onclick="submitMulti()">決定</button>

    <div class="feedback" id="feedback">
      <div class="feedback-result" id="feedbackResult"></div>
      <div class="feedback-body" id="feedbackBody"></div>
    </div>

let totalCorrect = 0;          // セッション全体の累計
let answered = false;

/* ============================================
   問題プール生成
   ============================================ */

function buildPool(mode) {
  if (mode === 'A') {
    return SUFFIX_DATA.map(item => ({
      target: item.suffix,
      targetNote: item.targetNote || null,
      answers: item.answers,
      multi: item.multi || false,
      example: item.example,
      meaning: item.meaning,
      note: item.note || null,
      type: 'suffix'
    }));
  } else {
    return WORD_DATA.map(item => ({
      target: item.word,
      answers: item.answers,
      multi: false,
      suffix: item.suffix,
      meaning: item.meaning,
      note: item.note || null,
      type: 'word'
    }));
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================
   画面遷移
   ============================================ */

function startQuiz(mode) {
  currentMode = mode;
  totalAttempts = 0;
  totalCorrect = 0;
  const pool = buildPool(mode);
  startRound(pool, 1);
}

function startRound(questions, roundNum) {
  currentRound = roundNum;
  // 各問題に答えの記録フィールドを付ける(新しいオブジェクト)
  currentQueue = shuffle(questions).map(q => ({
    ...q,
    userAnswer: null,
    isCorrect: null
  }));
  wrongList = [];
  
  // 画面切り替え
  document.getElementById('modeSelect').style.display = 'none';
  document.getElementById('reviewScreen').classList.remove('active');
  document.getElementById('completeScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.add('active');
  
  showNextQuestion();
}

function startNextRound() {
  // 間違えた問題のみで次の周回
  // wrongListをコピーして次の周回のpoolにする(元の記録は破棄して新たに採る)
  const nextPool = wrongList.map(q => {
    // 元の問題データを復元(userAnswer等は除く)
    const { userAnswer, isCorrect, ...orig } = q;
    return orig;
  });
  startRound(nextPool, currentRound + 1);
}

function backToMode() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('reviewScreen').classList.remove('active');
  document.getElementById('completeScreen').classList.remove('active');
  document.getElementById('modeSelect').style.display = 'block';
  updateCounts();
}

function restartQuiz() {
  startQuiz(currentMode);
}

function showNextQuestion() {
  if (currentQueue.length === 0) {
    // 周回終了 → レビュー画面か完了画面へ
    onRoundEnd();
    return;
  }
  
  currentQuestion = currentQueue[0];
  answered = false;
  multiSelected = new Set();
  
  // ターゲット表示
  const targetEl = document.getElementById('qTarget');
  if (currentQuestion.targetNote) {
    targetEl.innerHTML = currentQuestion.target + '<span class="target-note">(' + currentQuestion.targetNote + ')</span>';
  } else {
    targetEl.textContent = currentQuestion.target;
  }
  
  if (currentQuestion.target.length > 11) {
    targetEl.classList.add('small');
  } else {
    targetEl.classList.remove('small');
  }
  
  // プロンプト
  const promptEl = document.getElementById('qPrompt');
  if (currentMode === 'A') {
    promptEl.textContent = 'この接尾辞が作る品詞は?';
  } else {
    promptEl.textContent = 'この単語の品詞は?';
  }
  
  // 複数選択通知
  const multiNotice = document.getElementById('multiNotice');
  if (currentQuestion.multi) {
    multiNotice.classList.add('show');
  } else {
    multiNotice.classList.remove('show');
  }
  
  // 選択肢リセット
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = false;
    btn.className = 'choice-btn';
  });
  
  // 「わからない」ボタンリセット
  const dontknowBtn = document.getElementById('dontknowBtn');
  dontknowBtn.disabled = false;
  dontknowBtn.classList.remove('dimmed');
  dontknowBtn.style.display = 'block';
  
  // 決定ボタン
  const submitBtn = document.getElementById('submitBtn');
  if (currentQuestion.multi) {
    submitBtn.classList.add('show');
    submitBtn.disabled = true;
  } else {
    submitBtn.classList.remove('show');
  }
  
  // フィードバック非表示
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';
  
  updateProgress();
}

function onRoundEnd() {
  if (wrongList.length === 0) {
    // 全問正解 → セッション終了
    showComplete();
  } else {
    // 間違いあり → レビュー画面
    showReviewScreen();
  }
}

function updateProgress() {
  document.getElementById('remaining').textContent = currentQueue.length;
  document.getElementById('correct').textContent = totalCorrect;
  const roundLabel = document.getElementById('roundLabel');
  if (currentRound >= 2) {
    roundLabel.innerHTML = `<span style="color: var(--accent); font-weight: 700;">${currentRound}周目</span> ・ `;
  } else {
    roundLabel.innerHTML = '';
  }
}

function updateCounts() {
  document.getElementById('countA').textContent = 
    `収録: ${SUFFIX_DATA.length}問`;
  document.getElementById('countB').textContent = 
    `収録: ${WORD_DATA.length}問`;
}

/* ============================================
   解答処理
   ============================================ */

function selectChoice(choice) {
  if (answered) return;
  
  if (currentQuestion.multi) {
    // 複数選択モード: トグル
    const btn = document.querySelector(`.choice-btn[data-pos="${choice}"]`);
    if (multiSelected.has(choice)) {
      multiSelected.delete(choice);
      btn.classList.remove('selected');
    } else {
      multiSelected.add(choice);
      btn.classList.add('selected');
    }
    document.getElementById('submitBtn').disabled = multiSelected.size === 0;
  } else {
    judgeAnswer([choice]);
  }
}

function selectDontKnow() {
  if (answered) return;
  // 「わからない」は即座に不正解として判定
  judgeAnswer(['__dontknow__']);
}

function submitMulti() {
  if (answered || multiSelected.size === 0) return;
  judgeAnswer([...multiSelected]);
}

function judgeAnswer(selectedArr) {
  answered = true;
  totalAttempts++;
  
  const isDontKnow = selectedArr.length === 1 && selectedArr[0] === '__dontknow__';
  const correctSet = new Set(currentQuestion.answers);
  const selectedSet = new Set(isDontKnow ? [] : selectedArr);
  
  // 正誤判定: 「わからない」は不正解、それ以外は完全一致で正解
  let isCorrect = false;
  if (!isDontKnow) {
    isCorrect = correctSet.size === selectedSet.size;
    if (isCorrect) {
      for (const a of correctSet) {
        if (!selectedSet.has(a)) { isCorrect = false; break; }
      }
    }
  }
  
  // 問題に記録
  currentQuestion.userAnswer = isDontKnow ? ['__dontknow__'] : [...selectedSet];
  currentQuestion.isCorrect = isCorrect;
  
  // ボタンスタイル更新
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const pos = btn.dataset.pos;
    btn.classList.remove('selected');
    
    if (correctSet.has(pos)) {
      btn.classList.add('correct');
      if (!selectedSet.has(pos)) {
        btn.classList.add('dimmed');
      }
    } else {
      if (selectedSet.has(pos)) {
        btn.classList.add('wrong');
      } else {
        btn.classList.add('dimmed');
      }
    }
  });
  
  // 「わからない」ボタン無効化
  const dontknowBtn = document.getElementById('dontknowBtn');
  dontknowBtn.disabled = true;
  if (isDontKnow) {
    dontknowBtn.classList.add('dimmed');
  } else {
    dontknowBtn.classList.add('dimmed');
  }
  
  // 決定ボタンを隠す
  document.getElementById('submitBtn').classList.remove('show');
  
  // フィードバック表示
  const feedback = document.getElementById('feedback');
  const resultEl = document.getElementById('feedbackResult');
  const bodyEl = document.getElementById('feedbackBody');
  
  if (isCorrect) {
    totalCorrect++;
    resultEl.textContent = '正解';
    resultEl.className = 'feedback-result correct';
  } else {
    resultEl.textContent = isDontKnow ? 'わからない(不正解扱い)' : '不正解';
    resultEl.className = 'feedback-result wrong';
  }
  
  bodyEl.innerHTML = buildFeedback(currentQuestion);
  feedback.classList.add('show');
  
  document.getElementById('nextBtn').style.display = 'block';
  
  // キュー処理: 1問1回出題、不正解はwrongListに追加
  if (!isCorrect) {
    wrongList.push(currentQuestion);
  }
  currentQueue.shift();
  
  updateProgress();
}

function buildFeedback(q) {
  const posLabel = { noun: '名詞', adjective: '形容詞', adverb: '副詞' };
  let html = '';
  
  const answerStr = q.answers.map(a => posLabel[a]).join(' / ');
  html += `<div class="feedback-row"><span class="label">品詞:</span>${answerStr}</div>`;
  
  if (q.type === 'suffix') {
    html += `<div class="feedback-row"><span class="label">例:</span>${q.example.includes('<code>') ? q.example : '<code>' + q.example + '</code>'}</div>`;
    if (q.meaning) {
      html += `<div class="feedback-row"><span class="label">意味:</span>${q.meaning}</div>`;
    }
  } else {
    if (q.suffix) {
      html += `<div class="feedback-row"><span class="label">接尾辞:</span><code>${q.suffix}</code></div>`;
    }
    if (q.meaning) {
      html += `<div class="feedback-row"><span class="label">意味:</span>${q.meaning}</div>`;
    }
  }
  
  if (q.note) {
    html += `<div class="note">${q.note}</div>`;
  }
  
  return html;
}

function nextQuestion() {
  showNextQuestion();
}

/* ============================================
   レビュー画面
   ============================================ */

function showReviewScreen() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('completeScreen').classList.remove('active');
  document.getElementById('reviewScreen').classList.add('active');
  
  document.getElementById('reviewTitle').textContent = `${currentRound}周目の結果`;
  
  const totalThisRound = currentRound === 1 ? buildPool(currentMode).length : 
    (wrongList.length > 0 ? null : 0);
  // 周回ごとの出題数は、1周目=全問、2周目以降=前周のwrong数
  // ただしこの時点で currentQueue は空、wrongListに記録あり
  // 周の出題数は wrongList の集計から逆算するのは難しいので、別途記録すべきだが、
  // シンプルに wrongList.length(間違い数)だけ表示する
  
  const summaryEl = document.getElementById('reviewSummary');
  summaryEl.innerHTML = `間違えた問題: <span class="num">${wrongList.length}</span> 問<br>タップで解説を表示できます。`;
  
  // 間違いリストを表示
  const wrongListEl = document.getElementById('wrongList');
  wrongListEl.innerHTML = '';
  
  const posLabel = { noun: '名詞', adjective: '形容詞', adverb: '副詞' };
  
  wrongList.forEach((q, idx) => {
    const item = document.createElement('div');
    item.className = 'wrong-item';
    
    // ユーザーの解答表示
    let userAnsStr;
    if (q.userAnswer.length === 1 && q.userAnswer[0] === '__dontknow__') {
      userAnsStr = 'わからない';
    } else {
      userAnsStr = q.userAnswer.map(a => posLabel[a]).join('・');
    }
    const correctAnsStr = q.answers.map(a => posLabel[a]).join('・');
    
    item.innerHTML = `
      <div class="wrong-item-header" onclick="toggleWrongItem(${idx})">
        <span class="wrong-item-target">${q.target}</span>
        <span class="wrong-item-meta">
          あなた: <span class="user-ans">${userAnsStr}</span> / 正解: <span class="correct-ans">${correctAnsStr}</span>
        </span>
        <span class="wrong-item-toggle">+</span>
      </div>
      <div class="wrong-item-body">
        ${buildFeedback(q)}
      </div>
    `;
    
    wrongListEl.appendChild(item);
  });
}

function toggleWrongItem(idx) {
  const items = document.querySelectorAll('.wrong-item');
  if (items[idx]) {
    items[idx].classList.toggle('expanded');
  }
}

function endSession() {
  showComplete();
}

function showComplete() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('reviewScreen').classList.remove('active');
  document.getElementById('completeScreen').classList.add('active');
  
  document.getElementById('totalAttempts').textContent = totalAttempts;
  document.getElementById('totalCorrect').textContent = totalCorrect;
  const acc = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
  document.getElementById('accuracy').textContent = acc + '%';
}

/* 初期化 */
updateCounts();
