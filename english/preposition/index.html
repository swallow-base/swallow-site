<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つばめ英語 — 前置詞演習 v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c2436;
    --ink-soft: #3a4257;
    --paper: #fefdfb;
    --bg: #f5f3ee;
    --accent: #8a1f2b;
    --accent-deep: #6b1620;
    --subtle: #6e6a5f;
    --border: #c9c3b3;
    --border-soft: #e0dccf;
    --correct: #1f5d3f;
    --wrong: #8a1f2b;
    --highlight: #f7f1de;
    --rule-gold: #a08940;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 30%, rgba(160,137,64,0.02) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(28,36,54,0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    padding: 28px 0 24px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--rule-gold);
    margin: 18px auto 0;
  }

  .title-main {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.45em;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--ink);
  }

  .title-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1em;
    color: var(--subtle);
    letter-spacing: 0.18em;
    margin-top: 8px;
  }

  /* モード選択画面 */
  .mode-select {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 28px;
    box-shadow: 0 1px 0 var(--border-soft), 0 4px 20px rgba(28,36,54,0.04);
  }

  .home-link {
    display: inline-block;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85em;
    color: var(--subtle);
    text-decoration: none;
    margin-bottom: 18px;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }

  .home-link:hover { color: var(--accent); }

  .mode-select h2 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1em;
    font-weight: 500;
    margin-bottom: 28px;
    text-align: center;
    color: var(--ink);
    letter-spacing: 0.1em;
  }

  .mode-select h2::after {
    content: '';
    display: block;
    width: 30px;
    height: 1px;
    background: var(--border);
    margin: 12px auto 0;
  }

  .mode-btn {
    display: block;
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 26px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    font-family: 'Noto Sans JP', sans-serif;
    position: relative;
  }

  .mode-btn:hover {
    border-color: var(--accent);
    background: var(--highlight);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(28,36,54,0.06);
  }

  .mode-btn .mode-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2em;
    font-weight: 600;
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 2px;
    line-height: 1;
  }

  .mode-btn .mode-title {
    font-size: 1.02em;
    font-weight: 700;
    color: var(--ink);
    margin: 8px 0 6px;
  }

  .mode-btn .mode-desc {
    font-size: 0.85em;
    color: var(--subtle);
    line-height: 1.6;
  }

  .mode-btn .mode-count {
    font-size: 0.78em;
    color: var(--subtle);
    margin-top: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.05em;
  }

  /* クイズ画面 */
  .quiz-screen { display: none; }
  .quiz-screen.active { display: block; }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 12px 18px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.85em;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--subtle);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9em;
    padding: 4px 8px;
  }

  .back-btn:hover { color: var(--accent); }

  .progress {
    color: var(--subtle);
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.05em;
    font-size: 0.9em;
  }

  .progress strong {
    color: var(--ink);
    font-weight: 600;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25em;
    margin: 0 2px;
  }

  .question-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px 28px;
    margin-bottom: 16px;
    position: relative;
  }

  .question-label {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78em;
    font-weight: 500;
    color: var(--subtle);
    letter-spacing: 0.35em;
    margin-bottom: 4px;
    text-align: center;
    padding-left: 0.35em;
  }

  .question-label::after {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--rule-gold);
    margin: 10px auto 0;
  }

  /* モードA/C: 前置詞単体表示 */
  .question-target {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.2em;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    padding: 18px 0 8px;
    letter-spacing: 0.01em;
  }

  .question-target.small { font-size: 2.5em; }

  /* モードB: 例文表示 */
  .question-sentence {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8em;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    padding: 18px 8px 6px;
    line-height: 1.5;
  }

  .question-sentence .blank {
    display: inline-block;
    min-width: 2.2em;
    border-bottom: 2px solid var(--accent);
    margin: 0 0.12em;
    color: var(--accent);
    font-style: italic;
  }

  .question-gloss {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.6em;
    color: var(--subtle);
    text-align: center;
    margin-top: 10px;
    line-height: 1.6;
  }

  .question-prompt {
    text-align: center;
    color: var(--subtle);
    font-size: 0.92em;
    margin-top: 4px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .choices.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .choice-btn {
    padding: 16px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1em;
    font-weight: 500;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }

  /* モードB選択肢(前置詞)は英字装飾 */
  .choice-btn.prep {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.5em;
    font-weight: 600;
  }

  .choice-btn:hover:not(:disabled) {
    background: var(--highlight);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .choice-btn:disabled { cursor: default; }

  .choice-btn.correct {
    background: #e3eee7;
    border-color: var(--correct);
    border-width: 2px;
    color: var(--correct);
    font-weight: 700;
  }

  .choice-btn.wrong {
    background: #f3dee0;
    border-color: var(--wrong);
    border-width: 2px;
    color: var(--wrong);
  }

  .choice-btn.dimmed { opacity: 0.35; }

  .dontknow-btn {
    width: 100%;
    padding: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.92em;
    font-weight: 500;
    background: var(--paper);
    border: 1px dashed var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--subtle);
    margin-bottom: 12px;
  }

  .dontknow-btn:hover:not(:disabled) {
    background: var(--highlight);
    border-color: var(--subtle);
    border-style: solid;
    color: var(--ink);
  }

  .dontknow-btn:disabled { cursor: default; }
  .dontknow-btn.dimmed { opacity: 0.35; }

  /* レビュー画面 */
  .review-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 28px;
  }

  .review-card h2 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.2em;
    font-weight: 700;
    margin-bottom: 8px;
    text-align: center;
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  .review-card h2::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--rule-gold);
    margin: 14px auto 0;
  }

  .review-summary {
    text-align: center;
    color: var(--subtle);
    font-size: 0.92em;
    margin: 14px 0 24px;
  }

  .review-summary .num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    color: var(--accent);
    font-size: 1.4em;
    margin: 0 3px;
  }

  .wrong-list { margin-bottom: 28px; }

  .wrong-item {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
    background: var(--paper);
  }

  .wrong-item-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
  }

  .wrong-item-header:hover { background: var(--highlight); }

  .wrong-item-target {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3em;
    font-weight: 500;
    color: var(--ink);
    flex-shrink: 0;
    font-style: italic;
  }

  .wrong-item-target.sentence {
    font-size: 1.05em;
    font-style: normal;
  }

  .wrong-item-meta {
    font-size: 0.82em;
    color: var(--subtle);
    flex-grow: 1;
    text-align: right;
  }

  .wrong-item-meta .user-ans { color: var(--wrong); font-weight: 700; }
  .wrong-item-meta .correct-ans { color: var(--correct); font-weight: 700; }

  .wrong-item-toggle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4em;
    color: var(--subtle);
    transition: transform 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .wrong-item.expanded .wrong-item-toggle { transform: rotate(45deg); }

  .wrong-item-body {
    display: none;
    padding: 16px 18px 18px;
    border-top: 1px solid var(--border-soft);
    background: var(--bg);
    font-size: 0.9em;
    line-height: 1.8;
  }

  .wrong-item.expanded .wrong-item-body { display: block; }

  .wrong-item-body .label {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--accent);
    margin-right: 6px;
    font-size: 0.92em;
  }

  .wrong-item-body code {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    background: var(--highlight);
    padding: 1px 8px;
    border-radius: 2px;
    color: var(--ink);
  }

  .wrong-item-body .note {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--paper);
    border-left: 3px solid var(--accent);
    border-radius: 0 3px 3px 0;
    font-size: 0.92em;
    color: var(--ink-soft);
  }

  .review-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .review-actions button {
    width: 100%;
    padding: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.98em;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .review-actions .primary-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
  }

  .review-actions .primary-btn:hover { background: var(--accent); }

  .review-actions .secondary-btn {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .review-actions .secondary-btn:hover {
    background: var(--highlight);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* 解説 */
  .feedback {
    display: none;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 26px;
    margin-bottom: 16px;
    position: relative;
  }

  .feedback.show { display: block; }

  .feedback::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--rule-gold);
    border-radius: 3px 0 0 3px;
  }

  .feedback-result {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    margin-bottom: 14px;
    font-size: 1.1em;
    letter-spacing: 0.1em;
  }

  .feedback-result.correct { color: var(--correct); }
  .feedback-result.wrong { color: var(--wrong); }

  .feedback-body {
    font-size: 0.92em;
    line-height: 1.85;
    color: var(--ink);
  }

  .feedback-row { margin-bottom: 4px; }

  .feedback-body .label {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--accent);
    margin-right: 8px;
    letter-spacing: 0.05em;
  }

  .feedback-body code {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    background: var(--highlight);
    padding: 1px 8px;
    border-radius: 2px;
    font-size: 1.05em;
    color: var(--ink);
  }

  .feedback-body .note {
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--highlight);
    border-left: 3px solid var(--accent);
    border-radius: 0 3px 3px 0;
    font-size: 0.9em;
    color: var(--ink-soft);
  }

  .next-btn {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.98em;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.1em;
  }

  .next-btn:hover { background: var(--accent); }

  /* 完了画面 */
  .complete-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px 28px;
    text-align: center;
  }

  .complete-card h2 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.3em;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink);
    letter-spacing: 0.08em;
  }

  .complete-card h2::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--rule-gold);
    margin: 14px auto 0;
  }

  .complete-card p {
    color: var(--subtle);
    margin: 16px 0 24px;
    font-size: 0.92em;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 36px;
    margin: 24px 0 32px;
  }

  .stat-item .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6em;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }

  .stat-item .stat-label {
    font-size: 0.8em;
    color: var(--subtle);
    letter-spacing: 0.05em;
    margin-top: 6px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .restart-btn {
    padding: 12px 28px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.92em;
    cursor: pointer;
    margin: 0 6px;
    letter-spacing: 0.05em;
  }

  .restart-btn:hover { background: var(--accent); }

  .restart-btn.secondary {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .restart-btn.secondary:hover {
    background: var(--highlight);
    border-color: var(--accent);
    color: var(--accent);
  }

  footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    color: var(--subtle);
    font-size: 0.72em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 0.25em;
  }

  footer::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 16px;
  }

  .origin-note {
    text-align: center;
    font-size: 0.74em;
    color: var(--subtle);
    margin-top: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    .title-main { font-size: 1.3em; }
    .question-target { font-size: 2.6em; }
    .question-target.small { font-size: 2em; }
    .question-sentence { font-size: 1.35em; }
    .choices { grid-template-columns: 1fr 1fr; }
    .choices.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .stats { gap: 22px; }
    .stat-item .stat-num { font-size: 2.1em; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-main">つばめ英語 — 前置詞演習</div>
    <div class="title-sub">Preposition Training</div>
  </header>

  <!-- モード選択 -->
  <div id="modeSelect" class="mode-select">
    <a class="home-link" href="../">← 演習一覧へ</a>
    <h2>モードを選んでください</h2>
    <button class="mode-btn" onclick="startQuiz('A')">
      <div class="mode-label">A.</div>
      <div class="mode-title">前置詞からコアイメージを答える</div>
      <div class="mode-desc">表示される前置詞(例: in, at, by)の「コアイメージ(基本イメージ)」を選びます。</div>
      <div class="mode-count" id="countA"></div>
    </button>
    <button class="mode-btn" onclick="startQuiz('B')">
      <div class="mode-label">B.</div>
      <div class="mode-title">例文の空所に入る前置詞を答える</div>
      <div class="mode-desc">前置詞が空所になった例文を見て、当てはまる前置詞を選びます。1回ごとに全108問からランダムに30問を出題します。</div>
      <div class="mode-count" id="countB"></div>
    </button>
    <button class="mode-btn" onclick="startQuiz('C')">
      <div class="mode-label">C.</div>
      <div class="mode-title">前置詞からコアイメージを答える(発展)</div>
      <div class="mode-desc">資料外の前置詞(例: between, through, against)のコアイメージを選びます。誤答にはモードAの語のイメージも混ざります。</div>
      <div class="mode-count" id="countC"></div>
    </button>
  </div>

  <!-- クイズ画面 -->
  <div id="quizScreen" class="quiz-screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="backToMode()">← モード選択へ</button>
      <div class="progress">
        <span id="roundLabel"></span>残り <strong id="remaining">0</strong> / 正解 <strong id="correct">0</strong>
      </div>
    </div>

    <div class="question-card">
      <div class="question-label">問題</div>
      <div class="question-target" id="qTarget"></div>
      <div class="question-sentence" id="qSentence" style="display:none;"></div>
      <div class="question-gloss" id="qGloss" style="display:none;"></div>
      <div class="question-prompt" id="qPrompt"></div>
    </div>

    <div class="choices" id="choices"></div>

    <button class="dontknow-btn" id="dontknowBtn" onclick="selectDontKnow()">わからない</button>

    <div class="feedback" id="feedback">
      <div class="feedback-result" id="feedbackResult"></div>
      <div class="feedback-body" id="feedbackBody"></div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">次の問題へ →</button>
  </div>

  <!-- レビュー画面 -->

/* セッションあたりの最大出題数 */
const SESSION_SIZE = 30;

/* ============================================
   状態管理
   ============================================ */

let currentRound = 0;
let currentQueue = [];
let wrongList = [];
let currentQuestion = null;
let totalAttempts = 0;
let totalCorrect = 0;

/* ============================================
   ユーティリティ
   ============================================ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================
   選択肢生成
   ============================================ */

// モードA/C: コアイメージ選択肢。正解coreを必ず含め、誤答は重複ラベルを排除。
function buildCoreChoices(correctPrep, distractorPool, numChoices) {
  const usedLabels = new Set([correctPrep.core]);
  const choices = [{ value: correctPrep.core, isCorrect: true }];
  const pool = shuffle(distractorPool.filter(p => p.id !== correctPrep.id));
  for (const p of pool) {
    if (choices.length >= numChoices) break;
    if (usedLabels.has(p.core)) continue; // of/off など同一ラベルの重複を排除
    usedLabels.add(p.core);
    choices.push({ value: p.core, isCorrect: false });
  }
  return shuffle(choices);
}

// モードB: 前置詞選択肢。誤答は資料16語から。
function buildPrepChoices(correctPrep, numChoices) {
  const pool = shuffle(PREP_MASTER.filter(p => p.group === 'A' && p.id !== correctPrep.id));
  const choices = [{ value: correctPrep.id, disp: correctPrep.disp, isCorrect: true }];
  for (const p of pool) {
    if (choices.length >= numChoices) break;
    choices.push({ value: p.id, disp: p.disp, isCorrect: false });
  }
  return shuffle(choices);
}

/* ============================================
   問題プール生成
   ============================================ */
function buildPool(mode) {
  if (mode === 'A' || mode === 'C') {
    const group = mode === 'A' ? 'A' : 'C';
    const distractorPool = mode === 'A'
      ? PREP_MASTER.filter(p => p.group === 'A')
      : PREP_MASTER.slice(); // モードCは16語+発展10語から誤答を作る
    return PREP_MASTER.filter(p => p.group === group).map(p => ({
      kind: 'core',
      prepId: p.id,
      disp: p.disp,
      answerLabel: p.core,
      distractorPool: distractorPool,
    }));
  } else {
    return SENTENCE_DATA.map(s => ({
      kind: 'sentence',
      prepId: s.prep,
      sentence: s.sentence,
      gloss: s.gloss,
      note: s.note || null,
      answerDisp: MASTER_BY_ID[s.prep].disp,
    }));
  }
}

/* ============================================
   画面遷移
   ============================================ */
function startQuiz(mode) {
  currentMode = mode;
  totalAttempts = 0;
  totalCorrect = 0;
  let pool = buildPool(mode);
  pool = shuffle(pool).slice(0, SESSION_SIZE); // 母数がSESSION_SIZE未満なら全問
  startRound(pool, 1);
}

function startRound(questions, roundNum) {
  currentRound = roundNum;
  currentQueue = shuffle(questions).map(q => ({
    ...q,
    userAnswer: null,
    isCorrect: null,
    choices: null, // この周回で選択肢を固定
  }));
  wrongList = [];

  document.getElementById('modeSelect').style.display = 'none';
  document.getElementById('reviewScreen').classList.remove('active');
  document.getElementById('completeScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.add('active');

  showNextQuestion();
}

function startNextRound() {
  const nextPool = wrongList.map(q => {
    const { userAnswer, isCorrect, choices, ...orig } = q;
    return orig;
  });
  startRound(nextPool, currentRound + 1);
}

function backToMode() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('reviewScreen').classList.remove('active');
  document.getElementById('completeScreen').classList.remove('active');
  document.getElementById('modeSelect').style.display = 'block';
  updateCounts();
}

function restartQuiz() { startQuiz(currentMode); }

function showNextQuestion() {
  if (currentQueue.length === 0) {
    onRoundEnd();
    return;
  }

  currentQuestion = currentQueue[0];
  answered = false;

  const targetEl = document.getElementById('qTarget');
  const sentenceEl = document.getElementById('qSentence');
  const glossEl = document.getElementById('qGloss');
  const promptEl = document.getElementById('qPrompt');
  const choicesEl = document.getElementById('choices');

  if (!currentQuestion.choices) {
    const correctPrep = MASTER_BY_ID[currentQuestion.prepId];
    if (currentQuestion.kind === 'core') {
      currentQuestion.choices = buildCoreChoices(correctPrep, currentQuestion.distractorPool, 4);
    } else {
      currentQuestion.choices = buildPrepChoices(correctPrep, 4);
    }
  }

  if (currentQuestion.kind === 'core') {
    targetEl.style.display = 'block';
    targetEl.textContent = currentQuestion.disp;
    targetEl.classList.toggle('small', currentQuestion.disp.length > 8);
    sentenceEl.style.display = 'none';
    glossEl.style.display = 'none';
    promptEl.textContent = 'この前置詞のコアイメージは?';
  } else {
    targetEl.style.display = 'none';
    sentenceEl.style.display = 'block';
    sentenceEl.innerHTML = currentQuestion.sentence.replace('___', '<span class="blank">?</span>');
    glossEl.style.display = 'block';
    glossEl.textContent = currentQuestion.gloss;
    promptEl.textContent = '空所に入る前置詞は?';
  }

  choicesEl.innerHTML = '';
  choicesEl.className = 'choices' + (currentQuestion.choices.length === 3 ? ' cols-3' : '');
  currentQuestion.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (currentQuestion.kind === 'sentence' ? ' prep' : '');
    btn.dataset.idx = idx;
    btn.textContent = currentQuestion.kind === 'sentence' ? c.disp : c.value;
    btn.onclick = () => selectChoice(idx);
    choicesEl.appendChild(btn);
  });

  const dontknowBtn = document.getElementById('dontknowBtn');
  dontknowBtn.disabled = false;
  dontknowBtn.classList.remove('dimmed');
  dontknowBtn.style.display = 'block';

  document.getElementById('feedback').classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';

  updateProgress();
}

function onRoundEnd() {
  if (wrongList.length === 0) showComplete();
  else showReviewScreen();
}

function updateProgress() {
  document.getElementById('remaining').textContent = currentQueue.length;
  document.getElementById('correct').textContent = totalCorrect;
  const roundLabel = document.getElementById('roundLabel');
  if (currentRound >= 2) {
    roundLabel.innerHTML = `<span style="color: var(--accent); font-weight: 700;">${currentRound}周目</span> ・ `;
  } else {
    roundLabel.innerHTML = '';
  }
}

function updateCounts() {
  const aCount = PREP_MASTER.filter(p => p.group === 'A').length;
  const cCount = PREP_MASTER.filter(p => p.group === 'C').length;
  document.getElementById('countA').textContent = `収録: ${aCount}問`;
  document.getElementById('countB').textContent = `収録: ${SENTENCE_DATA.length}問(毎回${SESSION_SIZE}問を出題)`;
  document.getElementById('countC').textContent = `収録: ${cCount}問`;
}

/* ============================================
   解答処理
   ============================================ */
function selectChoice(idx) {
  if (answered) return;
  judgeAnswer(idx);
}

function selectDontKnow() {
  if (answered) return;
  judgeAnswer(-1);
}

function judgeAnswer(selectedIdx) {
  answered = true;
  totalAttempts++;

  const isDontKnow = selectedIdx === -1;
  const isCorrect = !isDontKnow && currentQuestion.choices[selectedIdx].isCorrect;

  currentQuestion.userAnswer = selectedIdx;
  currentQuestion.isCorrect = isCorrect;

  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const i = parseInt(btn.dataset.idx, 10);
    const c = currentQuestion.choices[i];
    if (c.isCorrect) {
      btn.classList.add('correct');
      if (i !== selectedIdx) btn.classList.add('dimmed');
    } else {
      if (i === selectedIdx) btn.classList.add('wrong');
      else btn.classList.add('dimmed');
    }
  });

  const dontknowBtn = document.getElementById('dontknowBtn');
  dontknowBtn.disabled = true;
  dontknowBtn.classList.add('dimmed');

  const feedback = document.getElementById('feedback');
  const resultEl = document.getElementById('feedbackResult');
  const bodyEl = document.getElementById('feedbackBody');

  if (isCorrect) {
    totalCorrect++;
    resultEl.textContent = '正解';
    resultEl.className = 'feedback-result correct';
  } else {
    resultEl.textContent = isDontKnow ? 'わからない(不正解扱い)' : '不正解';
    resultEl.className = 'feedback-result wrong';
  }

  bodyEl.innerHTML = buildFeedback(currentQuestion);
  feedback.classList.add('show');

  document.getElementById('nextBtn').style.display = 'block';

  if (!isCorrect) wrongList.push(currentQuestion);
  currentQueue.shift();

  updateProgress();
}

function buildFeedback(q) {
  let html = '';
  const prep = MASTER_BY_ID[q.prepId];

  if (q.kind === 'core') {
    html += `<div class="feedback-row"><span class="label">前置詞:</span><code>${prep.disp}</code></div>`;
    html += `<div class="feedback-row"><span class="label">コアイメージ:</span>${prep.core}</div>`;
    if (prep.group === 'C') {
      html += `<div class="note">この語のコアイメージは当塾オリジナルの補足です(資料には未収録)。</div>`;
    }
  } else {
    const filled = q.sentence.replace('___', `<code>${prep.disp}</code>`);
    html += `<div class="feedback-row"><span class="label">正解:</span><code>${prep.disp}</code></div>`;
    html += `<div class="feedback-row"><span class="label">例文:</span>${filled}</div>`;
    html += `<div class="feedback-row"><span class="label">意味:</span>${q.gloss}</div>`;
    html += `<div class="feedback-row"><span class="label">コアイメージ:</span>${prep.core}</div>`;
    if (q.note) html += `<div class="note">${q.note}</div>`;
  }
  return html;
}

function nextQuestion() { showNextQuestion(); }

/* ============================================
   レビュー画面
   ============================================ */
function showReviewScreen() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('completeScreen').classList.remove('active');
  document.getElementById('reviewScreen').classList.add('active');

  document.getElementById('reviewTitle').textContent = `${currentRound}周目の結果`;
  document.getElementById('reviewSummary').innerHTML =
    `間違えた問題: <span class="num">${wrongList.length}</span> 問<br>タップで解説を表示できます。`;

  const wrongListEl = document.getElementById('wrongList');
  wrongListEl.innerHTML = '';

  wrongList.forEach((q, idx) => {
    const prep = MASTER_BY_ID[q.prepId];
    const item = document.createElement('div');
    item.className = 'wrong-item';

    let headTarget, userAnsStr, correctAnsStr, targetClass;
    if (q.kind === 'core') {
      headTarget = prep.disp;
      targetClass = 'wrong-item-target';
      correctAnsStr = prep.core;
      userAnsStr = q.userAnswer === -1 ? 'わからない' : q.choices[q.userAnswer].value;
    } else {
      headTarget = q.sentence.replace('___', '____');
      targetClass = 'wrong-item-target sentence';
      correctAnsStr = prep.disp;
      userAnsStr = q.userAnswer === -1 ? 'わからない' : q.choices[q.userAnswer].disp;
    }

    item.innerHTML = `
      <div class="wrong-item-header" onclick="toggleWrongItem(${idx})">
        <span class="${targetClass}">${headTarget}</span>
        <span class="wrong-item-meta">
          あなた: <span class="user-ans">${userAnsStr}</span> / 正解: <span class="correct-ans">${correctAnsStr}</span>
        </span>
        <span class="wrong-item-toggle">+</span>
      </div>
      <div class="wrong-item-body">
        ${buildFeedback(q)}
      </div>
    `;
    wrongListEl.appendChild(item);
  });
}

function toggleWrongItem(idx) {
  const items = document.querySelectorAll('.wrong-item');
  if (items[idx]) items[idx].classList.toggle('expanded');
}

function endSession() { showComplete(); }

function showComplete() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('reviewScreen').classList.remove('active');
  document.getElementById('completeScreen').classList.add('active');

  document.getElementById('totalAttempts').textContent = totalAttempts;
  document.getElementById('totalCorrect').textContent = totalCorrect;
  const acc = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
  document.getElementById('accuracy').textContent = acc + '%';
}

/* 初期化 */
updateCounts();
</script>
</body>
</html>
